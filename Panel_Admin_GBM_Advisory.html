:root{--azul:#424EE0;--azul02:#F1F0FD;--negro:#0A0A0C;--negro02:#1D1D20;--gris:#EAEBED;--gris02:#F4F5F8;
 --gris03:#DEDEE0;--gris04:#8C8C8C;--gris05:#54565A;--ok:#1F9D57;--okbg:#E9F6EF;--bad:#C8453B;--badbg:#FBECEA;--amber:#B8860B;--amberbg:#FBF3E0;}
*{box-sizing:border-box;}body{margin:0;font-family:'GBM Sans',sans-serif;color:var(--negro02);background:var(--gris02);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
strong{font-weight:700;}.med{font-weight:500;}
.topbar{background:var(--negro);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;}
.brand{font-size:18px;}.brand b{font-weight:700;}.brand .sep{color:var(--gris04);margin:0 10px;}.brand .app{color:var(--gris04);font-weight:500;font-size:13px;letter-spacing:1.2px;text-transform:uppercase;}
.demo{font-size:11px;letter-spacing:.6px;text-transform:uppercase;background:#2a2a30;border:1px solid #3a3a42;border-radius:20px;padding:4px 11px;font-weight:700;}
.demo.live{background:#11351f;border-color:#1F9D57;color:#7CE0A6;}
.demo .lo{margin-left:10px;color:var(--gris04);cursor:pointer;text-transform:none;letter-spacing:0;font-weight:500;}
.wrap{max-width:1080px;margin:0 auto;padding:24px 20px 80px;}
.bar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
h1{font-weight:700;font-size:26px;letter-spacing:-.3px;margin:0;}
.sub{color:var(--gris05);font-size:14px;margin-top:2px;}
select{font-family:inherit;font-size:14.5px;padding:10px 13px;border:1.5px solid var(--gris03);border-radius:11px;background:#fff;cursor:pointer;color:var(--negro02);}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px;}
.kpi{background:#fff;border:1px solid var(--gris);border-radius:15px;padding:15px 16px;}
.kpi .n{font-size:27px;font-weight:700;letter-spacing:-1px;}.kpi .l{font-size:12.5px;color:var(--gris05);margin-top:2px;}
.kpi.acc .n{color:var(--azul);}.kpi.cert .n{color:var(--ok);}
.card{background:#fff;border:1px solid var(--gris);border-radius:16px;padding:20px 22px;margin-bottom:18px;}
.card h2{font-size:16px;font-weight:700;margin:0 0 3px;}.card .h-sub{font-size:13px;color:var(--gris05);margin:0 0 14px;}
.chart-wrap{background:var(--gris02);border:1px solid var(--gris);border-radius:13px;padding:14px;}
.chart-empty{color:var(--gris04);font-size:13px;text-align:center;padding:30px 0;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--gris04);font-weight:700;padding:8px 8px;border-bottom:1px solid var(--gris);}
td{padding:11px 8px;border-bottom:1px solid var(--gris);font-size:14px;vertical-align:middle;}
tr.adv{cursor:pointer;}tr.adv:hover{background:var(--azul02);}
.namecell{font-weight:500;}
.minibar{height:7px;background:var(--gris);border-radius:99px;overflow:hidden;width:96px;display:inline-block;vertical-align:middle;margin-right:8px;}
.minibar>i{display:block;height:100%;background:var(--azul);border-radius:99px;}
.badge{display:inline-block;font-size:12.5px;font-weight:700;border-radius:7px;padding:3px 9px;}
.badge.ok{background:var(--okbg);color:var(--ok);}.badge.mid{background:var(--azul02);color:var(--azul);}
.badge.low{background:var(--badbg);color:var(--bad);}.badge.none{background:var(--gris02);color:var(--gris04);}
.st{display:inline-block;font-size:12px;font-weight:700;border-radius:20px;padding:3px 11px;}
.st.ok{background:var(--okbg);color:var(--ok);}.st.mid{background:var(--azul02);color:var(--azul);}
.st.low{background:var(--amberbg);color:var(--amber);}.st.none{background:var(--gris02);color:var(--gris04);}
.cov-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--gris);}
.cov-row:last-child{border-bottom:none;}
.cov-name{flex:1;font-size:13.5px;min-width:0;}.cov-name .sn{color:var(--gris04);font-weight:700;margin-right:7px;}
.cov-bar{flex:0 0 200px;height:9px;background:var(--gris);border-radius:99px;overflow:hidden;}
.cov-bar>i{display:block;height:100%;border-radius:99px;}
.cov-val{flex:0 0 88px;text-align:right;font-size:12.5px;color:var(--gris05);font-variant-numeric:tabular-nums;}
.hardq{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--gris);}
.hardq:last-child{border-bottom:none;}
.hardq .pc{flex:0 0 52px;text-align:center;font-weight:700;font-size:15px;color:var(--bad);}
.hardq .tx{flex:1;font-size:13.5px;}.hardq .tx .s{color:var(--gris04);font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.cols{display:grid;grid-template-columns:1.25fr 1fr;gap:18px;align-items:start;}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--gris05);margin-top:12px;}
.dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle;}
.overlay{position:fixed;inset:0;background:rgba(10,10,12,.5);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 16px;overflow:auto;}
.overlay.on{display:flex;}
.modal{background:#fff;border-radius:18px;max-width:680px;width:100%;padding:26px;}
.modal .x{float:right;border:none;background:var(--gris02);border-radius:9px;width:34px;height:34px;font-size:18px;cursor:pointer;color:var(--gris05);}
.foot{text-align:center;color:var(--gris04);font-size:12px;margin-top:26px;}
.login{max-width:380px;margin:8vh auto 0;}
.login input{width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1.5px solid var(--gris03);border-radius:11px;margin-top:10px;}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--azul);color:#fff;border:none;border-radius:11px;padding:13px 22px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;}
.btn:hover{background:#3540c4;}
.linkish{background:none;border:none;color:var(--azul);font-family:inherit;font-size:13.5px;cursor:pointer;margin-top:14px;padding:0;}
.err{color:var(--bad);font-size:13.5px;margin-top:10px;}
.loading{color:var(--gris05);text-align:center;padding:60px 0;}
@media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr);}.cols{grid-template-columns:1fr;}.cov-bar{flex-basis:120px;}}
</style></head>

const D={"sections": [{"sec": 1, "title": "Advisory"}, {"sec": 2, "title": "Soluciones de Inversión"}, {"sec": 3, "title": "Teoría financiera clásica"}, {"sec": 4, "title": "Finanzas conductuales"}, {"sec": 5, "title": "Advisor's Alpha: el valor del asesor"}, {"sec": 6, "title": "Asset allocation"}, {"sec": 7, "title": "El médico del dinero: asesoría aplicada"}, {"sec": 8, "title": "Optimización de portafolios: Deep Dive"}, {"sec": 9, "title": "Seguros y protección patrimonial"}, {"sec": 10, "title": "Sistema de pensiones y AFOREs"}, {"sec": 11, "title": "FIBRAs: inversión inmobiliaria"}, {"sec": 12, "title": "ETFs"}, {"sec": 13, "title": "Factor investing: profundización"}, {"sec": 14, "title": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty"}, {"sec": 15, "title": "Activos alternativos y mercados privados"}, {"sec": 16, "title": "Notas estructuradas y productos estructurados"}, {"sec": 17, "title": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?"}, {"sec": 18, "title": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos"}, {"sec": 19, "title": "Renta fija"}, {"sec": 20, "title": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)"}, {"sec": 21, "title": "Producto GBM: Smart Cash"}, {"sec": 22, "title": "Producto GBM: Smart Cash Dólares"}, {"sec": 23, "title": "Producto GBM: PPR digital (Plan Personal para el Retiro)"}, {"sec": 24, "title": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios"}, {"sec": 25, "title": "Producto GBM: Cartera Modelo Siegel-WisdomTree Global Equity (UCITS)"}, {"sec": 26, "title": "Producto GBM: Euro Yield (Cuenta Temática / SMA)"}, {"sec": 27, "title": "Producto GBM: International Peso-Hedged — profundización"}, {"sec": 28, "title": "Planeación financiera integral y matemáticas financieras"}, {"sec": 29, "title": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito"}], "seccount": {"1": 25, "2": 25, "3": 20, "4": 20, "5": 20, "6": 20, "7": 20, "8": 30, "9": 20, "10": 30, "11": 20, "12": 25, "13": 25, "14": 25, "15": 30, "16": 25, "17": 15, "18": 10, "19": 30, "20": 10, "21": 12, "22": 13, "23": 15, "24": 10, "25": 5, "26": 3, "27": 5, "28": 30, "29": 10}, "totalq": 548, "hard": [{"sec": 22, "prompt": "La tasa de rendimiento de Smart Cash Dólares se caracteriza porque:", "pct": 37}, {"sec": 23, "prompt": "¿Cuáles son requisitos para abrir el PPR digital de GBM?", "pct": 33}, {"sec": 22, "prompt": "¿Qué comisión tiene Smart Cash Dólares?", "pct": 62}, {"sec": 28, "prompt": "Si los pagos mensuales de deuda de un cliente suman $18,000 y su ingreso bruto mensual es de $60", "pct": 30}, {"sec": 9, "prompt": "El &quot;problema del retiro en México&quot; se caracteriza por:", "pct": 66}, {"sec": 9, "prompt": "El límite de deducción de las aportaciones al PPR es:", "pct": 53}, {"sec": 28, "prompt": "¿Cuál será el valor futuro de $100,000 invertidos durante 10 años a una tasa anual del 8%?", "pct": 56}, {"sec": 24, "prompt": "¿Qué significa el componente &quot;Dynamic&quot; (dinámico) de la estrategia?", "pct": 38}, {"sec": 9, "prompt": "Al retirar el PPR a los 65 años, el tratamiento fiscal (2025) contempla:", "pct": 28}, {"sec": 5, "prompt": "Vanguard estima que el coaching conductual puede aportar:", "pct": 61}, {"sec": 22, "prompt": "¿Qué es Smart Cash Dólares?", "pct": 32}, {"sec": 14, "prompt": "La magnitud de las &quot;ganancias de bienestar&quot; que estima el paper para los estadounidens", "pct": 31}]};

 'Hilda Campos','Iván Castro','Jimena Ortega','Karla Domínguez','Luis Fonseca','María José Peña','Néstor Aguilar','Olivia Vega',
 'Pablo Cisneros','Quetzal Ramírez','Rodrigo Lara','Sofía Bernal','Tomás Iglesias','Úrsula Méndez','Valeria Cano','Wendy Solís','Ximena Brito','Yahir Olvera'];

function pctCls(p){return p>=80?'ok':(p>=55?'mid':'low');}
function barColor(p){return p>=80?'var(--ok)':(p>=55?'var(--azul)':'var(--bad)');}
function ago(d){return d===0?'Hoy':(d===1?'Ayer':'hace '+d+' días');}
function daysSince(ts){if(!ts)return 99;return Math.max(0,Math.round((Date.now()-new Date(ts).getTime())/86400000));}
function statusOf(cov,acc,certified){
  if(certified) return ['Certificado','ok'];
  if(cov>=80&&acc>=80) return ['Certificable','ok'];
  if(cov>=55&&acc>=70) return ['Avanzado','mid'];
  if(cov>0) return ['En progreso','low'];
  return ['Sin iniciar','none'];
}

/* ===================== MOCK (demostración) ===================== */
function rng(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;var t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const MOCK={};
(function genMock(){
  const r=rng(42); const counts={c1:14,c2:10}; let ni=0; MOCK.adv={};
  DEMO_COHORTS.forEach(c=>{ MOCK.adv[c.id]=[];
    for(let i=0;i<counts[c.id];i++){
      const lvl=r(); const sec={}; let seenTot=0,wm=0,ws=0;
      SECTIONS.forEach(s=>{ if(r()<0.35+lvl*0.55){
        const total=SECCOUNT[s.sec]; let seen=Math.min(total,Math.max(1,Math.round(total*(0.25+r()*0.7*(0.5+lvl)))));
        const mastery=Math.max(20,Math.min(100,Math.round(lvl*58+r()*55)));
        sec[s.sec]={seen,mastery}; seenTot+=seen; wm+=mastery*seen; ws+=seen; }});
      MOCK.adv[c.id].push({id:c.id+'-'+i,name:NAMES[ni++%NAMES.length],
        coverage:Math.round(seenTot/TOTALQ*100), accuracy:ws?Math.round(wm/ws):0,
        attempts:Math.round(2+lvl*12+r()*5), lastDays:Math.round(Math.pow(r(),1.5)*16), sec});
    }});
})();
function demoState(cohortId){
  const list=MOCK.adv[cohortId];
  const advisors=list.map(a=>{const cert=a.coverage>=80&&a.accuracy>=80;return {
    id:a.id,name:a.name,coverage:a.coverage,accuracy:a.accuracy,attempts:a.attempts,lastDays:a.lastDays,
    certified:cert,status:statusOf(a.coverage,a.accuracy,cert),_sec:a.sec};});
  const n=advisors.length;
  const themes=SECTIONS.map(s=>{const v=list.map(a=>a.sec[s.sec]).filter(Boolean);
    return {sec:s.sec,title:SECTITLE[s.sec],m:v.length?Math.round(v.reduce((x,y)=>x+y.mastery,0)/v.length):null,practiced:v.length};});
  const avgAcc=Math.round(advisors.reduce((s,a)=>s+a.accuracy,0)/n);
  const r=rng(cohortId==='c1'?7:9); const trend=[]; for(let w=0;w<8;w++){const base=Math.max(35,avgAcc-22)+(22)*(w/7); trend.push(Math.round(Math.min(98,base+(r()*8-4))));}
  return {
    cohorts:DEMO_COHORTS, curCohort:cohortId,
    kpis:{n, active:advisors.filter(a=>a.lastDays<=7).length,
          avgCov:Math.round(advisors.reduce((s,a)=>s+a.coverage,0)/n), avgAcc,
          certified:advisors.filter(a=>a.certified).length, certLabel:'Certificables'},
    advisors, themes, hard:HARD, trend,
    sectionDetail:(id)=>advisors.find(a=>a.id===id)._sec
  };
}

/* ===================== LIVE (Supabase) ===================== */
function isoWeek(d){const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-day);const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));return t.getUTCFullYear()+'-'+String(Math.ceil(((t-ys)/86400000+1)/7)).padStart(2,'0');}
async function liveState(cohortId){
  const {data:cov,error:e1}=await sbc.from('v_cohort_overview').select('*');
  if(e1) throw e1;
  const cohorts=cov.map(c=>({id:c.cohort_id,name:c.name}));
  const cur=cohortId||(cohorts[0]&&cohorts[0].id);
  const {data:up,error:e2}=await sbc.from('v_user_progress').select('*').eq('cohort_id',cur);
  if(e2) throw e2;
  const {data:cs}=await sbc.from('v_certification_status').select('*').eq('cohort_id',cur);
  const certMap={}; (cs||[]).forEach(c=>certMap[c.user_id]=c);
  const advisors=(up||[]).map(a=>{const certified=!!(certMap[a.user_id]&&certMap[a.user_id].certified);
    return {id:a.user_id,name:a.full_name,coverage:Math.round(a.coverage_pct||0),accuracy:Math.round(a.accuracy_pct||0),
      attempts:a.attempts||0,lastDays:daysSince(a.last_activity),certified,
      status:statusOf(a.coverage_pct||0,a.accuracy_pct||0,certified)};});
  const {data:csec}=await sbc.from('v_cohort_section').select('*').eq('cohort_id',cur);
  const secMap={}; (csec||[]).forEach(r=>secMap[r.section_id]={m:Math.round(r.avg_mastery),practiced:r.advisors_practiced});
  const themes=SECTIONS.map(s=>({sec:s.sec,title:SECTITLE[s.sec],m:secMap[s.sec]?secMap[s.sec].m:null,practiced:secMap[s.sec]?secMap[s.sec].practiced:0}));
  const {data:diff}=await sbc.from('v_question_difficulty').select('*').not('times_answered','eq',0).order('pct_correct',{ascending:true}).limit(8);
  let hard=[];
  if(diff&&diff.length){
    const ids=diff.map(d=>d.question_id);
    const {data:qs}=await sbc.from('questions').select('id,prompt').in('id',ids);
    const pm={}; (qs||[]).forEach(q=>pm[q.id]=q.prompt);
    hard=diff.map(d=>({sec:d.section_id,title:SECTITLE[d.section_id],
      prompt:(pm[d.question_id]||'').replace(/<[^>]+>/g,'').slice(0,96),pct:Math.round(d.pct_correct)}));
  }
  let trend=null;
  try{
    const {data:at}=await sbc.from('quiz_attempts').select('finished_at,score_pct,profiles!inner(cohort_id)').eq('profiles.cohort_id',cur);
    if(at&&at.length){const byW={}; at.forEach(r=>{const k=isoWeek(new Date(r.finished_at));(byW[k]=byW[k]||[]).push(Number(r.score_pct));});
      const ks=Object.keys(byW).sort().slice(-8); trend=ks.map(k=>Math.round(byW[k].reduce((a,b)=>a+b,0)/byW[k].length));}
  }catch(e){trend=null;}
  const n=advisors.length||1;
  return {
    cohorts,curCohort:cur,
    kpis:{n:advisors.length, active:advisors.filter(a=>a.lastDays<=7).length,
          avgCov:Math.round(advisors.reduce((s,a)=>s+a.coverage,0)/n),
          avgAcc:Math.round(advisors.reduce((s,a)=>s+a.accuracy,0)/n),
          certified:advisors.filter(a=>a.certified).length, certLabel:'Certificados'},
    advisors,themes,hard,trend,
    sectionDetail:async(id)=>{const {data}=await sbc.from('v_user_section').select('*').eq('user_id',id);
      const o={}; (data||[]).forEach(r=>o[r.section_id]={seen:r.seen,mastery:Math.round(r.mastery_pct)}); return o;}
  };
}

/* ===================== RENDER ===================== */
let STATE=null, MODE='demo';
function render(ST){
  STATE=ST;
  const {advisors,themes,hard,trend,kpis}=ST;
  const weakest=themes.filter(t=>t.m!==null).sort((a,b)=>a.m-b.m).slice(0,3);
  let chart;
  if(trend&&trend.length){
    const W=720,H=150,pad=28; const m=trend.length;
    const xs=i=>m===1?W/2:pad+i*(W-2*pad)/(m-1), ys=v=>(H-pad)-v/100*(H-2*pad);
    const grid=[0,50,100].map(g=>'<line x1="'+pad+'" y1="'+ys(g)+'" x2="'+(W-pad)+'" y2="'+ys(g)+'" stroke="#DEDEE0"/><text x="'+(pad-7)+'" y="'+(ys(g)+3)+'" text-anchor="end" font-size="9" fill="#8C8C8C">'+g+'</text>').join('');
    const poly=trend.map((v,i)=>xs(i).toFixed(0)+','+ys(v).toFixed(0)).join(' ');
    const dots=trend.map((v,i)=>'<circle cx="'+xs(i).toFixed(0)+'" cy="'+ys(v).toFixed(0)+'" r="3.2" fill="#424EE0"/>').join('');
    const xl=trend.map((v,i)=>'<text x="'+xs(i).toFixed(0)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="#8C8C8C">S'+(i+1)+'</text>').join('');
    chart='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto">'+grid+'<polyline points="'+poly+'" fill="none" stroke="#424EE0" stroke-width="2.5" stroke-linejoin="round"/>'+dots+xl+'</svg>';
  } else { chart='<div class="chart-empty">Aún no hay suficientes intentos para mostrar la tendencia.</div>'; }
  const cohortOpts=ST.cohorts.map(c=>'<option value="'+c.id+'"'+(c.id===ST.curCohort?' selected':'')+'>'+c.name+'</option>').join('');
  const rows=advisors.slice().sort((a,b)=>b.coverage-a.coverage).map(a=>
    '<tr class="adv" data-id="'+a.id+'"><td class="namecell">'+a.name+'</td>'
    +'<td><span class="minibar"><i style="width:'+a.coverage+'%"></i></span>'+a.coverage+'%</td>'
    +'<td><span class="badge '+pctCls(a.accuracy)+'">'+a.accuracy+'%</span></td>'
    +'<td>'+a.attempts+'</td><td style="color:var(--gris05)">'+ago(a.lastDays)+'</td>'
    +'<td><span class="st '+a.status[1]+'">'+a.status[0]+'</span></td></tr>').join('')
    || '<tr><td colspan="6" style="color:var(--gris04)">Sin asesores en este cohort.</td></tr>';
  const themeRows=themes.map(t=>{const m=t.m,w=m===null?0:m,col=m===null?'var(--gris03)':barColor(m);
    const val=m===null?'<span style="color:var(--gris04)">sin práctica</span>':m+'% · '+t.practiced+' asesores';
    return '<div class="cov-row"><div class="cov-name"><span class="sn">S'+t.sec+'</span>'+t.title+'</div>'
      +'<div class="cov-bar"><i style="width:'+w+'%;background:'+col+'"></i></div><div class="cov-val">'+val+'</div></div>';}).join('');
  const hardRows=(hard&&hard.length)?hard.slice(0,8).map(h=>'<div class="hardq"><div class="pc">'+h.pct+'%</div><div class="tx"><span class="s">Sección '+h.sec+' · '+(h.title||'')+'</span><br>'+h.prompt+'…</div></div>').join('')
    :'<div class="chart-empty">Sin datos de dificultad todavía.</div>';
  app.innerHTML='';
  app.appendChild($('<div>'
   +'<div class="bar"><div><h1>Avance del cohort</h1><div class="sub">Seguimiento de la Ruta de Formación · '+kpis.n+' asesores</div></div>'
   +'<select id="coh">'+cohortOpts+'</select></div>'
   +'<div class="kpis">'
     +'<div class="kpi"><div class="n">'+kpis.n+'</div><div class="l">Asesores</div></div>'
     +'<div class="kpi"><div class="n">'+kpis.active+'</div><div class="l">Activos (7 días)</div></div>'
     +'<div class="kpi"><div class="n">'+kpis.avgCov+'%</div><div class="l">Cobertura prom.</div></div>'
     +'<div class="kpi acc"><div class="n">'+kpis.avgAcc+'%</div><div class="l">Aciertos prom.</div></div>'
     +'<div class="kpi cert"><div class="n">'+kpis.certified+'</div><div class="l">'+kpis.certLabel+'</div></div>'
   +'</div>'
   +'<div class="card"><h2>Mejoría del cohort</h2><p class="h-sub">Aciertos promedio por semana</p><div class="chart-wrap">'+chart+'</div></div>'
   +'<div class="cols">'
     +'<div class="card"><h2>Asesores</h2><p class="h-sub">Clic en una fila para ver el detalle por tema</p>'
       +'<table><thead><tr><th>Nombre</th><th>Cobertura</th><th>Aciertos</th><th>Bloques</th><th>Última actividad</th><th>Estatus</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
     +'<div><div class="card"><h2>Dominio por tema</h2><p class="h-sub">Promedio del cohort'+(weakest.length?' · a reforzar: '+weakest.map(w=>'S'+w.sec).join(', '):'')+'</p>'+themeRows
        +'<div class="legend"><span><span class="dot" style="background:var(--ok)"></span>&ge;80%</span><span><span class="dot" style="background:var(--azul)"></span>55&ndash;79%</span><span><span class="dot" style="background:var(--bad)"></span>&lt;55%</span><span><span class="dot" style="background:var(--gris03)"></span>Sin práctica</span></div></div>'
     +'<div class="card"><h2>Preguntas más difíciles</h2><p class="h-sub">Menor % de acierto — candidatas a revisar</p>'+hardRows+'</div></div>'
   +'</div>'
   +'<div class="foot">'+(MODE==='live'?'Conectado a Supabase · datos en vivo.':'Panel de demostración · los datos mostrados son simulados. Configura tus llaves para ver datos reales.')+'</div>'
   +'</div>'));
  document.getElementById('coh').onchange=e=>switchCohort(e.target.value);
  document.querySelectorAll('tr.adv').forEach(tr=>tr.onclick=()=>openAdvisor(tr.getAttribute('data-id')));
}
async function switchCohort(id){
  if(MODE==='live'){ app.innerHTML='<div class="loading">Cargando…</div>'; try{ render(await liveState(id)); }catch(e){ app.innerHTML='<div class="err" style="padding:20px">Error al cargar: '+e.message+'</div>'; } }
  else render(demoState(id));
}
async function openAdvisor(id){
  const a=STATE.advisors.find(x=>x.id===id);
  let sec; try{ sec=await STATE.sectionDetail(id); }catch(e){ sec={}; }
  const secRows=SECTIONS.filter(s=>sec[s.sec]).map(s=>{const d=sec[s.sec];
    return '<div class="cov-row"><div class="cov-name"><span class="sn">S'+s.sec+'</span>'+SECTITLE[s.sec]+'</div>'
      +'<div class="cov-bar"><i style="width:'+d.mastery+'%;background:'+barColor(d.mastery)+'"></i></div>'
      +'<div class="cov-val">'+d.mastery+'% · '+d.seen+'/'+SECCOUNT[s.sec]+'</div></div>';}).join('')
    || '<p class="h-sub">Aún sin práctica registrada.</p>';
  const m=document.getElementById('modal');
  m.innerHTML='<button class="x" id="cx">&times;</button><h2 style="font-size:20px;margin:0 0 2px">'+a.name+'</h2>'
    +'<p class="h-sub"><span class="st '+a.status[1]+'">'+a.status[0]+'</span></p>'
    +'<div class="kpis" style="grid-template-columns:repeat(4,1fr);margin:14px 0 18px">'
      +'<div class="kpi"><div class="n">'+a.coverage+'%</div><div class="l">Cobertura</div></div>'
      +'<div class="kpi acc"><div class="n">'+a.accuracy+'%</div><div class="l">Aciertos</div></div>'
      +'<div class="kpi"><div class="n">'+a.attempts+'</div><div class="l">Bloques</div></div>'
      +'<div class="kpi"><div class="n" style="font-size:18px;padding-top:6px">'+ago(a.lastDays)+'</div><div class="l">Última actividad</div></div></div>'
    +'<h2 style="font-size:15px;margin:0 0 8px">Dominio por tema</h2>'+secRows;
  document.getElementById('ov').classList.add('on');
  document.getElementById('cx').onclick=close;
}
function close(){document.getElementById('ov').classList.remove('on');}
document.getElementById('ov').onclick=e=>{if(e.target.id==='ov')close();};

/* ===================== LOGIN (solo modo live) ===================== */
function renderLogin(msg){
  app.innerHTML='';
  const c=$('<div class="card login"><h1 style="font-size:22px">Acceso académico</h1>'
    +'<p class="sub">Inicia sesión con tu cuenta de staff para ver el avance de los asesores.</p>'
    +'<input id="em" type="email" placeholder="Correo">'
    +'<input id="pw" type="password" placeholder="Contraseña">'
    +(msg?'<div class="err">'+msg+'</div>':'')
    +'<br><button class="btn" id="go">Entrar</button>'
    +'<br><button class="linkish" id="demo">Ver datos de demostración</button></div>');
  app.appendChild(c);
  c.querySelector('#go').onclick=async()=>{
    try{ const {error}=await sbc.auth.signInWithPassword({email:c.querySelector('#em').value,password:c.querySelector('#pw').value});
      if(error) return renderLogin(error.message); boot(); }
    catch(e){ renderLogin(e.message); }
  };
  c.querySelector('#demo').onclick=()=>{MODE='demo';badge.textContent='Datos de demostración';badge.classList.remove('live');render(demoState('c1'));};
}

/* ===================== ARRANQUE ===================== */
async function boot(){
  if(!LIVE || !sbc){ MODE='demo'; render(demoState('c1')); return; }
  const {data:{session}}=await sbc.auth.getSession();
  if(!session){ return renderLogin(''); }
  try{
    const uid=session.user.id;
    const {data:prof}=await sbc.from('profiles').select('role').eq('id',uid).single();
    if(!prof || !['admin','trainer'].includes(prof.role)){ await sbc.auth.signOut(); return renderLogin('Tu cuenta no tiene acceso al panel académico.'); }
    MODE='live'; badge.classList.add('live');
    badge.innerHTML='Conectado<span class="lo" id="lo">· salir</span>';
    document.getElementById('lo').onclick=async()=>{await sbc.auth.signOut();location.reload();};
    app.innerHTML='<div class="loading">Cargando datos…</div>';
    render(await liveState(null));
  }catch(e){ app.innerHTML='<div class="err" style="padding:20px">Error: '+e.message+'</div>'; }
}
boot();
