El \"noise trader risk\" de De Long, Shleifer, Summers &amp; Waldmann (1990) sostiene que:", "opts": [{"text": "Los <em>noise traders</em> siempre pierden y desaparecen del mercado.", "correct": false}, {"text": "El sentimiento de los <em>noise traders</em> es un riesgo en sí mismo que los arbitrajistas no pueden ignorar, lo que limita su capacidad de corregir precios.", "correct": true}, {"text": "El arbitraje elimina de inmediato cualquier desviación.", "correct": false}, {"text": "El sentimiento es irrelevante para la formación de precios.", "correct": false}], "just": "Como el sentimiento puede empeorar antes de revertir, apostar contra los <em>noise traders</em> conlleva riesgo; ese riesgo permite que el mispricing persista."}, {"id": 596, "sec": 4, "secTitle": "Finanzas conductuales", "q": "El X-CAPM (Barberis, Greenwood, Jin &amp; Shleifer, 2015) se diferencia del CAPM porque:", "opts": [{"text": "Elimina por completo el factor de mercado.", "correct": false}, {"text": "Sustituye las expectativas racionales por expectativas extrapolativas, añadiendo un sesgo de sentimiento al precio.", "correct": true}, {"text": "Supone que todos los inversionistas son perfectamente racionales.", "correct": false}, {"text": "Asume arbitraje sin fricciones.", "correct": false}], "just": "El X-CAPM incorpora extrapolación de retornos pasados (los inversionistas esperan que las rachas continúen), generando sobre/sub-reacción endógenas."}, {"id": 597, "sec": 13, "secTitle": "Factor investing: profundización", "q": "Asness, Moskowitz &amp; Pedersen (2013), \"Value and Momentum Everywhere\", documentan que:", "opts": [{"text": "Value y momentum solo funcionan en acciones estadounidenses.", "correct": false}, {"text": "Ambos estilos funcionan en acciones, índices, divisas, bonos y <em>commodities</em>, y están negativamente correlacionados entre sí.", "correct": true}, {"text": "Value y momentum están positivamente correlacionados.", "correct": false}, {"text": "Momentum funciona, pero value no aparece fuera de EE. UU.", "correct": false}], "just": "El artículo (Journal of Finance) muestra primas de value y momentum en múltiples clases de activos y una correlación negativa entre ambos estilos."}, {"id": 598, "sec": 13, "secTitle": "Factor investing: profundización", "q": "La ventaja de combinar value y momentum proviene principalmente de:", "opts": [{"text": "Un retorno esperado adicional que aporta la combinación.", "correct": false}, {"text": "Su correlación negativa: la diversificación eleva el Sharpe aunque el retorno medio casi no cambie.", "correct": true}, {"text": "Reducir el retorno para bajar el riesgo.", "correct": false}, {"text": "Eliminar por completo el riesgo de mercado.", "correct": false}], "just": "La \"aritmética de la diversificación\": el Sharpe combinado depende de la correlación entre estilos; en un año uno sufre y el otro compensa, colapsando la volatilidad sin sacrificar la media (~6%)."}, {"id": 599, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El \"value spread\" se define como:", "opts": [{"text": "La diferencia de rendimiento entre value y momentum.", "correct": false}, {"text": "La diferencia de valuación entre el decil barato y el caro; se ensancha en euforia y se comprime en pánico.", "correct": true}, {"text": "La comisión de un ETF de value.", "correct": false}, {"text": "La brecha entre el CAPM y el modelo de cinco factores.", "correct": false}], "just": "Es una medida del \"cuán barato está lo barato frente a lo caro\"; su amplitud informa sobre el retorno esperado futuro del estilo."}, {"id": 600, "sec": 13, "secTitle": "Factor investing: profundización", "q": "La lectura de AQR (Asness; Israel, Laursen &amp; Richardson, 2020–2021) sobre la caída de value sostiene que:", "opts": [{"text": "Value se \"rompió\" estructuralmente y dejó de funcionar.", "correct": false}, {"text": "La caída no fue una ruptura de fundamentos, sino el <em>spread</em> de valuación abriéndose a un extremo histórico; abaratarse deprime el retorno pasado pero eleva el esperado futuro.", "correct": true}, {"text": "El <em>spread</em> de valuación se comprimió a mínimos.", "correct": false}, {"text": "La caída se debió a un aumento de comisiones.", "correct": false}], "just": "AQR descompone la caída y concluye que fue casi toda <em>spread</em> (valuación), no fundamentos; por eso ubican el punto de \"máximo dolor\" como el de mayor premio esperado."}, {"id": 601, "sec": 13, "secTitle": "Factor investing: profundización", "q": "Los \"momentum crashes\" (Daniel &amp; Moskowitz, 2016) se caracterizan porque:", "opts": [{"text": "Momentum pierde de forma lenta y constante.", "correct": false}, {"text": "Momentum gana lento y constante, pero colapsa de golpe en los giros de mercado; su talón de Aquiles es la cola izquierda (asimetría negativa).", "correct": true}, {"text": "Momentum nunca sufre caídas pronunciadas.", "correct": false}, {"text": "Sus caídas son simétricas respecto a las ganancias.", "correct": false}], "just": "En los rebotes tras caídas fuertes, la cartera de momentum (corta en los perdedores que rebotan) sufre pérdidas abruptas: retornos con sesgo negativo y colas izquierdas."}, {"id": 602, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El hallazgo de McLean &amp; Pontiff (2016) —las anomalías pierden ~la mitad de su prima tras publicarse— se usa como argumento de que:", "opts": [{"text": "Las anomalías son 100% compensación por riesgo.", "correct": false}, {"text": "Una prima de puro riesgo no debería debilitarse solo por hacerse conocida; su decaimiento post-publicación apunta a un componente de error corregible.", "correct": true}, {"text": "Las anomalías desaparecen por completo al publicarse.", "correct": false}, {"text": "La publicación no tiene efecto sobre las primas.", "correct": false}], "just": "Que la prima caiga (pero no desaparezca, por límites al arbitraje) al volverse conocida es difícil de conciliar con una compensación por riesgo estable."}, {"id": 603, "sec": 13, "secTitle": "Factor investing: profundización", "q": "La dependencia del sentimiento (Stambaugh-Yu-Yuan) indica que las anomalías:", "opts": [{"text": "Son más fuertes tras periodos de pesimismo extremo.", "correct": false}, {"text": "Son más fuertes tras olas de optimismo (alto sentimiento), lo que apunta a un origen conductual más que de riesgo.", "correct": true}, {"text": "No tienen relación con el sentimiento del mercado.", "correct": false}, {"text": "Solo existen en mercados bajistas.", "correct": false}], "just": "Si las primas dependieran solo del riesgo, no deberían variar con el sentimiento; su fortalecimiento tras el optimismo sugiere mispricing."}, {"id": 604, "sec": 13, "secTitle": "Factor investing: profundización", "q": "La advertencia \"value no es una sola cosa\" se refiere a que:", "opts": [{"text": "Todas las métricas de valor producen exactamente la misma cartera.", "correct": false}, {"text": "La métrica elegida (B/M, E/P, cash-flow-to-price) cambia la composición de la cartera y su comportamiento.", "correct": true}, {"text": "El valor solo se mide con el P/E.", "correct": false}, {"text": "El valor no puede formalizarse como factor.", "correct": false}], "just": "Distintas razones de valuación capturan aspectos diferentes; la elección de métrica altera qué acciones entran y cómo se comporta la estrategia."}, {"id": 605, "sec": 13, "secTitle": "Factor investing: profundización", "q": "En términos de implementación, value y momentum se distinguen porque:", "opts": [{"text": "Ambos exigen rotación mínima y son fáciles de mantener.", "correct": false}, {"text": "Momentum exige alta rotación (costos de transacción), mientras value exige paciencia ante periodos prolongados de bajo desempeño.", "correct": true}, {"text": "Value rota cada pocos meses y momentum casi nunca.", "correct": false}, {"text": "Ninguno enfrenta costos ni periodos de bajo desempeño.", "correct": false}], "just": "La cartera de momentum se recompone con frecuencia; la de value puede tardar años en dar la razón, lo que pone a prueba la disciplina del inversionista."}, {"id": 606, "sec": 13, "secTitle": "Factor investing: profundización", "q": "La robustez reportada en \"Value and Momentum Everywhere\" indica que:", "opts": [{"text": "El combo 50/50 solo supera a cada estilo en un subperiodo específico.", "correct": false}, {"text": "El combo 50/50 supera a cada estilo por separado en todos los subperiodos y regímenes de liquidez, por lo que no es un artefacto de una sola época.", "correct": true}, {"text": "El resultado desaparece al controlar por liquidez.", "correct": false}, {"text": "La combinación reduce el Sharpe respecto a cada estilo.", "correct": false}], "just": "La superioridad del combo se sostiene en distintos subperiodos y condiciones de liquidez, reforzando que no es casualidad muestral."}, {"id": 607, "sec": 13, "secTitle": "Factor investing: profundización", "q": "La descripción correcta del <em>Global Equity Factor</em> (GEF) de GBM es:", "opts": [{"text": "Una cartera <em>long-short</em> pura de momentum, sin exposición al mercado.", "correct": false}, {"text": "Un portafolio global de renta variable inclinado hacia el factor momentum; su historial muestra crecimiento sostenido con caídas abruptas —la \"firma\" del momentum.", "correct": true}, {"text": "Un fondo de renta fija con cobertura cambiaria.", "correct": false}, {"text": "Una réplica del índice de mercado sin ningún sesgo de factor.", "correct": false}], "just": "GEF no es un factor puro <em>long-short</em>: es un portafolio de renta variable global con <em>tilt</em> a momentum (la exposición de mercado sigue dominando), por lo que exhibe el perfil de crecimiento y <em>drawdowns</em> propio del estilo."}, {"id": 608, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "La síntesis del rol del asesor frente a value y momentum es que agrega valor:", "opts": [{"text": "Prediciendo el momento exacto de entrada y salida del mercado.", "correct": false}, {"text": "Eliminando por completo el riesgo del portafolio.", "correct": false}, {"text": "Gestionando dos conjuntos de sesgos: los del mercado, que crean la prima, y los del cliente, que le impiden capturarla.", "correct": true}, {"text": "Garantizando el rendimiento de los factores.", "correct": false}], "just": "Las primas de factor nacen de sesgos del mercado; capturarlas exige sostener la estrategia pese a los sesgos del propio cliente —ahí es donde el acompañamiento conductual del asesor es decisivo."}, {"id": 609, "sec": 12, "secTitle": "ETFs", "q": "El ETF SPY (SPDR S&amp;P 500) se distingue porque:", "opts": [{"text": "Replica al Nasdaq-100.", "correct": false}, {"text": "Replica al S&amp;P 500 y fue el primer ETF listado en EE. UU. (1993), emitido por State Street.", "correct": true}, {"text": "Es un ETF de bonos del Tesoro de largo plazo.", "correct": false}, {"text": "Invierte en empresas de semiconductores.", "correct": false}], "just": "SPY, lanzado en 1993 por State Street (marca SPDR), fue el primer ETF estadounidense y sigue al índice S&amp;P 500 de grandes empresas de EE. UU."}, {"id": 610, "sec": 12, "secTitle": "ETFs", "q": "El ETF VOO (Vanguard S&amp;P 500):", "opts": [{"text": "Replica un índice de mercados emergentes.", "correct": false}, {"text": "Replica al S&amp;P 500, es de Vanguard y, a 2026, es el ETF más grande del mundo por activos (primero en superar US$1 billón).", "correct": true}, {"text": "Es un ETF apalancado 3x.", "correct": false}, {"text": "Invierte solo en oro físico.", "correct": false}], "just": "VOO sigue al S&amp;P 500 con un costo de 0.03%; superó a SPY como el mayor ETF del mundo en 2025 y cruzó US$1 trillion (billón anglosajón) en junio de 2026."}, {"id": 611, "sec": 12, "secTitle": "ETFs", "q": "SPY, VOO e IVV coinciden en que:", "opts": [{"text": "Cada uno replica un índice distinto.", "correct": false}, {"text": "Los tres son ETFs de renta fija.", "correct": false}, {"text": "Los tres replican el mismo índice (S&amp;P 500); difieren en emisor, costo y estructura.", "correct": true}, {"text": "Ninguno cotiza en bolsa.", "correct": false}], "just": "IVV (iShares Core S&amp;P 500, de BlackRock), VOO (Vanguard) y SPY (State Street) dan la misma exposición al S&amp;P 500; se diferencian en comisión (VOO/IVV 0.03% vs. SPY ~0.09%) y estructura."}, {"id": 612, "sec": 12, "secTitle": "ETFs", "q": "Una diferencia estructural de SPY frente a VOO e IVV es que:", "opts": [{"text": "SPY no cotiza en tiempo real.", "correct": false}, {"text": "SPY es un <em>unit investment trust</em> (UIT), una estructura más antigua que no reinvierte dividendos internamente, mientras VOO e IVV son fondos abiertos.", "correct": true}, {"text": "SPY invierte en un índice diferente.", "correct": false}, {"text": "SPY es de gestión activa.", "correct": false}], "just": "Como UIT, SPY mantiene los dividendos en efectivo hasta la distribución trimestral; los fondos abiertos (VOO, IVV) pueden reinvertirlos de inmediato."}, {"id": 613, "sec": 12, "secTitle": "ETFs", "q": "El ETF QQQ (Invesco QQQ) da exposición a:", "opts": [{"text": "Todo el mercado accionario de EE. UU.", "correct": false}, {"text": "El Nasdaq-100: las 100 mayores empresas no financieras listadas en el Nasdaq, con fuerte peso tecnológico.", "correct": true}, {"text": "Bonos corporativos de alto rendimiento.", "correct": false}, {"text": "El índice mexicano IPC.", "correct": false}], "just": "QQQ replica el Nasdaq-100, concentrado en grandes tecnológicas (las \"Magnificent Seven\" pesan una parte importante)."}, {"id": 614, "sec": 12, "secTitle": "ETFs", "q": "El VanEck Semiconductor ETF (SMH) invierte en:", "opts": [{"text": "El S&amp;P 500 completo.", "correct": false}, {"text": "Bonos del Tesoro.", "correct": false}, {"text": "Empresas del sector de semiconductores (un índice de las principales semiconductoras listadas en EE. UU.).", "correct": true}, {"text": "Oro y metales preciosos.", "correct": false}], "just": "SMH es un ETF sectorial concentrado en semiconductores; por ello es más volátil y menos diversificado que un índice amplio."}, {"id": 615, "sec": 12, "secTitle": "ETFs", "q": "El iShares Russell 2000 ETF (IWM) ofrece exposición a:", "opts": [{"text": "Grandes empresas globales.", "correct": false}, {"text": "Empresas de pequeña capitalización (<em>small caps</em>) de EE. UU., vía el índice Russell 2000.", "correct": true}, {"text": "Bonos municipales.", "correct": false}, {"text": "Materias primas.", "correct": false}], "just": "IWM replica el Russell 2000, el referente de <em>small caps</em> estadounidenses."}, {"id": 616, "sec": 12, "secTitle": "ETFs", "q": "El iShares MSCI USA Momentum Factor ETF (MTUM) selecciona acciones por:", "opts": [{"text": "Su bajo P/E (valor).", "correct": false}, {"text": "Su alto rendimiento por dividendo.", "correct": false}, {"text": "Su alto momentum de precio: acciones estadounidenses que han mostrado una tendencia alcista reciente.", "correct": true}, {"text": "Su baja volatilidad.", "correct": false}], "just": "MTUM sigue el índice MSCI USA Momentum, que sobrepondera acciones de EE. UU. con fuerte momentum de precio."}, {"id": 617, "sec": 12, "secTitle": "ETFs", "q": "El iShares Edge MSCI World Momentum Factor UCITS ETF (IWMO):", "opts": [{"text": "Invierte solo en acciones mexicanas.", "correct": false}, {"text": "Captura el factor momentum en mercados desarrollados globales (índice MSCI World Momentum) y es un ETF UCITS domiciliado en Irlanda.", "correct": true}, {"text": "Es un ETF de bonos de corto plazo.", "correct": false}, {"text": "Replica el Nasdaq-100.", "correct": false}], "just": "IWMO (iShares, BlackRock) sigue el MSCI World Momentum —acciones de 23 países desarrollados con alto momentum— bajo estructura UCITS europea."}, {"id": 618, "sec": 12, "secTitle": "ETFs", "q": "¿En qué se diferencian MTUM e IWMO, siendo ambos ETFs de momentum?", "opts": [{"text": "MTUM es de renta fija e IWMO de renta variable." ext": "Un índice de bonos.", "correct": false}], "just": "A diferencia de VOO (solo S&amp;P 500), VTI abarca todo el espectro de capitalización del mercado estadounidense."}, {"id": 622, "sec": 12, "secTitle": "ETFs", "q": "El Vanguard Growth ETF (VUG) invierte en:", "opts": [{"text": "Empresas de valor (bajo P/E).", "correct": false}, {"text": "Empresas estadounidenses de gran capitalización con estilo de crecimiento (índice CRSP US Large Cap Growth).", "correct": true}, {"text": "Bonos de grado de inversión.", "correct": false}, {"text": "Materias primas.", "correct": false}], "just": "VUG sobrepondera acciones <em>growth</em> de gran capitalización de EE. UU.; es el complemento de un ETF de estilo <em>value</em>."}, {"id": 623, "sec": 12, "secTitle": "ETFs", "q": "El iShares Bitcoin Trust (IBIT) ofrece:", "opts": [{"text": "Exposición a futuros de Bitcoin únicamente.", "correct": false}, {"text": "Exposición a Bitcoin al contado (<em>spot</em>), a través de un ETF de BlackRock, sin que el inversionista maneje llaves privadas ni custodia.", "correct": true}, {"text": "Un canasto de empresas de tecnología.", "correct": false}, {"text": "Bonos ligados a la inflación.", "correct": false}], "just": "IBIT mantiene Bitcoin al contado; permite exposición a la criptomoneda dentro de una cuenta de valores tradicional."}, {"id": 624, "sec": 12, "secTitle": "ETFs", "q": "El iShares 20+ Year Treasury Bond ETF (TLT) invierte en:", "opts": [{"text": "Acciones de crecimiento.", "correct": false}, {"text": "Bonos del Tesoro de EE. UU. de largo plazo (vencimientos de 20 años o más), con alta sensibilidad a las tasas de interés (duración larga).", "correct": true}, {"text": "Oro físico.", "correct": false}, {"text": "Bonos corporativos de corto plazo.", "correct": false}], "just": "Al concentrar Treasuries de muy largo plazo, TLT tiene una duración elevada: su precio sube o baja con fuerza ante cambios en las tasas."}, {"id": 625, "sec": 12, "secTitle": "ETFs", "q": "El Vanguard Total Bond Market ETF (BND) ofrece:", "opts": [{"text": "Exposición a un solo bono del Tesoro de largo plazo.", "correct": false}, {"text": "Un universo amplio y diversificado de bonos de EE. UU. de grado de inversión (índice Bloomberg US Aggregate), de duración intermedia.", "correct": true}, {"text": "Acciones de mercados emergentes.", "correct": false}, {"text": "Materias primas.", "correct": false}], "just": "BND replica el \"Agg\", que agrupa Treasuries, bonos de agencias, corporativos IG y titulizados de EE. UU.; es un núcleo de renta fija diversificado."}, {"id": 626, "sec": 12, "secTitle": "ETFs", "q": "¿Cuál es la diferencia clave entre TLT y BND?", "opts": [{"text": "TLT es de acciones y BND de bonos.", "correct": false}, {"text": "TLT concentra Treasuries de larguísimo plazo (muy sensible a tasas), mientras BND es un agregado diversificado de bonos IG de EE. UU. con duración intermedia.", "correct": true}, {"text": "Ambos son idénticos.", "correct": false}, {"text": "BND es apalancado y TLT inverso.", "correct": false}], "just": "TLT es una apuesta de duración larga (Treasuries 20+ años); BND busca exposición amplia y equilibrada a la renta fija estadounidense."}, {"id": 627, "sec": 12, "secTitle": "ETFs", "q": "El SPDR Gold Shares (GLD) da exposición a:", "opts": [{"text": "Acciones de mineras de oro.", "correct": false}, {"text": "El precio del oro físico (bullion): es un ETF de materia prima, no de acciones ni bonos.", "correct": true}, {"text": "Bonos ligados al oro.", "correct": false}, {"text": "El índice S&amp;P 500.", "correct": false}], "just": "GLD está respaldado por oro físico en custodia; su valor sigue el precio del metal, no a empresas mineras."}, {"id": 628, "sec": 12, "secTitle": "ETFs", "q": "El iShares NAFTRAC replica:", "opts": [{"text": "El S&amp;P 500.", "correct": false}, {"text": "El índice S&amp;P/BMV IPC, principal referente accionario de México (alrededor de 35 empresas de gran capitalización); fue el primer ETF de América Latina     .concat(SECTIONS.map(s=>{

      return '<option value="'+s.sec+'">Sección '+s.sec+' — '+s.title+' ('+c+')</option>';
    })).join('');
  app.innerHTML = '';
  const card = $(`<div class="card">
    <p class="eyebrow">Ruta de formación · Invierte con Propósito</p>
    <h1>Practica para tu certificación</h1>
    <p class="muted">Genera un bloque aleatorio de preguntas en formato examen, con tiempo limitado. Al terminar, revisa cada pregunta con su justificación.</p>

    <div class="field"><label>Número de preguntas</label>
      <div class="opts-row" id="f-count"></div></div>

    <div class="field"><label>Tema</label>
      <select id="f-sec">${secOpts}</select></div>

    <div class="field"><label>Modo</label>
      <div class="opts-row" id="f-mode"></div>
      <p class="hint" id="mode-hint" style="margin-top:9px"></p></div>

    <div class="field" id="time-field"><label>Tiempo por pregunta</label>
      <div class="opts-row" id="f-time"></div></div>

    <div class="btn-row"><button class="btn" id="start">Comenzar bloque</button></div>
    <p class="hint" style="margin-top:18px">El banco contiene ${QUESTIONS.length} preguntas en ${SECTIONS.length} bloques temáticos. Las preguntas y el orden de las opciones se barajan en cada intento.</p>
  </div>`);
  app.appendChild(card);

  const mkChips=(host,vals,cur,fn)=>{vals.forEach(([v,lbl])=>{const c=$('<button class="chip'+(v===cur?' on':'')+'">'+lbl+'</button>');c.onclick=()=>{fn(v);};host.appendChild(c);});};
  mkChips(card.querySelector('#f-count'),[[10,'10'],[20,'20'],[30,'30'],[50,'50']],cfg.count,v=>{cfg.count=v;renderSetup();});
  card.querySelector('#f-sec').value=String(cfg.sec);
  card.querySelector('#f-sec').onchange=e=>{cfg.sec=parseInt(e.target.value);};
  mkChips(card.querySelector('#f-mode'),[['examen','Examen (con tiempo)'],['practica','Práctica (feedback inmediato)']],cfg.mode,v=>{cfg.mode=v;renderSetup();});
  card.querySelector('#mode-hint').textContent = cfg.mode==='examen'
    ? 'Respondes todo el bloque contra reloj; la revisión y las justificaciones aparecen al final.'
    : 'Tras cada respuesta ves de inmediato si acertaste y su justificación. Sin reloj.';
  const tf=card.querySelector('#time-field'); 
  if(cfg.mode==='practica'){tf.style.display='none';}
  else{mkChips(card.querySelector('#f-time'),[[90,'1.5 min'],[60,'1 min'],[120,'2 min'],[0,'Sin límite']],cfg.perQ,v=>{cfg.perQ=v;renderSetup();});}
  card.querySelector('#start').onclick=startSession;
}

/* ---------------- SESSION ---------------- */
function startSession(){
  let pool = cfg.sec===0 ? QUESTIONS : QUESTIONS.filter(q=>q.sec===cfg.sec);
  const n = Math.min(cfg.count, pool.length);
  const picked = shuffle(pool).slice(0,n);
  S = {
    items: picked.map(q=>{
      const order = cfg.shuffle ? shuffle(q.opts.map((_,i)=>i)) : q.opts.map((_,i)=>i);
      return {q, order, chosen:null, flagged:false, locked:false};
    }),
    idx:0, mode:cfg.mode, perQ:cfg.perQ,
    total: cfg.perQ*n, left: cfg.perQ*n, elapsed:0, timer:null, started:Date.now()
  };
  if(S.mode==='examen' && S.perQ>0){
    S.timer=setInterval(tick,1000);
  } else if(S.mode==='examen'){
    S.timer=setInterval(()=>{S.elapsed++;updTimer();},1000);
  }
  renderQuiz();
}
function tick(){ S.left--; updTimer(); if(S.left<=0){clearInterval(S.timer);finish(true);} }
function updTimer(){
  const el=document.getElementById('timer'); if(!el)return;
  if(S.perQ>0){el.textContent='⏱ '.replace('⏱','')+'Tiempo: '+fmtTime(S.left);
    el.classList.toggle('warn', S.left<=S.total*0.1);}
  else{el.textContent='Tiempo: '+fmtTime(S.elapsed);}
}

function renderQuiz(){
  const it=S.items[S.idx]; const q=it.q; const n=S.items.length;
  app.innerHTML='';
  const answered=S.items.filter(x=>x.chosen!==null).length;
  const card=$(`<div class="card">
    <div class="qbar">
      <div class="qprog">Pregunta ${S.idx+1} <span class="of">de ${n}</span></div>
      ${S.mode==='examen'?'<div class="timer" id="timer"></div>':'<div class="timer" id="timer" style="background:var(--azul02);border-color:var(--azul);color:var(--azul)">Práctica</div>'}
    </div>
    <div class="pbar"><i style="width:${(answered/n)*100}%"></i></div>
    <div class="seclabel">Sección ${q.sec} · ${q.secTitle}</div>
    <p class="qtext">${q.q}</p>
    <div class="answers" id="answers"></div>
    <div id="fb"></div>
    <div class="navrow">
      <div class="left">
        <button class="flagbtn ${it.flagged?'on':''}" id="flag">${it.flagged?'● Marcada':'Marcar'}</button>
      </div>
      <div class="left">
        <button class="btn ghost" id="prev" ${S.idx===0?'disabled':''}>Anterior</button>
        ${S.idx===n-1?'<button class="btn" id="finish">Finalizar</button>':'<button class="btn" id="next">Siguiente</button>'}
      </div>
    </div>
    <div class="palette"><h3>Preguntas</h3><div class="pgrid" id="pal"></div></div>
  </div>`);
  app.appendChild(card);
  if(S.mode==='examen') updTimer();

  const ansHost=card.querySelector('#answers');
  it.order.forEach((origIdx,pos)=>{
    const o=q.opts[origIdx]; const letter='abcd'[pos];
    const b=$('<button class="ans" data-pos="'+pos+'"><span class="lt">'+letter+'</span><span class="ot">'+o.text+'</span></button>');
    if(it.chosen===pos) b.classList.add('sel');
    if(it.locked){
      b.classList.add('lock');
      if(o.correct) b.classList.add('correct');
      else if(it.chosen===pos) b.classList.add('wrong');
    }
    b.onclick=()=>select(pos);
    ansHost.appendChild(b);
  });
  if(it.locked) showFeedback(it);

  card.querySelector('#flag').onclick=()=>{it.flagged=!it.flagged;renderQuiz();};
  if(card.querySelector('#prev')) card.querySelector('#prev').onclick=()=>{S.idx--;renderQuiz();};
  if(card.querySelector('#next')) card.querySelector('#next').onclick=()=>{S.idx++;renderQuiz();};
  if(card.querySelector('#finish')) card.querySelector('#finish').onclick=()=>confirmFinish();
  // palette
  const pal=card.querySelector('#pal');
  S.items.forEach((x,i)=>{
    const c=$('<button class="pcell '+(x.chosen!==null?'ans':'')+(i===S.idx?' cur':'')+(x.flagged?' flag':'')+'">'+(i+1)+'</button>');
    c.onclick=()=>{S.idx=i;renderQuiz();};
    pal.appendChild(c);
  });
}
function select(pos){
  const it=S.items[S.idx];
  if(it.locked) return;
  it.chosen=pos;
  if(S.mode==='practica'){ it.locked=true; renderQuiz(); }
  else { renderQuiz(); }
}
function showFeedback(it){
  const host=document.getElementById('fb'); if(!host)return;
  const correctPos=it.order.findIndex(oi=>it.q.opts[oi].correct);
  const ok = it.chosen===correctPos;
  host.innerHTML='<div class="fb"><span class="lbl">'+(ok?'Correcto':'Justificación')+'</span>'+it.q.just+'</div>';
}
function confirmFinish(){
  const pend=S.items.filter(x=>x.chosen===null).length;
  if(pend>0 && !confirm('Tienes '+pend+' pregunta(s) sin responder. ¿Finalizar de todas formas?')) return;
  finish(false);
}
function finish(byTime){
  if(S.timer) clearInterval(S.timer);
  const n=S.items.length;
  let correct=0;
  S.items.forEach(it=>{
    const cp=it.order.findIndex(oi=>it.q.opts[oi].correct);
    it.correctPos=cp; it.isCorrect=(it.chosen===cp);
    if(it.isCorrect) correct++;
  });
  const used = S.mode==='examen' ? (S.perQ>0 ? S.total-S.left : S.elapsed) : Math.round((Date.now()-S.started)/1000);
  S.finished=true; recordAttempt(correct,n,used);
  if(S.cert){
    if(LIVEON){ certFinishLive(used); return; }
    renderCertResult(correct,n,used,byTime); return;
  }
  if(LIVEON){ const sec=(cfg&&cfg.sec)?cfg.sec:null; try{ GBM.recordLabels(S.mode==='examen'?'exam':'practice',sec,false,used,answersPayload()).catch(function(){}); }catch(e){} }
  renderResults(correct,n,used,byTime,'all');
}

/* ---------------- RESULTS ---------------- */
function renderResults(correct,n,used,byTime,filter){
  const pct=Math.round(correct/n*100);
  const cls=pct>=80?'ok':(pct>=60?'mid':'low');
  app.innerHTML='';
  const card=$(`<div class="card">
    <p class="eyebrow">Resultado del bloque</p>
    ${byTime?'<p class="hint" style="color:var(--bad);font-weight:700">⏱ Se agotó el tiempo. Se calificó lo respondido.</p>'.replace('⏱',''):''}
    <div class="scorehead">
      <div class="scorebig ${cls}">${pct}%</div>
      <div class="scoremeta"><b>${correct}</b> de <b>${n}</b> correctas<br>
      ${S.mode==='examen'?'Tiempo utilizado: <b>'+fmtTime(used)+'</b>':'Modo práctica'}</div>
    </div>
    <div class="statgrid">
      <div class="stat"><div class="n" style="color:var(--ok)">${correct}</div><div class="l">Correctas</div></div>
      <div class="stat"><div class="n" style="color:var(--bad)">${n-correct}</div><div class="l">Incorrectas</div></div>
      <div class="stat"><div class="n">${pct}%</div><div class="l">Aciertos</div></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="again">Nuevo bloque</button>
      <button class="btn ghost" id="redo" ${correct===n?'disabled':''}>Repetir incorrectas</button>
    </div>
    <div class="rev-filter">
      <strong style="font-size:13px;letter-spacing:.4px">REVISIÓN</strong>
      <button class="chip ${filter==='all'?'on':''}" id="fall">Todas</button>
      <button class="chip ${filter==='bad'?'on':''}" id="fbad">Solo incorrectas</button>
    </div>
    <div class="review" id="review"></div>
    <div class="foot">GBM Advisory · App de estudio · Universidad GBM</div>
  </div>`);
  app.appendChild(card);
  const rev=card.querySelector('#review');
  S.items.forEach((it,i)=>{
    if(filter==='bad' && it.isCorrect) return;
    const q=it.q;
    let opthtml='';
    it.order.forEach((oi,pos)=>{
      const o=q.opts[oi]; const letter='abcd'[pos];
      let c=''; let mk='';
      if(o.correct){c='correct';mk='<span class="mk">Correcta</span>';}
      if(it.chosen===pos && !o.correct){c='chosenwrong';mk='<span class="mk">Tu respuesta</span>';}
      if(it.chosen===pos && o.correct){mk='<span class="mk">Tu respuesta ✓</span>'.replace('✓','');mk='<span class="mk">Tu respuesta · correcta</span>';}
      opthtml+='<div class="ropt '+c+'"><strong>'+letter+')</strong> '+o.text+mk+'</div>';
    });
    const tag = it.chosen===null ? '<span class="tag">Sin responder</span>'
      : (it.isCorrect?'<span class="tag ok">Correcta</span>':'<span class="tag bad">Incorrecta</span>');
    rev.appendChild($('<div class="ritem"><p class="rq">'+tag+'<strong>'+(i+1)+'.</strong> '+q.q+'</p>'+opthtml
      +'<div class="rjust"><span class="lbl">Justificación</span>'+q.just+'</div></div>'));
  });
  card.querySelector('#again').onclick=renderSetup;
  card.querySelector('#fall').onclick=()=>renderResults(correct,n,used,byTime,'all');
  card.querySelector('#fbad').onclick=()=>renderResults(correct,n,used,byTime,'bad');
  const redo=card.querySelector('#redo');
  if(redo&&correct!==n) redo.onclick=()=>{
    const wrong=S.items.filter(x=>!x.isCorrect).map(x=>x.q);
    S={items:wrong.map(q=>({q,order:cfg.shuffle?shuffle(q.opts.map((_,i)=>i)):q.opts.map((_,i)=>i),chosen:null,flagged:false,locked:false})),
       idx:0,mode:cfg.mode,perQ:cfg.perQ,total:cfg.perQ*wrong.length,left:cfg.perQ*wrong.length,elapsed:0,timer:null,started:Date.now()};
    if(S.mode==='examen'&&S.perQ>0)S.timer=setInterval(tick,1000);
    else if(S.mode==='examen')S.timer=setInterval(()=>{S.elapsed++;updTimer();},1000);
    renderQuiz();
  };
  window.scrollTo(0,0);
}

function recordAttempt(correct,n,used){
  try{
    const hist=loadHist();
    hist.push({ts:Date.now(),mode:S.mode,n:n,correct:correct,pct:Math.round(correct/n*100),dur:used,sec:cfg.sec});
    saveHist(hist);
    const st=loadStats();
    S.items.forEach(it=>{
      if(it.chosen===null) return;
      const id=it.q.id;
      const r=st[id]||{sec:it.q.sec,seen:0,correct:0,last:false,first:null};
      r.seen++; if(it.isCorrect)r.correct++; r.last=!!it.isCorrect; if(r.first===null)r.first=!!it.isCorrect;
      st[id]=r;
    });
    saveStats(st);
  }catch(e){}
}
function pctCls(p){return p>=80?'ok':(p>=55?'mid':'low');}
function navAway(){ if(S && S.items && !S.finished){ return confirm('Hay un bloque en curso. ¿Salir y perder este intento?'); } return true; }
function setTab(name){
  const a=document.getElementById('tab-prac'), b=document.getElementById('tab-dash'), c=document.getElementById('tab-cert');
  if(a)a.classList.toggle('on',name==='prac'); if(b)b.classList.toggle('on',name==='dash'); if(c)c.classList.toggle('on',name==='cert');
}
function renderDashboard(){
  if(LIVEON){ return renderDashboardLive(); }
  if(S&&S.timer)clearInterval(S.timer);
  const hist=loadHist(), stats=loadStats();
  app.innerHTML='';
  if(hist.length===0){
    const c=$('<div class="card"><p class="eyebrow">Mi progreso</p><h1>Aún no hay datos</h1><p class="muted">Completa tu primer bloque de práctica y aquí verás tu avance, la cobertura de los temas y tu mejoría con el tiempo.</p><div class="btn-row"><button class="btn" id="go">Ir a practicar</button></div></div>');
    app.appendChild(c); c.querySelector('#go').onclick=()=>{setTab('prac');renderSetup();}; return;
  }
  let name=''; try{name=localStorage.getItem(NK)||'';}catch(e){}
  const attempts=hist.length;
  const ids=Object.keys(stats);
  const seenUnique=ids.length;
  let totAns=0,totCorr=0; ids.forEach(id=>{totAns+=stats[id].seen;totCorr+=stats[id].correct;});
  const globalAcc=totAns?Math.round(totCorr/totAns*100):0;
  const best=Math.max.apply(null,hist.map(h=>h.pct));
  const covGlobal=Math.round(seenUnique/QUESTIONS.length*100);
  const pcts=hist.map(h=>h.pct);
  const k=Math.min(3,pcts.length);
  const firstAvg=Math.round(pcts.slice(0,k).reduce((a,b)=>a+b,0)/k);
  const lastAvg=Math.round(pcts.slice(-k).reduce((a,b)=>a+b,0)/k);
  const delta=lastAvg-firstAvg;
  const trendCls=delta>2?'up':(delta<-2?'down':'flat');
  const trendWord=delta>2?'al alza':(delta<-2?'a la baja':'estable');
  let recovered=0; ids.forEach(id=>{if(stats[id].first===false&&stats[id].last===true)recovered++;});
  // improvement chart
  const W=680,H=160,pad=28;
  const xs=i=> pcts.length===1? W/2 : pad+i*(W-2*pad)/(pcts.length-1);
  const ys=v=> (H-pad)-v/100*(H-2*pad);
  const grid=[0,50,100].map(g=>'<line x1="'+pad+'" y1="'+ys(g)+'" x2="'+(W-pad)+'" y2="'+ys(g)+'" stroke="#DEDEE0" stroke-width="1"/><text x="'+(pad-7)+'" y="'+(ys(g)+3)+'" text-anchor="end" font-size="9" fill="#8C8C8C">'+g+'</text>').join('');
  const poly=pcts.map((v,i)=>xs(i).toFixed(1)+','+ys(v).toFixed(1)).join(' ');
  const dots=pcts.map((v,i)=>'<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(v).toFixed(1)+'" r="3.4" fill="#424EE0"/>').join('');
  const chart='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto">'+grid+'<polyline points="'+poly+'" fill="none" stroke="#424EE0" stroke-width="2.5" stroke-linejoin="round"/>'+dots+'</svg>';
  // coverage rows
  const rows=SECTIONS.map(s=>{
    const total=SECCOUNT[s.sec];
    const sids=ids.filter(id=>stats[id].sec===s.sec);
    const seen=sids.length;
    const mastery=seen?Math.round(sids.filter(id=>stats[id].last).length/seen*100):0;
    const cov=Math.round(seen/total*100);
    const bcls=seen===0?'none':pctCls(mastery);
    const blabel=seen===0?'—':mastery+'%';
    return '<div class="cov-row"><div class="cov-name"><span class="sn">S'+s.sec+'</span>'+s.title+'</div>'
      +'<div class="cov-bar"><i style="width:'+cov+'%"></i></div>'
      +'<div class="cov-seen">'+seen+'/'+total+'</div>'
      +'<div class="badge '+bcls+'">'+blabel+'</div></div>';
  }).join('');
  // focus suggestion
  const focus=SECTIONS.map(s=>{const sids=ids.filter(id=>stats[id].sec===s.sec);const seen=sids.length;
    const m=seen?sids.filter(id=>stats[id].last).length/seen*100:-1;return {s,seen,m};})
    .filter(x=>x.seen>0&&x.m<60).sort((a,b)=>a.m-b.m).slice(0,3);
  const notStarted=SECTIONS.filter(s=>!ids.some(id=>stats[id].sec===s.sec));
  let sugg='';
  if(focus.length||notStarted.length){
    sugg='<div class="section-title">Sugerencia de enfoque</div><p class="hint">'
      +(focus.length?('Refuerza por bajo dominio: '+focus.map(f=>'Sección '+f.s.sec+' ('+Math.round(f.m)+'%)').join(', ')+'. '):'')
      +(notStarted.length?('Aún sin practicar: '+notStarted.slice(0,5).map(s=>'Sección '+s.sec).join(', ')+(notStarted.length>5?' y '+(notStarted.length-5)+' más':'')+'.'):'')
      +'</p>';
  }
  const card=$('<div class="card">'
   +'<p class="eyebrow">Mi progreso</p>'
   +'<h1>'+(name?('Hola, '+name):'Tu avance')+'</h1>'
   +'<div class="namebar"><input id="nm" placeholder="Tu nombre (opcional)" value="'+name.replace(/"/g,'&quot;')+'"><button class="btn ghost" id="savenm">Guardar</button></div>'
   +'<div class="statgrid">'
     +'<div class="stat"><div class="n">'+attempts+'</div><div class="l">Bloques completados</div></div>'
     +'<div class="stat"><div class="n" style="color:var(--azul)">'+globalAcc+'%</div><div class="l">Aciertos global</div></div>'
     +'<div class="stat"><div class="n">'+covGlobal+'%</div><div class="l">Cobertura del banco</div></div>'
     +'<div class="stat"><div class="n" style="color:var(--ok)">'+best+'%</div><div class="l">Mejor bloque</div></div>'
   +'</div>'
   +'<div class="section-title">Mejoría</div>'
   +'<p class="hint">Promedio inicial '+firstAvg+'% &rarr; reciente '+lastAvg+'% &middot; tendencia <span class="trend '+trendCls+'">'+(delta>=0?'+':'')+delta+' pts ('+trendWord+')</span>. Preguntas recuperadas (de error a acierto): <strong>'+recovered+'</strong>.</p>'
   +'<div class="chart-wrap">'+chart+'<div class="hint" style="text-align:center;margin-top:4px">Aciertos (%) por bloque, del primero al más reciente</div></div>'
   +'<div class="section-title">Cobertura por tema</div>'
   +'<div class="cov-head"><div style="flex:1">Tema</div><div style="flex:0 0 110px">Cobertura</div><div style="flex:0 0 56px;text-align:right">Vistas</div><div style="flex:0 0 54px;text-align:center">Dominio</div></div>'
   +rows
   +'<div class="cov-legend"><span><span class="dot" style="background:var(--ok)"></span>Dominio &ge;80%</span><span><span class="dot" style="background:var(--azul)"></span>55&ndash;79%</span><span><span class="dot" style="background:var(--bad)"></span>&lt;55%</span><span><span class="dot" style="background:var(--gris03)"></span>Sin iniciar</span></div>'
   +sugg
   +'<div class="btn-row"><button class="btn" id="practi">Practicar ahora</button><button class="btn ghost" id="expo">Exportar progreso</button><button class="btn ghost" id="reset">Reiniciar progreso</button></div>'
   +'<div class="foot">Tu progreso se guarda localmente en este navegador.</div>'
   +'</div>');
  app.appendChild(card);
  card.querySelector('#savenm').onclick=()=>{try{localStorage.setItem(NK,card.querySelector('#nm').value.trim());}catch(e){} renderDashboard();};
  card.querySelector('#practi').onclick=()=>{setTab('prac');renderSetup();};
  card.querySelector('#reset').onclick=()=>{if(confirm('¿Borrar todo tu progreso guardado en este navegador?')){try{localStorage.removeItem(HK);localStorage.removeItem(SK);}catch(e){} renderDashboard();}};
  card.querySelector('#expo').onclick=()=>{try{const blob=new Blob([JSON.stringify({name:name,hist:loadHist(),stats:loadStats()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='progreso_gbm_advisory.json';document.body.appendChild(a);a.click();a.remove();}catch(e){}};
  window.scrollTo(0,0);
}

/* ---------------- CERTIFICACIÓN ---------------- */
const CERT={ n:100, pass:80, perQ:60 };
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
function renderCert(){
  if(S&&S.timer)clearInterval(S.timer); S=null;
  app.innerHTML='';
  const c=$(`<div class="card">
    <p class="eyebrow">Certificación profesional</p>

      </div>
      <div class="legend" style="margin-top:6pt">

    <p class="hint" style="margin-top:16px">Tiempo total: ${CERT.n*CERT.perQ/60} minutos. Una vez iniciado, el cronómetro no se detiene.</p>
  </div>`);
  app.appendChild(c);
  c.querySelector('#go').onclick=startCert;
}
function pickStratified(total){
  const bySec={}; QUESTIONS.forEach(q=>{(bySec[q.sec]=bySec[q.sec]||[]).push(q);});
  const secs=Object.keys(bySec); const totalQ=QUESTIONS.length;
  const alloc={}; let assigned=0; const rema=[];
  secs.forEach(s=>{ const exact=total*bySec[s].length/totalQ; const base=Math.min(bySec[s].length,Math.max(1,Math.floor(exact))); alloc[s]=base; assigned+=base; rema.push([s,exact-Math.floor(exact)]); });
  rema.sort((a,b)=>b[1]-a[1]); let i=0;
  while(assigned<total && i<secs.length*100){ const s=rema[i%rema.length][0]; if(alloc[s]<bySec[s].length){alloc[s]++;assigned++;} i++; }
  const order=secs.slice().sort((a,b)=>alloc[b]-alloc[a]); i=0;
  while(assigned>total && i<secs.length*100){ const s=order[i%order.length]; if(alloc[s]>1){alloc[s]--;assigned--;} i++; }
  let picked=[]; secs.forEach(s=>{ picked=picked.concat(shuffle(bySec[s]).slice(0,alloc[s])); });
  return shuffle(picked).slice(0,total);
}
function startCert(){
  const picked=pickStratified(CERT.n);
  const n=picked.length;
  S={ items:picked.map(q=>({q,order:shuffle(q.opts.map((_,i)=>i)),chosen:null,flagged:false,locked:false})),
      idx:0, mode:'examen', perQ:CERT.perQ, total:CERT.perQ*n, left:CERT.perQ*n, elapsed:0, timer:null, started:Date.now(), cert:true };
  S.timer=setInterval(tick,1000);
  renderQuiz();
}

async function renderDashboardLive(){
  app.innerHTML='<div class="card"><p class="muted">Cargando tu progreso…</p></div>';
  let p,sec,att;
  try{ p=await GBM.myProgress(); sec=await GBM.mySection(); att=await GBM.myAttempts(); }
  catch(e){ app.innerHTML='<div class="card"><p class="eyebrow">Mi progreso</p><h1>No se pudo cargar</h1><p class="muted">'+e.message+'</p></div>'; return; }
  if(!p || (p.attempts||0)===0){ app.innerHTML='<div class="card"><p class="eyebrow">Mi progreso</p><h1>Aún no hay datos</h1><p class="muted">Completa tu primer bloque y aquí verás tu avance, la cobertura de los temas y tu mejoría.</p></div>'; return; }
  let name=''; try{name=localStorage.getItem(NK)||'';}catch(e){}
  const secMap={}; (sec||[]).forEach(r=>secMap[r.section_id]={seen:r.seen,mastery:Math.round(r.mastery_pct)});
  const pcts=(att||[]).map(a=>Math.round(a.score_pct));
  let chart;
  if(pcts.length){ const W=680,H=160,pad=28,m=pcts.length;
    const xs=i=>m===1?W/2:pad+i*(W-2*pad)/(m-1), ys=v=>(H-pad)-v/100*(H-2*pad);
    const grid=[0,50,100].map(g=>'<line x1="'+pad+'" y1="'+ys(g)+'" x2="'+(W-pad)+'" y2="'+ys(g)+'" stroke="#DEDEE0" stroke-width="1"/><text x="'+(pad-7)+'" y="'+(ys(g)+3)+'" text-anchor="end" font-size="9" fill="#8C8C8C">'+g+'</text>').join('');
    const poly=pcts.map((v,i)=>xs(i).toFixed(1)+','+ys(v).toFixed(1)).join(' ');
    const dots=pcts.map((v,i)=>'<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(v).toFixed(1)+'" r="3.4" fill="#424EE0"/>').join('');
    chart='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto">'+grid+'<polyline points="'+poly+'" fill="none" stroke="#424EE0" stroke-width="2.5" stroke-linejoin="round"/>'+dots+'</svg>';
  } else chart='<div class="hint" style="text-align:center;padding:20px">Sin intentos aún.</div>';
  const rows=SECTIONS.map(s=>{const total=SECCOUNT[s.sec];const d=secMap[s.sec];const seen=d?d.seen:0;const mastery=d?d.mastery:0;const cov=Math.round(seen/total*100);
    const bcls=seen===0?'none':pctCls(mastery);const blabel=seen===0?'—':mastery+'%';
    return '<div class="cov-row"><div class="cov-name"><span class="sn">S'+s.sec+'</span>'+s.title+'</div><div class="cov-bar"><i style="width:'+cov+'%"></i></div><div class="cov-seen">'+seen+'/'+total+'</div><div class="badge '+bcls+'">'+blabel+'</div></div>';}).join('');
  app.innerHTML='';
  app.appendChild($('<div class="card">'
    +'<p class="eyebrow">Mi progreso</p><h1>'+(name?('Hola, '+name):'Tu avance')+'</h1>'
    +'<div class="statgrid">'
      +'<div class="stat"><div class="n">'+(p.attempts||0)+'</div><div class="l">Bloques completados</div></div>'
      +'<div class="stat"><div class="n" style="color:var(--azul)">'+Math.round(p.accuracy_pct||0)+'%</div><div class="l">Aciertos global</div></div>'
      +'<div class="stat"><div class="n">'+Math.round(p.coverage_pct||0)+'%</div><div class="l">Cobertura del banco</div></div>'
      +'<div class="stat"><div class="n" style="color:var(--ok)">'+Math.round(p.best_score||0)+'%</div><div class="l">Mejor bloque</div></div>'
    +'</div>'
    +'<div class="section-title">Mejoría</div><div class="chart-wrap">'+chart+'<div class="hint" style="text-align:center;margin-top:4px">Aciertos (%) por bloque</div></div>'
    +'<div class="section-title">Cobertura por tema</div>'
    +'<div class="cov-head"><div style="flex:1">Tema</div><div style="flex:0 0 110px">Cobertura</div><div style="flex:0 0 56px;text-align:right">Vistas</div><div style="flex:0 0 54px;text-align:center">Dominio</div></div>'
    +rows
    +'<div class="foot">Conectado · datos en vivo desde Supabase.</div></div>'));
  window.scrollTo(0,0);
}

/* keyboard */
document.addEventListener('keydown',e=>{
  if(!S||!S.items)return;
  const it=S.items[S.idx]; if(!it)return;
  if(['a','b','c','d'].includes(e.key.toLowerCase())){const p='abcd'.indexOf(e.key.toLowerCase());if(p<it.order.length)select(p);}
  if(e.key==='ArrowRight'&&S.idx<S.items.length-1){S.idx++;renderQuiz();}
  if(e.key==='ArrowLeft'&&S.idx>0){S.idx--;renderQuiz();}
});

document.getElementById('tab-prac').onclick=()=>{ if(gate()&&navAway()){setTab('prac');renderSetup();} };

    +(msg?'<div class="err">'+msg+'</div>':'')+'<br><button class="btn" id="go">Entrar</button></div>');

  c.querySelector('#go').onclick=async()=>{ try{ await GBM.signIn(c.querySelector('#em').value.trim(),c.querySelector('#pw').value); afterLogin(); }catch(e){ renderLogin(e.message); } };

async function afterLogin(){ LIVEON=true;
  try{ const p=await GBM.profile(); if(p&&p.full_name){ try{localStorage.setItem(NK,p.full_name);}catch(e){} } }catch(e){}
  try{ await GBM.migrate(); }catch(e){}
  renderAccount(); setTab('prac'); renderSetup();
}
async function boot(){
  if(!LIVE){ renderSetup(); return; }
  if(!sbc){ renderLogin('No se pudo inicializar la conexión.'); return; }
  try{ const s=await GBM.session(); if(!s){ renderLogin(''); return; } await afterLogin(); }
  catch(e){ renderLogin(e.message); }
}
boot();</script>
