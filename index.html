a, siendo el perfil más conservador de la gama, orientado a quien prioriza estabilidad sobre crecimiento", "correct": true}, {"text": "Ser el más volátil de la familia", "correct": false}, {"text": "Garantizar el capital", "correct": false}], "just": "El 0/100 es el extremo conservador (toda renta fija): menor volatilidad y menor rendimiento esperado que las variedades con acciones, para clientes que priorizan preservación y estabilidad (sin que ello implique ausencia de riesgo de tasa/crédito)."}, {"id": 494, "sec": 24, "secTitle": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios", "q": "¿Por qué es relevante que estos portafolios usen ETFs UCITS para un inversionista mexicano (no estadounidense)?", "opts": [{"text": "Porque los UCITS no están regulados", "correct": false}, {"text": "Porque los UCITS son vehículos del marco regulatorio europeo, con estándares de diversificación y protección al inversionista, y suelen ser más eficientes fiscalmente para inversionistas no estadounidenses que los ETFs domiciliados en EE.UU.", "correct": true}, {"text": "Porque los UCITS solo invierten en México", "correct": false}, {"text": "Porque eliminan el riesgo de mercado", "correct": false}], "just": "Para un inversionista no estadounidense, los ETFs UCITS (domiciliados típicamente en Europa, p. ej., Irlanda) suelen ofrecer ventajas fiscales y un marco regulatorio robusto frente a los ETFs estadounidenses (enlaza con la Sección 12 sobre UCITS)."}, {"id": 495, "sec": 24, "secTitle": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios", "q": "Aplicación: ¿cómo elige un asesor la variedad adecuada de la gama para un cliente?", "opts": [{"text": "Eligiendo siempre el 100/0 por su mayor rendimiento esperado", "correct": false}, {"text": "Empatando la mezcla acciones/renta fija con la tolerancia al riesgo y el horizonte del cliente: más renta variable (p. ej., 100/0 u 80/20) para perfiles agresivos y de largo plazo; más renta fija (p. ej., 20/80 o 0/100) para perfiles conservadores o de menor horizonte", "correct": true}, {"text": "Eligiendo al azar", "correct": false}, {"text": "Usando solo la variedad más conservadora para todos", "correct": false}], "just": "La gama está diseñada precisamente para &quot;marcar&quot; el nivel de riesgo: el asesor selecciona la variedad cuya proporción acciones/renta fija corresponda al perfil de riesgo, los objetivos y el horizonte del cliente, dentro de una solución diversificada, de bajo costo y gestionada dinámicamente."}, {"id": 496, "sec": 25, "secTitle": "Producto GBM: Cartera Modelo Siegel-WisdomTree Global Equity (UCITS)", "q": "¿Qué es la Cartera Modelo Siegel-WisdomTree Global Equity (UCITS)?", "opts": [{"text": "Un único ETF de deuda mexicana", "correct": false}, {"text": "Una cartera modelo construida con ETFs UCITS que da exposición a una asignación diversificada de acciones globales, creada en colaboración con el Dr. Jeremy Siegel y diseñada para desafiar el enfoque tradicional 60/40, buscando un rendimiento ajustado al riesgo competitivo frente a estrategias pasivas adecuadas", "correct": true}, {"text": "Una nota estructurada con capital protegido", "correct": false}, {"text": "Una cuenta de liquidez en pesos", "correct": false}], "just": "Es una cartera modelo de renta variable global (multi-ETF UCITS) desarrollada con Jeremy Siegel (autor de <em>Stocks for the Long Run</em>), pensada para cuestionar el 60/40 tradicional y mejorar los perfiles de ingreso y longevidad —en sintonía con el debate de lifecycle investing de la Sección 14—."}, {"id": 497, "sec": 25, "secTitle": "Producto GBM: Cartera Modelo Siegel-WisdomTree Global Equity (UCITS)", "q": "La filosofía de inversión de WisdomTree (&quot;Modern Alpha®&quot;) sostiene que:", "opts": [{"text": "La ponderación por capitalización bursátil es siempre óptima", "correct": false}, {"text": "La ponderación por capitalización es imperfecta y los fundamentales importan; su enfoque combina lo mejor de la gestión activa y la pasiva: bajo costo, proceso transparente, sistemático/basado en reglas y ponderación fundamental/por factores, en lugar del juicio discrecional (&quot;caja negra&quot;) de la gestión activa tradicional", "correct": true}, {"text": "Solo la gestión activa discrecional genera valor", "correct": false}, {"text": "Los ETFs no aportan ninguna ventaja", "correct": false}], "just": "WisdomTree es pionero de la inversión por factores/ponderación fundamental: &quot;Modern Alpha&quot; busca un punto medio entre el &quot;Legado Alpha&quot; (activo, costoso, subjetivo, con riesgo de hombre clave) y el &quot;Legado Beta&quot; (indexación por capitalización), con un proceso transparente, sistemático y de bajo costo. Conecta con factor investing (Sección 13) y el debate activa vs. pasiva (Secciones 18 y 20)."}, {"id": 498, "sec": 25, "secTitle": "Producto GBM: Cartera Modelo Siegel-WisdomTree Global Equity (UCITS)", "q": "¿Qué significa que la cartera tenga &quot;arquitectura abierta&quot;?", "opts": [{"text": "Que solo puede incluir ETFs de WisdomTree", "correct": false}, {"text": "Que puede incluir tanto ETFs propios de WisdomTree como de terceros (no propios), buscando añadir valor mediante la selección de clases de activo Y la selección de los mejores fondos", "correct": true}, {"text": "Que el cliente arma la cartera por su cuenta", "correct": false}, {"text": "Que no tiene gestor", "correct": false}], "just": "La arquitectura abierta permite elegir los mejores vehículos disponibles, sean o no de la propia casa, lo que alinea al gestor con el resultado del cliente (mismo principio del &quot;beauty contest&quot; de las notas estructuradas, Sección 16, y la oferta de Invesco de la Sección 24)."}, {"id": 499, "sec": 25, "secTitle": "Producto GBM: Cartera Modelo Siegel-WisdomTree Global Equity (UCITS)", "q": "¿Cómo está compuesta y caracterizada esta cartera modelo?", "opts": [{"text": "100% renta fija de corto plazo", "correct": false}, {"text": "Es esencialmente 100% renta variable, globalmente diversificada (predominio de large caps, con porciones de mercados emergentes y small caps), construida con ETFs UCITS y con sesgos hacia factores de calidad, dividendos e ingreso, manteniendo un costo (expense ratio) promedio bajo (del orden de ~0.34%)", "correct": true}, {"text": "Una mezcla 60/40 de acciones y bonos", "correct": false}, {"text": "Un portafolio concentrado en una sola acción", "correct": false}], "just": "La cartera es de renta variable global con inclinaciones a calidad/dividendos/ingreso (a través de ETFs como Quality Dividend Growth, Equity Income, etc.), diversificada por geografía y capitalización, y con un costo promedio contenido —coherente con la filosofía de bajo costo y ponderación fundamental—."}, {"id": 500, "sec": 25, "secTitle": "Producto GBM: Cartera Modelo Siegel-WisdomTree Global Equity (UCITS)", "q": "Síntesis (capstone). ¿Cómo usa un asesor esta cartera modelo dentro de un plan?", "opts": [{"text": "Como sustituto del fondo de emergencia o de la liquidez", "correct": false}, {"text": "Garantizando que superará a su índice de referencia", "correct": false}, {"text": "Como el componente de renta variable global (la &quot;bolsa&quot; de acciones) de un cliente con horizonte largo y tolerancia al riesgo, aprovechando la diversificación global, el sesgo a factores y la estructura UCITS (eficiente para inversionistas no estadounidenses), sin prometer que batirá a su benchmark —el rendimiento histórico no garantiza resultados futuros— y dimensionándola según el perfil del cliente", "correct": true}, {"text": "Asignándola al 100% del portafolio de cualquier cliente", "correct": false}], "just": "Integra el bloque y todo el banco: es una solución de renta variable global, basada en factores y de bajo costo, en formato UCITS (idóneo para el inversionista mexicano, ver Secciones 12 y 24). El asesor la usa como el &quot;cajón&quot; de acciones de un perfil adecuado, con honestidad sobre el riesgo y el desempeño relativo (que puede quedar por encima o por debajo del benchmark), y dimensionada a la tolerancia y los objetivos del cliente —el cierre natural de un banco que enfatiza diversificación, costo, evidencia y juicio aplicado—."}, {"id": 501, "sec": 26, "secTitle": "Producto GBM: Euro Yield (Cuenta Temática / SMA)", "q": "¿Qué es y qué objetivo tiene la estrategia Euro Yield?", "opts": [{"text": "Un fondo de renta variable europea de alta volatilidad", "correct": false}, {"text": "Una cuenta temática (SMA) de renta fija que invierte en bonos denominados en euros, diseñada para que el inversionista mantenga una posición en euros y se proteja de la fluctuación cambiaria, con instrumentos de baja volatilidad, alta calidad crediticia y corto plazo (y mayor eficiencia fiscal)", "correct": true}, {"text": "Una nota estructurada apalancada sobre el euro", "correct": false}, {"text": "Una cuenta de liquidez en pesos", "correct": false}], "just": "Euro Yield da exposición en euros vía bonos de la Eurozona, pensada como cobertura/diversificación frente al tipo de cambio, con un perfil conservador (baja volatilidad, alta calidad, corto plazo). Es la contraparte en euros de Dollar Yield (Sección 19)."}, {"id": 502, "sec": 26, "secTitle": "Producto GBM: Euro Yield (Cuenta Temática / SMA)", "q": "¿Cómo está compuesta la cartera de Euro Yield?", "opts": [{"text": "100% acciones europeas", "correct": false}, {"text": "Principalmente en ETFs de bonos gubernamentales de la Eurozona (de corto plazo, p. ej., 0-1 y 1-3 años) complementados con bonos corporativos europeos con grado de inversión; predomina el sector gubernamental (~75%), con alta calidad crediticia, duración promedio corta (~8 meses) y un rendimiento a vencimiento del orden de ~2.46% en euros", "correct": true}, {"text": "Bonos de mercados emergentes de alto rendimiento", "correct": false}, {"text": "Deuda mexicana en pesos", "correct": false}], "just": "La cartera se concentra en deuda gubernamental europea de corto plazo más corporativos europeos de grado de inversión, lo que explica su baja volatilidad, su corta duración (~8.3 meses) y su carácter conservador dentro de la renta fija en euros."}, {"id": 503, "sec": 26, "secTitle": "Producto GBM: Euro Yield (Cuenta Temática / SMA)", "q": "Aplicación: ¿para qué cliente es más adecuada Euro Yield?", "opts": [{"text": "Para un cliente que busca máximo crecimiento en renta variable", "correct": false}, {"text": "Para un cliente que desea exposición o diversificación en euros (p. ej., metas o gastos en esa moneda, o cobertura frente al peso), con un perfil conservador de renta fija, entendiendo que el rendimiento es en euros y queda sujeto a la variable del tipo de cambio EUR/MXN, y que —aunque de baja volatilidad— no está exenta de riesgo de tasa y de crédito", "correct": true}, {"text": "Para un cliente que necesita liquidez inmediata en pesos sin costo", "correct": false}, {"text": "Para especular con apalancamiento de corto plazo", "correct": false}], "just": "Euro Yield encaja con objetivos o coberturas en euros y diversificación cambiaria, con un perfil conservador. El asesor debe explicar que el resultado en pesos depende del tipo de cambio EUR/MXN y que la renta fija conlleva riesgo de tasa y crédito (Sección 19), eligiendo la divisa según la meta y el perfil del cliente —junto con Dollar Yield/Smart Cash Dólares para exposición en dólares—."}, {"id": 504, "sec": 27, "secTitle": "Producto GBM: International Peso-Hedged — profundización", "q": "¿Por qué una cartera de bonos del Tesoro de EUA (que rinde ~4% en USD), cubierta a pesos, termina rindiendo aproximadamente como los CETES (~8-10%) y no ~4%?", "opts": [{"text": "Porque el ETF paga un cupón extra en pesos", "correct": false}, {"text": "Por la paridad de tasas de interés cubierta: al vender los dólares a futuro (forward), la operación captura el diferencial de tasas vía los puntos forward, de modo que el rendimiento final en pesos se aproxima a la tasa libre de riesgo en pesos (CETES), no al rendimiento del bono en dólares", "correct": true}, {"text": "Porque los bonos del Tesoro rinden más que los CETES", "correct": false}, {"text": "Porque se asume un alto riesgo de crédito", "correct": false}], "just": "Es el resultado central de la CIP: cubrir un activo en dólares de vuelta a una moneda de mayor tasa (el peso) incorpora el diferencial de tasas a través del forward, llevando el rendimiento cubierto a ≈ la tasa doméstica (CETES). No se &quot;gana&quot; el rendimiento del Tesoro: se transforma en rendimiento en pesos."}, {"id": 505, "sec": 27, "secTitle": "Producto GBM: International Peso-Hedged — profundización", "q": "La condición de paridad de tasas de interés cubierta se expresa como (1 + r_peso) = (1 + r_dólar) × (Forward / Spot). ¿Qué implica para el hedge?", "opts": [{"text": "Que el forward es siempre igual al spot", "correct": false}, {"text": "Como las tasas en pesos suelen ser mayores que en dólares, el peso cotiza a &quot;descuento forward&quot; (Forward &gt; Spot); vender los dólares a futuro a ese precio mayor añade el diferencial de tasas al rendimiento en dólares, de modo que el costo de oportunidad del hedge es renunciar a una eventual ganancia por depreciación del peso a cambio de fijar un rendimiento ≈ CETES", "correct": true}, {"text": "Que el inversionista gana el rendimiento del Tesoro más toda la depreciación del peso", "correct": false}, {"text": "Que el hedge no tiene relación con las tasas de interés", "correct": false}], "just": "Los puntos forward reflejan el diferencial de tasas. Al cubrir, el inversionista no captura ni la depreciación ni la apreciación del peso: fija ≈ CETES. El &quot;costo&quot; del hedge es renunciar a la posible ganancia cambiaria (a cambio de eliminar también el riesgo cambiario)."}, {"id": 506, "sec": 27, "secTitle": "Producto GBM: International Peso-Hedged — profundización", "q": "En la descomposición del rendimiento de la estrategia, ¿por qué R_IPH ≈ r(T,MXN)?", "opts": [{"text": "Porque se ignoran los rendimientos en dólares", "correct": false}, {"text": "Porque al sumar el subyacente [r(T,USD) + r_FX] y la cobertura [−r_FX + (r(T,MXN) − r(T,USD))], los términos cambiarios (r_FX) se cancelan y los rendimientos en dólares (r(T,USD)) también se cancelan, dejando aproximadamente la tasa en pesos r(T,MXN)", "correct": true}, {"text": "Porque el rendimiento en dólares se duplica", "correct": false}, {"text": "Porque la cobertura elimina todo rendimiento", "correct": false}], "just": "Algebraicamente: r(T,USD) + r_FX − r_FX + r(T,MXN) − r(T,USD) = r(T,MXN). El hedge anula la exposición cambiaria (r_FX) y &quot;intercambia&quot; la tasa en dólares por la tasa en pesos; de ahí que el resultado se aproxime a CETES."}, {"id": 507, "sec": 27, "secTitle": "Producto GBM: International Peso-Hedged — profundización", "q": "¿Qué fuerza de mercado garantiza que la paridad de tasas cubierta se cumpla en la práctica?", "opts": [{"text": "La intervención del banco central", "correct": false}, {"text": "El arbitraje: si el forward se desviara de su nivel de equilibrio, un arbitrajista podría pedir prestado en pesos, convertir a dólares, invertir en el Tesoro y vender los dólares forward al precio distorsionado para obtener una ganancia sin riesgo; esa actividad presiona el forward de vuelta al equilibrio, por lo que las oportunidades de arbitraje puro son muy raras", "correct": true}, {"text": "Una regulación de la CNBV que fija el forward", "correct": false}, {"text": "El azar del mercado", "correct": false}], "just": "La posibilidad de ganancia sin riesgo (p. ej., +1.87% sobre el capital si el forward estuviera a $19.80 en lugar de $19.3955) atrae arbitrajistas cuya operación corrige la distorsión. Este mecanismo autocorrectivo es el que mantiene la CIP y, con ella, que el rendimiento de la IPH ≈ CETES."}, {"id": 508, "sec": 27, "secTitle": "Producto GBM: International Peso-Hedged — profundización", "q": "Síntesis (capstone). ¿Cuál es la propuesta de valor real de la International Peso-Hedged y para quién es adecuada?", "opts": [{"text": "Obtener el rendimiento del Tesoro de EUA más la apreciación del dólar, sin riesgo", "correct": false}, {"text": "Maximizar el rendimiento asumiendo riesgo cambiario", "correct": false}, {"text": "Importar la calidad crediticia (Tesoro AAA, superior al techo soberano de México) y la diversificación geográfica de activos no correlacionados con la economía mexicana, manteniendo el rendimiento en pesos (≈ CETES) y sin riesgo cambiario; con eficiencia fiscal (la deuda vía ETFs UCITS tributa como renta variable, ~10% sobre ganancias, frente a hasta ~35% como intereses en inversión directa) y el hedge ya incorporado en los ETFs (MXN Hedged Accumulating de BlackRock/JP Morgan). Es ideal para un cliente conservador que busca mejor calidad crediticia que la deuda mexicana y diversificación, en versión de corto plazo (más conservadora) o mediano plazo (algo más de riesgo/rendimiento)", "correct": true}, {"text": "Especular con el tipo de cambio peso-dólar", "correct": false}], "just": "Integra el bloque: la IPH no es una apuesta cambiaria ni un &quot;yield pickup&quot; en dólares; &quot;importa&quot; las condiciones del país donde se invierte (calidad crediticia, diversificación) pero se paga el &quot;precio&quot; del riesgo del país donde se vive (el rendimiento queda ≈ CETES). Su valor está en la calidad AAA, la descorrelación con México, la eficiencia fiscal vía UCITS y la operación profesional del hedge —no en superar a los CETES—. El asesor elige corto vs. mediano plazo según el perfil del cliente."}, {"id": 509, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "¿Cómo se describe mejor la planeación financiera?", "opts": [{"text": "La venta de un producto de inversión en una sola ocasión", "correct": false}, {"text": "Un proceso estructurado y continuo, centrado en las metas del cliente, que va del diagnóstico a la implementación y el monitoreo", "correct": true}, {"text": "Elegir la acción que más subirá el próximo año", "correct": false}, {"text": "Un trámite que se hace una vez y no se revisa", "correct": false}], "just": "La planeación financiera es un proceso (no un producto): se define la relación y el alcance, se recopilan datos, se analiza, se recomienda, se implementa y se monitorea de forma recurrente. Coincide con la lógica de Invierte con Propósito."}, {"id": 510, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "¿Cuál es el primer paso del proceso de planeación financiera?", "opts": [{"text": "Comprar instrumentos de inversión", "correct": false}, {"text": "Establecer y definir la relación asesor-cliente y el alcance del encargo (qué incluye y qué no)", "correct": true}, {"text": "Calcular impuestos", "correct": false}, {"text": "Rebalancear la cartera", "correct": false}], "just": "Antes de recopilar datos o recomendar, se acuerda el alcance del trabajo y las responsabilidades de cada parte. Esto alinea expectativas y delimita el servicio."}, {"id": 511, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "La recopilación de datos del cliente debe incluir:", "opts": [{"text": "Solo información cuantitativa (ingresos, activos, deudas)", "correct": false}, {"text": "Tanto datos cuantitativos (ingresos, activos, deudas, gastos) como cualitativos (metas, horizonte, tolerancia al riesgo, valores y prioridades)", "correct": true}, {"text": "Solo su edad", "correct": false}, {"text": "Únicamente su historial de trading", "correct": false}], "just": "Un buen plan requiere los números y también lo cualitativo: qué quiere lograr el cliente, cuándo, y cómo se siente frente al riesgo. Lo cualitativo suele ser tan determinante como lo cuantitativo."}, {"id": 512, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "En el orden correcto del proceso, el análisis de la situación del cliente:", "opts": [{"text": "Se hace después de implementar las recomendaciones", "correct": false}, {"text": "Se realiza antes de desarrollar y presentar las recomendaciones, que a su vez preceden a la implementación", "correct": true}, {"text": "Es opcional", "correct": false}, {"text": "Sustituye a la recopilación de datos", "correct": false}], "just": "El flujo lógico es diagnosticar (analizar) → recomendar → implementar → monitorear. Recomendar sin analizar primero llevaría a soluciones desalineadas con la situación real del cliente."}, {"id": 513, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "¿Cuándo debe revisarse un plan financiero?", "opts": [{"text": "Nunca; una vez hecho es definitivo", "correct": false}, {"text": "De forma periódica y, además, ante eventos de vida relevantes (matrimonio, hijos, cambio de empleo, herencia, enfermedad), porque el plan es dinámico", "correct": true}, {"text": "Solo cuando el mercado cae", "correct": false}, {"text": "Solo al cumplir 65 años", "correct": false}], "just": "Las circunstancias del cliente y del mercado cambian, así que el monitoreo y la revisión periódica (y tras eventos de vida) son parte esencial del proceso. Un plan es un documento vivo."}, {"id": 514, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "El balance personal (estado de situación patrimonial) se calcula como:", "opts": [{"text": "Ingresos menos gastos", "correct": false}, {"text": "Activos menos pasivos, es decir, el patrimonio neto en un momento determinado", "correct": true}, {"text": "La suma de los ingresos del año", "correct": false}, {"text": "El total de las deudas", "correct": false}], "just": "El balance personal es una &quot;foto&quot; a una fecha: activos (lo que se tiene) menos pasivos (lo que se debe) = patrimonio neto. Mide la riqueza acumulada, no el flujo."}, {"id": 515, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Un cliente tiene activos por $3,800,000 (casa $2,500,000; auto $300,000; inversiones $800,000; efectivo $200,000) y pasivos por $1,600,000 (hipoteca $1,400,000; crédito automotriz $150,000; tarjetas $50,000). ¿Cuál es su patrimonio neto?", "opts": [{"text": "$3,800,000", "correct": false}, {"text": "$2,200,000", "correct": true}, {"text": "$1,600,000", "correct": false}, {"text": "$5,400,000", "correct": false}], "just": "Patrimonio neto = activos − pasivos = $3,800,000 − $1,600,000 = <strong>$2,200,000</strong>. Es el indicador central del balance personal."}, {"id": 516, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "El estado de flujo de efectivo personal mide:", "opts": [{"text": "El patrimonio neto a una fecha", "correct": false}, {"text": "Los ingresos menos los egresos durante un periodo, revelando el superávit o déficit disponible para ahorrar e invertir", "correct": true}, {"text": "El valor de mercado de la casa", "correct": false}, {"text": "El saldo de las tarjetas de crédito", "correct": false}], "just": "A diferencia del balance (una foto), el flujo de efectivo es una &quot;película&quot; del periodo: cuánto entra y cuánto sale. El superávit es la materia prima del ahorro y la inversión."}, {"id": 517, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Si un cliente tiene ingresos mensuales por $60,000 y gastos por $45,000, ¿cuál es su superávit mensual disponible para ahorrar?", "opts": [{"text": "$60,000", "correct": false}, {"text": "$15,000", "correct": true}, {"text": "$45,000", "correct": false}, {"text": "$105,000", "correct": false}], "just": "Superávit = ingresos − gastos = $60,000 − $45,000 = <strong>$15,000</strong>. Ese excedente es lo que puede destinarse a metas, aplicando &quot;págate a ti primero&quot;."}, {"id": 518, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "La razón de liquidez (meses de cobertura) se interpreta como:", "opts": [{"text": "El rendimiento anual de la cartera", "correct": false}, {"text": "Los activos líquidos divididos entre los gastos mensuales, es decir, cuántos meses podría sostenerse el cliente sin ingresos", "correct": true}, {"text": "El total de deudas entre los ingresos", "correct": false}, {"text": "El patrimonio neto entre los activos", "correct": false}], "just": "La razón de liquidez vincula el fondo de emergencia con los gastos: activos líquidos / gastos mensuales = meses de colchón. Se busca cubrir de 3 a 6 meses."}, {"id": 519, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Si un cliente ahorra $9,000 de un ingreso mensual de $45,000, ¿cuál es su tasa de ahorro?", "opts": [{"text": "9%", "correct": false}, {"text": "20%", "correct": true}, {"text": "45%", "correct": false}, {"text": "25%", "correct": false}], "just": "Tasa de ahorro = ahorro / ingreso = $9,000 / $45,000 = <strong>20%</strong>. Es un indicador clave de la salud financiera y del avance hacia las metas."}, {"id": 520, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Respecto a la &quot;buena&quot; y la &quot;mala&quot; deuda, la recomendación general de planeación es:", "opts": [{"text": "Toda deuda es igual y debe pagarse al final", "correct": false}, {"text": "Priorizar el pago de la deuda cara (p. ej., tarjetas de crédito) antes de invertir, porque su tasa suele superar el rendimiento esperado de las inversiones", "correct": true}, {"text": "Nunca pagar deudas para conservar liquidez", "correct": false}, {"text": "Invertir siempre antes de pagar cualquier deuda", "correct": false}], "just": "Pagar una tarjeta al 40% es un &quot;rendimiento garantizado&quot; del 40%, muy superior al esperado de una cartera. Por eso la deuda cara se liquida antes de invertir; la deuda barata y productiva (p. ej., hipoteca) puede convivir con la inversión."}, {"id": 521, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Si los pagos mensuales de deuda de un cliente suman $18,000 y su ingreso bruto mensual es de $60,000, ¿cuál es su razón deuda-ingreso (DTI)?", "opts": [{"text": "18%", "correct": false}, {"text": "30%", "correct": true}, {"text": "60%", "correct": false}, {"text": "3.3%", "correct": false}], "just": "DTI = pagos de deuda / ingreso bruto = $18,000 / $60,000 = <strong>30%</strong>. Es una medida de carga de deuda; niveles altos comprometen la capacidad de ahorro y de obtener crédito."}, {"id": 522, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "La diferencia entre el método &quot;avalancha&quot; y el de &quot;bola de nieve&quot; para pagar deudas es:", "opts": [{"text": "No existe diferencia", "correct": false}, {"text": "La avalancha paga primero la deuda de mayor tasa (minimiza el interés total pagado), mientras que la bola de nieve paga primero el saldo más pequeño (aporta motivación conductual con victorias tempranas)", "correct": true}, {"text": "La bola de nieve siempre paga menos intereses", "correct": false}, {"text": "La avalancha ignora las tasas de interés", "correct": false}], "just": "Matemáticamente, la avalancha (mayor tasa primero) minimiza el interés; conductualmente, la bola de nieve (menor saldo primero) puede sostener mejor la motivación. El asesor elige según el perfil del cliente."}, {"id": 523, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "¿Cuál es la jerarquía de prioridades financieras generalmente recomendada?", "opts": [{"text": "Especular en acciones, luego ahorrar", "correct": false}, {"text": "Fondo de emergencia → pago de deuda cara → ahorro para el retiro con beneficio fiscal → otras metas de inversión", "correct": true}, {"text": "Comprar bienes de lujo → invertir → ahorrar", "correct": false}, {"text": "Invertir todo en una sola acción antes que nada", "correct": false}], "just": "Primero se asegura el colchón de liquidez y se elimina la deuda cara (rendimiento garantizado), luego se aprovecha el ahorro fiscalmente eficiente para el retiro y, después, las demás metas. Es la secuencia que más valor crea con menos riesgo."}, {"id": 524, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "El principio del valor del dinero en el tiempo establece que:", "opts": [{"text": "Un peso de hoy vale lo mismo que un peso dentro de 10 años", "correct": false}, {"text": "Un peso disponible hoy vale más que un peso en el futuro, porque puede invertirse y generar rendimiento (y porque la inflación erosiona el poder de compra)", "correct": true}, {"text": "El dinero futuro siempre vale más que el actual", "correct": false}, {"text": "La inflación no afecta el valor del dinero", "correct": false}], "just": "El dinero presente tiene un costo de oportunidad: invertido, crece. Por eso descontamos los flujos futuros (valor presente) y capitalizamos los actuales (valor futuro). Es la base de toda la planeación cuantitativa."}, {"id": 525, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "¿Cuál será el valor futuro de $100,000 invertidos durante 10 años a una tasa anual del 8%?", "opts": [{"text": "$180,000", "correct": false}, {"text": "≈ $215,900", "correct": true}, {"text": "$108,000", "correct": false}, {"text": "$200,000", "correct": false}], "just": "VF = VP × (1 + r)ⁿ = 100,000 × 1.08<sup>10</sup> ≈ 100,000 × 2.1589 = <strong>$215,892</strong>. El interés compuesto, no el simple ($180,000), explica la diferencia. <em>(Tolerancia ±$500.)</em>"}, {"id": 526, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "¿Cuánto debe invertirse hoy para tener $500,000 en 10 años, si la tasa anual es del 7%?", "opts": [{"text": "$500,000", "correct": false}, {"text": "≈ $254,000", "correct": true}, {"text": "$350,000", "correct": false}, {"text": "$430,000", "correct": false}], "just": "VP = VF / (1 + r)ⁿ = 500,000 / 1.07<sup>10</sup> ≈ 500,000 / 1.9672 = <strong>$254,174</strong>. Es el valor presente: cuánto vale hoy una meta futura descontada a la tasa esperada. <em>(Tolerancia ±$1,000.)</em>"}, {"id": 527, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Usando la &quot;regla del 72&quot;, ¿en cuántos años se duplica aproximadamente una inversión que rinde 8% anual?", "opts": [{"text": "7.2 años", "correct": false}, {"text": "9 años", "correct": true}, {"text": "8 años", "correct": false}, {"text": "14 años", "correct": false}], "just": "La regla del 72 aproxima el tiempo de duplicación dividiendo 72 entre la tasa: 72 / 8 = <strong>9 años</strong>. Es una herramienta mental rápida derivada del interés compuesto."}, {"id": 528, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Un cliente ahorra $50,000 al final de cada año durante 10 años a una tasa del 6% anual. ¿Cuánto acumulará?", "opts": [{"text": "$500,000", "correct": false}, {"text": "≈ $659,000", "correct": true}, {"text": "$530,000", "correct": false}, {"text": "$1,000,000", "correct": false}], "just": "VF de una anualidad = PMT × [((1 + r)ⁿ − 1) / r] = 50,000 × [(1.06<sup>10</sup> − 1) / 0.06] ≈ 50,000 × 13.181 = <strong>$659,039</strong>. Lo aportado ($500,000) más los intereses compuestos. <em>(Tolerancia ±$2,000.)</em>"}, {"id": 529, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "¿Cuánto debe ahorrar un cliente al final de cada año para acumular $2,000,000 en 15 años, a una tasa del 7% anual?", "opts": [{"text": "$133,333", "correct": false}, {"text": "≈ $79,600", "correct": true}, {"text": "$50,000", "correct": false}, {"text": "$120,000", "correct": false}], "just": "PMT = VF / [((1 + r)ⁿ − 1) / r] = 2,000,000 / [(1.07<sup>15</sup> − 1) / 0.07] ≈ 2,000,000 / 25.129 = <strong>$79,589 al año</strong>. Despejar el pago de la fórmula de anualidad es la base de la planeación de metas. <em>(Tolerancia ±$1,000.)</em>"}, {"id": 530, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "La diferencia entre interés simple y compuesto es:", "opts": [{"text": "No hay diferencia", "correct": false}, {"text": "El interés simple se calcula solo sobre el capital inicial, mientras que el compuesto se calcula sobre el capital más los intereses ya acumulados; además, a mayor frecuencia de capitalización, mayor rendimiento efectivo", "correct": true}, {"text": "El interés simple siempre rinde más", "correct": false}, {"text": "El compuesto no depende del tiempo", "correct": false}], "just": "El interés compuesto genera &quot;interés sobre interés&quot;, lo que acelera el crecimiento frente al simple, sobre todo en horizontes largos. Capitalizar con mayor frecuencia (mensual vs. anual) eleva la tasa efectiva."}, {"id": 531, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Si una inversión rinde 9% nominal y la inflación es de 4%, ¿cuál es el rendimiento real (fórmula de Fisher)?", "opts": [{"text": "13%", "correct": false}, {"text": "≈ 4.8%", "correct": true}, {"text": "Exactamente 5%", "correct": false}, {"text": "9%", "correct": false}], "just": "Rendimiento real = [(1 + nominal) / (1 + inflación)] − 1 = (1.09 / 1.04) − 1 ≈ <strong>4.81%</strong>. La resta simple (9% − 4% = 5%) es solo una aproximación; la fórmula de Fisher es la correcta. <em>(Tolerancia ±0.2 pp.)</em>"}, {"id": 532, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Una colegiatura cuesta hoy $400,000. Si la inflación educativa es del 6% anual, ¿cuánto costará en 10 años?", "opts": [{"text": "$640,000", "correct": false}, {"text": "≈ $716,000", "correct": true}, {"text": "$400,000", "correct": false}, {"text": "$480,000", "correct": false}], "just": "Costo futuro = costo actual × (1 + inflación)ⁿ = 400,000 × 1.06<sup>10</sup> ≈ 400,000 × 1.7908 = <strong>$716,339</strong>. Planear una meta exige primero inflactarla a su valor futuro. <em>(Tolerancia ±$3,000.)</em>"}, {"id": 533, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "¿Por qué es tan importante empezar a invertir temprano?", "opts": [{"text": "Porque las tasas son mejores para los jóvenes", "correct": false}, {"text": "Porque el tiempo es el factor más poderoso del interés compuesto: quien empieza antes puede aportar menos en total y aun así acumular más, ya que sus rendimientos se capitalizan durante más años", "correct": true}, {"text": "Porque el mercado solo sube cuando uno es joven", "correct": false}, {"text": "Porque elimina el riesgo", "correct": false}], "just": "En el interés compuesto, los años importan más que el monto. Empezar temprano permite que los rendimientos generen, a su vez, rendimientos durante más tiempo, superando a quien empieza tarde aunque este aporte más."}, {"id": 534, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "La &quot;tasa de reemplazo&quot; en la planeación del retiro se refiere a:", "opts": [{"text": "La frecuencia con que se reemplaza la cartera", "correct": false}, {"text": "El porcentaje del ingreso previo al retiro que la persona necesitará como ingreso durante el retiro (un objetivo común ronda 70–80%)", "correct": true}, {"text": "La comisión del fondo de retiro", "correct": false}, {"text": "La tasa de los CETES", "correct": false}], "just": "La tasa de reemplazo dimensiona cuánto ingreso hará falta en el retiro respecto al ingreso laboral. Como el AFORE suele ofrecer una tasa baja, el ahorro voluntario (PPR) cierra la diferencia (Secciones 10 y 23)."}, {"id": 535, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Si un cliente desea un ingreso anual de $720,000 en el retiro y se usa la regla del 4% (retiro sostenible), ¿qué capital necesita acumular?", "opts": [{"text": "$7,200,000", "correct": false}, {"text": "$18,000,000", "correct": true}, {"text": "$2,880,000", "correct": false}, {"text": "$28,800,000", "correct": false}], "just": "Capital = gasto anual / tasa de retiro = $720,000 / 0.04 = <strong>$18,000,000</strong> (equivalente a 25 veces el gasto anual). La regla del 4% es una guía de planeación, no una garantía, y debe ajustarse por horizonte y supuestos. <em>(Tolerancia ±$100,000.)</em>"}, {"id": 536, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Para reunir los ≈ $716,000 de la colegiatura futura en 10 años, invirtiendo al 7% anual, ¿cuánto debe ahorrarse al año (aproximadamente)?", "opts": [{"text": "$71,600", "correct": false}, {"text": "≈ $51,800", "correct": true}, {"text": "$35,000", "correct": false}, {"text": "$100,000", "correct": false}], "just": "PMT = meta / [((1 + r)ⁿ − 1) / r] = 716,000 / [(1.07<sup>10</sup> − 1) / 0.07] ≈ 716,000 / 13.816 = <strong>$51,823 al año</strong>. Planear una meta es un proceso de dos pasos: inflactar el costo y luego calcular el ahorro requerido. <em>(Tolerancia ±$1,500.)</em>"}, {"id": 537, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "El &quot;análisis de brecha&quot; (gap analysis) en la planeación del retiro consiste en:", "opts": [{"text": "Medir la diferencia entre dos fondos de inversión", "correct": false}, {"text": "Comparar el capital necesario para el retiro con el capital proyectado (AFORE + ahorro actual); la diferencia es la brecha que el plan de ahorro debe cerrar", "correct": true}, {"text": "Calcular la inflación histórica", "correct": false}, {"text": "Estimar la comisión del asesor", "correct": false}], "just": "El gap analysis cuantifica cuánto falta: capital necesario − capital proyectado = brecha. Esa brecha define cuánto debe ahorrar el cliente (vía PPR y otras metas) para alcanzar su objetivo de retiro."}, {"id": 538, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "El rebalanceo de una cartera consiste en:", "opts": [{"text": "Vender todo cuando el mercado cae", "correct": false}, {"text": "Restaurar la asignación objetivo del plan (típicamente vendiendo lo que subió de más y comprando lo que quedó por debajo), ya sea por calendario o cuando se exceden bandas de tolerancia", "correct": true}, {"text": "Perseguir la inversión que más rindió el mes pasado", "correct": false}, {"text": "Dejar de aportar", "correct": false}], "just": "El rebalanceo mantiene el riesgo alineado con el plan y, de forma disciplinada, induce a &quot;comprar barato y vender caro&quot;. Puede hacerse por calendario (p. ej., anual) o por umbral (cuando una clase se desvía más de cierto porcentaje). Es una fuente de valor del Advisor&#x27;s Alpha (Sección 5)."}, {"id": 539, "sec": 29, "secTitle": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito", "q": "La idea central de la inversión por objetivos (goals-based investing) es que:", "opts": [{"text": "Lo único que importa es maximizar el valor absoluto del portafolio", "correct": false}, {"text": "No invertimos en abstracto: lo que importa no es la cifra de riqueza en sí, sino lo que esa riqueza nos permite lograr (nuestras metas), por lo que la inversión siempre es, en el fondo, por objetivos", "correct": true}, {"text": "Las metas del cliente son irrelevantes para construir el portafolio", "correct": false}, {"text": "El riesgo se mide solo como varianza", "correct": false}], "just": "Desde Bernoulli (1738) —y reforzado por Shiller— se reconoce que valoramos lo que el dinero nos permite hacer, no su monto abstracto. Es la premisa de Invierte con Propósito: primero las metas, luego el portafolio."}, {"id": 540, "sec": 29, "secTitle": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito", "q": "La paradoja de Friedman-Savage (1948) —que la misma persona compre seguros y billetes de lotería— se explica porque:", "opts": [{"text": "Las personas son siempre aversas al riesgo", "correct": false}, {"text": "La curva de utilidad no es de una sola forma, sino &quot;ondulada&quot; (cóncava y convexa por tramos): la persona es aversa al riesgo para protegerse de la pobreza (seguro) y afín al riesgo para buscar el enriquecimiento (lotería)", "correct": true}, {"text": "Las personas son irracionales sin remedio", "correct": false}, {"text": "Los seguros y las loterías son la misma cosa", "correct": false}], "just": "La curva &quot;ondulada&quot; anticipa la lógica por capas: protección abajo, aspiración arriba. La cuenta mental (mental accounting) la resuelve de forma natural al asignar distintas tolerancias al riesgo a distintos objetivos."}, {"id": 541, "sec": 29, "secTitle": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito", "q": "En la teoría por objetivos, el término &quot;mental accounting&quot; (cuentas mentales) de Thaler tiene dos lecturas. ¿Cuál corresponde a la base de Invierte con Propósito?", "opts": [{"text": "Únicamente el sesgo cognitivo de tratar el dinero como no fungible", "correct": false}, {"text": "La observación —no irracional— de que las personas dedican su riqueza a distintas metas y, en respuesta, eligen distintas estrategias y niveles de riesgo para cada una (aun tratando el dinero como fungible)", "correct": true}, {"text": "Que el dinero nunca debe separarse por objetivos", "correct": false}, {"text": "Que conviene ignorar las metas del cliente", "correct": false}], "just": "Hay un mental accounting que es sesgo (no tratar el dinero como fungible) y otro que es racional (dedicar la riqueza a objetivos con riesgos distintos). La teoría por objetivos —y los cajones de GBM— se basan en el segundo, que Brunel (2006) y Das et al. (2010) mostraron que no es irracional ni ineficiente."}, {"id": 542, "sec": 29, "secTitle": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito", "q": "El aporte central de la Behavioral Portfolio Theory (Shefrin-Statman, 2000) es redefinir el riesgo como:", "opts": [{"text": "La varianza o desviación estándar de los rendimientos", "correct": false}, {"text": "La probabilidad de no alcanzar el rendimiento mínimo (umbral) necesario para cumplir una meta; es decir, el riesgo es la probabilidad de no lograr el objetivo", "correct": true}, {"text": "La beta frente al mercado", "correct": false}, {"text": "La duración de los bonos", "correct": false}], "just": "Frente al &quot;riesgo = varianza&quot; de Markowitz, la BPT define el riesgo como la probabilidad de fallar el umbral de la meta. Esta es exactamente la noción de riesgo que usa Invierte con Propósito: el riesgo es no alcanzar el objetivo de cada cajón."}, {"id": 543, "sec": 29, "secTitle": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito", "q": "Según la BPT, los portafolios óptimos de los inversionistas se asemejan a:", "opts": [{"text": "Una sola cartera bien diversificada sobre la frontera media-varianza", "correct": false}, {"text": "Pirámides por capas: una capa base diseñada para evitar la pobreza (instrumentos seguros, tipo &quot;bonos&quot;) y una capa superior para buscar el enriquecimiento (apuestas de alto potencial, tipo &quot;billetes de lotería&quot;)", "correct": true}, {"text": "Un único bono cupón cero", "correct": false}, {"text": "Una cartera 100% en una sola acción", "correct": false}], "just": "Shefrin-Statman muestran que los portafolios óptimos son combinaciones de &quot;bonos y billetes de lotería&quot; (consistente con Friedman-Savage), organizadas como pirámides por capas. Es el reflejo teórico de los cajones: liquidez/seguridad abajo, crecimiento/aspiración arriba."}, {"id": 544, "sec": 29, "secTitle": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito", "q": "La BPT presenta dos versiones, BPT-SA y BPT-MA. ¿Cuál describe mejor cómo invierten las personas reales y la lógica de los cajones?", "opts": [{"text": "BPT-SA, que integra todo en una sola cuenta mental", "correct": false}, {"text": "BPT-MA, en la que el inversionista segrega su riqueza en varias cuentas mentales (capas), cada una asociada a una aspiración o meta con su propia tolerancia al riesgo", "correct": true}, {"text": "Ninguna; las personas optimizan media-varianza", "correct": false}, {"text": "Ambas son idénticas", "correct": false}], "just": "La versión de múltiples cuentas (BPT-MA) corresponde a las &quot;pirámides por capas&quot; y a cómo realmente las personas dividen su dinero por objetivos. Es la formalización académica de los cajones de Invierte con Propósito."}, {"id": 545, "sec": 29, "secTitle": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito", "q": "¿Por qué un portafolio construido según la BPT puede parecer &quot;no diversificado&quot; frente a la teoría de Markowitz (MPT)?", "opts": [{"text": "Porque la BPT prohíbe la diversificación", "correct": false}, {"text": "Porque el inversionista evalúa cada cuenta mental (capa) por separado e ignora las covarianzas entre capas, de modo que la frontera eficiente de la BPT no coincide con la media-varianza y no se cumple la separación en dos fondos del CAPM", "correct": true}, {"text": "Porque la BPT solo invierte en efectivo", "correct": false}, {"text": "Porque la MPT también construye pirámides", "correct": false}], "just": "Al tratar cada capa/meta de forma aislada (sin considerar las covarianzas entre cajones), el resultado difiere de la cartera única óptima de la MPT. No es un error: es la consecuencia de organizar la inversión por objetivos."}, {"id": 546, "sec": 29, "secTitle": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito", "q": "La BPT se apoya en la teoría SP/A de Lopes (1987) y en el criterio safety-first de Roy (1952). ¿Qué capturan estas ideas?", "opts": [{"text": "Que los inversionistas solo buscan maximizar el rendimiento esperado", "correct": false}, {"text": "La tensión entre la seguridad (miedo a la pobreza), el potencial (esperanza de enriquecimiento) y el nivel de aspiración (la meta), reconociendo que las personas, ante la incertidumbre, buscan primero evitar el desastre", "correct": true}, {"text": "Que el riesgo no existe", "correct": false}, {"text": "Que la diversificación es irrelevante", "correct": false}], "just": "SP/A (Security, Potential, Aspiration) y el safety-first de Roy incorporan las emociones de miedo y esperanza y la prioridad de &quot;no arruinarse&quot; antes que &quot;maximizar&quot;. Es la dimensión conductual que el asesor gestiona meta por meta (enlaza con la Sección 4)."}, {"id": 547, "sec": 29, "secTitle": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito", "q": "Das, Markowitz, Scheid y Statman (2010) reconciliaron la BPT con la teoría de Markowitz al mostrar que:", "opts": [{"text": "La BPT y la MPT son incompatibles", "correct": false}, {"text": "Dividir la riqueza en cuentas mentales por objetivos no es irracional ni ineficiente: la probabilidad de no alcanzar un umbral es matemáticamente traducible a un parámetro de aversión al riesgo, de modo que cada meta puede optimizarse al estilo media-varianza", "correct": true}, {"text": "Las cuentas mentales siempre destruyen valor", "correct": false}, {"text": "Conviene ignorar las metas y optimizar una sola cartera", "correct": false}], "just": "Este resultado es clave para Invierte con Propósito: legitima académicamente el enfoque por cajones. El cliente declara la probabilidad máxima de fallo que tolera para cada meta, y esa cifra se traduce en una optimización rigurosa por cuenta, sin sacrificar eficiencia."}, {"id": 548, "sec": 29, "secTitle": "Goals-based investing y Behavioral Portfolio Theory: el fundamento teórico de Invierte con Propósito", "q": "Síntesis (capstone). ¿Cómo fundamenta la teoría por objetivos a la metodología Invierte con Propósito?", "opts": [{"text": "La contradice, pues exige una sola cartera optimizada para todo", "correct": false}, {"text": "No tiene relación con la práctica de la asesoría", "correct": false}, {"text": "Los cajones de Invierte con Propósito son la materialización de las cuentas mentales / capas de la BPT: cada cajón es una meta con su propio horizonte, umbral y tolerancia al riesgo; el riesgo se define como la probabilidad de no alcanzar cada objetivo; y la literatura (Brunel; Das-Markowitz-Scheid-Statman) demuestra que organizar la riqueza así es racional y no ineficiente, validando la metodología", "correct": true}, {"text": "Solo aplica a inversionistas institucionales", "correct": false}], "just": "Integra el bloque y toda la metodología: Invierte con Propósito no es una simplificación comercial, sino la aplicación de la inversión por objetivos con sólido respaldo académico (Bernoulli → Friedman-Savage → Thaler → Shefrin-Statman → Das et al.). El asesor agrega valor definiendo metas, asignando cada cajón a su objetivo y gestionando la conducta meta por meta."}, {"id": 549, "sec": 1, "secTitle": "Advisory", "q": "Según GBM Advisory, invertir se trata principalmente de:", "opts": [{"text": "Perseguir los rendimientos más altos disponibles en cada momento.", "correct": false}, {"text": "Reaccionar de forma oportuna a las noticias del mercado.", "correct": false}, {"text": "Tener un plan que te acompañe durante toda tu vida, no solo elegir productos.", "correct": true}, {"text": "Seleccionar el instrumento con la comisión más baja.", "correct": false}], "just": "La presentación enfatiza que \"invertir no se trata solo de productos\", sino de contar con un plan que acompañe al inversionista a lo largo del tiempo; invertir sin plan es dejar el futuro al azar."}, {"id": 550, "sec": 1, "secTitle": "Advisory", "q": "GBM Advisory ofrece dos formas de acompañamiento. ¿Cuáles son?", "opts": [{"text": "Fondos de inversión y contratos de futuros.", "correct": false}, {"text": "Portafolios Recomendados y Gestión Patrimonial 360.", "correct": true}, {"text": "Cuentas en pesos y cuentas en dólares.", "correct": false}, {"text": "Trading discrecional y asesoría telefónica.", "correct": false}], "just": "Ambas soluciones parten de un plan; la diferencia es el grado de profundidad del acompañamiento."}, {"id": 551, "sec": 1, "secTitle": "Advisory", "q": "La diferencia esencial entre Portafolios Recomendados y Gestión Patrimonial 360 es:", "opts": [{"text": "Que solo una de ellas invierte en instrumentos de mercado.", "correct": false}, {"text": "El monto mínimo para abrir la cuenta, exclusivamente.", "correct": false}, {"text": "El grado de profundidad del acompañamiento; ambas parten de un plan.", "correct": true}, {"text": "Que Portafolios Recomendados no permite rebalanceo.", "correct": false}], "just": "La presentación aclara que \"ambas opciones parten de un plan. La diferencia es el grado de profundidad\"."}, {"id": 552, "sec": 1, "secTitle": "Advisory", "q": "\"Portafolios Recomendados\" está diseñado idealmente para:", "opts": [{"text": "Inversionistas que requieren optimización fiscal y custodia internacional.", "correct": false}, {"text": "Quienes buscan una solución clara y estructurada para empezar a invertir con disciplina, sin gestión patrimonial completa.", "correct": true}, {"text": "Clientes que necesitan un asesor personal dedicado 1:1.", "correct": false}, {"text": "Personas que buscan operar activamente en el corto plazo.", "correct": false}], "just": "Es la solución simple, estructurada y profesional para invertir con orden, sin requerir una gestión patrimonial integral."}, {"id": 553, "sec": 1, "secTitle": "Advisory", "q": "Gestión Patrimonial 360 es ideal para:", "opts": [{"text": "Quien apenas da su primer paso con $100 MXN.", "correct": false}, {"text": "Inversionistas que solo desean un portafolio y rebalanceo automático.", "correct": false}, {"text": "Inversionistas que buscan una visión completa de su patrimonio y acompañamiento profundo en cada decisión relevante.", "correct": true}, {"text": "Personas que prefieren no tener un plan financiero.", "correct": false}], "just": "GP360 conecta todas las decisiones patrimoniales en una sola estrategia coherente, con diagnóstico continuo."}, {"id": 554, "sec": 1, "secTitle": "Advisory", "q": "¿Cuál de los siguientes NO es un componente de Gestión Patrimonial 360?", "opts": [{"text": "Optimización fiscal y decisión de moneda.", "correct": false}, {"text": "Custodia internacional y coaching conductual.", "correct": false}, {"text": "Plan de ahorro estructurado y asignación de activos.", "correct": false}, {"text": "Garantía de un rendimiento anual mínimo.", "correct": true}], "just": "GP360 integra plan financiero, ahorro, asignación de activos, selección de instrumentos, optimización fiscal, decisión de moneda, custodia internacional, coaching conductual y servicio de excelencia. Ninguna estrategia seria garantiza rendimientos."}, {"id": 555, "sec": 1, "secTitle": "Advisory", "q": "El nivel de asesoría \"Digital\" está disponible a partir de:", "opts": [{"text": "$300,000 MXN.", "correct": false}, {"text": "$100 MXN.", "correct": true}, {"text": "$2,000,000 MXN.", "correct": false}, {"text": "$20,000,000 MXN.", "correct": false}], "just": "El nivel Digital permite dar el primer paso con estructura y autonomía desde $100 MXN, con herramientas 100% digitales."}, {"id": 556, "sec": 1, "secTitle": "Advisory", "q": "Relaciona el nivel de asesoría con su monto de acceso. ¿Cuál es correcta?", "opts": [{"text": "Personal desde $2,000,000 MXN.", "correct": false}, {"text": "Premium desde $300,000 MXN.", "correct": false}, {"text": "Private desde $20,000,000 MXN.", "correct": true}, {"text": "Digital desde $2,000,000 MXN.", "correct": false}], "just": "Los umbrales son Digital $100, Personal $300,000, Premium $2,000,000 y Private $20,000,000 MXN."}, {"id": 557, "sec": 1, "secTitle": "Advisory", "q": "¿A partir de qué nivel de asesoría se ofrece acceso a cuentas de inversión en EE. UU. en dólares?", "opts": [{"text": "Desde el nivel Digital.", "correct": false}, {"text": "A partir del nivel Personal.", "correct": true}, {"text": "Solo en el nivel Private.", "correct": false}, {"text": "No se ofrece en ningún nivel.", "correct": false}], "just": "Personal, Premium y Private mencionan acceso a cuentas en EE. UU. en dólares; el nivel Digital no lo incluye."}, {"id": 558, "sec": 1, "secTitle": "Advisory", "q": "¿Qué distingue al nivel \"Private\" de los demás?", "opts": [{"text": "Es el único con planificación financiera.", "correct": false}, {"text": "Es el único que invierte en instrumentos de mercado.", "correct": false}, {"text": "Añade acceso a eventos privados y productos exclusivos, además del asesor dedicado.", "correct": true}, {"text": "No requiere monto mínimo.", "correct": false}], "just": "Private (desde $20,000,000 MXN) suma eventos privados y productos exclusivos al acompañamiento 1:1."}, {"id": 559, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "¿Cómo funcionan los Portafolios Recomendados?", "opts": [{"text": "El cliente elige manualmente cada instrumento sin perfilamiento.", "correct": false}, {"text": "Perfilamiento en pocos pasos, construcción de un portafolio optimizado según el perfil y seguimiento con rebalanceo automático.", "correct": true}, {"text": "Se replica el portafolio de otro cliente con mayor patrimonio.", "correct": false}, {"text": "Se opera de forma discrecional buscando ganancias de corto plazo.", "correct": false}], "just": "El flujo es perfilar, construir un portafolio optimizado y dar seguimiento con rebalanceo automático en el tiempo."}, {"id": 560, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "En el ejemplo de GP360, ¿qué instrumento ilustra cada portafolio?", "opts": [{"text": "Acciones = CETES 28 días; Balanceada = MSCI ACWI; Reserva = GMP.", "correct": false}, {"text": "Acciones = MSCI ACWI; Balanceada = GBM Global Market Portfolio; Reserva = CETES 28 días.", "correct": true}, {"text": "Acciones = GMP; Balanceada = CETES; Reserva = MSCI ACWI.", "correct": false}, {"text": "Los tres se ilustran con CETES 28 días.", "correct": false}], "just": "La presentación usa el índice MSCI ACWI para acciones, el GBM Global Market Portfolio para la parte balanceada y CETES 28 días para la reserva."}, {"id": 561, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "El perfilamiento del inversionista define principalmente:", "opts": [{"text": "El horario de operación y el tipo de dispositivo.", "correct": false}, {"text": "El horizonte, la tolerancia al riesgo y los objetivos financieros.", "correct": true}, {"text": "La comisión aplicable a cada operación.", "correct": false}, {"text": "El país de residencia fiscal del cliente.", "correct": false}], "just": "A partir del perfilamiento (horizonte, tolerancia al riesgo y objetivos) se construye el portafolio a la medida."}, {"id": 562, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "¿Cuál es la función del rebalanceo automático?", "opts": [{"text": "Aumentar la frecuencia de operación para generar comisiones.", "correct": false}, {"text": "Vender todo ante caídas del mercado.", "correct": false}, {"text": "Mantener el portafolio alineado al perfil objetivo a lo largo del tiempo.", "correct": true}, {"text": "Predecir el mejor momento para entrar y salir.", "correct": false}], "just": "El rebalanceo devuelve las ponderaciones al objetivo definido por el perfil, sin intentar adivinar el mercado."}, {"id": 563, "sec": 6, "secTitle": "Asset allocation", "q": "En Invierte con Propósito, ¿cuál es el rol del portafolio de \"Alto Crecimiento\"?", "opts": [{"text": "Cubrir gastos e imprevistos de corto plazo.", "correct": false}, {"text": "Reducir al mínimo la volatilidad del patrimonio.", "correct": false}, {"text": "Ser el motor de crecimiento del patrimonio en el largo plazo, asumiendo volatilidad de corto plazo.", "correct": true}, {"text": "Garantizar liquidez inmediata sin riesgo.", "correct": false}], "just": "Se enfoca en el crecimiento de empresas en el tiempo, aceptando volatilidad de corto plazo a cambio de mayor potencial de retorno."}, {"id": 564, "sec": 6, "secTitle": "Asset allocation", "q": "¿Cuál es el propósito del portafolio \"Fondo de Emergencia\"?", "opts": [{"text": "Maximizar el rendimiento con acciones globales.", "correct": false}, {"text": "Enfrentar imprevistos sin tener que vender inversiones en mal momento ni endeudarse.", "correct": true}, {"text": "Concentrar el patrimonio en una sola economía.", "correct": false}, {"text": "Sustituir al seguro de vida.", "correct": false}], "just": "Da tranquilidad y estabilidad para que el resto del plan crezca sin interrupciones."}, {"id": 565, "sec": 6, "secTitle": "Asset allocation", "q": "La \"Diversificación Global\" busca:", "opts": [{"text": "Apostar por la economía con mejor desempeño reciente.", "correct": false}, {"text": "Invertir en distintos países, sectores y activos para reducir la dependencia de una sola economía y suavizar la volatilidad.", "correct": true}, {"text": "Eliminar por completo el riesgo de mercado.", "correct": false}, {"text": "Invertir únicamente en México.", "correct": false}], "just": "Equilibra riesgo y retorno mientras se construye patrimonio de forma consistente."}, {"id": 566, "sec": 6, "secTitle": "Asset allocation", "q": "La estructura de tres portafolios (emergencia, diversificación, crecimiento) refleja el principio de:", "opts": [{"text": "Concentrar el capital donde haya mayor rendimiento histórico.", "correct": false}, {"text": "Asignar cada componente a un objetivo y rol específico dentro del plan.", "correct": true}, {"text": "Rotar de activo cada vez que cambian las noticias.", "correct": false}, {"text": "Igualar la ponderación de todos los activos siempre.", "correct": false}], "just": "Cada portafolio cumple una función distinta (liquidez, equilibrio y crecimiento), coherente con una inversión orientada a objetivos."}, {"id": 567, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "La metodología \"Págate a ti primero\" consiste en:", "opts": [{"text": "Pagar primero todas las deudas y luego ahorrar lo que sobre.", "correct": false}, {"text": "Apartar e invertir una parte de tus ingresos para tu futuro antes de gastar en todo lo demás.", "correct": true}, {"text": "Ahorrar solo cuando quede dinero a fin de mes.", "correct": false}, {"text": "Destinar los ingresos extraordinarios exclusivamente al consumo.", "correct": false}], "just": "Convierte el ahorro en una prioridad automática; repetido por años, transforma la vida financiera."}, {"id": 568, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "La idea \"ahorrar es lineal, invertir es exponencial\" se explica principalmente por:", "opts": [{"text": "La inflación.", "correct": false}, {"text": "La diversificación.", "correct": false}, {"text": "El interés compuesto.", "correct": true}, {"text": "El apalancamiento.", "correct": false}], "just": "Ahorrar acumula de forma lineal; invertir con interés compuesto hace que cada peso genere rendimientos sobre rendimientos, creciendo de forma exponencial."}, {"id": 569, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Según el ejemplo ilustrativo (invertir $100 al día), la diferencia entre ahorrar e invertir:", "opts": [{"text": "Es constante a lo largo de los años.", "correct": false}, {"text": "Se reduce con el tiempo.", "correct": false}, {"text": "Crece con el tiempo: a mayor plazo, mayor es la brecha por el interés compuesto.", "correct": true}, {"text": "Solo aparece si la tasa supera el 20% anual.", "correct": false}], "just": "En el ejemplo, a 35 años la inversión (~$10.4 M) supera ampliamente al simple ahorro (~$1.28 M); la brecha se amplía con el horizonte."}, {"id": 570, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "En \"invertir una vez vs. con constancia\" (ambos al 10% anual), ¿por qué la Persona B termina con más patrimonio?", "opts": [{"text": "Porque asume menos riesgo que la Persona A.", "correct": false}, {"text": "Porque suma aportaciones mensuales constantes que, con interés compuesto, acumulan más capital en el tiempo.", "correct": true}, {"text": "Porque obtiene una tasa de rendimiento mayor.", "correct": false}, {"text": "Porque evita por completo la volatilidad.", "correct": false}], "just": "Ambos rinden 10% anual; la ventaja de B proviene de las aportaciones periódicas ($10,000/mes) capitalizadas durante 30 años."}, {"id": 571, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "Según la presentación, la clave para construir riqueza está en:", "opts": [{"text": "Cuánto ganas cada año.", "correct": false}, {"text": "Encontrar el mejor momento para entrar al mercado.", "correct": false}, {"text": "Cuánto decides ahorrar e invertir de forma constante cada mes.", "correct": true}, {"text": "Elegir un solo activo ganador.", "correct": false}], "just": "La constancia y el tiempo en el mercado son los principales motores del resultado de largo plazo."}, {"id": 572, "sec": 28, "secTitle": "Planeación financiera integral y matemáticas financieras", "q": "El dato citado sobre el S&amp;P 500 indica un rendimiento promedio anual cercano a 10.13% desde:", "opts": [{"text": "1929.", "correct": false}, {"text": "1957.", "correct": true}, {"text": "1987.", "correct": false}, {"text": "2000.", "correct": false}], "just": "La presentación usa como referencia el promedio anual de ~10.13% del S&amp;P 500 desde 1957 para ilustrar el rendimiento compuesto."}, {"id": 573, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "Según el estudio de Vanguard citado (\"Putting a value on your value: Quantifying Advisor's Alpha\"), la asesoría puede aportar hasta:", "opts": [{"text": "0.5% anual adicional.", "correct": false}, {"text": "1% anual adicional.", "correct": false}, {"text": "Alrededor de 3% anual adicional.", "correct": true}, {"text": "8% anual adicional garantizado.", "correct": false}], "just": "La presentación cita que contar con asesoría puede aportar hasta ~3% adicional anual, como ejemplo ilustrativo (no garantizado)."}, {"id": 574, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "¿Cuál de las siguientes es una palanca de \"disciplina y comportamiento\" del valor de la asesoría?", "opts": [{"text": "La asignación de activos adecuada.", "correct": false}, {"text": "La ubicación eficiente de activos.", "correct": false}, {"text": "Mantenerse invertido en momentos de volatilidad y evitar decisiones impulsivas.", "correct": true}, {"text": "La custodia internacional.", "correct": false}], "just": "El valor se agrupa en estructura/estrategia, disciplina/comportamiento y coordinación/optimización; mantenerse invertido y evitar impulsos corresponde a la disciplina conductual."}, {"id": 575, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "La \"ubicación eficiente de activos\" (asset location) se refiere a:", "opts": [{"text": "Elegir la casa de bolsa más cercana.", "correct": false}, {"text": "Colocar cada activo en la cuenta o jurisdicción más eficiente desde el punto de vista fiscal.", "correct": true}, {"text": "Diversificar entre sectores económicos.", "correct": false}, {"text": "Rebalancear el portafolio cada semana.", "correct": false}], "just": "Es una palanca de coordinación/optimización: alinear la ubicación de los activos con la situación fiscal para mejorar el rendimiento neto."}, {"id": 576, "sec": 4, "secTitle": "Finanzas conductuales", "q": "La frase de Warren Buffett citada —\"el mercado transfiere dinero de los impacientes a los pacientes\"— ilustra:", "opts": [{"text": "Que conviene operar con la mayor frecuencia posible.", "correct": false}, {"text": "El valor de la paciencia y del tiempo en el mercado por encima de intentar adivinar su momento.", "correct": true}, {"text": "Que el mercado siempre premia el apalancamiento.", "correct": false}, {"text": "Que los rendimientos pasados garantizan los futuros.", "correct": false}], "just": "La cita refuerza que la disciplina y la permanencia superan al <em>timing</em>; los impacientes tienden a transferir valor a los pacientes."}, {"id": 577, "sec": 4, "secTitle": "Finanzas conductuales", "q": "El \"coaching conductual\" dentro de Gestión Patrimonial 360 busca:", "opts": [{"text": "Aumentar la rotación del portafolio.", "correct": false}, {"text": "Acompañar al inversionista para evitar decisiones impulsivas y mantener la disciplina.", "correct": true}, {"text": "Sustituir el plan financiero.", "correct": false}, {"text": "Garantizar rendimientos en mercados a la baja.", "correct": false}], "just": "Es el acompañamiento que ayuda a sostener el plan cuando las emociones tienden a desviar las decisiones."}, {"id": 578, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Según la presentación, los principales motores del resultado de largo plazo son:", "opts": [{"text": "El apalancamiento y el <em>timing</em> del mercado.", "correct": false}, {"text": "La selección de un único activo ganador.", "correct": false}, {"text": "La constancia y el tiempo en el mercado.", "correct": true}, {"text": "La reacción rápida a las noticias.", "correct": false}], "just": "La estrategia se enfoca en hacer simple, disciplinado y eficiente el proceso de invertir con constancia a lo largo del tiempo."}, {"id": 579, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "En el \"blindaje del plan\", ¿cuál es el papel del seguro de vida?", "opts": [{"text": "Buscar el mayor rendimiento posible del patrimonio.", "correct": false}, {"text": "Sustituir al fondo de emergencia.", "correct": false}, {"text": "Asegurar que el plan continúe y la familia quede protegida ante un evento inesperado.", "correct": true}, {"text": "Reemplazar la diversificación global.", "correct": false}], "just": "El seguro de vida no busca rendimiento; busca que el plan siga en pie y las metas se cumplan pase lo que pase."}, {"id": 580, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "\"Proteger el plan es parte del plan\" porque:", "opts": [{"text": "Los seguros siempre superan el rendimiento de las acciones.", "correct": false}, {"text": "Un evento inesperado puede poner en riesgo años de esfuerzo; la protección permite cumplir los objetivos aun en escenarios adversos.", "correct": true}, {"text": "La protección elimina la necesidad de invertir.", "correct": false}, {"text": "Solo aplica para patrimonios superiores a $20,000,000 MXN.", "correct": false}], "just": "La protección financiera resguarda el plan ante imprevistos, de modo que los objetivos importantes se cumplan incluso en escenarios adversos."}, {"id": 581, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "En Gestión Patrimonial 360, ¿con qué comienza el acompañamiento integral?", "opts": [{"text": "Con la compra inmediata de acciones globales.", "correct": false}, {"text": "Con un diagnóstico financiero profundo y continuo.", "correct": true}, {"text": "Con la contratación de un seguro de vida.", "correct": false}, {"text": "Con la apertura de una cuenta en dólares.", "correct": false}], "just": "GP360 parte de un diagnóstico continuo, sobre el cual se construye y actualiza el plan financiero integral —análogo a un diagnóstico médico antes del tratamiento."}, {"id": 582, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "El \"problema de la hipótesis conjunta\" en las pruebas de eficiencia implica que:", "opts": [{"text": "Solo puede probarse la eficiencia si se conoce con certeza el modelo de riesgo verdadero.", "correct": false}, {"text": "Toda prueba de eficiencia es también una prueba del modelo de riesgo asumido; nunca se rechaza la eficiencia por sí sola, y una anomalía siempre puede reinterpretarse como un factor de riesgo aún no identificado.", "correct": true}, {"text": "Las anomalías demuestran de forma concluyente que la EMH es falsa.", "correct": false}, {"text": "La EMH y los modelos de factores son hipótesis independientes que se prueban por separado.", "correct": false}], "just": "En el marco de Fama, cualquier prima persistente puede leerse como compensación por riesgo (un factor no identificado) o como ineficiencia; el test conjunto impide atribuir el hallazgo solo a la (in)eficiencia."}, {"id": 583, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "El \"enigma central\" que unifica a value y momentum es que:", "opts": [{"text": "Ambos generan sus primas en el mismo horizonte y sentido.", "correct": false}, {"text": "Ambos desaparecen por completo bajo expectativas racionales.", "correct": false}, {"text": "Operan en horizontes opuestos sobre un mismo eje temporal: los retornos se continúan en el corto plazo (momentum) y revierten en el largo (value).", "correct": true}, {"text": "Solo funcionan en el mercado accionario estadounidense.", "correct": false}], "just": "La clave del enigma es la coexistencia de continuación de corto plazo y reversión de largo plazo: \"un mismo eje temporal, dos signos\"."}, {"id": 584, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "En la defensa <em>racional</em>, ¿cuál es la interpretación de la prima de value como compensación por riesgo?", "opts": [{"text": "Las firmas baratas son más seguras, por eso pagan más.", "correct": false}, {"text": "Las firmas baratas suelen estar financieramente frágiles (riesgo de <em>distress</em>, Fama-French 1996) y más expuestas al ciclo económico; la prima remunera ese riesgo.", "correct": true}, {"text": "La prima proviene de un error de expectativas de los analistas.", "correct": false}, {"text": "La prima existe porque el arbitraje es ilimitado y sin fricciones.", "correct": false}], "just": "La lectura racional de value combina riesgo de <em>distress</em> (FF 1996), teoría q/basada en inversión (Zhang) y covarianza con el ciclo/consumo (Lettau-Ludvigson); su talón de Aquiles es la magnitud observada."}, {"id": 585, "sec": 4, "secTitle": "Finanzas conductuales", "q": "La reversión de largo plazo documentada por De Bondt &amp; Thaler (1985) muestra que:", "opts": [{"text": "Los ganadores extremos recientes siguen ganando indefinidamente.", "correct": false}, {"text": "Los perdedores extremos previos tienden a superar a los ganadores extremos en los años siguientes, porque el mercado sobrerreacciona y luego revierte.", "correct": true}, {"text": "No existe relación entre el desempeño pasado y el futuro.", "correct": false}, {"text": "La reversión ocurre solo en el corto plazo (1–3 meses).", "correct": false}], "just": "De Bondt-Thaler (1985) hallaron que las carteras de perdedores extremos superan a las de ganadores extremos en horizontes largos: evidencia de sobre-reacción y reversión."}, {"id": 586, "sec": 4, "secTitle": "Finanzas conductuales", "q": "La Porta et al. (1997) muestran que el premio de value se concentra en los días de anuncios de resultados. ¿Qué implica esto?", "opts": [{"text": "Que value es puramente compensación por riesgo sistemático.", "correct": false}, {"text": "Que refleja un error de expectativas que se corrige en los anuncios: si fuera riesgo, el premio no se concentraría en esas fechas.", "correct": true}, {"text": "Que el premio es un artefacto de datos sin significado económico.", "correct": false}, {"text": "Que los anuncios de resultados no aportan información nueva.", "correct": false}], "just": "Que el retorno se materialice justo cuando llegan las noticias sugiere corrección de expectativas erróneas, no una prima de riesgo constante."}, {"id": 587, "sec": 4, "secTitle": "Finanzas conductuales", "q": "La Porta (1996) encontró que las expectativas de crecimiento de los analistas predicen los retornos \"al revés\". Esto significa que:", "opts": [{"text": "Las acciones con mayor crecimiento esperado obtienen los mayores retornos posteriores.", "correct": false}, {"text": "Las acciones con expectativas de crecimiento más optimistas tienden a obtener MENORES retornos posteriores, porque el mercado sobre-extrapola y paga de más.", "correct": true}, {"text": "Los analistas predicen los retornos con gran precisión.", "correct": false}, {"text": "No hay relación entre expectativas y retornos.", "correct": false}], "just": "La sobre-extrapolación del crecimiento lleva a sobrevalorar <em>glamour</em>; cuando los fundamentos revierten, esos nombres decepcionan (spread ~15% anual, confirmado por Bordalo et al. 2019)."}, {"id": 588, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Los tres modelos conductuales seminales (BSV, DHS y Hong-Stein) convergen en una misma narrativa:", "opts": [{"text": "Sobre-reacción inmediata seguida de continuación permanente.", "correct": false}, {"text": "Sub-reacción primero (momentum gana), luego sobre-reacción y finalmente reversión (value gana).", "correct": true}, {"text": "Los precios siempre reflejan de inmediato la información.", "correct": false}, {"text": "Momentum y value no pueden coexistir.", "correct": false}], "just": "Los tres modelos formalizan una secuencia común: la información se incorpora lentamente (sub-reacción → momentum) y luego el precio sobrepasa el valor y revierte (→ value)."}, {"id": 589, "sec": 4, "secTitle": "Finanzas conductuales", "q": "El modelo BSV (1998, Barberis-Shleifer-Vishny) explica momentum y reversión a partir de:", "opts": [{"text": "Dos poblaciones de agentes con difusión gradual de información.", "correct": false}, {"text": "Exceso de confianza y auto-atribución sesgada.", "correct": false}, {"text": "Un mismo inversor representativo que combina conservadurismo y representatividad y alterna entre dos regímenes mentales según el horizonte.", "correct": true}, {"text": "Arbitraje perfecto sin fricciones.", "correct": false}], "just": "En BSV, un único inversor representativo alterna regímenes (proceso de Markov): conservadurismo produce sub-reacción; representatividad, sobre-reacción."}, {"id": 590, "sec": 4, "secTitle": "Finanzas conductuales", "q": "El modelo DHS (1998, Daniel-Hirshleifer-Subrahmanyam) atribuye el patrón a:", "opts": [{"text": "Conservadurismo y representatividad en un inversor representativo.", "correct": false}, {"text": "Exceso de confianza en la señal privada y auto-atribución sesgada, que generan una sobre-reacción retardada: el precio sobrepasa el valor antes de corregir.", "correct": true}, {"text": "La difusión lenta de información entre <em>newswatchers</em>.", "correct": false}, {"text": "La ausencia total de sesgos.", "correct": false}], "just": "En DHS, el inversor confía de más en su información privada y atribuye los aciertos a su talento; el precio sobrepasa el valor y luego revierte."}, {"id": 591, "sec": 4, "secTitle": "Finanzas conductuales", "q": "El modelo Hong-Stein (1999) se distingue porque explica el fenómeno mediante:", "opts": [{"text": "Un solo inversor representativo con regímenes mentales.", "correct": false}, {"text": "Exceso de confianza y auto-atribución.", "correct": false}, {"text": "Dos tipos de agentes con racionalidad acotada: la información se difunde despacio entre <em>newswatchers</em> y los <em>momentum traders</em> amplifican la tendencia hasta excederla.", "correct": true}, {"text": "Expectativas plenamente racionales.", "correct": false}], "just": "Hong-Stein parte de difusión gradual de información entre <em>newswatchers</em> (sub-reacción) que luego los <em>momentum traders</em> llevan al exceso (sobre-reacción)."}, {"id": 592, "sec": 4, "secTitle": "Finanzas conductuales", "q": "El conservadurismo, documentado por Edwards (1968), sostiene que:", "opts": [{"text": "Las personas actualizan sus creencias más rápido de lo que Bayes prescribe.", "correct": false}, {"text": "Las personas actualizan sus creencias a ~50% de lo óptimo bayesiano, lo que produce sub-reacción y ayuda a explicar el <em>drift</em> post-anuncio (PEAD).", "correct": true}, {"text": "Las creencias se actualizan exactamente como prescribe Bayes.", "correct": false}, {"text": "El conservadurismo genera sobre-reacción inmediata.", "correct": false}], "just": "Al anclar en el estado previo, la actualización insuficiente hace que el precio siga ajustándose semanas después del anuncio (post-earnings-announcement drift)."}, {"id": 593, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Que la prospect theory estime un coeficiente de aversión a las pérdidas λ ≈ 2.25 significa que:", "opts": [{"text": "Las ganancias pesan 2.25 veces más que las pérdidas.", "correct": false}, {"text": "Perder $100 duele aproximadamente como no ganar $225; las pérdidas pesan ~2.25 veces más que las ganancias equivalentes.", "correct": true}, {"text": "El inversionista es indiferente entre ganar y perder.", "correct": false}, {"text": "La utilidad se evalúa sobre la riqueza absoluta, no sobre un punto de referencia.", "correct": false}], "just": "La utilidad se mide relativa a un punto de referencia; con λ ≈ 2.25, el dolor de perder supera al placer de ganar una cantidad igual."}, {"id": 594, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Según Shleifer &amp; Vishny (1997), los \"límites al arbitraje\" implican que:", "opts": [{"text": "El arbitraje siempre corrige el mispricing de inmediato.", "correct": false}, {"text": "El mispricing puede agravarse antes de corregir, y el arbitrajista que opera con capital externo puede verse forzado a liquidar justo en el peor momento.", "correct": true}, {"text": "Los arbitrajistas tienen capital ilimitado y horizonte infinito.", "correct": false}, {"text": "El sentimiento nunca afecta a los precios.", "correct": false}], "just": "El arbitraje real es riesgoso y financiado con capital que huye tras pérdidas; por eso los errores no se eliminan al instante y persisten en horizontes medibles."}, {"id": 595, "sec": 4, "secTitle": "Finanzas conductuales", "q": "
