sladan íntegros como menores rendimientos para el inversionista (alfa neto agregado negativo, ≈ -0.8% anual en 1984–2006)", "correct": true}, {"text": "La gestión activa no tiene ningún costo", "correct": false}, {"text": "Los fondos activos no se parecen en nada al mercado", "correct": false}], "just": "En conjunto, los fondos activos &quot;son&quot; aproximadamente el mercado antes de costos; lo que los hunde frente al inversionista es el costo de gestionarlos. El alfa bruto agregado ronda cero y el neto es negativo por el monto de los costos."}, {"id": 397, "sec": 18, "secTitle": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos", "q": "El principio de &quot;equilibrium accounting&quot; que aplican Fama y French sostiene que:", "opts": [{"text": "Antes de costos los inversionistas activos ganan alfa positivo para siempre", "correct": false}, {"text": "En agregado, los inversionistas activos tienen alfa ≈ cero ANTES de costos (es un juego de suma cero frente al mercado) y alfa negativo DESPUÉS de costos; no todos pueden estar por encima del promedio", "correct": true}, {"text": "La gestión activa crea valor agregado para todos sus partícipes", "correct": false}, {"text": "Los costos no afectan el resultado agregado", "correct": false}], "just": "Por contabilidad de equilibrio, el conjunto de inversionistas activos no puede, en agregado, superar al mercado antes de costos (lo que uno gana otro lo pierde); tras descontar comisiones, el agregado necesariamente queda por debajo."}, {"id": 398, "sec": 18, "secTitle": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos", "q": "¿Por qué Fama y French utilizan simulaciones de bootstrap?", "opts": [{"text": "Para inflar el número de fondos exitosos", "correct": false}, {"text": "Porque con miles de fondos, algunos parecerán hábiles solo por azar; el bootstrap compara la distribución real de los alfas (sus t-estadísticos) contra la que se generaría bajo la hipótesis nula de que el alfa verdadero es cero para todos los fondos, separando suerte de habilidad", "correct": true}, {"text": "Para evitar usar datos reales", "correct": false}, {"text": "Para garantizar que todos los fondos tengan alfa positivo", "correct": false}], "just": "El bootstrap es la innovación metodológica clave: permite preguntar si la cola de fondos &quot;ganadores&quot; es mayor de lo que la pura suerte produciría, distinguiendo habilidad genuina de azar."}, {"id": 399, "sec": 18, "secTitle": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos", "q": "Los modelos de referencia (benchmark) que utiliza el paper para medir el alfa son:", "opts": [{"text": "Únicamente el rendimiento del S&amp;P 500", "correct": false}, {"text": "Principalmente el modelo de tres factores de Fama-French (1993) y también el de cuatro factores de Carhart (1997), que añade momentum", "correct": true}, {"text": "Solo el CAPM de un factor", "correct": false}, {"text": "Un modelo sin factores de riesgo", "correct": false}], "just": "Al ajustar por mercado, tamaño, valor (y momentum en el de cuatro factores), el alfa mide el desempeño que no se explica por exposiciones a factores conocidos —es decir, la habilidad &quot;real&quot; del gestor—. Conecta con las Secciones 3 y 13."}, {"id": 400, "sec": 18, "secTitle": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos", "q": "¿Por qué evalúan los fondos usando el t-estadístico del alfa, t(α), y no solo el alfa?", "opts": [{"text": "Porque el alfa no se puede calcular", "correct": false}, {"text": "Porque el t(α) controla las diferencias de precisión entre fondos (distinta volatilidad y longitud de historial): un alfa alto de un fondo con poca historia o mucho ruido es menos confiable que uno con historial largo y estable", "correct": true}, {"text": "Porque el t(α) siempre es mayor", "correct": false}, {"text": "Porque elimina la necesidad de un benchmark", "correct": false}], "just": "Estandarizar por la precisión evita confundir un golpe de suerte de corta data con habilidad sostenida; el t(α) hace comparables fondos con historiales y volatilidades distintas."}, {"id": 401, "sec": 18, "secTitle": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos", "q": "Respecto a los rendimientos NETOS (después de comisiones), el bootstrap encontró que:", "opts": [{"text": "La mayoría de los fondos supera sus costos con holgura", "correct": false}, {"text": "Muy pocos fondos generan rendimientos ajustados por riesgo suficientes para cubrir sus costos; la distribución de alfas netos luce peor que la suerte (cola izquierda peor que el azar y cola derecha demasiado delgada para atribuirla a habilidad)", "correct": true}, {"text": "Todos los fondos baten al mercado neto de comisiones", "correct": false}, {"text": "Los costos no influyen en el resultado neto", "correct": false}], "just": "Para el inversionista (neto de comisiones), el desempeño de la gran mayoría de los fondos es indistinguible de la suerte —o peor—; pocos cubren siquiera sus propios costos."}, {"id": 402, "sec": 18, "secTitle": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos", "q": "Respecto a los rendimientos BRUTOS (sumando de vuelta las comisiones), el paper encontró que:", "opts": [{"text": "No existe ninguna habilidad ni en términos brutos", "correct": false}, {"text": "Hay evidencia de alfa verdadero distinto de cero en las colas extremas: existen gestores inferiores (sin habilidad) y superiores (con habilidad) antes de costos", "correct": true}, {"text": "Todos los gestores tienen exactamente la misma habilidad", "correct": false}, {"text": "El alfa bruto es siempre negativo", "correct": false}], "just": "Antes de costos, las colas se ensanchan más de lo que la suerte explicaría: sí hay habilidad (y falta de ella) genuina. El matiz crítico es que esa habilidad existe en bruto, pero no necesariamente llega al inversionista."}, {"id": 403, "sec": 18, "secTitle": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos", "q": "¿Cómo se reconcilia &quot;existe habilidad (bruto)&quot; con &quot;los inversionistas no la capturan (neto)&quot;?", "opts": [{"text": "La habilidad no existe en absoluto", "correct": false}, {"text": "Hay gestores con habilidad real, pero en promedio esa habilidad es consumida por las comisiones y costos, de modo que neto de gastos el inversionista típico no la captura; por eso la mayoría de los &quot;ganadores&quot; observados netos son, en realidad, suerte", "correct": true}, {"text": "Los costos aumentan el alfa neto", "correct": false}, {"text": "La habilidad siempre supera a los costos", "correct": false}], "just": "Es el corazón del título &quot;suerte vs. habilidad&quot;: la habilidad existe pero es escasa y, neto de costos, prácticamente desaparece para el inversionista; distinguir ex ante al gestor hábil del afortunado es extremadamente difícil."}, {"id": 404, "sec": 18, "secTitle": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos", "q": "La implicación práctica del paper para el inversionista es que:", "opts": [{"text": "Conviene perseguir al fondo activo que más rindió el año pasado", "correct": false}, {"text": "Se espera que un fondo indexado de bajo costo rinda aproximadamente igual que el ~3% superior de los fondos activos y mejor que el resto; como no se puede identificar de forma confiable a los pocos hábiles por adelantado, conviene favorecer la indexación de bajo costo y amplia diversificación", "correct": true}, {"text": "La gestión activa es siempre superior", "correct": false}, {"text": "El costo de los fondos es irrelevante", "correct": false}], "just": "Conecta con Bogle y la indexación (Sección 12), el costo en Advisor&#x27;s Alpha (Sección 5) y Bessembinder (Sección 17): si la habilidad neta es escasa e impredecible, la opción robusta es minimizar costos y diversificar, en lugar de apostar a seleccionar al ganador."}, {"id": 405, "sec": 18, "secTitle": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos", "q": "Síntesis (capstone). ¿Qué afirma —y qué NO afirma— Fama-French (2010), y cómo lo usa un asesor?", "opts": [{"text": "Afirma que ningún gestor tiene habilidad y que hay que evitar la renta variable", "correct": false}, {"text": "Afirma que la gestión activa siempre vale su costo", "correct": false}, {"text": "Afirma que la habilidad de gestión es escasa, difícil de identificar ex ante y, neto de costos, usualmente no llega al inversionista —pero NO que sea imposible ni que el mercado no premie al inversionista de largo plazo—; el asesor lo usa para justificar un núcleo de bajo costo (indexado/pasivo) y para ser humilde y selectivo al recomendar gestión activa", "correct": true}, {"text": "Afirma que el bootstrap demuestra que todos los fondos son iguales", "correct": false}], "just": "Integra el bloque y el club de lectura: el paper es matizado, no nihilista. Sí existe habilidad (en bruto, en las colas), pero el costo y la dificultad de identificarla ex ante hacen que, para la mayoría de los inversionistas, un núcleo indexado de bajo costo sea la decisión racional. El asesor agrega valor gestionando costos, diversificación y conducta —no prometiendo &quot;el próximo fondo estrella&quot;—."}, {"id": 406, "sec": 19, "secTitle": "Renta fija", "q": "Un bono (instrumento de renta fija) es esencialmente:", "opts": [{"text": "Una participación en el capital de una empresa", "correct": false}, {"text": "Un préstamo: el inversionista presta al emisor, que se compromete a pagar cupones periódicos y a devolver el principal (valor nominal) al vencimiento", "correct": true}, {"text": "Un derivado sobre una acción", "correct": false}, {"text": "Un depósito bancario garantizado por el gobierno", "correct": false}], "just": "El tenedor de un bono es acreedor (no propietario): tiene derecho a flujos contractuales (cupones + principal), con prelación sobre los accionistas en caso de quiebra, pero sin participación en las utilidades."}, {"id": 407, "sec": 19, "secTitle": "Renta fija", "q": "La relación entre el precio de un bono y las tasas de interés es:", "opts": [{"text": "Directa: si las tasas suben, el precio sube", "correct": false}, {"text": "Inversa: cuando las tasas de mercado suben, el precio de los bonos existentes baja; cuando las tasas bajan, el precio sube", "correct": true}, {"text": "Inexistente", "correct": false}, {"text": "Aleatoria", "correct": false}], "just": "Un bono con cupón fijo se vuelve menos atractivo cuando las nuevas emisiones pagan más, así que su precio cae hasta que su rendimiento iguala al de mercado. Esta relación inversa es el corazón del riesgo de tasa."}, {"id": 408, "sec": 19, "secTitle": "Renta fija", "q": "Un bono cotiza &quot;a premio&quot; (sobre par) cuando:", "opts": [{"text": "Su tasa cupón es menor que el rendimiento de mercado", "correct": false}, {"text": "Su tasa cupón es mayor que el rendimiento de mercado exigido (por eso vale más que su valor nominal)", "correct": true}, {"text": "Su tasa cupón es igual al rendimiento de mercado", "correct": false}, {"text": "El emisor está en default", "correct": false}], "just": "Si el cupón supera al rendimiento exigido, el bono paga &quot;de más&quot; y el mercado lo valora por encima de la par; si el cupón es menor, cotiza a descuento; si son iguales, a la par."}, {"id": 409, "sec": 19, "secTitle": "Renta fija", "q": "La diferencia entre la tasa cupón, el rendimiento corriente y el rendimiento al vencimiento (YTM) es:", "opts": [{"text": "Son tres nombres para lo mismo", "correct": false}, {"text": "La tasa cupón es fija sobre el nominal; el rendimiento corriente es el cupón anual entre el precio actual; el YTM es la TIR que iguala el precio con el valor presente de todos los flujos si se mantiene a vencimiento (asume reinversión de cupones a esa tasa)", "correct": true}, {"text": "El YTM ignora el precio de compra", "correct": false}, {"text": "El rendimiento corriente incluye la ganancia de capital al vencimiento", "correct": false}], "just": "El YTM es la medida más completa porque integra cupones, reinversión y la diferencia entre precio y valor nominal; el rendimiento corriente solo considera el flujo de cupón sobre el precio."}, {"id": 410, "sec": 19, "secTitle": "Renta fija", "q": "Un bono cupón cero (como los CETES o ciertos instrumentos en GBMGUB):", "opts": [{"text": "Paga cupones mensuales elevados", "correct": false}, {"text": "No paga cupones: se compra a descuento y su rendimiento proviene de la diferencia entre el precio de compra y el valor nominal recibido al vencimiento", "correct": true}, {"text": "Tiene el menor riesgo de tasa para un plazo dado", "correct": false}, {"text": "Garantiza un rendimiento real positivo", "correct": false}], "just": "Al concentrar todo el flujo en el vencimiento, el cupón cero tiene una duración igual a su plazo y, por tanto, mayor sensibilidad a tasas que un bono con cupones del mismo vencimiento."}, {"id": 411, "sec": 19, "secTitle": "Renta fija", "q": "El rendimiento total de una inversión en bonos proviene de:", "opts": [{"text": "Solo de los cupones", "correct": false}, {"text": "Tres fuentes: los cupones recibidos, la reinversión de esos cupones y el cambio de precio del bono (ganancia o pérdida de capital)", "correct": true}, {"text": "Únicamente del cambio de precio", "correct": false}, {"text": "Solo de la inflación", "correct": false}], "just": "Descomponer el rendimiento en cupón + reinversión + precio es clave para entender por qué el resultado realizado puede diferir del YTM inicial (si las tasas de reinversión o de salida cambian)."}, {"id": 412, "sec": 19, "secTitle": "Renta fija", "q": "Un bono o fondo de tasa flotante (como la posición preponderante del GBMF3) se distingue porque:", "opts": [{"text": "Tiene la mayor sensibilidad a tasas", "correct": false}, {"text": "Su cupón se ajusta periódicamente a una tasa de referencia (p. ej., TIIE), lo que mantiene su precio cerca del par y reduce su duración y su riesgo de tasa de interés", "correct": true}, {"text": "Paga un cupón fijo para siempre", "correct": false}, {"text": "No tiene riesgo de crédito", "correct": false}], "just": "Como el cupón &quot;sigue&quot; a las tasas, el precio de un flotante fluctúa poco ante cambios de tasa (baja duración); por eso GBMF3, preponderantemente flotante, tiene una duración efectiva corta (~3 meses)."}, {"id": 413, "sec": 19, "secTitle": "Renta fija", "q": "La duración de un fondo de deuda, según el material de GBM, mide:", "opts": [{"text": "El plazo legal del fondo", "correct": false}, {"text": "La sensibilidad del precio del fondo a cambios en las tasas de interés; es el tiempo promedio ponderado necesario para recuperar el valor presente de los flujos de los instrumentos que lo componen", "correct": true}, {"text": "La comisión anual del fondo", "correct": false}, {"text": "La calificación crediticia promedio", "correct": false}], "just": "Es la definición canónica de GBM: mayor duración = mayor sensibilidad del precio a las tasas (más riesgo de tasa), pero potencialmente mayor rendimiento como compensación."}, {"id": 414, "sec": 19, "secTitle": "Renta fija", "q": "La regla práctica de GBM para mitigar el riesgo de tasa de interés al invertir en un fondo de deuda es:", "opts": [{"text": "Vender el fondo cada semana", "correct": false}, {"text": "Procurar que el horizonte de inversión sea al menos igual a la duración del fondo", "correct": true}, {"text": "Elegir siempre el fondo de mayor duración", "correct": false}, {"text": "Evitar todos los fondos con duración mayor a un día", "correct": false}], "just": "Si el horizonte ≥ duración, las pérdidas temporales por alzas de tasa tienden a compensarse con la mayor reinversión, de modo que el inversionista captura aproximadamente el rendimiento esperado. Es la lógica de la inmunización."}, {"id": 415, "sec": 19, "secTitle": "Renta fija", "q": "La duración modificada de un bono indica:", "opts": [{"text": "El número de cupones que paga al año", "correct": false}, {"text": "El cambio porcentual aproximado en el precio ante un cambio de 1% (100 pb) en el rendimiento; a mayor duración, mayor variación de precio por el mismo movimiento de tasas", "correct": true}, {"text": "El plazo hasta el primer cupón", "correct": false}, {"text": "La calificación de crédito", "correct": false}], "just": "Un bono con duración modificada de 5 perderá ~5% si las tasas suben 1% (y ganará ~5% si bajan 1%). Es la herramienta central para cuantificar el riesgo de tasa."}, {"id": 416, "sec": 19, "secTitle": "Renta fija", "q": "El GBMGUB tiene una duración efectiva de ~2 meses y el GBMDIV2 de ~11 meses. Esto implica que:", "opts": [{"text": "Ambos tienen el mismo riesgo de tasa", "correct": false}, {"text": "El GBMDIV2 es más sensible a los movimientos de tasas (mayor riesgo de tasa) y por ello ofrece potencialmente mayor rendimiento, mientras que el GBMGUB es mucho más estable", "correct": true}, {"text": "El GBMGUB es más volátil que el GBMDIV2", "correct": false}, {"text": "La duración no afecta a ninguno de los dos", "correct": false}], "just": "La diferencia de duración (≈2 vs ≈11 meses) explica por qué el DIV2 oscila más ante cambios de tasa; sumado a que el DIV2 asume riesgo de crédito (alto rendimiento), su perfil de riesgo es claramente mayor."}, {"id": 417, "sec": 19, "secTitle": "Renta fija", "q": "La duración efectiva (en lugar de la de Macaulay o modificada) se usa cuando:", "opts": [{"text": "El bono no paga cupones", "correct": false}, {"text": "Los flujos del instrumento son inciertos o dependen del nivel de tasas (p. ej., bonos con opciones incorporadas, como los redimibles/callable), porque modela cómo cambian los flujos ante movimientos de tasa", "correct": true}, {"text": "El bono es de muy corto plazo", "correct": false}, {"text": "Nunca se usa en la práctica", "correct": false}], "just": "Cuando hay opcionalidad (call, put, prepago), los flujos no son fijos; la duración efectiva captura la sensibilidad real del precio considerando que los flujos pueden cambiar con las tasas."}, {"id": 418, "sec": 19, "secTitle": "Renta fija", "q": "El &quot;DV01&quot; (o valor del punto base, PVBP) de un bono mide:", "opts": [{"text": "El cupón anual del bono", "correct": false}, {"text": "El cambio en el precio (en dinero) del bono ante un movimiento de un punto base (0.01%) en el rendimiento", "correct": true}, {"text": "La probabilidad de default", "correct": false}, {"text": "El plazo al vencimiento", "correct": false}], "just": "El DV01 traduce la sensibilidad a tasas a términos monetarios, útil para dimensionar y cubrir posiciones de renta fija; complementa a la duración (que se expresa en porcentaje)."}, {"id": 419, "sec": 19, "secTitle": "Renta fija", "q": "La convexidad de un bono describe que:", "opts": [{"text": "La relación precio-rendimiento es una línea recta", "correct": false}, {"text": "La relación precio-rendimiento es curva (convexa): la duración subestima la ganancia de precio cuando las tasas bajan y sobreestima la pérdida cuando suben; una convexidad positiva es favorable para el inversionista", "correct": true}, {"text": "El precio sube siempre que las tasas suben", "correct": false}, {"text": "La convexidad solo aplica a las acciones", "correct": false}], "just": "Por la convexidad, el precio cae menos de lo que predice la duración cuando las tasas suben, y sube más cuando bajan. La duración es una aproximación lineal; la convexidad corrige esa aproximación, especialmente ante grandes movimientos de tasa."}, {"id": 420, "sec": 19, "secTitle": "Renta fija", "q": "El riesgo de reinversión y el riesgo de tasa (precio) se relacionan así:", "opts": [{"text": "Son el mismo riesgo", "correct": false}, {"text": "Actúan en direcciones opuestas: si las tasas suben, el precio del bono cae (riesgo de precio) pero los cupones se reinvierten a tasas mayores (beneficio de reinversión); cuando el horizonte iguala la duración, ambos efectos tienden a compensarse (inmunización)", "correct": true}, {"text": "Ambos mejoran cuando las tasas suben", "correct": false}, {"text": "Ninguno afecta el rendimiento realizado", "correct": false}], "just": "Esta compensación es la base teórica de la regla &quot;horizonte ≥ duración&quot;: al igualar horizonte y duración, la pérdida de precio por alzas de tasa se equilibra con la mayor reinversión de los cupones."}, {"id": 421, "sec": 19, "secTitle": "Renta fija", "q": "El riesgo de crédito y las calificaciones se relacionan en que:", "opts": [{"text": "Todos los bonos tienen el mismo riesgo de crédito", "correct": false}, {"text": "El riesgo de crédito es la posibilidad de que el emisor no pague; las calificadoras lo gradúan (de AAA, la máxima, hacia abajo), distinguiendo &quot;grado de inversión&quot; de &quot;grado especulativo / alto rendimiento&quot;; el GBMGUB elimina el riesgo de crédito al invertir 100% en instrumentos gubernamentales AAA", "correct": true}, {"text": "Los bonos gubernamentales siempre tienen más riesgo de crédito que los corporativos", "correct": false}, {"text": "La calificación no afecta el rendimiento exigido", "correct": false}], "just": "A menor calificación, mayor rendimiento exigido (mayor riesgo de impago y menor recuperación esperada). Un fondo 100% gubernamental local AAA, como GBMGUB, prácticamente elimina ese riesgo (queda el de tasa)."}, {"id": 422, "sec": 19, "secTitle": "Renta fija", "q": "El &quot;spread de crédito&quot; (sobretasa) es:", "opts": [{"text": "La comisión del fondo", "correct": false}, {"text": "El rendimiento adicional que un bono con riesgo de crédito paga por encima de un instrumento libre de riesgo de plazo comparable; se amplía en periodos de estrés y compensa el riesgo de impago", "correct": true}, {"text": "La diferencia entre dos cupones", "correct": false}, {"text": "El impuesto sobre los intereses", "correct": false}], "just": "El spread es la prima por asumir riesgo de crédito. Fondos como el GBMDIV2 (deuda corporativa de alto rendimiento) capturan spreads mayores asumiendo, explícitamente, un riesgo de crédito importante."}, {"id": 423, "sec": 19, "secTitle": "Renta fija", "q": "Un bono redimible anticipadamente (callable) implica para el inversionista que:", "opts": [{"text": "Tiene mayor protección que un bono normal", "correct": false}, {"text": "El emisor puede recomprarlo (típicamente cuando las tasas bajan), lo que expone al inversionista a riesgo de reinversión y genera &quot;convexidad negativa&quot;: su precio sube menos cuando las tasas caen", "correct": true}, {"text": "No tiene ningún riesgo adicional", "correct": false}, {"text": "Garantiza un rendimiento mayor sin contrapartida", "correct": false}], "just": "La opción de recompra beneficia al emisor: cuando refinanciarse es conveniente (tasas a la baja), &quot;llama&quot; el bono y el inversionista debe reinvertir a tasas menores. Por ese riesgo, los callables suelen ofrecer mayor rendimiento."}, {"id": 424, "sec": 19, "secTitle": "Renta fija", "q": "La forma de la curva de rendimiento (yield curve) y su lectura:", "opts": [{"text": "Siempre es plana", "correct": false}, {"text": "Normalmente tiene pendiente positiva (las tasas largas superan a las cortas); puede aplanarse o invertirse (tasas cortas por encima de las largas), y una curva invertida se interpreta históricamente como señal de posible recesión", "correct": true}, {"text": "Una curva invertida indica expansión segura", "correct": false}, {"text": "La pendiente no aporta información", "correct": false}], "just": "La curva refleja expectativas de tasas, inflación y crecimiento. La inversión de la curva (corto &gt; largo) ha precedido a varias recesiones, por lo que es una señal macro vigilada de cerca."}, {"id": 425, "sec": 19, "secTitle": "Renta fija", "q": "Entre las teorías de la estructura temporal de tasas:", "opts": [{"text": "Solo existe la teoría de la inflación", "correct": false}, {"text": "La teoría de las expectativas puras (las tasas largas reflejan expectativas de tasas cortas futuras), la de preferencia por liquidez (los inversionistas exigen una prima por plazos largos) y la de segmentación/hábitat preferido (oferta y demanda por plazo determinan cada tramo) explican su forma", "correct": true}, {"text": "La curva es completamente aleatoria", "correct": false}, {"text": "La curva solo depende del tipo de cambio", "correct": false}], "just": "Estas teorías son complementarias: las expectativas explican el &quot;centro&quot; de la curva, la prima por liquidez su pendiente positiva habitual, y la segmentación los desajustes por tramos según oferta y demanda específicas."}, {"id": 426, "sec": 19, "secTitle": "Renta fija", "q": "La tasa de referencia de Banxico influye en la renta fija porque:", "opts": [{"text": "No tiene relación con los bonos", "correct": false}, {"text": "Ancla el extremo corto de la curva y el costo del dinero; cuando Banxico recorta la tasa, los precios de los bonos existentes tienden a subir (y mejoran valuaciones de activos sensibles a tasa, como las FIBRAs), y viceversa", "correct": true}, {"text": "Solo afecta al tipo de cambio", "correct": false}, {"text": "Determina directamente el precio de las acciones", "correct": false}], "just": "La política monetaria mueve toda la curva (especialmente el corto plazo). Un ciclo de recortes reduce el costo de capital y eleva el valor presente de los flujos futuros, beneficiando a bonos y a activos de larga duración. (Verificar el nivel vigente de la tasa al usar el material.)"}, {"id": 427, "sec": 19, "secTitle": "Renta fija", "q": "Los CETES (Certificados de la Tesorería) son:", "opts": [{"text": "Bonos corporativos de largo plazo", "correct": false}, {"text": "Instrumentos gubernamentales de corto plazo (28, 91, 182, 364 días), cupón cero (se venden a descuento), considerados la referencia de &quot;tasa libre de riesgo&quot; en pesos", "correct": true}, {"text": "Instrumentos ligados a la inflación", "correct": false}, {"text": "Acciones del gobierno", "correct": false}], "just": "Los CETES son el activo de referencia del mercado de dinero mexicano; muchos fondos y SMAs de liquidez/renta fija (Smart Income, Deuda gubernamental) se comparan precisamente contra CETES de 28 días."}, {"id": 428, "sec": 19, "secTitle": "Renta fija", "q": "Los Bonos M se caracterizan por:", "opts": [{"text": "Tener tasa flotante y plazo corto", "correct": false}, {"text": "Ser bonos gubernamentales de tasa fija nominal y plazo largo (hasta ~30 años), por lo que tienen mayor duración y sensibilidad a las tasas de interés", "correct": true}, {"text": "Estar denominados en dólares", "correct": false}, {"text": "No pagar cupones", "correct": false}], "just": "Al ser de tasa fija y largo plazo, los Bonos M concentran el riesgo de tasa: pequeños cambios en el rendimiento mueven mucho su precio. Son la contraparte &quot;larga&quot; de los CETES."}, {"id": 429, "sec": 19, "secTitle": "Renta fija", "q": "Los Udibonos sirven para:", "opts": [{"text": "Invertir en dólares estadounidenses", "correct": false}, {"text": "Proteger el poder adquisitivo: están denominados en UDIs (unidades ligadas a la inflación), de modo que pagan un rendimiento real y su principal se ajusta con la inflación (INPC)", "correct": true}, {"text": "Apostar a la caída de la bolsa", "correct": false}, {"text": "Eliminar el riesgo de tasa de interés", "correct": false}], "just": "Los Udibonos cubren el riesgo de inflación al entregar un rendimiento real fijo. La diferencia entre el rendimiento nominal (Bono M) y el real (Udibono) del mismo plazo aproxima la inflación implícita (breakeven)."}, {"id": 430, "sec": 19, "secTitle": "Renta fija", "q": "Los Bondes (p. ej., Bondes F) y los BPAs son ejemplos de:", "opts": [{"text": "Acciones preferentes", "correct": false}, {"text": "Instrumentos gubernamentales/del IPAB de tasa flotante (revisable), cuyo cupón se ajusta a una tasa de referencia, por lo que tienen baja duración y bajo riesgo de tasa", "correct": true}, {"text": "Bonos corporativos de alto rendimiento", "correct": false}, {"text": "Derivados sobre divisas", "correct": false}], "just": "Al ser de tasa revisable, su precio se mantiene cerca del par ante cambios de tasa (baja duración). Son útiles para reducir el riesgo de tasa de un portafolio de deuda, igual que la porción flotante del GBMF3."}, {"id": 431, "sec": 19, "secTitle": "Renta fija", "q": "La deuda corporativa y bancaria en México (certificados bursátiles, papel comercial):", "opts": [{"text": "Tiene el mismo rendimiento que los CETES", "correct": false}, {"text": "Ofrece un rendimiento mayor que la deuda gubernamental de plazo comparable, como compensación por el riesgo de crédito del emisor; muchas emisiones de tasa flotante usan la TIIE como referencia", "correct": true}, {"text": "No tiene riesgo de crédito", "correct": false}, {"text": "Está prohibida para fondos de inversión", "correct": false}], "just": "El emisor corporativo/bancario paga una sobretasa (spread) sobre el gobierno por su riesgo de crédito. Fondos como GBMF2, GBMF3 y GBMM3 combinan deuda gubernamental con corporativa/bancaria de alta calidad para mejorar el rendimiento controlando el riesgo."}, {"id": 432, "sec": 19, "secTitle": "Renta fija", "q": "Entre GBMGUBL, GBMF2 y GBMF3, ¿cuál es la diferencia clave?", "opts": [{"text": "Los tres invierten solo en acciones", "correct": false}, {"text": "GBMGUBL invierte exclusivamente en bonos gubernamentales (el más seguro); GBMF2 (AAA/S1, muy baja sensibilidad) añade deuda corporativa y bancaria de alta calidad para liquidez; GBMF3 es deuda mixta de mediano plazo, preponderantemente en tasa flotante", "correct": true}, {"text": "GBMGUBL es el de mayor riesgo de crédito", "correct": false}, {"text": "Los tres tienen duración idéntica", "correct": false}], "just": "El anaquel se escala por riesgo de crédito y duración: de lo más conservador (GUBL, 100% gubernamental) a mezclas gubernamental/corporativo (F2 para liquidez, F3 mediano plazo flotante), permitiendo ubicar al cliente según su horizonte y tolerancia."}, {"id": 433, "sec": 19, "secTitle": "Renta fija", "q": "Los fondos GBMDOL/CASH y el GBMDINT se distinguen porque:", "opts": [{"text": "Ambos invierten en acciones mexicanas", "correct": false}, {"text": "GBMDOL/CASH están denominados en dólares e invierten en bonos de EE.UU. (para exposición en dólares; CASH se opera solo en dólares), mientras que GBMDINT da renta fija global vía ETFs/UCITs con una estructura que tributa como renta variable, lo que mejora su eficiencia fiscal", "correct": true}, {"text": "Son idénticos en moneda y régimen fiscal", "correct": false}, {"text": "Ninguno invierte en bonos", "correct": false}], "just": "Para exposición dolarizada directa están DOL/CASH; para renta fija global con ventaja fiscal (tributar como RV, tasa menor) está GBMDINT. El asesor elige según la moneda objetivo y la eficiencia fiscal buscada (enlaza con asset location, Sección 5)."}, {"id": 434, "sec": 19, "secTitle": "Renta fija", "q": "Para un cliente conservador que prioriza liquidez y preservación de capital, frente a uno que tolera más riesgo por mayor rendimiento, el anaquel GBM sugiere:", "opts": [{"text": "RETO y DIV2 para el conservador; GUBL y F2 para el agresivo", "correct": false}, {"text": "GBMF2/GBMGUBL (y GBMM3 para personas morales exentas) para el conservador que busca liquidez y seguridad; y GBMRETO (CETES + ~100 pb, gestión táctica), GBMDIV2 (alto rendimiento) o GBMPAT (mediano-largo plazo) para quien tolera más riesgo y tiene mayor horizonte", "correct": true}, {"text": "El mismo fondo para ambos perfiles", "correct": false}, {"text": "Solo fondos de renta variable para ambos", "correct": false}], "just": "La idoneidad manda: liquidez/seguridad (F2, GUBL, M3 para morales exentas) vs. mayor rendimiento con más volatilidad y horizonte &gt; 1 año (RETO, DIV2, PAT). El asesor empata el fondo con el objetivo, el horizonte y la tolerancia del cliente."}, {"id": 435, "sec": 19, "secTitle": "Renta fija", "q": "Síntesis (capstone). ¿Cómo construye un asesor el componente de renta fija de un portafolio?", "opts": [{"text": "Eligiendo el fondo que más rindió el mes pasado, sin más", "correct": false}, {"text": "Asumiendo que &quot;renta fija&quot; significa &quot;sin riesgo&quot;", "correct": false}, {"text": "Empatando la duración con el horizonte del cliente, diversificando por emisor y calidad crediticia, entendiendo los riesgos de tasa, crédito, reinversión y liquidez, eligiendo el vehículo GBM adecuado al objetivo (liquidez, mediano plazo, global, dolarizado, táctico) y explicando que la renta fija sí tiene riesgos (de tasa y de crédito), aunque sean distintos a los de la renta variable", "correct": true}, {"text": "Concentrando todo en un solo bono de largo plazo", "correct": false}], "just": "Integra el bloque: la renta fija no es &quot;sin riesgo&quot;. El asesor gestiona duración vs. horizonte, calidad crediticia, y selecciona el fondo correcto del anaquel según la meta, comunicando con claridad que existen riesgos de tasa y de crédito —pieza esencial de una asesoría honesta y técnica—."}, {"id": 436, "sec": 20, "secTitle": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)", "q": "El hallazgo central del paper de DeMiguel, Garlappi y Uppal es que:", "opts": [{"text": "La optimización media-varianza siempre supera a las reglas simples", "correct": false}, {"text": "De los 14 modelos de asignación &quot;óptima&quot; que evaluaron en 7 conjuntos de datos, ninguno superó de forma consistente a la regla ingenua 1/N (peso igual) fuera de muestra, en Sharpe, retorno de certeza-equivalente o turnover", "correct": true}, {"text": "La diversificación no aporta valor", "correct": false}, {"text": "El 1/N siempre pierde frente a Markowitz", "correct": false}], "just": "El resultado es contraintuitivo y demoledor: las estrategias &quot;óptimas&quot; sofisticadas no logran batir de forma robusta a simplemente repartir por igual entre los activos, una vez que se mide el desempeño fuera de muestra."}, {"id": 437, "sec": 20, "secTitle": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)", "q": "La regla &quot;1/N&quot; (diversificación ingenua) consiste en:", "opts": [{"text": "Invertir todo en el activo de mayor rendimiento esperado", "correct": false}, {"text": "Asignar el mismo peso (1 dividido entre N activos) a cada activo del universo y rebalancear, sin necesidad de estimar rendimientos esperados ni covarianzas", "correct": true}, {"text": "Optimizar los pesos con un modelo media-varianza", "correct": false}, {"text": "Concentrar la cartera según las convicciones del gestor", "correct": false}], "just": "El 1/N no requiere estimar parámetros (su gran ventaja): evita por completo el error de estimación que aqueja a la optimización. Tiene raíces antiguas (la regla &quot;talmúdica&quot; de repartir en tercios)."}, {"id": 438, "sec": 20, "secTitle": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)", "q": "¿Por qué los modelos óptimos no logran superar al 1/N fuera de muestra?", "opts": [{"text": "Porque la diversificación óptima no tiene ningún beneficio teórico", "correct": false}, {"text": "Porque la ganancia teórica de la optimización se ve más que anulada por el error de estimación de los insumos (sobre todo de los rendimientos esperados), que son muy ruidosos", "correct": true}, {"text": "Porque el 1/N usa información privilegiada", "correct": false}, {"text": "Porque los mercados son perfectamente eficientes", "correct": false}], "just": "En teoría (con parámetros conocidos) la optimización domina; en la práctica, hay que estimar medias y covarianzas con datos ruidosos, y esos errores destruyen las ganancias. Conecta con la &quot;maximización de errores&quot; de la optimización (Sección 8)."}, {"id": 439, "sec": 20, "secTitle": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)", "q": "El resultado sobre la &quot;ventana de estimación&quot; necesaria indica que:", "opts": [{"text": "Bastan 12 meses de datos para que la optimización supere al 1/N", "correct": false}, {"text": "Para que la estrategia media-varianza (y sus extensiones) supere de forma confiable al 1/N se necesitarían ~3,000 meses (≈250 años) de datos para 25 activos, y ~6,000 meses (≈500 años) para 50 activos: un horizonte impráctico", "correct": true}, {"text": "No se requiere ningún dato histórico", "correct": false}, {"text": "La ventana necesaria es de solo 5 años", "correct": false}], "just": "Es la cifra más citada del paper: la cantidad de datos requerida para estimar los parámetros con suficiente precisión es absurdamente larga, lo que ilustra por qué la optimización falla con muestras realistas. &quot;Quedan muchas millas por recorrer&quot; antes de que sus promesas se materialicen."}, {"id": 440, "sec": 20, "secTitle": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)", "q": "El alcance de la crítica del paper es amplio porque demostró que NO superan al 1/N:", "opts": [{"text": "Solo el modelo media-varianza básico de Markowitz", "correct": false}, {"text": "Tanto la media-varianza muestral como un amplio conjunto de extensiones diseñadas para reducir el error de estimación: modelos bayesianos (Jorion, Pástor), Bayes-Stein, mínima varianza, el modelo de &quot;tres fondos&quot; (Kan-Zhou) y carteras &quot;robustas&quot;, entre otros", "correct": true}, {"text": "Únicamente las carteras de mínima varianza", "correct": false}, {"text": "Solo modelos antiguos de los años setenta", "correct": false}], "just": "La fortaleza del estudio es su amplitud: no derriba un solo modelo, sino toda una familia de enfoques sofisticados (incluidos los más modernos), usando tres métricas y siete conjuntos de datos."}, {"id": 441, "sec": 20, "secTitle": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)", "q": "Las tres métricas de desempeño fuera de muestra que utilizó el estudio son:", "opts": [{"text": "Alfa, beta y R<sup>2</sup>", "correct": false}, {"text": "El Sharpe ratio, el retorno de certeza-equivalente (CEQ) y el turnover (rotación de la cartera)", "correct": true}, {"text": "La duración, la convexidad y el spread", "correct": false}, {"text": "El rendimiento bruto, neto y nominal", "correct": false}], "just": "Evaluar Sharpe (rendimiento ajustado por riesgo), CEQ (bienestar del inversionista) y turnover (costos de operar) da una imagen integral; el 1/N gana o empata en las tres de forma robusta."}, {"id": 442, "sec": 20, "secTitle": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)", "q": "El factor del turnover es relevante porque:", "opts": [{"text": "El 1/N requiere operar constantemente", "correct": false}, {"text": "Las estrategias óptimas suelen exigir rebalanceos frecuentes y grandes (alto turnover), cuyos costos de transacción erosionan el rendimiento neto, mientras que el 1/N tiene un turnover bajo y estable", "correct": true}, {"text": "El turnover no afecta el rendimiento neto", "correct": false}, {"text": "Las carteras óptimas nunca necesitan rebalanceo", "correct": false}], "just": "Los pesos &quot;óptimos&quot; cambian mucho cuando cambian las estimaciones ruidosas, generando operación costosa. El bajo turnover del 1/N es otra de sus ventajas prácticas, especialmente después de costos."}, {"id": 443, "sec": 20, "secTitle": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)", "q": "Respecto a por qué los rendimientos esperados son el principal culpable:", "opts": [{"text": "Son fáciles de estimar con precisión", "correct": false}, {"text": "La optimización media-varianza es extremadamente sensible a los rendimientos esperados, que son los parámetros más difíciles y ruidosos de estimar; por eso las carteras de mínima varianza (que ignoran las medias y solo usan covarianzas) tienden a comportarse relativamente mejor, aunque tampoco superan de forma confiable al 1/N", "correct": true}, {"text": "Las covarianzas son imposibles de estimar y las medias triviales", "correct": false}, {"text": "Los rendimientos esperados no influyen en la optimización", "correct": false}], "just": "El error en las medias se amplifica enormemente en los pesos óptimos. Ignorarlas (mínima varianza) ayuda, pero no basta para vencer de forma robusta al 1/N: el error de estimación sigue dominando."}, {"id": 444, "sec": 20, "secTitle": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)", "q": "¿Qué NO afirma el paper (lectura cuidadosa)?", "opts": [{"text": "Que ningún modelo óptimo supera al 1/N fuera de muestra de forma consistente", "correct": false}, {"text": "NO afirma que la optimización sea inútil en teoría ni que la diversificación no importe: afirma que, en la práctica y fuera de muestra, el error de estimación hace del 1/N un benchmark sorprendentemente difícil de batir; la literatura posterior sigue debatiendo y proponiendo mejoras (shrinkage, restricciones, Black-Litterman)", "correct": true}, {"text": "Que el error de estimación anula las ganancias de la optimización", "correct": false}, {"text": "Que se necesitan siglos de datos para que la optimización gane", "correct": false}], "just": "Matiz importante: el paper es una crítica a la implementación práctica, no a la teoría de Markowitz. Motiva respuestas como el shrinkage, las restricciones de pesos y Black-Litterman (Sección 8), que buscan domar el error de estimación."}, {"id": 445, "sec": 20, "secTitle": "DeMiguel, Garlappi & Uppal: diversificación óptima vs. ingenua (1/N)", "q": "Síntesis (capstone). ¿Qué lección extrae un asesor del paper 1/N?", "opts": [{"text": "Que debe construir optimizaciones cada vez más complejas", "correct": false}, {"text": "Que la diversificación no sirve y conviene concentrar", "correct": false}, {"text": "Humildad ante la optimización: el error de estimación es el enemigo práctico, las reglas simples y robustas (diversificación amplia, pesos estables, bajo turnover, restricciones/shrinkage) suelen funcionar bien, y una cartera bien diversificada y sostenida con disciplina con frecuencia supera a una sobre-optimizada en el mundo real", "correct": true}, {"text": "Que el Sharpe ratio es irrelevante", "correct": false}], "just": "Integra el bloque y se conecta con Bessembinder, Fama-French (2010) y la indexación: la sofisticación no garantiza mejores resultados fuera de muestra. La diversificación amplia, de bajo costo y baja rotación, mantenida con disciplina, es una base robusta; la optimización aporta valor solo si se controla rigurosamente el error de estimación."}, {"id": 446, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "¿Qué es Smart Cash?", "opts": [{"text": "Un fondo de renta variable de largo plazo con comisiones escalonadas", "correct": false}, {"text": "Una cuenta de depósito libre de comisiones que genera rendimientos diarios y mantiene el saldo disponible para retirar en días hábiles (de 7:30 a.m. a 1:30 p.m., hora CDMX)", "correct": true}, {"text": "Una nota estructurada con capital protegido", "correct": false}, {"text": "Una cuenta de cheques bancaria sin rendimiento", "correct": false}], "just": "Smart Cash es una cuenta de depósito sin comisiones, pensada para el efectivo: genera rendimiento diario manteniendo alta disponibilidad en días hábiles, a diferencia de un fondo de inversión tradicional o una chequera bancaria."}, {"id": 447, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "¿Cuál es la inversión inicial de Smart Cash y en qué invierte?", "opts": [{"text": "$1,000,000 MXN; invierte en acciones internacionales", "correct": false}, {"text": "Desde $100 MXN; invierte en instrumentos de bajo riesgo, como reporto de CETES", "correct": true}, {"text": "$50,000 MXN; invierte en deuda corporativa de alto rendimiento", "correct": false}, {"text": "Sin mínimo; invierte en criptomonedas", "correct": false}], "just": "Con apenas $100 MXN de inversión inicial, Smart Cash coloca los recursos en instrumentos de bajo riesgo (reporto de CETES), lo que sustenta su perfil conservador y de alta disponibilidad."}, {"id": 448, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "¿Cuál es la tasa de rendimiento de Smart Cash?", "opts": [{"text": "Una tasa fija garantizada de 10% anual", "correct": false}, {"text": "Una tasa anual de entre 4.00% y 4.75%, según la inversión total del cliente en GBM, que toma como referencia las tasas de Banco de México y puede cambiar en cualquier momento", "correct": true}, {"text": "Una tasa variable ligada al S&amp;P 500", "correct": false}, {"text": "Cero rendimiento", "correct": false}], "just": "La tasa se ubica en el rango 4.00%–4.75%, escalonada por el monto total invertido en GBM y referenciada a Banxico; al no ser garantizada, puede ajustarse cuando cambian las condiciones de mercado."}, {"id": 449, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "¿Cómo se relacionan los niveles de inversión total en GBM con la tasa de Smart Cash?", "opts": [{"text": "A mayor inversión, menor tasa", "correct": false}, {"text": "4.00% (Plus: $0–$300,000), 4.25% (Personal: $300,000–$2,000,000), 4.50% (Premium: $2,000,000–$20,000,000) y 4.75% (Private: más de $20,000,000)", "correct": true}, {"text": "Todos los niveles reciben 4.75%", "correct": false}, {"text": "La tasa no depende del nivel de inversión", "correct": false}], "just": "El esquema premia el mayor saldo total en GBM con una mejor tasa, escalando de Plus a Private. Es un incentivo a consolidar el patrimonio del cliente dentro de la plataforma."}, {"id": 450, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "Para aumentar los rendimientos en Smart Cash, el cliente debe:", "opts": [{"text": "Operar acciones con mayor frecuencia", "correct": false}, {"text": "Aumentar su inversión total en GBM para subir de nivel y acceder a una tasa mayor", "correct": true}, {"text": "Retirar dinero cada semana", "correct": false}, {"text": "Cambiar a un fondo de renta variable", "correct": false}], "just": "Como la tasa depende del nivel (inversión total en GBM), la forma de mejorarla es incrementar ese saldo total para alcanzar el siguiente escalón (Personal, Premium o Private)."}, {"id": 451, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "¿Qué ocurre si el cliente baja de nivel de inversión?", "opts": [{"text": "Pierde la tasa de inmediato", "correct": false}, {"text": "Mantiene la tasa durante 30 días; si no recupera el nivel después de ese tiempo, la tasa se ajusta al nivel correspondiente", "correct": true}, {"text": "Conserva la tasa anterior de forma permanente", "correct": false}, {"text": "Su cuenta se cierra automáticamente", "correct": false}], "just": "Hay un periodo de gracia de 30 días tras bajar de nivel: si en ese lapso el cliente recupera el saldo, conserva la tasa; de lo contrario, esta se ajusta al nuevo nivel."}, {"id": 452, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "¿Cada cuánto se generan los rendimientos en Smart Cash?", "opts": [{"text": "Una vez al mes", "correct": false}, {"text": "Diariamente, pero se reflejan solo en días hábiles; por ejemplo, las ganancias del fin de semana (viernes, sábado y domingo) aparecen hasta el lunes (o el martes si el lunes es feriado)", "correct": true}, {"text": "Solo al cierre del año", "correct": false}, {"text": "Únicamente cuando el cliente lo solicita", "correct": false}], "just": "El rendimiento se devenga a diario, pero su reflejo en la cuenta sigue el calendario de días hábiles, por lo que lo generado en fin de semana se acumula y aparece el siguiente día hábil."}, {"id": 453, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "¿Cuál es el horario para retirar dinero de Smart Cash y qué implica?", "opts": [{"text": "A cualquier hora, los siete días de la semana, con llegada inmediata", "correct": false}, {"text": "En días hábiles antes de la 1:30 p.m. (hora CDMX), el dinero llega en minutos; después de ese horario, la transferencia se completa al siguiente día hábil", "correct": true}, {"text": "Solo los viernes", "correct": false}, {"text": "Únicamente mediante ventanilla física", "correct": false}], "just": "El corte operativo es la 1:30 p.m. (hora CDMX) en días hábiles: las solicitudes antes de esa hora se procesan en minutos; las posteriores, al siguiente día hábil."}, {"id": 454, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "¿Qué es la &quot;Regla de permanencia&quot; que aplica a Smart Cash?", "opts": [{"text": "Una comisión por retirar antes de un año", "correct": false}, {"text": "Una regla regulatoria de las Casas de Bolsa: los depósitos y transferencias a Smart Cash se invierten de inmediato en reportos a un día hábil, por lo que hay que esperar a que se cumpla ese día para poder retirarlos", "correct": true}, {"text": "Un mínimo de permanencia de 30 días", "correct": false}, {"text": "Una penalización fiscal por mover el dinero", "correct": false}], "just": "La Regla de permanencia es regulatoria (no una comisión): como los recursos se invierten al instante en reportos a un día, el retiro de esos fondos debe esperar a que ese día se cumpla."}, {"id": 455, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "Si un cliente deposita en Smart Cash hoy, ¿cuándo puede retirar ese dinero?", "opts": [{"text": "De inmediato, sin importar la hora", "correct": false}, {"text": "Si deposita antes de la 1:30 p.m. (hora CDMX), puede solicitar el retiro al día hábil siguiente; si deposita después de ese horario, debe esperar 2 días hábiles (el primero invertido en reportos y el segundo ya disponible)", "correct": true}, {"text": "Hasta dentro de 30 días", "correct": false}, {"text": "Nunca, hasta cerrar la cuenta", "correct": false}], "just": "Por la Regla de permanencia, el dinero recién depositado queda invertido en reportos a un día; el momento del depósito respecto al corte de la 1:30 p.m. determina si la disponibilidad es al día hábil siguiente o a los dos días hábiles. Aun así, ese saldo sí puede usarse de inmediato para invertir en otras estrategias."}, {"id": 456, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "¿A qué destinos puede transferir un cliente desde Smart Cash en la app de GBM?", "opts": [{"text": "Solo a cuentas bancarias propias", "correct": false}, {"text": "Entre sus cuentas GBM, a sus cuentas bancarias propias o a cuentas de otras personas, asegurándose de que el &quot;Origen&quot; indique Smart Cash", "correct": true}, {"text": "Únicamente a otra cuenta Smart Cash", "correct": false}, {"text": "Solo mediante cheque físico", "correct": false}], "just": "El flujo de retiro en la app permite transferir a cuentas propias dentro de GBM, a cuentas bancarias del propio cliente o a terceros, verificando que el origen de la operación sea Smart Cash."}, {"id": 457, "sec": 21, "secTitle": "Producto GBM: Smart Cash", "q": "Aplicación: ¿en qué situación es más adecuado recomendar Smart Cash a un cliente?", "opts": [{"text": "Como vehículo principal de crecimiento patrimonial de largo plazo", "correct": false}, {"text": "Como destino del efectivo ocioso, el fondo de emergencia o el &quot;cajón&quot; de liquidez del portafolio: ofrece rendimiento diario y alta disponibilidad, superando a una chequera que rinde poco o nada, sin asumir riesgo de mercado relevante", "correct": true}, {"text": "Para sustituir una cartera diversificada de renta variable", "correct": false}, {"text": "Para especular con apalancamiento de corto plazo", "correct": false}], "just": "Smart Cash resuelve el &quot;costo del efectivo ocioso&quot; (Advisor&#x27;s Alpha, Sección 5): convierte el dinero que esperaría en una chequera de bajo rendimiento en un saldo que rinde a diario y se mantiene disponible. Es un componente de liquidez, no un motor de crecimiento de largo plazo."}, {"id": 458, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿Qué es Smart Cash Dólares?", "opts": [{"text": "Una cuenta para invertir en acciones mexicanas", "correct": false}, {"text": "Una cuenta para invertir en dólares de forma práctica: con un depósito inicial desde $100 MXN, invierte en el fondo GBMDOL (instrumentos de bajo riesgo que cotizan en dólares) y aprovecha la variable del tipo de cambio USD/MXN", "correct": true}, {"text": "Una nota estructurada en euros", "correct": false}, {"text": "Una cuenta de cheques en pesos sin rendimiento", "correct": false}], "just": "Smart Cash Dólares da exposición a instrumentos de bajo riesgo denominados en dólares (vía GBMDOL) y, además, al movimiento del tipo de cambio peso-dólar, desde un depósito inicial accesible."}, {"id": 459, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿Qué significa que Smart Cash Dólares sea una cuenta &quot;discrecional&quot;?", "opts": [{"text": "Que el cliente debe colocar cada orden de compra manualmente", "correct": false}, {"text": "Que el cliente deposita y el equipo de expertos de GBM adquiere y gestiona el fondo por él, sin que tenga que realizar órdenes de compra", "correct": true}, {"text": "Que GBM puede disponer libremente del dinero del cliente", "correct": false}, {"text": "Que no genera rendimientos", "correct": false}], "just": "En una cuenta discrecional, la gestión operativa (adquisición y manejo del fondo) la realiza GBM por el cliente; &quot;discrecional&quot; se refiere al manejo del fondo, no a un uso libre de los recursos."}, {"id": 460, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿Qué requisitos se necesitan para abrir Smart Cash Dólares?", "opts": [{"text": "Una inversión mínima de $1,000,000 MXN", "correct": false}, {"text": "Completar el cuestionario al abrir la cuenta y realizar un depósito inicial de al menos $100 MXN", "correct": true}, {"text": "Ser inversionista institucional acreditado", "correct": false}, {"text": "Tener una cuenta bancaria en Estados Unidos", "correct": false}], "just": "Los dos requisitos son el cuestionario de apertura (idoneidad/perfil) y el depósito inicial mínimo de $100 MXN, lo que mantiene el producto accesible."}, {"id": 461, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿En qué fondo invierte Smart Cash Dólares?", "opts": [{"text": "En el fondo GBMGUB de deuda gubernamental en pesos", "correct": false}, {"text": "En el fondo GBMDOL, compuesto por instrumentos de bajo riesgo que cotizan en dólares", "correct": true}, {"text": "En un ETF de renta variable estadounidense", "correct": false}, {"text": "En reporto de CETES", "correct": false}], "just": "El vehículo subyacente es GBMDOL (bonos estadounidenses de bajo riesgo en dólares), lo que define tanto el perfil de bajo riesgo como la denominación en dólares del producto."}, {"id": 462, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿Cuáles son las diferencias clave entre Smart Cash y Smart Cash Dólares?", "opts": [{"text": "Son idénticas salvo el nombre", "correct": false}, {"text": "Smart Cash es libre de comisiones, se referencia a la tasa libre de riesgo de Banxico, invierte en reporto de CETES y tiene tasa fija; Smart Cash Dólares cobra comisión por el manejo de GBMDOL, se referencia a la tasa libre de riesgo de la Fed de EE.UU., invierte en GBMDOL, su tasa no es fija y está sujeta a la variable del tipo de cambio USD/MXN", "correct": true}, {"text": "Smart Cash Dólares invierte en pesos y Smart Cash en dólares", "correct": false}, {"text": "Ambas tienen tasa fija y cero comisiones", "correct": false}], "just": "Las diferencias abarcan comisión, referencia de tasa (Banxico vs. Fed), instrumento (CETES vs. GBMDOL), naturaleza de la tasa (fija vs. no fija) y, de manera central, la exposición al tipo de cambio en la versión en dólares."}, {"id": 463, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿Qué comisión tiene Smart Cash Dólares?", "opts": [{"text": "Una comisión por cada depósito y retiro", "correct": false}, {"text": "Un arancel por manejo del fondo GBMDOL de 1.5% anual + IVA, que se resta a diario del saldo; no se cobran comisiones por depósito, retiro ni otras transacciones", "correct": true}, {"text": "Una comisión fija de $500 mensuales", "correct": false}, {"text": "Ninguna comisión", "correct": false}], "just": "El único cargo es el arancel de manejo del fondo (1.5% anual + IVA, prorrateado diariamente sobre el saldo). A diferencia de Smart Cash (sin comisiones), aquí sí hay un costo de gestión, aunque no por transacciones."}, {"id": 464, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "La tasa de rendimiento de Smart Cash Dólares se caracteriza porque:", "opts": [{"text": "Es fija y referenciada a Banxico", "correct": false}, {"text": "No es fija y se desempeña con referencia a la tasa libre de riesgo del Sistema de la Reserva Federal de Estados Unidos (Fed)", "correct": true}, {"text": "Está garantizada por el gobierno mexicano", "correct": false}, {"text": "Es siempre superior a la de Smart Cash", "correct": false}], "just": "Al invertir en instrumentos en dólares, su rendimiento se ancla a la tasa libre de riesgo estadounidense (Fed) y no es fijo, a diferencia de la tasa fija referenciada a Banxico de Smart Cash."}, {"id": 465, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿Cómo afecta el tipo de cambio a una inversión en Smart Cash Dólares?", "opts": [{"text": "No tiene ningún efecto", "correct": false}, {"text": "Tanto la inversión como los rendimientos están sujetos a la variable del tipo de cambio USD/MXN, por lo que el valor en pesos puede subir o bajar según se mueva el peso frente al dólar", "correct": true}, {"text": "Solo afecta a los rendimientos, no al capital", "correct": false}, {"text": "Elimina todo el riesgo de mercado", "correct": false}], "just": "El componente cambiario es la diferencia esencial: además del rendimiento en dólares, el resultado medido en pesos depende del movimiento del tipo de cambio, que puede beneficiar o perjudicar al inversionista."}, {"id": 466, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿Qué tipo de cambio utiliza Smart Cash Dólares?", "opts": [{"text": "El tipo de cambio fijado por el cliente", "correct": false}, {"text": "El Valmer Spot 48 h, proporcionado por Valmer (empresa regulada y supervisada por la CNBV); el saldo en la app se muestra con el tipo de cambio del cierre del día anterior como referencia estable, mientras que al depositar y transferir se aplica el vigente al momento de la operación", "correct": true}, {"text": "Un tipo de cambio fijo de $20.00 por dólar", "correct": false}, {"text": "El tipo de cambio del banco del cliente", "correct": false}], "just": "El uso del Valmer Spot 48 h (fuente regulada por la CNBV) da una referencia objetiva; el saldo mostrado usa el cierre del día previo para estabilidad, pero las operaciones aplican el tipo de cambio vigente, lo que explica posibles variaciones."}, {"id": 467, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿Qué ocurre con los rendimientos de Smart Cash y Smart Cash Dólares?", "opts": [{"text": "Se pagan en efectivo cada mes y no se reinvierten", "correct": false}, {"text": "Se suman al saldo y se reinvierten de forma automática, aprovechando el interés compuesto", "correct": true}, {"text": "Se retienen hasta el cierre del año", "correct": false}, {"text": "Se pierden si no se retiran", "correct": false}], "just": "En ambos productos la reinversión automática permite que el interés compuesto trabaje sobre el saldo creciente, sin que el cliente deba reinvertir manualmente."}, {"id": 468, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿En cuánto tiempo llega un retiro de Smart Cash Dólares?", "opts": [{"text": "De inmediato, a cualquier hora", "correct": false}, {"text": "Si se solicita en día hábil antes de la 1:30 p.m. (hora CDMX), llega en 2 días hábiles; después de ese horario, en 3 días hábiles, ya que es necesario vender los títulos de la estrategia y completar la transferencia", "correct": true}, {"text": "En 30 días naturales", "correct": false}, {"text": "El mismo día sin importar la hora", "correct": false}], "just": "A diferencia de Smart Cash (minutos/siguiente día), Smart Cash Dólares requiere más tiempo porque hay que vender los títulos del fondo y liquidar; el corte de la 1:30 p.m. determina si son 2 o 3 días hábiles. Si hay una solicitud de retiro activa, debe completarse antes de procesar una nueva."}, {"id": 469, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "¿Cómo funciona la mecánica de los retiros de Smart Cash Dólares?", "opts": [{"text": "El dinero se transfiere antes de vender los títulos", "correct": false}, {"text": "Como GBMDOL tiene un plazo de liquidación de un día hábil, al solicitar el retiro primero se venden los títulos del fondo, después se completa ese plazo de liquidación y al final se transfiere el dinero a la cuenta bancaria", "correct": true}, {"text": "No se venden títulos; el dinero está siempre en efectivo", "correct": false}, {"text": "La liquidación es instantánea y sin pasos intermedios", "correct": false}], "just": "El plazo de liquidación de un día hábil del fondo GBMDOL es lo que marca los tiempos del retiro: venta de títulos → liquidación → transferencia. Entender esta secuencia explica por qué el dinero no está disponible de inmediato."}, {"id": 470, "sec": 22, "secTitle": "Producto GBM: Smart Cash Dólares", "q": "Aplicación: ¿para qué cliente es más adecuado Smart Cash Dólares frente a Smart Cash?", "opts": [{"text": "Para un cliente que necesita liquidez inmediata en pesos y cero costo", "correct": false}, {"text": "Para un cliente que desea exposición en dólares (p. ej., para metas o gastos en dólares, o para diversificar frente al peso), que acepta la variable del tipo de cambio, la tasa no fija y el arancel de 1.5% + IVA, y que no requiere disponer del dinero el mismo día", "correct": true}, {"text": "Para un cliente que quiere máximo crecimiento de largo plazo en renta variable", "correct": false}, {"text": "Para especular con apalancamiento intradía", "correct": false}], "just": "Smart Cash Dólares encaja con objetivos o coberturas en dólares y diversificación cambiaria, asumiendo el riesgo/oportunidad del tipo de cambio y un costo de gestión; para pura liquidez en pesos, sin costo y con disponibilidad casi inmediata, Smart Cash es la opción. El asesor elige según la moneda objetivo, el horizonte y la tolerancia del cliente."}, {"id": 471, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Qué es un PPR (Plan Personal para el Retiro)?", "opts": [{"text": "Una cuenta de liquidez de corto plazo sin beneficios fiscales", "correct": false}, {"text": "Una cuenta de inversión de largo plazo para construir el retiro, como complemento al AFORE, con el beneficio fiscal de deducir aportaciones (hasta 10% de los ingresos anuales, con tope de 5 UMAs al año)", "correct": true}, {"text": "Un seguro de gastos médicos mayores", "correct": false}, {"text": "Una cuenta de cheques bancaria", "correct": false}], "just": "El PPR es un vehículo de ahorro/inversión para el retiro que complementa al AFORE y ofrece un incentivo fiscal (deducibilidad de aportaciones), enmarcado en el Art. 151 LISR visto en la Sección 9."}, {"id": 472, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Cuál es el monto inicial para abrir el PPR digital de GBM?", "opts": [{"text": "$100 MXN", "correct": false}, {"text": "$10,000 MXN", "correct": true}, {"text": "$100,000 MXN", "correct": false}, {"text": "No tiene monto mínimo", "correct": false}], "just": "El monto inicial del PPR digital es de $10,000 MXN, superior al de productos de liquidez como Smart Cash ($100 MXN), acorde con su naturaleza de inversión de largo plazo."}, {"id": 473, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Cómo funciona el PPR de GBM en cuanto a aportaciones y gestión?", "opts": [{"text": "Exige aportaciones fijas mensuales obligatorias", "correct": false}, {"text": "El cliente decide cuánto aportar y cuándo; el dinero se invierte en un portafolio diseñado según su perfil y gestionado por GBM, consultable en todo momento en la plataforma", "correct": true}, {"text": "El cliente debe elegir y operar cada instrumento manualmente", "correct": false}, {"text": "GBM garantiza un rendimiento fijo anual", "correct": false}], "just": "Las aportaciones son flexibles (monto y momento a elección del cliente) y la gestión del portafolio (según perfil de riesgo y objetivo) la realiza GBM, con transparencia para consultarlo en la plataforma."}, {"id": 474, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Qué ocurre al retirar el PPR a los 65 años?", "opts": [{"text": "Siempre se retiene el 20% de ISR", "correct": false}, {"text": "Se puede retirar sin retención de impuestos, siempre que no se exceda el monto exento", "correct": true}, {"text": "Se pierde el capital acumulado", "correct": false}, {"text": "Se paga IVA sobre el retiro", "correct": false}], "just": "El retiro a los 65 años es el escenario &quot;natural&quot; del PPR: está exento de retención hasta el monto exento aplicable (ligado a la UMA, como vimos en la Sección 9), lo que premia mantener el ahorro hasta el retiro."}, {"id": 475, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Cuál es el beneficio fiscal del PPR?", "opts": [{"text": "Deducir el 100% de las aportaciones sin límite", "correct": false}, {"text": "Deducir las aportaciones hasta el 10% de los ingresos anuales, con un tope de 5 UMAs al año", "correct": true}, {"text": "Un crédito fiscal fijo de $50,000", "correct": false}, {"text": "La exención total de ISR sobre todos los ingresos", "correct": false}], "just": "La deducción de aportaciones está limitada por dos parámetros: 10% del ingreso anual y el equivalente a 5 UMAs anuales, conforme al Art. 151 LISR."}, {"id": 476, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Cómo se calcula el máximo deducible de las aportaciones al PPR?", "opts": [{"text": "Sumando el 10% del ingreso y las 5 UMAs", "correct": false}, {"text": "Se toma el 10% del ingreso bruto anual estimado y se compara con el tope legal de 5 UMAs al año; el deducible es el MENOR de esos dos valores", "correct": true}, {"text": "Es siempre 5 UMAs sin importar el ingreso", "correct": false}, {"text": "Es siempre el 10% del ingreso sin tope", "correct": false}], "just": "El deducible es el <strong>menor</strong> entre el 10% del ingreso bruto anual estimado y las 5 UMAs anuales: para ingresos altos manda el tope de 5 UMAs, y para ingresos menores manda el 10%."}, {"id": 477, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Cuáles son requisitos para abrir el PPR digital de GBM?", "opts": [{"text": "Ser mayor de 65 años y tener cotitulares", "correct": false}, {"text": "Tener entre 18 y 64 años, un monto inicial de $10,000 MXN o más, no tener cotitulares y tener completa la información fiscal del contrato (RFC, Código Postal y Régimen Fiscal)", "correct": true}, {"text": "Ser inversionista institucional", "correct": false}, {"text": "Tener una cuenta bancaria en el extranjero", "correct": false}], "just": "El PPR requiere edad entre 18 y 64 años (para que tenga sentido el horizonte al retiro), el monto mínimo, ausencia de cotitulares y datos fiscales completos —indispensables para emitir la constancia deducible—."}, {"id": 478, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "Entre los requisitos operativos para abrir el PPR digital, el cliente debe:", "opts": [{"text": "Mantener un límite de depósitos en su cuenta", "correct": false}, {"text": "Tener una &quot;Cuenta sin límite&quot; (si no la tiene, quitar el límite de depósitos desde la app, cambio que toma 2 días hábiles) y no tener un Portafolio recomendado llamado &#x27;PPR&#x27; (si lo tiene, debe cambiarle el nombre)", "correct": true}, {"text": "Cerrar todas sus demás cuentas GBM", "correct": false}, {"text": "Esperar 30 días naturales", "correct": false}], "just": "Dos condiciones operativas frecuentes son: contar con una Cuenta sin límite (quitar el límite toma 2 días hábiles) y que no exista ya un portafolio con el nombre &#x27;PPR&#x27;, para evitar conflictos al crear el plan."}, {"id": 479, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿En qué invierte el PPR de GBM?", "opts": [{"text": "En un solo fondo de deuda gubernamental", "correct": false}, {"text": "En 5 fondos (GBMGUBL, GBMINT, GBMTRV, GMP+ y GBMAA) que distribuyen sus porcentajes según la tolerancia al riesgo y el objetivo del cliente, dando exposición a renta variable y renta fija", "correct": true}, {"text": "Solo en acciones internacionales", "correct": false}, {"text": "Únicamente en reporto de CETES", "correct": false}], "just": "El PPR es un portafolio multifondo (GBMGUBL, GBMINT, GBMTRV, GMP+, GBMAA) que combina renta fija y variable y se pondera según el perfil del cliente, en línea con la lógica de asset allocation por objetivo."}, {"id": 480, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Se puede retirar del PPR antes de los 65 años?", "opts": [{"text": "No, está totalmente bloqueado hasta los 65", "correct": false}, {"text": "Sí, pero se aplica una retención del 20% como pago provisional de ISR (como en cualquier plan personal para el retiro); por ahora ese retiro no puede realizarse desde la app", "correct": true}, {"text": "Sí, sin ninguna consecuencia fiscal", "correct": false}, {"text": "Sí, pero se pierde todo el capital", "correct": false}], "just": "El retiro anticipado es posible pero penalizado fiscalmente (retención del 20% como pago provisional de ISR), lo que desincentiva usar el PPR antes del retiro; actualmente no se gestiona desde la app."}, {"id": 481, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "Si una persona tiene varios PPR, ¿puede deducir más?", "opts": [{"text": "Sí, cada PPR suma su propio tope deducible", "correct": false}, {"text": "No: el beneficio fiscal es único por persona, y tener varios PPR no aumenta el máximo deducible", "correct": true}, {"text": "Sí, pero solo si están en distintas instituciones", "correct": false}, {"text": "Sí, se duplica el tope con dos PPR", "correct": false}], "just": "El límite de deducción (10% del ingreso / 5 UMAs) aplica por contribuyente, no por cuenta: abrir varios PPR no incrementa el monto deducible total."}, {"id": 482, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Cuántos PPR digitales se pueden abrir en la app de GBM actualmente?", "opts": [{"text": "Tantos como el cliente desee", "correct": false}, {"text": "Por el momento, solo uno; el beneficio fiscal sigue siendo único por persona", "correct": true}, {"text": "Exactamente cinco, uno por cada fondo", "correct": false}, {"text": "Ninguno; solo por sucursal física", "correct": false}], "just": "Actualmente la app permite abrir un único PPR digital; aun cuando en el futuro se permitan más, el beneficio fiscal permanecerá siendo único por persona."}, {"id": 483, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Cómo y cuándo obtiene el cliente la constancia fiscal (CFDI) de sus aportaciones al PPR?", "opts": [{"text": "Se envía por correo postal cada mes", "correct": false}, {"text": "El CFDI por las aportaciones está disponible en la app GBM (en Menú → &#x27;Estados de cuenta y constancias&#x27; → &#x27;PPR&#x27; → pestaña &#x27;Constancias fiscales&#x27;, eligiendo el año)", "correct": true}, {"text": "No se emite constancia", "correct": false}, {"text": "Solo se obtiene en una sucursal física", "correct": false}], "just": "La constancia (CFDI) que ampara la deducción se descarga directamente desde la app, en la sección de estados de cuenta y constancias del PPR; es el documento que respalda el beneficio fiscal ante el SAT."}, {"id": 484, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "¿Cómo se integra el PPR con el resto del plan de retiro del cliente?", "opts": [{"text": "Sustituye por completo al AFORE", "correct": false}, {"text": "Funciona como complemento voluntario al AFORE: añade ahorro de largo plazo con incentivo fiscal y gestión de portafolio por perfil, ayudando a cerrar la brecha que el AFORE por sí solo difícilmente cubre", "correct": true}, {"text": "Es incompatible con tener un AFORE", "correct": false}, {"text": "Solo sirve para personas sin AFORE", "correct": false}], "just": "Conecta con la Sección 10: dado que la tasa de reemplazo del AFORE suele ser insuficiente, el PPR (ahorro voluntario con beneficio fiscal) es una pieza clave para complementar el retiro, no un sustituto del sistema obligatorio."}, {"id": 485, "sec": 23, "secTitle": "Producto GBM: PPR digital (Plan Personal para el Retiro)", "q": "Aplicación: ¿para qué cliente y con qué advertencia es más adecuado el PPR?", "opts": [{"text": "Para quien necesita liquidez inmediata y podría retirar pronto", "correct": false}, {"text": "Para un cliente con horizonte de largo plazo que busca complementar su retiro y aprovechar la deducción fiscal, con la disciplina de no retirar antes de los 65 (pues se aplicaría la retención del 20%); el asesor debe dimensionar la aportación al tope deducible y verificar la información fiscal del contrato", "correct": true}, {"text": "Para un cliente que quiere especular en el corto plazo", "correct": false}, {"text": "Para sustituir el fondo de emergencia", "correct": false}], "just": "Integra el bloque: el PPR brilla para el ahorro de retiro de largo plazo con beneficio fiscal, siempre que el cliente no necesite esos recursos antes de los 65. El asesor agrega valor calibrando la aportación al máximo deducible, asegurando los datos fiscales y reforzando la disciplina de permanencia."}, {"id": 486, "sec": 24, "secTitle": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios", "q": "¿Qué son los Invesco Dynamic ETF Portfolios?", "opts": [{"text": "Un único ETF de renta variable estadounidense", "correct": false}, {"text": "Una gama de portafolios multiactivo diversificados y de bajo costo, construidos con ETFs, que combinan una asignación estratégica de largo plazo con perspectivas tácticas de corto plazo y se adaptan a lo largo del ciclo de mercado, con varios niveles de riesgo", "correct": true}, {"text": "Un fondo de deuda gubernamental mexicana", "correct": false}, {"text": "Una nota estructurada con capital protegido", "correct": false}], "just": "Son portafolios modelo (cuentas gestionadas) que acceden a clases de activo vía ETFs eficientes en costo, con diversificación amplia y varios niveles de riesgo para distintos perfiles de inversionista."}, {"id": 487, "sec": 24, "secTitle": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios", "q": "En la nomenclatura &quot;X/Y&quot; de estos portafolios (p. ej., 60/40), los números representan:", "opts": [{"text": "El plazo en años y el rendimiento objetivo", "correct": false}, {"text": "El porcentaje en renta variable (acciones) y el porcentaje en renta fija (bonos): 60/40 = 60% acciones / 40% renta fija", "correct": true}, {"text": "La comisión y el IVA", "correct": false}, {"text": "El número de ETFs y de países", "correct": false}], "just": "El primer número es la exposición a renta variable y el segundo a renta fija. Así, 100/0 es 100% acciones; 0/100 es 100% renta fija; y los intermedios escalan el balance entre ambos."}, {"id": 488, "sec": 24, "secTitle": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios", "q": "¿Qué significa el componente &quot;Dynamic&quot; (dinámico) de la estrategia?", "opts": [{"text": "Que el portafolio se liquida y reconstruye cada día", "correct": false}, {"text": "Que combina una asignación estratégica de largo plazo con ajustes tácticos de corto plazo, permitiendo que el portafolio se adapte a las condiciones a lo largo del ciclo de mercado", "correct": true}, {"text": "Que el cliente cambia los pesos manualmente cada semana", "correct": false}, {"text": "Que solo invierte cuando el mercado sube", "correct": false}], "just": "&quot;Dynamic&quot; se refiere a la mezcla de lo estratégico (la ancla de largo plazo por clase de activo) con lo táctico (desviaciones de corto plazo según las condiciones), buscando adaptarse a través del ciclo completo."}, {"id": 489, "sec": 24, "secTitle": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios", "q": "¿Cuál es el objetivo de inversión de estos portafolios?", "opts": [{"text": "Maximizar el rendimiento sin considerar el riesgo", "correct": false}, {"text": "Buscar mayores rendimientos ajustados por riesgo dentro de niveles de riesgo predefinidos, a lo largo de un ciclo de mercado completo", "correct": true}, {"text": "Garantizar un rendimiento fijo anual", "correct": false}, {"text": "Replicar exactamente al IPC mexicano", "correct": false}], "just": "Cada portafolio opera dentro de un nivel de riesgo definido (por su mezcla acciones/renta fija) y busca optimizar el rendimiento ajustado por riesgo, no el rendimiento absoluto sin restricciones."}, {"id": 490, "sec": 24, "secTitle": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios", "q": "¿Cómo logran estos portafolios su diversificación y bajo costo?", "opts": [{"text": "Comprando acciones individuales seleccionadas una a una", "correct": false}, {"text": "Accediendo a las clases y subclases de activo (y a distintos factores de inversión) a través de ETFs UCITS de bajo costo, en lugar de seleccionar valores individuales", "correct": true}, {"text": "Invirtiendo solo en un país y un sector", "correct": false}, {"text": "Usando exclusivamente derivados apalancados", "correct": false}], "just": "Al construirse con ETFs (vehículos diversificados y baratos), el portafolio obtiene exposición amplia a múltiples clases de activo y factores con costos contenidos, en línea con la filosofía indexada de bajo costo."}, {"id": 491, "sec": 24, "secTitle": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios", "q": "La gama ofrece varios niveles de riesgo. ¿Cómo se ordenan del más agresivo al más conservador?", "opts": [{"text": "0/100 es el más agresivo y 100/0 el más conservador", "correct": false}, {"text": "Del más agresivo al más conservador: 100/0, 80/20, 60/40, 40/60, 20/80 y 0/100; a mayor porcentaje en renta variable, mayor riesgo y mayor rendimiento esperado", "correct": true}, {"text": "Todos tienen el mismo nivel de riesgo", "correct": false}, {"text": "El 60/40 es el más agresivo de todos", "correct": false}], "just": "La &quot;escalera&quot; de riesgo va de 100% acciones (100/0, el más agresivo) a 100% renta fija (0/100, el más conservador). La gama permite al asesor &quot;marcar&quot; el nivel de riesgo adecuado al cliente."}, {"id": 492, "sec": 24, "secTitle": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios", "q": "El Invesco Dynamic UCITS ETF 100/0 Portfolio es más adecuado para:", "opts": [{"text": "Un cliente que necesita el dinero el próximo mes", "correct": false}, {"text": "Un inversionista con alta tolerancia al riesgo y horizonte de largo plazo que busca capturar los movimientos del mercado accionario global (100% renta variable)", "correct": true}, {"text": "Un cliente que no tolera ninguna volatilidad", "correct": false}, {"text": "Un cliente que solo quiere renta fija", "correct": false}], "just": "Al ser 100% renta variable global, el 100/0 ofrece el mayor potencial de crecimiento y la mayor volatilidad de la gama; es apropiado para perfiles agresivos con horizonte largo y capacidad de tolerar caídas."}, {"id": 493, "sec": 24, "secTitle": "Producto GBM: Invesco Dynamic UCITS ETF Portfolios", "q": "El Invesco Dynamic UCITS ETF 0/100 Portfolio se caracteriza por:", "opts": [{"text": "Invertir 100% en acciones", "correct": false}, {"text": "Invertir 100% en renta fij
