"}, {"id": 104, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "¿Cuál de las siguientes NO es uno de los componentes del Gamma de Morningstar?", "opts": [{"text": "Asignación de activos sobre la riqueza total", "correct": false}, {"text": "Estrategia dinámica de retiros", "correct": false}, {"text": "Selección activa de acciones para batir al mercado", "correct": true}, {"text": "Eficiencia fiscal en la ubicación y secuencia de retiros", "correct": false}], "just": "Los componentes de Gamma son de planeación (asignación sobre riqueza total, retiros dinámicos, asignación a ingreso garantizado/anualidades, eficiencia fiscal en ubicación/secuencia y optimización relativa a pasivos). La selección activa de acciones no forma parte del concepto."}, {"id": 105, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "El &quot;behavior gap&quot; (brecha de comportamiento) que documentan estudios como &quot;Mind the Gap&quot; de Morningstar describe:", "opts": [{"text": "La diferencia entre el rendimiento de las acciones y el de los bonos", "correct": false}, {"text": "Que el rendimiento que obtiene el inversionista promedio es inferior al del propio fondo, porque compra y vende en mal momento (entra tarde, sale en pánico)", "correct": true}, {"text": "La diferencia de comisiones entre fondos activos y pasivos", "correct": false}, {"text": "La brecha entre el rendimiento esperado y el libre de riesgo", "correct": false}], "just": "El inversionista típico subdesempeña al fondo en el que invierte por mal timing de aportaciones y retiros. Cerrar esa brecha es, precisamente, lo que captura el coaching conductual."}, {"id": 106, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "Un fondo promedió 7.0% anual en una década, pero el inversionista promedio en ese fondo obtuvo 5.5%. El behavior gap anual es de:", "opts": [{"text": "12.5%", "correct": false}, {"text": "0.0%", "correct": false}, {"text": "1.5%", "correct": true}, {"text": "7.0%", "correct": false}], "just": "Behavior gap = rendimiento del fondo − rendimiento del inversionista = 7.0% − 5.5% = 1.5%. Esa brecha es el valor que el coaching conductual busca recuperar manteniendo al cliente invertido y disciplinado."}, {"id": 107, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "El coaching conductual agrega valor sobre todo porque ayuda al cliente a:", "opts": [{"text": "Predecir los movimientos del mercado de corto plazo", "correct": false}, {"text": "Resistir impulsos como vender en caídas (aversión a las pérdidas) o perseguir modas (representatividad), manteniéndose fiel al plan de largo plazo", "correct": true}, {"text": "Concentrar la cartera en los activos de moda", "correct": false}, {"text": "Operar con mayor frecuencia", "correct": false}], "just": "El coaching opera directamente sobre los sesgos del Bloque 4 (aversión a las pérdidas, efecto disposición, representatividad, herding). Su valor es conductual, no predictivo."}, {"id": 108, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "Aplicando la ubicación de activos a un cliente mexicano con una cuenta de inversión gravable y un PPR (Plan Personal de Retiro), el criterio general sería:", "opts": [{"text": "Colocar todos los activos en la cuenta gravable por simplicidad", "correct": false}, {"text": "Alojar preferentemente los activos que generan ingreso gravable recurrente (p. ej., renta fija/intereses) en el vehículo con beneficio fiscal (PPR), y mantener en la cuenta gravable los activos fiscalmente más eficientes", "correct": true}, {"text": "Colocar solo acciones en el PPR y nada de renta fija", "correct": false}, {"text": "La ubicación es irrelevante en México", "correct": false}], "just": "El principio de asset location busca minimizar la carga fiscal del portafolio total: el ingreso gravado de forma recurrente se beneficia más del escudo fiscal. (Ajustar siempre a las reglas vigentes de LISR y a los límites de aportación deducible del PPR.)"}, {"id": 109, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "Una cartera objetivo 60/40 derivó a 70/30 tras un rally accionario y hoy vale 1,000,000 MXN. Para rebalancear a la meta, el asesor debe:", "opts": [{"text": "Comprar 100,000 de acciones", "correct": false}, {"text": "Vender 100,000 de acciones y comprar 100,000 de renta fija (de 700k/300k a 600k/400k)", "correct": true}, {"text": "No hacer nada hasta que llegue a 80/20", "correct": false}, {"text": "Vender toda la posición accionaria", "correct": false}], "just": "Rebalancear impone disciplina de &quot;vender lo que subió y comprar lo que se quedó atrás&quot;: 70% de 1,000,000 = 700k en acciones; la meta es 600k, así que se venden 100k de acciones y se llevan a renta fija (300k → 400k). Reduce el riesgo de vuelta al perfil objetivo."}, {"id": 110, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "¿Cómo se conecta el módulo de &quot;optimización&quot; de GBM Advisory (eficientizar asset allocation, divisas, impuestos y custodia) con el marco Advisor&#x27;s Alpha?", "opts": [{"text": "No tienen relación; son enfoques opuestos", "correct": false}, {"text": "Es la aplicación local del mismo principio: el valor no proviene de batir al mercado, sino de optimizar estructura, costos cambiarios, carga fiscal y custodia para mejorar el resultado neto del cliente", "correct": true}, {"text": "GBM solo busca generar alfa de mercado vía stock picking", "correct": false}, {"text": "La optimización sustituye por completo al coaching conductual", "correct": false}], "just": "Los cuatro ejes de optimización de GBM (asset allocation, divisas, impuestos, custodia) son módulos de Advisor&#x27;s Alpha traducidos al contexto mexicano; junto con el coaching conductual conforman la propuesta de valor de Advisory frente a Soluciones de Inversión (preguntas 20 y 21 del examen base)."}, {"id": 111, "sec": 6, "secTitle": "Asset allocation", "q": "La asignación estratégica de activos (SAA) o &quot;portafolio de política&quot; se define como:", "opts": [{"text": "Los ajustes de corto plazo que aprovechan desalineaciones temporales del mercado", "correct": false}, {"text": "La mezcla de clases de activos de largo plazo que refleja los objetivos y restricciones del cliente, y que sirve de ancla de la cartera", "correct": true}, {"text": "La selección de acciones individuales con mayor potencial", "correct": false}, {"text": "El nivel de efectivo que se mantiene para emergencias", "correct": false}], "just": "La SAA es la decisión de política de largo plazo (el <em>policy portfolio</em>), derivada del perfil de riesgo-rendimiento y las restricciones del cliente. Es el punto de referencia frente al cual se mide cualquier desviación."}, {"id": 112, "sec": 6, "secTitle": "Asset allocation", "q": "La diferencia entre asignación estratégica (SAA) y táctica (TAA) es que la TAA:", "opts": [{"text": "Define la mezcla de largo plazo", "correct": false}, {"text": "Realiza desviaciones deliberadas y temporales respecto al portafolio de política para aprovechar oportunidades de corto/mediano plazo", "correct": true}, {"text": "Elimina la necesidad de un policy portfolio", "correct": false}, {"text": "Es siempre pasiva", "correct": false}], "just": "La TAA se mueve <em>alrededor</em> de la SAA: son apuestas activas de corto plazo (sobre clases de activos) que buscan valor agregado, asumiendo más riesgo activo respecto al ancla estratégica."}, {"id": 113, "sec": 6, "secTitle": "Asset allocation", "q": "El conocido hallazgo de Brinson (y la precisión posterior de Ibbotson y Kaplan) sobre la asignación de activos establece correctamente que:", "opts": [{"text": "La asignación de activos explica el 90% del nivel de rendimiento de cualquier inversionista", "correct": false}, {"text": "La política de asignación de activos explica la gran mayoría (~90%) de la variabilidad de los rendimientos en el tiempo de un portafolio, no necesariamente el nivel ni las diferencias de desempeño entre fondos", "correct": true}, {"text": "La selección de valores explica el 90% del resultado", "correct": false}, {"text": "El market timing es el principal determinante del rendimiento", "correct": false}], "just": "Es la interpretación más malentendida del estudio. La asignación explica ~90% de la <em>variabilidad temporal</em> de los rendimientos de un fondo; explica una fracción mucho menor (~40%) de las diferencias <em>entre</em> fondos, y en promedio ~100% del nivel (porque la gestión activa es, en agregado, un juego de suma cero antes de costos)."}, {"id": 114, "sec": 6, "secTitle": "Asset allocation", "q": "El Investment Policy Statement (IPS) de un cliente debe especificar principalmente:", "opts": [{"text": "Solo la lista de acciones a comprar", "correct": false}, {"text": "Los objetivos de rendimiento y de riesgo, y las restricciones (horizonte, liquidez, fiscales, legales y circunstancias particulares)", "correct": true}, {"text": "Únicamente el benchmark del mercado accionario", "correct": false}, {"text": "El pronóstico macroeconómico del asesor", "correct": false}], "just": "El IPS formaliza objetivos (rendimiento/riesgo) y restricciones (horizonte temporal, liquidez, impuestos, marco legal y necesidades únicas). Es el documento del que se deriva la SAA."}, {"id": 115, "sec": 6, "secTitle": "Asset allocation", "q": "La asignación basada en metas (goals-based), como la de Invierte con Propósito, se distingue de la optimización media-varianza tradicional porque:", "opts": [{"text": "Ignora por completo el riesgo", "correct": false}, {"text": "Construye sub-portafolios separados, cada uno alineado a una meta con su propio horizonte y tolerancia al riesgo, en lugar de optimizar un solo portafolio agregado", "correct": true}, {"text": "Busca siempre el portafolio de máximo Sharpe global", "correct": false}, {"text": "Invierte todo en un único fondo balanceado", "correct": false}], "just": "El enfoque por metas usa de forma <em>constructiva</em> la contabilidad mental: cada cajón (necesidades inmediatas, emergencia, objetivos, etc.) tiene su propio horizonte y perfil de riesgo. Es menos eficiente en teoría de cartera pura, pero más alineado con la conducta y los objetivos reales del cliente."}, {"id": 116, "sec": 6, "secTitle": "Asset allocation", "q": "Cuando la capacidad de un cliente para asumir riesgo (situación financiera) y su disposición (psicológica) entran en conflicto, la práctica recomendada es:", "opts": [{"text": "Seguir siempre la disposición del cliente", "correct": false}, {"text": "Seguir siempre la capacidad financiera", "correct": false}, {"text": "Guiarse en general por el menor de los dos, y educar al cliente cuando la disposición no concuerda con la capacidad", "correct": true}, {"text": "Promediar ambos niveles automáticamente", "correct": false}], "just": "Tomar el menor de los dos es prudente; si la disposición es el factor limitante (subjetivo), el asesor puede educar para acercarla a la capacidad, pero no debe imponer un riesgo que el cliente no tolerará en una caída."}, {"id": 117, "sec": 6, "secTitle": "Asset allocation", "q": "A igualdad de otros factores, un mayor horizonte de inversión normalmente justifica:", "opts": [{"text": "Una mayor asignación a efectivo", "correct": false}, {"text": "Una mayor asignación a activos de riesgo (renta variable), porque hay más tiempo para absorber la volatilidad y capturar la prima de riesgo", "correct": true}, {"text": "Eliminar la renta variable", "correct": false}, {"text": "Un horizonte no influye en la asignación", "correct": false}], "just": "Coincide con la lógica de Invierte con Propósito: el cajón de objetivos a 15 años (pregunta 7) admite más renta variable que el de necesidades inmediatas. Mayor horizonte = mayor capacidad de asumir volatilidad."}, {"id": 118, "sec": 6, "secTitle": "Asset allocation", "q": "En un enfoque de asignación guiado por pasivos (asset-liability / liability-driven), la cartera se construye principalmente para:", "opts": [{"text": "Maximizar el Sharpe sin considerar obligaciones", "correct": false}, {"text": "Cubrir o financiar pasivos u objetivos futuros específicos (p. ej., la universidad de los hijos o el retiro), gestionando el riesgo relativo a esos pasivos", "correct": true}, {"text": "Replicar el índice más amplio posible", "correct": false}, {"text": "Maximizar el rendimiento nominal de corto plazo", "correct": false}], "just": "El enfoque ALM define el riesgo como la posibilidad de no cubrir el pasivo/objetivo, no como volatilidad absoluta. Es la lógica detrás de emparejar cada cajón de metas con su horizonte y necesidad."}, {"id": 119, "sec": 6, "secTitle": "Asset allocation", "q": "Un cliente con un salario estable de empleado público tiene un capital humano de tipo &quot;bono&quot;. La implicación para su cartera financiera es que:", "opts": [{"text": "Debe invertir todo en renta fija para igualar su capital humano", "correct": false}, {"text": "Puede inclinar su capital financiero hacia más renta variable, porque su capital humano (bond-like) ya aporta estabilidad al patrimonio total", "correct": true}, {"text": "Debe ignorar su capital humano al asignar", "correct": false}, {"text": "Su capital humano no tiene relación con la asignación", "correct": false}], "just": "En el enfoque de riqueza total, capital humano + capital financiero. Un capital humano estable (bond-like) deja espacio para más riesgo en el portafolio financiero; uno volátil (equity-like, p. ej. un comisionista) sugiere lo contrario."}, {"id": 120, "sec": 6, "secTitle": "Asset allocation", "q": "Un glidepath (senda de inversión) de ciclo de vida, como el de un fondo de retiro objetivo o una AFORE, consiste en:", "opts": [{"text": "Mantener una asignación fija toda la vida", "correct": false}, {"text": "Reducir gradualmente la exposición a renta variable y aumentar la renta fija conforme se acerca la fecha objetivo, a medida que el capital humano disminuye", "correct": true}, {"text": "Aumentar la renta variable conforme se acerca el retiro", "correct": false}, {"text": "Invertir 100% en acciones hasta el día del retiro", "correct": false}], "just": "El glidepath refleja la caída del capital humano con la edad: menos años para recuperarse de caídas → menor tolerancia al riesgo → mayor peso en renta fija. Es el diseño de los SIEFORES generacionales y los target-date funds."}, {"id": 121, "sec": 6, "secTitle": "Asset allocation", "q": "Los tres insumos que requiere la optimización media-varianza (MVO) para cada clase de activo son:", "opts": [{"text": "Precio, volumen y capitalización", "correct": false}, {"text": "Rendimiento esperado, volatilidad (desviación estándar) y correlaciones entre clases de activos", "correct": true}, {"text": "Beta, alfa y duración", "correct": false}, {"text": "Dividendo, P/U y deuda", "correct": false}], "just": "La MVO de Markowitz necesita rendimientos esperados, varianzas/volatilidades y la matriz de correlaciones (covarianzas) para trazar la frontera eficiente."}, {"id": 122, "sec": 6, "secTitle": "Asset allocation", "q": "La principal crítica práctica a la optimización media-varianza es que:", "opts": [{"text": "Es imposible de calcular", "correct": false}, {"text": "Es muy sensible a los insumos —en especial a los rendimientos esperados— y tiende a &quot;maximizar el error&quot;, produciendo carteras concentradas y poco estables", "correct": true}, {"text": "Nunca diversifica", "correct": false}, {"text": "Ignora por completo el riesgo", "correct": false}], "just": "La MVO sobrepondera activos con rendimiento esperado sobreestimado y correlación subestimada (&quot;error maximization&quot;). Por eso en la práctica se usan restricciones, <em>resampling</em>, Black-Litterman o asignaciones basadas en metas."}, {"id": 123, "sec": 6, "secTitle": "Asset allocation", "q": "¿Cómo afecta una menor correlación entre dos clases de activos al beneficio de diversificación?", "opts": [{"text": "Lo reduce", "correct": false}, {"text": "Lo aumenta: a menor correlación, mayor &quot;curvatura&quot; del conjunto de oportunidades y mayor reducción de riesgo para un rendimiento dado", "correct": true}, {"text": "No tiene efecto", "correct": false}, {"text": "Solo importa si la correlación es exactamente 1", "correct": false}], "just": "Cuanto menor (o más negativa) la correlación, más se &quot;arquea&quot; la frontera hacia la izquierda y mayor es el beneficio de combinar los activos. Con correlación = 1 no hay beneficio de diversificación."}, {"id": 124, "sec": 6, "secTitle": "Asset allocation", "q": "Una nueva clase de activos tiene un Sharpe de 0.30; el portafolio existente tiene un Sharpe de 0.40 y la correlación entre ambos es 0.50. Según la regla de incorporación, ¿conviene añadirla?", "opts": [{"text": "No, porque su Sharpe (0.30) es menor al del portafolio (0.40)", "correct": false}, {"text": "Sí, porque 0.30 &gt; 0.40 × 0.50 = 0.20", "correct": true}, {"text": "No, porque la correlación es positiva", "correct": false}, {"text": "No se puede decidir con esos datos", "correct": false}], "just": "Una clase de activos mejora el Sharpe del portafolio si Sharpe(nuevo) &gt; Sharpe(existente) × correlación. Aquí 0.30 &gt; 0.20, así que sí agrega valor pese a tener un Sharpe individual menor: su baja correlación lo compensa."}, {"id": 125, "sec": 6, "secTitle": "Asset allocation", "q": "La diferencia entre rebalanceo por calendario y rebalanceo por bandas (corredores) es:", "opts": [{"text": "El primero solo aplica a renta fija", "correct": false}, {"text": "El de calendario se ejecuta en fechas fijas (p. ej., trimestral); el de bandas se activa cuando una clase de activo se desvía más allá de un corredor predefinido (p. ej., ±5%)", "correct": true}, {"text": "El de bandas ignora la asignación objetivo", "correct": false}, {"text": "Son idénticos", "correct": false}], "just": "Calendario = disciplina temporal simple; bandas = disciplina basada en desviación, que rebalancea solo cuando es necesario. Muchas prácticas combinan ambos (revisar en calendario, actuar si se rompe la banda)."}, {"id": 126, "sec": 6, "secTitle": "Asset allocation", "q": "En un mercado fuertemente tendencial (al alza o a la baja sin reversión), ¿qué estrategia de rebalanceo tiende a desempeñarse mejor?", "opts": [{"text": "Constant-mix (rebalanceo a porcentaje fijo)", "correct": false}, {"text": "CPPI (compra cuando sube, vende cuando baja) y, en general, las estrategias con payoff convexo", "correct": true}, {"text": "Mantener efectivo", "correct": false}, {"text": "Ninguna estrategia importa en tendencias", "correct": false}], "just": "La CPPI es pro-cíclica (momentum): compra fuerza, vende debilidad, por lo que captura tendencias y ofrece un piso. La constant-mix es contraria (buy low/sell high) y brilla en mercados oscilantes/de reversión a la media, pero sufre en tendencias sostenidas."}, {"id": 127, "sec": 6, "secTitle": "Asset allocation", "q": "La estrategia constant-mix (rebalancear de vuelta a pesos fijos) implica un comportamiento:", "opts": [{"text": "Pro-cíclico: comprar lo que sube", "correct": false}, {"text": "Contrario: vender la clase de activo que subió y comprar la que cayó, imponiendo disciplina de &quot;vender caro, comprar barato&quot;", "correct": true}, {"text": "De comprar y mantener sin operar", "correct": false}, {"text": "De concentración en el activo ganador", "correct": false}], "just": "Rebalancear a una mezcla fija obliga a recortar lo que se apreció (ahora sobreponderado) y reforzar lo rezagado: comportamiento contrario que también controla el riesgo de la cartera. Enlaza con el rebalanceo 60/40 de la pregunta 109."}, {"id": 128, "sec": 6, "secTitle": "Asset allocation", "q": "Un cliente tiene una meta de 60% renta variable con un corredor de ±5%. Tras un rally, la renta variable representa 67% de la cartera. El asesor debe:", "opts": [{"text": "No hacer nada, porque sigue cerca de 60%", "correct": false}, {"text": "Rebalancear, porque 67% supera el límite superior del corredor (65%), reduciendo renta variable hasta volver al objetivo", "correct": true}, {"text": "Subir el objetivo a 70%", "correct": false}, {"text": "Vender toda la renta variable", "correct": false}], "just": "El corredor 55%–65% se rompió al alza (67%). La regla de bandas exige rebalancear para devolver la cartera a su perfil de riesgo objetivo, no perseguir la tendencia."}, {"id": 129, "sec": 6, "secTitle": "Asset allocation", "q": "El &quot;home bias&quot; (sesgo doméstico) en la asignación de activos describe:", "opts": [{"text": "Preferir activos internacionales sobre los locales", "correct": false}, {"text": "La tendencia a sobreponderar activos del país de origen respecto a su peso en el mercado global, sacrificando diversificación", "correct": true}, {"text": "Una estrategia óptima de cobertura cambiaria", "correct": false}, {"text": "Invertir solo en bienes raíces", "correct": false}], "just": "El home bias reduce los beneficios de diversificación global. Productos como GMP / Global Market Portfolio (pregunta 42) buscan precisamente exponer al cliente a los activos del mundo según su tamaño, mitigando ese sesgo."}, {"id": 130, "sec": 6, "secTitle": "Asset allocation", "q": "Para un objetivo de largo plazo como el retiro, fijar el objetivo de rendimiento en términos reales (ajustado por inflación) es importante porque:", "opts": [{"text": "La inflación no afecta a inversionistas de largo plazo", "correct": false}, {"text": "Lo que preserva el poder adquisitivo es el rendimiento por encima de la inflación; un objetivo nominal puede ocultar una pérdida real de poder de compra", "correct": true}, {"text": "Los rendimientos nominales siempre superan a la inflación", "correct": false}, {"text": "La inflación solo importa en renta fija", "correct": false}], "just": "En horizontes largos, la inflación erosiona el poder adquisitivo de forma compuesta. La asignación debe garantizar un rendimiento real positivo suficiente para cubrir la meta; de ahí el papel de la renta variable y los activos reales en carteras de retiro."}, {"id": 131, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "La analogía del &quot;médico del dinero&quot; captura mejor la idea de que el asesor financiero:", "opts": [{"text": "Garantiza rendimientos como un médico garantizaría una cura", "correct": false}, {"text": "Diagnostica la situación del cliente, prescribe un plan y da seguimiento; y sobre todo genera la confianza que le permite al cliente tomar y sostener decisiones de inversión que solo no tomaría", "correct": true}, {"text": "Vende el producto más rentable disponible en el momento", "correct": false}, {"text": "Predice los movimientos del mercado de corto plazo", "correct": false}], "just": "El paper <em>Money Doctors</em> sostiene que el inversionista paga por confianza y tranquilidad —no por garantías de rendimiento—, igual que un paciente confía en su médico. El valor está en el proceso y la relación, no en &quot;vencer al mercado&quot;."}, {"id": 132, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "Según el enfoque de &quot;money doctors&quot;, la confianza es central porque:", "opts": [{"text": "Permite cobrar comisiones más altas sin justificación", "correct": false}, {"text": "Sin confianza, muchos inversionistas evitarían por completo el riesgo (se quedarían en efectivo); la confianza en el asesor es lo que les permite invertir y permanecer invertidos", "correct": true}, {"text": "Sustituye la necesidad de diversificar", "correct": false}, {"text": "Elimina el riesgo de mercado", "correct": false}], "just": "La confianza habilita la toma de riesgo. Es la misma idea de &quot;dar certeza al cliente frente a la incertidumbre&quot; (pregunta 2) y la base del coaching conductual."}, {"id": 133, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "El principio médico &quot;primum non nocere&quot; (primero, no hacer daño) se traduce en asesoría como:", "opts": [{"text": "No recomendar productos inadecuados para el perfil, el horizonte o las necesidades del cliente, aunque sean rentables o convenientes para quien asesora", "correct": true}, {"text": "Nunca recomendar renta variable", "correct": false}, {"text": "Evitar cobrar honorarios", "correct": false}, {"text": "Recomendar siempre el producto con mayor rendimiento histórico", "correct": false}], "just": "Es el deber de idoneidad (suitability): evitar el daño tiene prioridad sobre perseguir rendimiento. Un producto rentable pero inadecuado para el cliente es una &quot;mala praxis&quot;."}, {"id": 134, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "La distinción entre un médico general y un especialista se refleja en GBM como:", "opts": [{"text": "Advisory vende ETFs y Soluciones vende fondos", "correct": false}, {"text": "Advisory atiende la salud financiera integral (diagnóstico y plan) y deriva a Soluciones de Inversión —el &quot;especialista&quot;— cuando el cliente requiere un producto específico, como stock picks", "correct": true}, {"text": "Soluciones hace el diagnóstico y Advisory ejecuta las órdenes", "correct": false}, {"text": "Ambos hacen exactamente lo mismo", "correct": false}], "just": "El médico general coordina la salud integral y refiere al especialista cuando hace falta. Enlaza con las preguntas 19 y 20: Advisory planea; Soluciones provee el producto puntual."}, {"id": 135, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "Antes de &quot;prescribir&quot; cualquier producto, el médico del dinero debe:", "opts": [{"text": "Recomendar el fondo con mejor desempeño reciente", "correct": false}, {"text": "Levantar la &quot;historia clínica&quot; financiera: objetivos, ingresos, gastos, deudas, horizonte y tolerancia al riesgo", "correct": true}, {"text": "Abrir de inmediato una cuenta de trading", "correct": false}, {"text": "Preguntar qué acción quiere comprar el cliente", "correct": false}], "just": "No hay prescripción sin diagnóstico. Equivale al fact-finding / KYC del que se deriva el plan (IPS). Recomendar antes de diagnosticar es mala praxis."}, {"id": 136, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "Un cliente dice: &quot;perdí dinero en la última caída y ahora quiero algo totalmente seguro&quot;. El médico del dinero debe:", "opts": [{"text": "Mover de inmediato todo a efectivo para calmarlo", "correct": false}, {"text": "Identificar la causa raíz (¿el plan o el horizonte eran inadecuados?, ¿asumió más riesgo del que tolera?) en lugar de tratar solo el síntoma", "correct": true}, {"text": "Recomendarle una acción de moda para &quot;recuperar&quot; lo perdido", "correct": false}, {"text": "Decirle que el mercado siempre sube y no cambiar nada", "correct": false}], "just": "Tratar el síntoma (mover a efectivo en el peor momento) sin atender la causa (desajuste de riesgo/horizonte o falta de plan) suele cristalizar la pérdida y repetir el ciclo."}, {"id": 137, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "Ante un cliente que opera en exceso y entra en pánico en cada caída, el &quot;diagnóstico diferencial&quot; consiste en:", "opts": [{"text": "Asumir que siempre es falta de capacidad financiera", "correct": false}, {"text": "Distinguir si la causa es baja capacidad de riesgo, baja disposición (conductual) o un producto inadecuado, antes de &quot;prescribir&quot; la solución", "correct": true}, {"text": "Cambiar de inmediato todos sus productos", "correct": false}, {"text": "Recomendarle que deje de invertir por completo", "correct": false}], "just": "Como en medicina, síntomas iguales pueden tener causas distintas. La intervención correcta (educar, reperfilar o cambiar producto) depende del diagnóstico diferencial."}, {"id": 138, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "Los &quot;signos vitales&quot; financieros que el médico del dinero revisa antes de optimizar inversiones son:", "opts": [{"text": "El rendimiento del S&amp;P 500 del último mes", "correct": false}, {"text": "El fondo de emergencia, el nivel de endeudamiento, la tasa de ahorro y la cobertura de seguros", "correct": true}, {"text": "La acción más comentada en redes sociales", "correct": false}, {"text": "El tipo de cambio del día", "correct": false}], "just": "Son la base de salud financiera. Sin esa base estable (cajones 1 y 2 de Invierte con Propósito), optimizar la cartera de inversión es prematuro."}, {"id": 139, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "Un cliente llega con un &quot;autodiagnóstico&quot; hecho con un tip de un conocido y videos de internet. El asesor debe:", "opts": [{"text": "Validar el autodiagnóstico para no incomodarlo", "correct": false}, {"text": "Ofrecer una evaluación profesional basada en la situación real y específica del cliente, en vez de aceptar un diagnóstico hecho con información genérica", "correct": true}, {"text": "Ejecutar lo que el cliente decidió sin más", "correct": false}, {"text": "Recomendar exactamente lo contrario por principio", "correct": false}], "just": "El autodiagnóstico con información genérica ignora el contexto particular del paciente. El valor profesional está en la evaluación personalizada, como una segunda opinión calificada."}, {"id": 140, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "La &quot;receta personalizada&quot; en asesoría significa que:", "opts": [{"text": "Todos los clientes reciben la misma cartera modelo", "correct": false}, {"text": "La misma &quot;medicina&quot; (clase de activo o producto) puede ser adecuada para un cliente e inadecuada para otro según su perfil; la prescripción se personaliza", "correct": true}, {"text": "Se receta siempre el producto más nuevo", "correct": false}, {"text": "La personalización solo aplica a clientes patrimoniales", "correct": false}], "just": "Igual que un fármaco se dosifica al paciente, la asignación se ajusta al cliente. Es la esencia de &quot;asesoría personalizada&quot; (pregunta 1)."}, {"id": 141, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "La &quot;dosis&quot; o posología en la implementación de un plan sugiere:", "opts": [{"text": "Invertir siempre el 100% de golpe, sin excepción", "correct": false}, {"text": "Considerar una implementación gradual (p. ej., aportaciones periódicas) para gestionar el riesgo del momento de entrada y la tolerancia del cliente", "correct": true}, {"text": "Nunca invertir más del 10% del patrimonio", "correct": false}, {"text": "Esperar a tener &quot;certeza&quot; del mercado antes de invertir", "correct": false}], "just": "La implementación gradual administra el riesgo de timing de entrada y la comodidad conductual del cliente, facilitando la adherencia. (No siempre maximiza el rendimiento esperado vs. invertir todo de inmediato, pero sí gestiona riesgo y conducta.)"}, {"id": 142, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "En la analogía médica, los &quot;efectos secundarios&quot; y las &quot;contraindicaciones&quot; de un producto financiero corresponden a:", "opts": [{"text": "Las comisiones del asesor únicamente", "correct": false}, {"text": "Los riesgos inherentes que deben divulgarse (efectos secundarios) y los casos en que el producto NO es apto para el perfil del cliente (contraindicaciones)", "correct": true}, {"text": "El rendimiento histórico del producto", "correct": false}, {"text": "La calificación crediticia del emisor solamente", "correct": false}], "just": "Todo producto tiene riesgos que deben revelarse, y hay perfiles para los que está contraindicado. Recetar sin advertir riesgos o pese a una contraindicación es mala praxis."}, {"id": 143, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "La &quot;adherencia al tratamiento&quot; es crítica en asesoría porque:", "opts": [{"text": "Elegir el plan correcto es la parte más difícil", "correct": false}, {"text": "La parte más difícil no es diseñar el plan, sino lograr que el cliente lo siga en momentos de volatilidad; el coaching conductual asegura esa adherencia", "correct": true}, {"text": "Los planes no requieren seguimiento", "correct": false}, {"text": "La adherencia solo importa en renta fija", "correct": false}], "just": "Como un tratamiento solo funciona si el paciente lo cumple, un buen plan solo da resultados si el cliente lo sostiene. Aquí se concentra el mayor valor del asesor (Advisor&#x27;s Alpha, Bloque 5)."}, {"id": 144, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "La &quot;medicina preventiva&quot; en finanzas se refiere a:", "opts": [{"text": "Comprar el producto de moda antes que los demás", "correct": false}, {"text": "Fondo de emergencia, diversificación y seguros: prevenir es más barato que &quot;curar&quot; una crisis financiera una vez ocurrida", "correct": true}, {"text": "Vender todo ante el primer signo de caída", "correct": false}, {"text": "Concentrar la cartera para maximizar el rendimiento", "correct": false}], "just": "La prevención (protección de la base financiera) evita daños mayores y costosos. Refuerza los primeros cajones de Invierte con Propósito antes de buscar crecimiento."}, {"id": 145, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "El &quot;chequeo periódico&quot; del médico del dinero implica que:", "opts": [{"text": "Una vez hecho el plan, no se vuelve a tocar (&quot;recetar y olvidar&quot;)", "correct": false}, {"text": "Se realizan revisiones periódicas y ante eventos de vida (matrimonio, hijos, cambio de empleo, herencia) que pueden exigir ajustar el plan", "correct": true}, {"text": "Solo se revisa si el cliente lo solicita expresamente", "correct": false}, {"text": "Se cambia toda la cartera en cada revisión", "correct": false}], "just": "La situación del cliente y los mercados cambian; el seguimiento (incluido el rebalanceo) mantiene el plan alineado con los objetivos, sin sobrerreaccionar."}, {"id": 146, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "&quot;No cambiar el tratamiento ante cada síntoma pasajero&quot; significa, en inversión:", "opts": [{"text": "Ignorar permanentemente la cartera", "correct": false}, {"text": "No abandonar un plan de largo plazo sólido por la volatilidad de corto plazo, igual que no se cambia de medicamento ante cada molestia transitoria", "correct": true}, {"text": "Operar con mayor frecuencia para &quot;estar al día&quot;", "correct": false}, {"text": "Vender en cada caída para evitar pérdidas", "correct": false}], "just": "Cambiar de estrategia constantemente (over-trading) erosiona el resultado, como interrumpir un tratamiento a la primera molestia. Conecta con la paciencia (pregunta 25) y el efecto disposición."}, {"id": 147, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "Aplicando el concepto de &quot;triage&quot; (priorización de urgencias), el orden correcto suele ser:", "opts": [{"text": "Optimizar primero la cartera de inversión de largo plazo", "correct": false}, {"text": "Atender primero el fondo de emergencia y las deudas de tasa alta, antes de optimizar el portafolio de inversión de largo plazo", "correct": true}, {"text": "Comprar el activo de mayor rendimiento esperado de inmediato", "correct": false}, {"text": "Contratar primero el mayor número de productos posible", "correct": false}], "just": "El triage atiende lo más urgente primero. Una deuda de tarjeta al 40% anual o la falta de colchón de emergencia son &quot;urgencias&quot; que ningún rendimiento de cartera compensa."}, {"id": 148, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "El médico del dinero practica una &quot;medicina basada en evidencia&quot;, lo que implica:", "opts": [{"text": "Seguir el consejo del cliente con más seguidores en redes", "correct": false}, {"text": "Apoyarse en principios respaldados por evidencia (diversificación, disciplina, costos bajos, horizonte) y desconfiar de &quot;curas milagrosas&quot; como tips o esquemas de enriquecimiento rápido", "correct": true}, {"text": "Recomendar siempre el producto recién lanzado", "correct": false}, {"text": "Basar decisiones en corazonadas y anécdotas", "correct": false}], "just": "La asesoría seria se basa en evidencia, no en anécdotas o promesas. Las &quot;curas milagrosas&quot; (rendimientos garantizados, tips infalibles) son señales de charlatanería, no de asesoría."}, {"id": 149, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "El equivalente al &quot;consentimiento informado&quot; en asesoría es:", "opts": [{"text": "Lograr que el cliente dependa por completo del asesor sin entender el plan", "correct": false}, {"text": "Buscar un cliente informado que comprenda y consienta su plan —sus riesgos, su horizonte y su lógica— en lugar de fomentar una dependencia ciega", "correct": true}, {"text": "Pedir una firma sin explicar nada", "correct": false}, {"text": "Tomar todas las decisiones sin consultar al cliente", "correct": false}], "just": "Un buen médico explica el tratamiento y obtiene consentimiento informado. El objetivo es un cliente que entiende su plan, no uno que delega a ciegas; eso fortalece la adherencia y la relación."}, {"id": 150, "sec": 7, "secTitle": "El médico del dinero: asesoría aplicada", "q": "Síntesis. Un cliente llega diciendo: &quot;quiero meter todos mis ahorros en la acción de moda de la que todos hablan&quot;. Como médico del dinero, lo correcto es:", "opts": [{"text": "Ejecutar de inmediato la compra que pide el cliente", "correct": false}, {"text": "Negarse en seco y terminar la relación", "correct": false}, {"text": "Diagnosticar primero (objetivos, horizonte, fondo de emergencia, tolerancia), educar sobre el riesgo de concentración y —si tras cubrir su plan persiste el apetito especulativo— canalizar una porción acotada vía Soluciones de Inversión con un tamaño de posición adecuado", "correct": true}, {"text": "Recomendarle apalancarse para comprar aún más de esa acción", "correct": false}], "just": "La respuesta integra todo el bloque: diagnóstico antes de prescribir, atención a la causa y la base financiera, educación sobre el riesgo (concentración, representatividad), idoneidad y dosificación, y derivación al &quot;especialista&quot; (Soluciones) con position sizing prudente. Ni complacencia ciega ni rechazo tajante: asesoría."}, {"id": 151, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "Para un portafolio de N activos, ¿cuántas covarianzas únicas se requieren, y por qué importa?", "opts": [{"text": "N covarianzas; es trivial de estimar", "correct": false}, {"text": "N(N−1)/2 covarianzas (con 50 activos, 1,225); estimarlas con error es el &quot;talón de Aquiles&quot; del modelo de Markowitz", "correct": true}, {"text": "N<sup>2</sup> covarianzas, todas independientes", "correct": false}, {"text": "Ninguna; basta con las varianzas individuales", "correct": false}], "just": "La matriz Σ es N×N simétrica; su diagonal son las N varianzas y fuera de diagonal hay N(N−1)/2 covarianzas únicas. El número crece de forma cuadrática, y el <em>estimation error</em> asociado es la principal debilidad práctica del MVO."}, {"id": 152, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "En el espacio media-varianza (sin activo libre de riesgo), la frontera eficiente con activos riesgosos tiene la forma de:", "opts": [{"text": "Una línea recta", "correct": false}, {"text": "Una hipérbola en (σ, E[R]) — equivalente a una parábola en (σ<sup>2</sup>, E[R])", "correct": true}, {"text": "Un círculo", "correct": false}, {"text": "Una función escalonada", "correct": false}], "just": "σ<sup>2</sup> = (Aμ₀<sup>2</sup> − 2Bμ₀ + C)/D describe una parábola en varianza, que es una hipérbola en desviación estándar. Solo al añadir un activo libre de riesgo la frontera relevante se vuelve una recta (la CML)."}, {"id": 153, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "¿Qué son los &quot;corner portfolios&quot; en la construcción de la frontera eficiente?", "opts": [{"text": "Los portafolios de las esquinas de la matriz de covarianza", "correct": false}, {"text": "Puntos de la frontera donde un activo entra o sale del portafolio óptimo; entre dos corner portfolios consecutivos la composición varía linealmente, así que basta conocerlos para reconstruir toda la frontera", "correct": true}, {"text": "Los portafolios con peso 100% en un solo activo", "correct": false}, {"text": "Portafolios fuera de la frontera eficiente", "correct": false}], "just": "Los corner portfolios marcan cambios en el conjunto de activos con peso positivo. Por la linealidad entre ellos, son una forma eficiente de caracterizar toda la frontera."}, {"id": 154, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "La pendiente de la Línea del Mercado de Capitales (CML) corresponde a:", "opts": [{"text": "La beta del portafolio tangente", "correct": false}, {"text": "El Sharpe ratio del portafolio tangente", "correct": true}, {"text": "La varianza del mercado", "correct": false}, {"text": "El alfa de Jensen", "correct": false}], "just": "La CML conecta Rf con el portafolio tangente, que es el de mayor Sharpe; la pendiente de esa recta es precisamente ese Sharpe ratio (exceso de rendimiento por unidad de riesgo total)."}, {"id": 155, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "En la formulación por utilidad cuadrática (maximizar wᵀμ − ½λ·wᵀΣw), el parámetro λ representa:", "opts": [{"text": "La tasa libre de riesgo", "correct": false}, {"text": "La aversión al riesgo del inversionista: un λ alto penaliza más la varianza y produce un portafolio más conservador", "correct": true}, {"text": "El rendimiento objetivo", "correct": false}, {"text": "El número de activos", "correct": false}], "just": "λ pondera la penalización por riesgo frente al rendimiento esperado. A mayor λ, el optimizador sacrifica rendimiento para reducir varianza."}, {"id": 156, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "¿Por qué el portafolio de mínima varianza global (GMV) a menudo se desempeña mejor que el MVO completo fuera de muestra?", "opts": [{"text": "Porque garantiza el mayor rendimiento", "correct": false}, {"text": "Porque no requiere estimar rendimientos esperados (la mayor fuente de error); solo usa Σ, lo que lo hace menos sensible al estimation error", "correct": true}, {"text": "Porque concentra la cartera en pocos activos", "correct": false}, {"text": "Porque elimina el riesgo sistemático", "correct": false}], "just": "Al prescindir de μ̂, el GMV evita el insumo más ruidoso del MVO. DeMiguel et al. y Jagannathan-Ma documentan su mejor robustez out-of-sample."}, {"id": 157, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "Según Chopra y Ziemba (1993), los errores de estimación en los rendimientos esperados (μ):", "opts": [{"text": "Son igual de dañinos que los errores en Σ", "correct": false}, {"text": "Son aproximadamente 10 veces más dañinos que los errores en la matriz de covarianza (Σ)", "correct": true}, {"text": "Son menos dañinos que los de Σ", "correct": false}, {"text": "No afectan el resultado de la optimización", "correct": false}], "just": "Por eso enfoques como Black-Litterman (que derivan μ del equilibrio) o Risk Parity/HRP (que no usan μ) reducen el problema atacando justo el insumo más sensible."}, {"id": 158, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "El hallazgo de DeMiguel, Garlappi y Uppal (2009) sobre la estrategia 1/N (equiponderada) es que:", "opts": [{"text": "Siempre es inferior a cualquier optimización", "correct": false}, {"text": "Iguala o supera a MVO y a 14 modelos de optimización fuera de muestra; se necesitarían ~3,000 meses de datos para que MVO la supere con 25 activos", "correct": true}, {"text": "Solo funciona en mercados alcistas", "correct": false}, {"text": "Requiere estimar μ con gran precisión", "correct": false}], "just": "La ganancia teórica de optimizar se anula por el estimation error cuando la ventana de datos es corta frente al número de activos. 1/N es un benchmark formidable porque no estima nada."}, {"id": 159, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "¿Por qué la restricción de no venta en corto (wᵢ ≥ 0) suele MEJORAR el desempeño fuera de muestra del MVO?", "opts": [{"text": "Porque aumenta el rendimiento esperado", "correct": false}, {"text": "Porque actúa como un regularizador implícito que limita pesos extremos y reduce la sensibilidad al error de estimación (Jagannathan &amp; Ma, 2003)", "correct": true}, {"text": "Porque elimina el riesgo de mercado", "correct": false}, {"text": "Porque no tiene ningún efecto", "correct": false}], "just": "Irónicamente, una restricción vista como limitación teórica estabiliza el portafolio. Además, en México la regulación (CNBV) prohíbe posiciones cortas en la mayoría de fondos regulados, así que la restricción es también una realidad operativa."}, {"id": 160, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "La frontera eficiente resampleada de Michaud (1998) consiste en:", "opts": [{"text": "Usar más activos en la optimización", "correct": false}, {"text": "Generar muchas muestras Monte Carlo de (μ̂, Σ̂), resolver una frontera por muestra y promediar los pesos al mismo nivel de retorno, obteniendo portafolios más diversificados y estables (un &quot;shrinkage implícito&quot; hacia equiponderación)", "correct": true}, {"text": "Eliminar los activos con mayor varianza", "correct": false}, {"text": "Invertir la matriz de covarianza varias veces", "correct": false}], "just": "El resampling promedia sobre la incertidumbre paramétrica, reduciendo la concentración extrema del MVO clásico, aunque sigue dentro del paradigma media-varianza y carece de fundamentación bayesiana formal."}, {"id": 161, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "La diferencia central del modelo de Merton (1969/1973) frente a Markowitz es que Merton:", "opts": [{"text": "Ignora el riesgo", "correct": false}, {"text": "Modela a un inversionista que maximiza la utilidad esperada del consumo a lo largo de toda su vida (multiperiodo, tiempo continuo), no en un solo periodo", "correct": true}, {"text": "Solo considera renta fija", "correct": false}, {"text": "Elimina la necesidad de diversificar", "correct": false}], "just": "Markowitz es estático (un periodo); Merton es dinámico e intertemporal: el agente decide simultáneamente cuánto consumir y cómo asignar su riqueza en cada instante, con oportunidades de inversión que cambian estocásticamente."}, {"id": 162, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "El &quot;hedging demand&quot; (demanda de cobertura) que surge en Merton y no en Markowitz se refiere a:", "opts": [{"text": "La cobertura cambiaria de activos en dólares", "correct": false}, {"text": "La porción del portafolio destinada a cubrirse contra cambios futuros en el conjunto de oportunidades de inversión (p. ej., variaciones de tasas o de la prima de riesgo)", "correct": true}, {"text": "La compra de seguros de vida", "correct": false}, {"text": "El uso de derivados para apalancar", "correct": false}], "just": "El peso óptimo de Merton = componente miópico (idéntico a Markowitz) + componente de cobertura. Este último protege al inversionista frente al deterioro futuro de su set de oportunidades."}, {"id": 163, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "En la solución de Merton, ¿cómo afecta el horizonte temporal a la asignación?", "opts": [{"text": "No tiene efecto", "correct": false}, {"text": "Un horizonte largo aumenta la hedging demand (admite más renta variable, con tiempo para recuperarse y aprovechar mean reversion); cerca del retiro la hedging demand tiende a cero y el portafolio converge al miópico, con más renta fija", "correct": true}, {"text": "Un horizonte largo exige más renta fija", "correct": false}, {"text": "El horizonte solo afecta la liquidez", "correct": false}], "just": "El horizonte deja de ser un dato secundario y se vuelve un determinante principal de la asignación óptima (Merton; Campbell y Viceira). Es la base teórica del glidepath."}, {"id": 164, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "En la inversión por ciclo de vida, el capital humano (valor presente del ingreso futuro) de un inversionista joven actúa como:", "opts": [{"text": "Un activo de máximo riesgo", "correct": false}, {"text": "Un &quot;bono implícito&quot; que justifica mayor exposición a renta variable en el capital financiero cuando se es joven (Ayres y Nalebuff llegan a proponer apalancamiento joven)", "correct": true}, {"text": "Un pasivo que debe cubrirse con efectivo", "correct": false}, {"text": "Un activo irrelevante para la asignación", "correct": false}], "just": "Si el capital humano se comporta como un bono, el patrimonio total ya tiene una base estable, dejando espacio para más riesgo financiero en la juventud; ese peso se reduce conforme el capital humano se consume con la edad."}, {"id": 165, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "El ejemplo del &quot;volado&quot; (un activo que crece 0% combinado 50/50 con efectivo y rebalanceado genera +6%) ilustra que:", "opts": [{"text": "El rebalanceo predice ganadores", "correct": false}, {"text": "El rebalanceo cosecha un &quot;retorno de diversificación&quot; a partir de la volatilidad y la baja correlación, porque el crecimiento compuesto (geométrico) difiere del promedio aritmético — sin pronóstico ni reversión a la media", "correct": true}, {"text": "Es imposible ganar sin reversión a la media", "correct": false}, {"text": "El efectivo siempre reduce el rendimiento", "correct": false}], "just": "CAGR = exp(E[ln(1+r)]) ≠ E[r]. La aritmética de la diversificación genera el crecimiento mecánicamente: combinar activos volátiles e imperfectamente correlacionados y rebalancear convierte la dispersión en crecimiento compuesto."}, {"id": 166, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "El retorno de diversificación que captura el rebalanceo es positivo siempre que los activos sean:", "opts": [{"text": "Perfectamente correlacionados", "correct": false}, {"text": "Volátiles e imperfectamente correlacionados; escala con la volatilidad idiosincrática y no requiere reversión a la media", "correct": true}, {"text": "De renta fija exclusivamente", "correct": false}, {"text": "Del mismo sector", "correct": false}], "just": "DR = ½[Σ(wᵢσᵢ<sup>2</sup>) − σₚ<sup>2</sup>] &gt; 0 bajo volatilidad y correlación imperfecta. La reversión en retornos reales aporta un extra menor (~11% del efecto); la mayor parte es &quot;cosecha de volatilidad&quot; pura."}, {"id": 167, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "¿Por qué el rebalanceo a pesos fijos captura el retorno de diversificación y el buy-and-hold no?", "opts": [{"text": "Porque el buy-and-hold paga más comisiones", "correct": false}, {"text": "Porque rebalancear obliga a recortar lo que subió y comprar lo que cayó (vender caro/comprar barato), cosechando la dispersión; el buy-and-hold deja derivar los pesos y &quot;olvida&quot; cosecharla", "correct": true}, {"text": "Porque el rebalanceo predice el mercado", "correct": false}, {"text": "Porque el buy-and-hold concentra en renta fija", "correct": false}], "just": "La regla mecánica de restaurar pesos es contraria por construcción y convierte la dispersión transversal en crecimiento compuesto; dejar derivar los pesos renuncia a esa prima matemática."}, {"id": 168, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "La evidencia de Plyakha, Uppal y Vilkov (S&amp;P 500, 1967–2009) sobre el portafolio equiponderado (EW) muestra que:", "opts": [{"text": "El EW siempre tiene menor volatilidad que el ponderado por valor", "correct": false}, {"text": "El EW supera al ponderado por valor y por precio con alfa positivo (~175 bps de 4 factores mensual), pero el alfa decae al reducir la frecuencia de rebalanceo y conlleva mayor volatilidad y rotación — no es un almuerzo gratis", "correct": true}, {"text": "El EW no genera ningún exceso de retorno", "correct": false}, {"text": "La ventaja proviene de los pesos iguales, no del rebalanceo", "correct": false}], "just": "La fuente del exceso es la <em>operación de rebalanceo</em>, no los pesos iguales: a 12 meses la ventaja se vuelve indistinguible del VW/PW. El alfa sobrevive a ~50 bps de costos, pero es compensación por varianza y rotación."}, {"id": 169, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "La idea central de la &quot;optimización inversa&quot; (reverse optimization) en Black-Litterman (1992) es:", "opts": [{"text": "Maximizar el rendimiento sin restricciones", "correct": false}, {"text": "Extraer los rendimientos esperados de equilibrio (Π) a partir de los pesos de capitalización del mercado, en lugar de estimar μ directamente —la mayor fuente de error del MVO", "correct": true}, {"text": "Invertir la matriz de covarianza dos veces", "correct": false}, {"text": "Eliminar el activo libre de riesgo", "correct": false}], "just": "Si el mercado es eficiente, los pesos actuales implican rendimientos de equilibrio (Π = δΣw_mkt). Partir de Π reduce drásticamente la sensibilidad al estimation error frente a estimar μ subjetivamente."}, {"id": 170, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "En el modelo Black-Litterman, si el asesor no expresa ninguna view, el portafolio resultante:", "opts": [{"text": "Queda indefinido", "correct": false}, {"text": "Converge exactamente al portafolio de mercado (ponderado por capitalización) — un &quot;default inteligente&quot; que no requiere estimaciones activas", "correct": true}, {"text": "Se concentra en el activo de menor varianza", "correct": false}, {"text": "Coincide con el MVO clásico", "correct": false}], "just": "El prior es el equilibrio de mercado; sin views que lo desplacen, el posterior bayesiano permanece en el mercado. Las views inclinan el portafolio de forma controlada según su confianza (Ω) y el peso del prior (τ)."}, {"id": 171, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "&quot;El S&amp;P 500 superará al IPC por 3% anual&quot; es un ejemplo de:", "opts": [{"text": "Una view absoluta", "correct": false}, {"text": "Una view relativa (sobre el diferencial de rendimiento entre dos activos), que tiende a ser más estable y confiable que una absoluta", "correct": true}, {"text": "Un rendimiento de equilibrio", "correct": false}, {"text": "Una restricción de no-negatividad", "correct": false}], "just": "Una view absoluta fija el nivel de un activo (&quot;el IPC rendirá 12%&quot;); una relativa fija un diferencial. Las relativas suelen ser más robustas porque expresan una opinión comparativa, no un nivel puntual."}, {"id": 172, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "La Behavioral Portfolio Theory (Shefrin y Statman, 2000) sostiene que los inversionistas reales construyen:", "opts": [{"text": "Un único portafolio media-varianza óptimo", "correct": false}, {"text": "Portafolios en capas mentales independientes (seguridad, crecimiento, aspiración), cada una con su objetivo y actitud hacia el riesgo — se asemejan a &quot;combinaciones de bonos y boletos de lotería&quot;", "correct": true}, {"text": "Portafolios 100% en renta variable", "correct": false}, {"text": "Carteras sin ninguna estructura", "correct": false}], "just": "A diferencia del MVO normativo, BPT es descriptiva: refleja cómo la gente realmente segrega su dinero por propósito, asumiendo distinto riesgo en cada capa."}, {"id": 173, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "El criterio &quot;safety-first&quot; (Roy, 1952) aplicado por capa en BPT implica que el inversionista:", "opts": [{"text": "Maximiza el rendimiento esperado sin restricciones", "correct": false}, {"text": "Maximiza la probabilidad de alcanzar su nivel de aspiración, sujeto a mantener baja la probabilidad de caer por debajo de un piso de seguridad", "correct": true}, {"text": "Minimiza siempre la varianza total", "correct": false}, {"text": "Ignora la probabilidad de pérdida", "correct": false}], "just": "Cada capa h optimiza con su propio nivel de aspiración Aₕ, piso de seguridad Sₕ y tolerancia máxima a la pérdida αₕ. La capa de seguridad prioriza no caer por debajo del piso; la de aspiración tolera mucho más riesgo."}, {"id": 174, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "La teoría SP/A de Lopes describe tres motivaciones simultáneas que gobiernan la decisión financiera:", "opts": [{"text": "Solvencia, Plazo y Apalancamiento", "correct": false}, {"text": "Seguridad (miedo a la pobreza), Potencial (esperanza de riqueza) y Aspiración (nivel de referencia de &quot;logro&quot;)", "correct": true}, {"text": "Sharpe, Precio y Alfa", "correct": false}, {"text": "Sistemático, Privado y Activo", "correct": false}], "just": "SP/A integra en BPT por qué los portafolios reales combinan activos ultra-seguros (Security) con apuestas especulativas (Potential), ancladas a un nivel de Aspiración que varía por cliente."}, {"id": 175, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "Das, Markowitz, Scheid y Statman (2010) demostraron que:", "opts": [{"text": "BPT y MVO son incompatibles", "correct": false}, {"text": "Se puede optimizar cada capa mental con MVO respetando sus restricciones de seguridad y aspiración, obteniendo un portafolio simultáneamente eficiente (Markowitz) y consistente con BPT — base teórica de &quot;Invierte con Propósito&quot;", "correct": true}, {"text": "El MVO debe abandonarse por completo", "correct": false}, {"text": "Las cuentas mentales siempre destruyen valor", "correct": false}], "just": "El enfoque integrado aplica MVO <em>dentro</em> de cada capa BPT: óptimo y psicológicamente realista a la vez, comunicable al cliente y con menor behavioral gap. Es exactamente la lógica de los cajones de Invierte con Propósito."}, {"id": 176, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "El principio de Risk Parity (Qian, 2005) consiste en:", "opts": [{"text": "Asignar pesos iguales a cada activo", "correct": false}, {"text": "Igualar la contribución al riesgo de cada activo, de modo que ninguno domine el riesgo total; no requiere estimar μ, solo Σ", "correct": true}, {"text": "Maximizar el rendimiento esperado", "correct": false}, {"text": "Invertir solo en el activo de menor varianza", "correct": false}], "just": "Si no sabemos qué activo rendirá más, al menos evitamos que uno domine el riesgo. Al prescindir de μ (el insumo más ruidoso), Risk Parity es más robusto que el MVO. El Bridgewater All Weather es su implementación más conocida."}, {"id": 177, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "Una diferencia clave entre Risk Parity y la estrategia 1/N (equiponderada) es que:", "opts": [{"text": "Son idénticas", "correct": false}, {"text": "1/N iguala el capital invertido en cada activo, mientras que Risk Parity iguala la contribución al riesgo: un activo más volátil recibe menos peso para no dominar el riesgo del portafolio", "correct": true}, {"text": "Risk Parity asigna más peso a los activos más volátiles", "correct": false}, {"text": "1/N requiere estimar la matriz de covarianza", "correct": false}], "just": "Equiponderar capital ≠ equiponderar riesgo. Un activo de alta volatilidad aporta más riesgo por unidad de capital, así que Risk Parity le reduce el peso para igualar contribuciones."}, {"id": 178, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "El método Hierarchical Risk Parity (HRP) de López de Prado (2016) se construye en tres pasos:", "opts": [{"text": "Estimar μ, invertir Σ y maximizar Sharpe", "correct": false}, {"text": "Clustering jerárquico de activos por distancia de correlación, quasi-diagonalización de Σ y bisección recursiva para asignar pesos top-down", "correct": true}, {"text": "Resampling de Monte Carlo y promedio de fronteras", "correct": false}, {"text": "Optimización por multiplicadores de Lagrange", "correct": false}], "just": "HRP agrupa activos similares en un dendrograma, reordena Σ para hacerla quasi-diagonal y reparte capital recursivamente entre sub-clusters según su varianza inversa, sin recurrir a la optimización media-varianza."}, {"id": 179, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "La ventaja fundamental de HRP frente a MVO, Black-Litterman y Risk Parity es que HRP:", "opts": [{"text": "Garantiza el mayor rendimiento", "correct": false}, {"text": "No requiere invertir la matriz de covarianza (Σ⁻<sup>1</sup>); por eso funciona incluso cuando Σ está mal condicionada (activos muy correlacionados) o cuando hay más activos que observaciones (N &gt; T)", "correct": true}, {"text": "Incorpora views del asesor", "correct": false}, {"text": "Elimina toda la volatilidad", "correct": false}], "just": "Invertir una Σ mal condicionada amplifica errores exponencialmente —la falla típica del MVO. HRP usa la estructura jerárquica de Σ sin invertirla, logrando mayor estabilidad out-of-sample y preservando la diversificación entre clusters."}, {"id": 180, "sec": 8, "secTitle": "Optimización de portafolios: Deep Dive", "q": "Síntesis — framework de decisión. ¿Qué emparejamiento modelo-situación es el más adecuado según el deck?", "opts": [{"text": "Cliente conservador con fondo de emergencia → MVO sin restricciones", "correct": false}, {"text": "Cliente con views de mercado → Black-Litterman; portafolio institucional con muchos activos → HRP; cliente que piensa por objetivos → BPT + MVO por capa; asignación macro tipo All Weather → Risk Parity", "correct": true}, {"text": "Cliente que piensa por objetivos → MVO concentrado", "correct": false}, {"text": "Asignación macro global → estimar μ activo por activo", "correct": false}], "just": "En la práctica los modelos se complementan: BL para la visión estratégica con views, RP/HRP para la implementación robusta, GMV/RP para perfiles conservadores sin pronósticos, y BPT para comunicar y estructurar por objetivos. El asesor no necesita implementar la matemática, sino saber cuándo y por qué aplicar cada uno."}, {"id": 181, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "¿Por qué los seguros y las inversiones son complementarios, no competidores?", "opts": [{"text": "Porque ambos buscan maximizar el rendimiento", "correct": false}, {"text": "Porque la inversión hace crecer el patrimonio y el seguro lo blinda; el mayor riesgo financiero no es la volatilidad del mercado, sino la falta de liquidez ante una eventualidad", "correct": true}, {"text": "Porque el seguro sustituye a la inversión de largo plazo", "correct": false}, {"text": "Porque compiten por el mismo capital y hay que elegir uno", "correct": false}], "just": "Los seguros no compiten con las inversiones: las blindan. Un portafolio construido en 20 años puede desmoronarse en meses sin la protección adecuada. El riesgo central que cubre el seguro es de liquidez, no de mercado."}, {"id": 182, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "El &quot;ciclo financiero completo&quot; que integra una estrategia sólida consta de:", "opts": [{"text": "Solo invertir y rebalancear", "correct": false}, {"text": "Invertir para crecer, proteger con seguros, optimizar fiscalmente (deducción de primas y PPR) y reinvertir los beneficios", "correct": true}, {"text": "Ahorrar, gastar, endeudarse y refinanciar", "correct": false}, {"text": "Comprar, mantener y vender acciones", "correct": false}], "just": "Los cuatro elementos se refuerzan mutuamente: la protección garantiza la continuidad del plan, la optimización fiscal libera capital, y los beneficios reinvertidos aceleran el interés compuesto."}, {"id": 183, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "En la pirámide de aseguramiento (análoga a la de Maslow), la base —el seguro más indispensable— es:", "opts": [{"text": "El seguro de auto", "correct": false}, {"text": "El plan personal de retiro (PPR)", "correct": false}, {"text": "El seguro de gastos médicos mayores (GMM)", "correct": true}, {"text": "El seguro de vida", "correct": false}], "just": "El GMM es el más indispensable: un cáncer cuesta ~$2.68 MDP en promedio en México, y sin cobertura una familia puede quebrar ante una enfermedad grave. Es la base sobre la que se construyen las demás coberturas."}, {"id": 184, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "&quot;Los seguros no se venden: se diagnostican.&quot; Esta idea implica que el asesor:", "opts": [{"text": "Debe presionar al cliente para cerrar la venta", "correct": false}, {"text": "Tiene la responsabilidad profesional de identificar y comunicar las brechas de protección del cliente, aunque sea incómodo —igual que un médico comunica un diagnóstico", "correct": true}, {"text": "Debe esperar a que el cliente pida un seguro", "correct": false}, {"text": "Solo debe ofrecer seguros a clientes patrimoniales", "correct": false}], "just": "Conecta con el rol de &quot;médico del dinero&quot; (Sección 7): cuando un médico detecta un problema, no pregunta si el paciente quiere escuchar el diagnóstico; lo comunica por responsabilidad profesional. Además, proteger al cliente protege al asesor: un cliente sin cobertura puede retirar toda su cartera ante una crisis."}, {"id": 185, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "¿En qué consiste la &quot;creación inmediata de patrimonio&quot; que distingue al seguro de vida?", "opts": [{"text": "En que garantiza un rendimiento fijo superior al mercado", "correct": false}, {"text": "En que la suma asegurada existe desde el día uno: si el evento ocurre en el mes 3, los beneficiarios reciben el monto completo aunque la inversión apenas haya comenzado", "correct": true}, {"text": "En que acumula capital igual que una inversión, pero más rápido", "correct": false}, {"text": "En que elimina la necesidad de invertir", "correct": false}], "just": "Es la &quot;magia&quot; del seguro. Garantizar $3 MDP combinando $2M invertidos + $1M asegurado (prima ~$48K/año) cuesta ~$952K menos que acumular los $3M, y el legado está disponible desde el primer mes de vigencia, no cuando se acumula el total."}, {"id": 186, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "Los &quot;riesgos existenciales&quot; (longevidad, incapacidad, sucesión, quebranto empresarial, cese productivo) se distinguen de los financieros porque:", "opts": [{"text": "Son predecibles y se pueden cronometrar", "correct": false}, {"text": "Son impredecibles, no se eligen y pueden ser devastadores; y el verdadero riesgo no es la eventualidad en sí, sino la falta de liquidez para enfrentarla sin destruir el patrimonio", "correct": true}, {"text": "Solo afectan a clientes de altos ingresos", "correct": false}, {"text": "Se cubren íntegramente con diversificación de cartera", "correct": false}], "just": "A diferencia del riesgo de mercado (que se gestiona con asignación y diversificación), los riesgos existenciales requieren transferencia vía seguro. La clave operativa vuelve a ser la liquidez."}, {"id": 187, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "¿Qué función cumple el seguro de vida en la planeación sucesoria de un patrimonio consolidado?", "opts": [{"text": "Reduce el valor del patrimonio gravable a cero", "correct": false}, {"text": "Provee liquidez inmediata a los herederos para pagar impuestos y gastos de sucesión, evitando la venta forzosa de activos a precios desfavorables", "correct": true}, {"text": "Sustituye la necesidad de testamento", "correct": false}, {"text": "Garantiza que no se paguen impuestos sucesorios", "correct": false}], "just": "&quot;Los impuestos no pagados se heredan.&quot; Sin liquidez, los herederos se ven obligados a malvender propiedades o activos para liquidar la sucesión; el seguro de vida aporta esa liquidez en el momento exacto en que se necesita."}, {"id": 188, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "En un seguro de &quot;persona clave&quot; para un empresario, ¿cuál es una ventaja distintiva?", "opts": [{"text": "Cubre el inventario de la empresa", "correct": false}, {"text": "Protege la continuidad del negocio ante la pérdida de un ejecutivo vital, la prima puede ser 100% deducible y, al vencimiento, puede usarse como bono de lealtad", "correct": true}, {"text": "Garantiza las utilidades del negocio", "correct": false}, {"text": "Es obligatorio para todas las empresas", "correct": false}], "just": "El seguro de persona clave blinda la capacidad generadora de ingresos del negocio frente a la pérdida de un ejecutivo crítico, con la ventaja fiscal de la deducibilidad de la prima."}, {"id": 189, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "La &quot;triple ventaja fiscal&quot; del PPR se manifiesta en tres etapas:", "opts": [{"text": "Apertura, mantenimiento y cancelación", "correct": false}, {"text": "Deducción de aportaciones, crecimiento libre de ISR mientras permanece invertido, y beneficios fiscales en el retiro", "correct": true}, {"text": "Comisión cero, rendimiento garantizado y liquidez diaria", "correct": false}, {"text": "Deducción, apalancamiento y cobertura cambiaria", "correct": false}], "just": "Cada peso aportado es deducible; los rendimientos (dividendos e intereses) crecen sin retención mientras permanecen invertidos; y al retiro hay montos exentos. Los tres beneficios se acumulan a lo largo del ciclo de vida de la inversión."}, {"id": 190, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "El límite de deducción de las aportaciones al PPR es:", "opts": [{"text": "15% del ingreso anual, sin tope absoluto", "correct": false}, {"text": "El menor entre 10% del ingreso anual acumulable y 5 veces la UMA anual (~$206,000 en 2025)", "correct": true}, {"text": "Un monto fijo de $3.7 MDP", "correct": false}, {"text": "No tiene límite", "correct": false}], "just": "Es el menor de los dos topes. Importante: este límite del PPR es <strong>independiente</strong> del límite de las demás deducciones personales (GMM, intereses hipotecarios), así que pueden aprovecharse ambos simultáneamente."}, {"id": 191, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "Al retirar el PPR a los 65 años, el tratamiento fiscal (2025) contempla:", "opts": [{"text": "Exención total de cualquier monto", "correct": false}, {"text": "Pago único exento hasta 90 UMAs anuales (~$3.7 MDP) o retiros periódicos exentos hasta 15 UMAs/año (~$619K); los excedentes tienen retención fija de 20%", "correct": true}, {"text": "Una tasa única de 35% sobre todo el retiro", "correct": false}, {"text": "Retención del 0.9% sobre el capital", "correct": false}], "just": "El beneficio al retiro combina montos exentos (atados a la UMA) con una retención fija moderada sobre el excedente, lo que premia el ahorro disciplinado de largo plazo."}, {"id": 192, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "Respecto a la deducción de primas de seguros de gastos médicos mayores (Art. 151 LISR, CFDI clave D07):", "opts": [{"text": "Solo es deducible si se usaron los servicios médicos en el año", "correct": false}, {"text": "La prima es deducible en su totalidad aunque no se usen los servicios médicos en el periodo, siempre que la póliza esté a nombre del declarante y el pago sea por medio bancario (no en efectivo)", "correct": true}, {"text": "Requiere pago en efectivo para ser deducible", "correct": false}, {"text": "Es deducible incluso si la póliza está a nombre de un tercero", "correct": false}], "just": "La deducibilidad depende del cumplimiento formal del CFDI (clave D07, RFC correcto, póliza a nombre del declarante, pago por transferencia/tarjeta/cheque nominativo), no del uso de los servicios."}, {"id": 193, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "La deducción de primas de GMM aplica para el contribuyente y:", "opts": [{"text": "Únicamente para el contribuyente", "correct": false}, {"text": "Cónyuge o concubino(a), ascendientes y descendientes, siempre que no perciban ingresos iguales o mayores a ~$41,274 (2025)", "correct": true}, {"text": "Cualquier persona designada, sin condición de ingreso", "correct": false}, {"text": "Solo los hijos menores de edad", "correct": false}], "just": "La cobertura del beneficio fiscal se extiende a la familia directa bajo la condición de que el dependiente no perciba ingresos por encima del umbral establecido para el ejercicio."}, {"id": 194, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "¿Cuál de los siguientes NO es deducible como deducción personal, y cómo se relacionan los límites?", "opts": [{"text": "Las primas de GMM del cónyuge sí son deducibles, sin condiciones", "correct": false}, {"text": "Los seguros de vida y los seguros de retiro no son deducibles como GMM (el retiro se canaliza vía PPR, con límite separado); además, el límite del GMM (deducciones personales) es independiente del límite del PPR, por lo que pueden aprovecharse ambos", "correct": true}, {"text": "Todo seguro es deducible siempre que se pague por transferencia", "correct": false}, {"text": "El PPR y el GMM comparten un mismo límite global", "correct": false}], "just": "Distinción clave: las primas de vida no entran en deducciones personales; el ahorro para retiro tiene su propio vehículo (PPR) con límite separado. Aprovechar ambos límites (GMM + PPR) en la misma declaración es legítimo y maximiza el beneficio fiscal."}, {"id": 195, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "El &quot;problema del retiro en México&quot; se caracteriza por:", "opts": [{"text": "Cobertura universal de AFORE y altas aportaciones voluntarias", "correct": false}, {"text": "Baja cobertura (~42% tiene AFORE), baja aportación voluntaria (~8%) y que ~68% sigue trabajando después de los 65 por obligación; con solo la AFORE la tasa de reemplazo puede quedar en ~60% o derivar en negativa de pensión", "correct": true}, {"text": "Pensiones generosas que superan el último salario", "correct": false}, {"text": "Una esperanza de vida en descenso que facilita el retiro", "correct": false}], "just": "La esperanza de vida ha aumentado sin que la edad de jubilación ni el ahorro lo hayan hecho proporcionalmente. La aportación voluntaria al PPR es la herramienta para cerrar la brecha de la tasa de reemplazo."}, {"id": 196, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "El PPR de GBM se distingue de las aseguradoras tradicionales por:", "opts": [{"text": "Garantizar un rendimiento fijo y plazos forzosos", "correct": false}, {"text": "Flexibilidad total (sin plazos forzosos ni penalizaciones por suspender aportaciones), rebalanceo automático tipo glide path, experiencia 100% digital y apertura desde $10,000", "correct": true}, {"text": "Exigir un mínimo de $1 MDP para cualquier cuenta", "correct": false}, {"text": "Operar exclusivamente con asesoría presencial", "correct": false}], "just": "El PPR de GBM ofrece flexibilidad y transparencia de costos frente a las aseguradoras, con rebalanceo que reduce el riesgo conforme se acerca a los 65 años (como un target-date fund). El PPR Premium (desde $1 MDP) permite portafolios a la medida, y la alianza GBM-Prudential complementa con seguro de vida."}, {"id": 197, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "El paper seminal de Yaari (1965) demuestra que un individuo racional con incertidumbre sobre su fecha de fallecimiento demanda:", "opts": [{"text": "Únicamente seguro de vida", "correct": false}, {"text": "Tanto anualidades (para cubrir el riesgo de longevidad) como seguro de vida (para cubrir la muerte prematura); el seguro emerge de la teoría de utilidad esperada, no es un &quot;gasto&quot;", "correct": true}, {"text": "Solo inversiones en renta variable", "correct": false}, {"text": "Ningún instrumento de protección", "correct": false}], "just": "Yaari formaliza que el seguro es la solución óptima al problema de incertidumbre vital: las anualidades cubren vivir demasiado y el seguro de vida cubrir morir demasiado pronto. Ambos derivan directamente de la maximización de utilidad esperada."}, {"id": 198, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "Hubbard (1994) demuestra empíricamente que el seguro:", "opts": [{"text": "Incrementa el ahorro precautorio del cliente", "correct": false}, {"text": "Reduce el ahorro precautorio innecesario, liberando capital para inversión productiva; sin cobertura, el cliente sobreahorra en activos líquidos de bajo rendimiento como colchón de emergencia", "correct": true}, {"text": "No tiene relación con las decisiones de inversión", "correct": false}, {"text": "Obliga a reducir la exposición a renta variable", "correct": false}], "just": "Un cliente sin cobertura adecuada debe mantener mayores reservas líquidas &quot;por si acaso&quot;, sacrificando rendimiento de largo plazo. El seguro, al transferir el riesgo, permite invertir ese capital de forma más eficiente."}, {"id": 199, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "Según el marco de capital humano (Ibbotson, Milevsky, Chen &amp; Zhu, 2007), el seguro de vida es:", "opts": [{"text": "Un gasto que reduce el capital financiero sin contrapartida", "correct": false}, {"text": "La cobertura natural del capital humano (el valor presente de los ingresos laborales futuros); a medida que el cliente envejece y su capital humano disminuye, la necesidad de seguro declina y el peso de las inversiones debe aumentar", "correct": true}, {"text": "Un sustituto perfecto de la renta variable", "correct": false}, {"text": "Relevante solo para clientes mayores de 60 años", "correct": false}], "just": "El capital humano es el activo más grande —pero ilíquido e inasegurable por los mercados— de las personas jóvenes. El seguro de vida protege ese activo aún no &quot;convertido&quot; en capital financiero. Conecta con el ciclo de vida de Merton (Sección 8): la asignación óptima cambia con el horizonte y la edad."}, {"id": 200, "sec": 9, "secTitle": "Seguros y protección patrimonial", "q": "El consenso de los estándares profesionales (CFP Board, CFA Institute, Rejda &amp; McNamara) sobre la relación seguro-inversión es que:", "opts": [{"text": "La inversión debe diseñarse primero y el seguro es opcional", "correct": false}, {"text": "La gestión de riesgos y el seguro deben evaluarse ANTES de la planeación de inversiones (en el CFP Board, el elemento #3 precede al #4); un portafolio que no considera los seguros asume implícitamente esos riesgos sin haberlo decidido", "correct": true}, {"text": "Seguro e inversión son disciplinas sin relación entre sí", "correct": false}, {"text": "El seguro solo aplica a la etapa de decumulación", "correct": false}], "just": "Los tres marcos convergen: no se puede diseñar un portafolio sin saber primero qué riesgos existenciales están cubiertos. El portafolio total del cliente = capital financiero + capital humano, y las decisiones de seguro son inseparables del asset allocation porque ambas determinan el riesgo neto total."}, {"id": 201, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "La fecha que divide los dos regímenes del SAR es:", "opts": [{"text": "El 1° de julio de 2020 (reforma de pensiones)", "correct": false}, {"text": "El 1° de julio de 1997: quienes cotizaron al IMSS antes pertenecen a Ley 73; quienes se registraron desde esa fecha, a Ley 97", "correct": true}, {"text": "El 16 de diciembre de 2020", "correct": false}, {"text": "El 1° de enero de 2000", "correct": false}], "just": "El parteaguas es la entra
