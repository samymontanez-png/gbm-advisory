ción 4)."}, {"id": 305, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "El portafolio óptimo que propone Anarkulova, Cederburg y O&#x27;Doherty (2023) para todo el ciclo de vida es:", "opts": [{"text": "60% acciones / 40% bonos, constante", "correct": false}, {"text": "Una mezcla fija de ~50% acciones domésticas y ~50% acciones internacionales, mantenida durante toda la vida (incluida la jubilación), sin bonos", "correct": true}, {"text": "Un glidepath que reduce acciones con la edad", "correct": false}, {"text": "100% bonos del Tesoro en el retiro", "correct": false}], "just": "El hallazgo central es que una cartera 100% de renta variable, repartida mitad doméstica/mitad internacional y sostenida toda la vida, supera ampliamente a las estrategias por edad (acciones-bonos)."}, {"id": 306, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "¿En qué dimensiones encuentra el paper que la estrategia all-equity supera a los glidepath por edad?", "opts": [{"text": "Solo en rendimiento bruto de corto plazo", "correct": false}, {"text": "En construir riqueza, sostener el consumo en el retiro, preservar el capital y generar herencias (bequests)", "correct": true}, {"text": "Únicamente en minimizar la volatilidad anual", "correct": false}, {"text": "En ninguna; solo iguala a los TDFs", "correct": false}], "just": "El paper documenta superioridad de la estrategia all-equity en las cuatro dimensiones simultáneamente, no solo en acumulación de riqueza."}, {"id": 307, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "La estrategia all-equity del paper desafía directamente la práctica de los target-date funds porque:", "opts": [{"text": "Propone aún más bonos en el retiro", "correct": false}, {"text": "Mantiene 100% renta variable incluso durante la jubilación (decumulación), en lugar de reducir el riesgo con la edad como hacen los TDFs y los glidepath regulatorios", "correct": true}, {"text": "Recomienda salir del mercado al jubilarse", "correct": false}, {"text": "Coincide exactamente con el glidepath de los TDFs", "correct": false}], "just": "El segundo dogma cuestionado es precisamente &quot;reducir acciones con la edad&quot;. El paper sostiene que incluso el jubilado obtiene mejores resultados manteniendo all-equity, en contra del diseño de los TDFs."}, {"id": 308, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "La metodología del paper se basa principalmente en:", "opts": [{"text": "Una simulación con rendimientos normales (gaussianos) de EE.UU.", "correct": false}, {"text": "Un &quot;block bootstrap&quot; sobre datos de 38 mercados desarrollados (1890–2019), que preserva las propiedades de largo plazo de los rendimientos (colas gruesas, crashes, correlaciones), con un modelo de ciclo de vida que incorpora ingresos laborales, Seguridad Social y mortalidad", "correct": true}, {"text": "La opinión de un panel de asesores", "correct": false}, {"text": "Solo los últimos 10 años del S&amp;P 500", "correct": false}], "just": "El remuestreo por bloques conserva las no-normalidades y la dependencia temporal de los rendimientos sin tener que especificar de antemano qué propiedades importan; el uso de 38 países mitiga el sesgo de supervivencia y el &quot;easy-data bias&quot;."}, {"id": 309, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "¿Por qué el paper concluye que las acciones internacionales diversifican mejor que los bonos en horizontes largos?", "opts": [{"text": "Porque los bonos nunca pagan rendimiento", "correct": false}, {"text": "Porque los bonos se vuelven más riesgosos y más correlacionados con las acciones domésticas para el inversionista de largo plazo (y son vulnerables a la inflación), mientras que la renta variable internacional aporta diversificación genuina", "correct": true}, {"text": "Porque las acciones internacionales no tienen riesgo", "correct": false}, {"text": "Porque los bonos tienen mayor rendimiento esperado que las acciones", "correct": false}], "just": "Uno de los argumentos clave (Cederburg) es que la correlación bonos-acciones aumenta en horizontes largos, erosionando el beneficio de diversificación de los bonos; la inflación añade riesgo real a la renta fija de largo plazo."}, {"id": 310, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "Un resultado contraintuitivo del paper es que la estrategia all-equity, pese a su mayor volatilidad de corto plazo:", "opts": [{"text": "Garantiza no perder dinero", "correct": false}, {"text": "Presenta una menor probabilidad de &quot;ruina&quot; (agotar los recursos en el retiro) y mayores herencias que los glidepath, en sus simulaciones", "correct": true}, {"text": "Tiene la misma probabilidad de ruina que mantener efectivo", "correct": false}, {"text": "Siempre pierde frente a un 60/40", "correct": false}], "just": "La intuición tradicional asocia más acciones con más riesgo de quedarse sin dinero; el paper encuentra lo contrario en el largo plazo, porque el mayor rendimiento esperado de la renta variable más que compensa su volatilidad bajo la distribución empírica de retornos."}, {"id": 311, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "La magnitud de las &quot;ganancias de bienestar&quot; que estima el paper para los estadounidenses al adoptar la estrategia all-equity es:", "opts": [{"text": "Marginal, de unos pocos millones", "correct": false}, {"text": "Del orden de &quot;billones de dólares&quot; (trillions, en inglés) en ganancias de bienestar agregadas", "correct": true}, {"text": "Negativa", "correct": false}, {"text": "Idéntica a la del glidepath", "correct": false}], "just": "El paper cuantifica las ganancias de bienestar potenciales en &quot;trillions of dollars&quot; (billones en español) para los ahorradores estadounidenses, lo que motivó gran parte del debate público. (Recordatorio de terminología: <em>trillion</em> en inglés = billón en español.)"}, {"id": 312, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "Respecto a la composición geográfica de la renta variable, el paper advierte que:", "opts": [{"text": "Hay que invertir 97% en el mercado doméstico", "correct": false}, {"text": "Es un error concentrar la cartera en el mercado doméstico; se necesita una diversificación internacional sustancial (de ahí el ~50% internacional), evitando el sesgo doméstico (home bias)", "correct": true}, {"text": "Solo se debe invertir en un país", "correct": false}, {"text": "La geografía es irrelevante", "correct": false}], "just": "Conecta con el home bias (Sección 6): los autores enfatizan evitar la sobreconcentración doméstica. El reparto 50/50 doméstico/internacional es central a su resultado, no un detalle accesorio."}, {"id": 313, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "La estrategia all-equity del paper se compara, entre otras, contra:", "opts": [{"text": "Únicamente contra mantener efectivo", "correct": false}, {"text": "Target-date funds (glidepath), estrategias balanceadas constantes (p. ej., 60/40) y 100% en letras (bills), entre otras alternativas por defecto (QDIAs)", "correct": true}, {"text": "Solo contra criptomonedas", "correct": false}, {"text": "Contra ningún benchmark", "correct": false}], "just": "El paper evalúa la all-equity frente al abanico de opciones por defecto de los planes de retiro (TDFs, balanceadas, money market/bills), mostrando su superioridad en las métricas de bienestar consideradas."}, {"id": 314, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "La principal crítica de Cliff Asness (AQR) en &quot;Why Not 100% Equities&quot; es que:", "opts": [{"text": "El paper subestima el rendimiento de las acciones", "correct": false}, {"text": "Una cartera 100% acciones es subóptima por su menor Sharpe ratio: una cartera más diversificada (p. ej., 60/40) apalancada a la tasa libre de riesgo podría ofrecer mayor rendimiento al mismo riesgo (o menor riesgo al mismo rendimiento); además, &quot;elegir lo que más subió en el pasado no es análisis financiero&quot;", "correct": true}, {"text": "Que las acciones internacionales no existen", "correct": false}, {"text": "Que el paper recomienda demasiados bonos", "correct": false}], "just": "Asness defiende el principio media-varianza: lo relevante es el rendimiento ajustado por riesgo. Si se acepta apalancamiento, una cartera de mayor Sharpe apalancada domina a la de 100% acciones; sin él, la conclusión depende de las preferencias del inversionista."}, {"id": 315, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "El argumento del Sharpe ratio contra el &quot;100% acciones&quot; sostiene que:", "opts": [{"text": "El Sharpe ratio es irrelevante para invertir", "correct": false}, {"text": "Como las acciones tienen menor Sharpe que una cartera bien diversificada, en teoría conviene tomar la cartera de mayor Sharpe y ajustar el riesgo con apalancamiento o efectivo, en lugar de concentrarse en el activo de mayor rendimiento esperado", "correct": true}, {"text": "Las acciones siempre tienen el mayor Sharpe posible", "correct": false}, {"text": "Diversificar reduce el rendimiento ajustado por riesgo", "correct": false}], "just": "Es la lógica de la Línea del Mercado de Capitales (Secciones 3 y 8): el inversionista óptimo combina el portafolio de mayor Sharpe con el activo libre de riesgo, no necesariamente el de mayor rendimiento absoluto. La objeción práctica es que muchos inversionistas no pueden apalancarse (lo que reconecta con el factor BAB de la Sección 13)."}, {"id": 316, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "Un punto en el que incluso críticos como Asness coinciden parcialmente con el paper es:", "opts": [{"text": "Que hay que invertir 100% en bonos", "correct": false}, {"text": "Que el dogma de &quot;reducir el riesgo con la edad&quot; es cuestionable: un jubilado con patrimonio acumulado y motivo de herencia podría ser, de hecho, más tolerante al riesgo que un joven", "correct": true}, {"text": "Que el análisis técnico funciona", "correct": false}, {"text": "Que las acciones internacionales deben evitarse", "correct": false}], "just": "Asness se muestra escéptico del glidepath automático por edad: la tolerancia al riesgo del jubilado depende de su riqueza y de su motivo de legado, no solo de su edad. El debate no es &quot;todo o nada&quot;."}, {"id": 317, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "¿Cuál es la lectura epistemológicamente correcta del debate ACO vs. críticos?", "opts": [{"text": "El paper prueba que todos deben tener 100% acciones", "correct": false}, {"text": "Tanto la conclusión del paper como las críticas dependen de supuestos sobre las preferencias y la función de utilidad del inversionista; prescribir una heurística única (&quot;100% acciones&quot; o &quot;glidepath&quot;) ignora que la asignación óptima varía según la tolerancia al riesgo y los objetivos de cada persona", "correct": true}, {"text": "Las críticas demuestran que las acciones no sirven a largo plazo", "correct": false}, {"text": "El debate está completamente resuelto a favor del all-equity", "correct": false}], "just": "Es un debate vivo. Lo robusto es la evidencia sobre el comportamiento de los activos en el largo plazo; lo discutible es saltar de ahí a una receta universal. La asignación adecuada sigue siendo específica al cliente."}, {"id": 318, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "El &quot;volatility laundering&quot; (lavado de volatilidad) describe que:", "opts": [{"text": "Las acciones ocultan su verdadero rendimiento", "correct": false}, {"text": "Los activos ilíquidos (desarrollo inmobiliario, negocios familiares, préstamos privados) parecen de bajo riesgo solo porque no se valúan a mercado continuamente, cuando en realidad suelen ser más riesgosos que una cartera diversificada en bolsa", "correct": true}, {"text": "Los bonos son más volátiles de lo que parecen", "correct": false}, {"text": "La volatilidad es siempre buena", "correct": false}], "just": "La falta de marcaje a mercado de los activos ilíquidos disfraza su riesgo. El deck señala que el inversionista mexicano promedio concentra patrimonio en alternativos ilíquidos de alto riesgo (México es 3.º mundial en negocios familiares) creyéndolos más seguros que la bolsa."}, {"id": 319, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "El estudio de Barber y Odean (2000) sobre el costo del overtrading encontró que:", "opts": [{"text": "Los traders activos superaron al mercado", "correct": false}, {"text": "Los inversionistas que más operaban obtuvieron ~11.4% anual frente al ~17.9% del mercado, destruyendo valor por exceso de operaciones (impulsado por sobreconfianza)", "correct": true}, {"text": "Operar más mejora el rendimiento neto", "correct": false}, {"text": "La rotación de cartera no tiene costo", "correct": false}], "just": "El overtrading, alimentado por la sobreconfianza (Sección 4), erosiona el rendimiento vía costos y mal timing. Refuerza el principio &quot;replicar el mercado completo&quot; en lugar de hacer stock picking activo."}, {"id": 320, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "El &quot;costo del market timing&quot; se ilustra con que, en el S&amp;P 500 (2000–2024):", "opts": [{"text": "Perderse los peores días arruina la cartera", "correct": false}, {"text": "Perderse solo los ~10 mejores días reduce el rendimiento de ~10.2% a ~6% anual, y 7 de los 10 mejores días ocurrieron muy cerca de los 10 peores —por eso conviene permanecer invertido (&quot;time in the market, not timing the market&quot;)", "correct": true}, {"text": "El timing perfecto es fácil de lograr", "correct": false}, {"text": "Los mejores días están repartidos uniformemente en el año", "correct": false}], "just": "La cercanía entre los mejores y peores días hace casi imposible salir y reentrar con acierto; intentarlo arriesga perderse la recuperación. La disciplina de permanecer invertido es lo que captura la prima de largo plazo."}, {"id": 321, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "El &quot;equity premium puzzle&quot; y la evidencia internacional sugieren que:", "opts": [{"text": "La prima por riesgo de las acciones es siempre enorme y garantizada", "correct": false}, {"text": "Las acciones pagan una prima por riesgo positiva en el largo plazo, pero esta puede ser menor de lo que se asume —especialmente fuera de EE.UU.— y existen periodos en que los bonos superan a las acciones", "correct": true}, {"text": "Las acciones nunca rinden más que los bonos", "correct": false}, {"text": "La prima por riesgo es idéntica en todos los países", "correct": false}], "just": "La prima de riesgo de la renta variable es real pero variable y no garantizada; la evidencia internacional (clave en el paper ACO) muestra primas más modestas que la experiencia estadounidense, lo que matiza el optimismo basado solo en datos de EE.UU."}, {"id": 322, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "En la elicitación de tolerancia al riesgo, expresar la aversión &quot;en dinero&quot; (cuánto pagaría el cliente por evitar una apuesta sobre su ingreso) sirve para:", "opts": [{"text": "Calcular su rendimiento esperado", "correct": false}, {"text": "Traducir una actitud psicológica abstracta en una magnitud tangible que ayuda a calibrar la disposición real del cliente al riesgo, insumo para definir su asignación", "correct": true}, {"text": "Determinar su capacidad fiscal", "correct": false}, {"text": "Fijar la comisión del asesor", "correct": false}], "just": "Convertir la aversión al riesgo a términos monetarios concretos (como en el &quot;quiz del demonio&quot; de Campbell) hace operativa una variable difusa y ayuda a alinear la cartera con la disposición —no solo la capacidad— del cliente (ver Sección 6, capacidad vs. disposición)."}, {"id": 323, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "Para un inversionista joven mexicano, una lectura razonable de los hallazgos de ACO sería:", "opts": [{"text": "Vender todo y comprar una sola acción", "correct": false}, {"text": "Priorizar una exposición amplia y diversificada a renta variable global (doméstica + internacional) en la fase de acumulación, en lugar de cargar pesadamente en bonos desde joven, vía vehículos como GMP / Global Equity Factor", "correct": true}, {"text": "Invertir 100% en CETES hasta el retiro", "correct": false}, {"text": "Evitar por completo la renta variable internacional", "correct": false}], "just": "El espíritu del paper —más renta variable, bien diversificada globalmente, durante más tiempo— se implementa con productos de mercado amplio. No implica concentración ni abandonar la gestión del riesgo conductual del cliente."}, {"id": 324, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "¿Qué tensión genera el paper de ACO frente al glidepath de las Siefores generacionales (Sección 10)?", "opts": [{"text": "Ninguna; el paper respalda el glidepath", "correct": false}, {"text": "El paper cuestiona empíricamente el dogma de reducir renta variable con la edad, que es justamente la lógica del glidepath regulatorio; sin embargo, el marco regulatorio (límites CNBV, topes de RV) y la capacidad conductual del trabajador para tolerar caídas imponen restricciones que el inversionista idealizado del paper no enfrenta", "correct": true}, {"text": "El paper exige eliminar las AFOREs", "correct": false}, {"text": "El glidepath y el paper coinciden por completo", "correct": false}], "just": "Hay una tensión genuina: la evidencia del paper apunta a más renta variable por más tiempo, pero el diseño regulatorio prioriza la protección del pensionado y opera bajo restricciones legales y conductuales. Reconocer esa tensión —sin resolverla dogmáticamente— es parte del juicio del asesor."}, {"id": 325, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "Síntesis (capstone). ¿Cuál es la conclusión profesional más equilibrada que un asesor debe extraer del debate sobre el &quot;all-equity lifecycle&quot;?", "opts": [{"text": "Poner a todos los clientes en 100% acciones de inmediato", "correct": false}, {"text": "Ignorar el paper porque contradice la práctica establecida", "correct": false}, {"text": "Tomarlo como evidencia provocadora a favor de mayor renta variable y diversificación internacional durante más tiempo, pero calibrando siempre la tolerancia al riesgo del cliente, su capacidad conductual de permanecer invertido en caídas profundas (el verdadero factor limitante), las restricciones aplicables y el hecho de que el debate teórico sigue abierto", "correct": true}, {"text": "Concluir que los bonos no tienen ningún papel para ningún inversionista", "correct": false}], "just": "Integra todo el bloque y el banco: la evidencia de largo plazo desafía el status quo, pero la asignación óptima es específica al cliente. El mayor riesgo no es la volatilidad en sí, sino que el cliente abandone una estrategia agresiva en el peor momento (Secciones 4, 5 y 7). El rol del asesor —médico del dinero— es diseñar una asignación que el cliente pueda <em>sostener</em>."}, {"id": 326, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "¿Qué define a una inversión alternativa?", "opts": [{"text": "Cualquier acción que cotice en bolsa", "correct": false}, {"text": "Una inversión que no es &quot;plain vanilla&quot; (renta fija o variable tradicional); suele tener menor liquidez, puede tomar posiciones en corto, usar apalancamiento y negociarse en mercados privados", "correct": true}, {"text": "Únicamente los bonos gubernamentales", "correct": false}, {"text": "Un fondo de liquidez diaria", "correct": false}], "just": "Los ejemplos más comunes son capital privado, deuda privada, desarrollo inmobiliario directo (no FIBRAs), infraestructura, commodities, criptoactivos y hedge funds. Sus rasgos (iliquidez, short, apalancamiento, mercados privados) los separan de las clases tradicionales."}, {"id": 327, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "Según datos del London Stock Exchange Group (2024), las inversiones alternativas representan:", "opts": [{"text": "Más de la mitad de los mercados globales", "correct": false}, {"text": "Cerca de 19.5 billones de dólares de un total de ~1,088 billones (≈1.79% del total invertible global), de los cuales ~13.6 billones están en mercados privados", "correct": true}, {"text": "Exactamente el 50% de los mercados privados", "correct": false}, {"text": "Una porción nula del mercado global", "correct": false}], "just": "Aunque reciben mucha atención, los alternativos son una fracción pequeña (~1.79%) del universo invertible. La mayoría se negocia en mercados privados, con menor regulación y transparencia que los públicos. (Recordatorio: <em>trillion</em> en inglés = billón en español.)"}, {"id": 328, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "Según la encuesta de miembros de CAIA, las principales razones para invertir en alternativos son:", "opts": [{"text": "Liquidez diaria y transparencia", "correct": false}, {"text": "Diversificación, mejora del desempeño (enhanced performance), incremento del rendimiento por ingreso (yield enhancement) y cobertura contra inflación", "correct": true}, {"text": "Garantía de capital y rendimiento fijo", "correct": false}, {"text": "Eliminación total del riesgo", "correct": false}], "just": "Los alternativos se buscan por descorrelación con activos tradicionales, potencial de alfa, ingreso y protección inflacionaria; no por seguridad ni liquidez."}, {"id": 329, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "La advertencia central de CAIA sobre los activos alternativos es que:", "opts": [{"text": "Son una solución garantizada para cualquier déficit de pensiones", "correct": false}, {"text": "No deben verse como una panacea ni como una apuesta segura; conllevan riesgo de opacidad y exigen comprometerse a lo largo de ciclos económicos completos", "correct": true}, {"text": "Siempre superan a los activos públicos", "correct": false}, {"text": "No requieren due diligence", "correct": false}], "just": "CAIA, pese a creer en los alternativos para capital de largo plazo, advierte que no es seguro que el alfa &quot;aparezca&quot; cuando se necesita; el inversionista debe atravesar ciclos completos para cosechar sus beneficios."}, {"id": 330, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "La &quot;prima de iliquidez&quot; esperada de los mercados privados sostiene que los activos ilíquidos deberían rendir más, pero el análisis de JP Morgan AM (1978–2023) sobre FIBRAs vs. bienes raíces privados encontró que:", "opts": [{"text": "Los bienes raíces privados superaron a las FIBRAs en todos los horizontes", "correct": false}, {"text": "Las FIBRAs superaron a la inversión directa en bienes raíces comerciales en todos los horizontes (p. ej., ~7.4%/7.8%/9.0% a 10/20/30 años vs. ~6.3%/6.2%/7.3%), contradiciendo la expectativa de una prima de iliquidez superior", "correct": true}, {"text": "Ambos rindieron exactamente igual", "correct": false}, {"text": "Las FIBRAs no tienen historia comparable", "correct": false}], "just": "Las FIBRAs se beneficiaron de mayor exposición a sectores de crecimiento, uso más eficiente del apalancamiento y costos menores. La supuesta prima de iliquidez del activo privado no se materializó frente al vehículo líquido y cotizado."}, {"id": 331, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "El &quot;espejismo&quot; de los mercados privados (tesis GBM) consiste en que:", "opts": [{"text": "Los activos privados son realmente de bajo riesgo", "correct": false}, {"text": "Los activos ilíquidos (la casa, departamentos en renta, el negocio del familiar) parecen de bajo riesgo solo porque su valor no se observa fluctuando continuamente; la falta de marcaje a mercado oculta su riesgo real (&quot;volatility laundering&quot;)", "correct": true}, {"text": "Los mercados públicos ocultan su verdadero rendimiento", "correct": false}, {"text": "Los alternativos no tienen riesgo idiosincrático", "correct": false}], "just": "A diferencia de los mercados bursátiles —donde el precio se ve en todo momento— el activo privado solo se &quot;valúa&quot; al comprar y al vender. Esa invisibilidad de la volatilidad genera una ilusión de seguridad que el asesor debe revelar."}, {"id": 332, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "El capital privado (private equity) consiste en:", "opts": [{"text": "Comprar acciones en bolsa de empresas grandes", "correct": false}, {"text": "Invertir en empresas no listadas en bolsa: se reúne capital de inversionistas para adquirir participaciones, mejorar el desempeño de la empresa y venderla con ganancia, típicamente reservado a inversionistas acreditados e institucionales", "correct": true}, {"text": "Prestar a gobiernos", "correct": false}, {"text": "Invertir solo en bonos corporativos", "correct": false}], "just": "El PE opera en mercados privados, requiere capital sustancial y horizontes largos, y busca crear valor en la empresa adquirida antes de una salida (exit) rentable."}, {"id": 333, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "El venture capital (VC) se distingue del private equity en general porque:", "opts": [{"text": "Invierte solo en empresas maduras y rentables", "correct": false}, {"text": "Es un subconjunto del PE enfocado en financiar startups y empresas en etapa temprana: alto riesgo, con potencial de rendimientos elevados si la empresa tiene éxito", "correct": true}, {"text": "No asume ningún riesgo", "correct": false}, {"text": "Invierte exclusivamente en deuda", "correct": false}], "just": "El VC apuesta a empresas jóvenes con alto potencial de crecimiento pero alta tasa de fracaso; sus retornos son muy dispersos y concentrados en pocos &quot;ganadores&quot;."}, {"id": 334, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "¿Cuál es una característica típica de las inversiones en PE/VC?", "opts": [{"text": "Liquidez diaria y salida inmediata", "correct": false}, {"text": "Iliquidez, compromiso de capital de largo plazo, due diligence extensa y varios años hasta una salida rentable", "correct": true}, {"text": "Transparencia y valuación continua a mercado", "correct": false}, {"text": "Capital mínimo muy bajo y sin requisitos", "correct": false}], "just": "El inversionista compromete capital por años sin liquidez, y la creación de valor (y la salida) toma tiempo; por eso la due diligence y el horizonte son críticos."}, {"id": 335, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "La &quot;curva J&quot; (J-curve) del private equity describe que:", "opts": [{"text": "Los rendimientos son siempre positivos desde el día uno", "correct": false}, {"text": "En los primeros años el rendimiento acumulado tiende a ser negativo (por comisiones y castigos tempranos a las valuaciones) antes de tornarse positivo conforme se realiza el valor de las inversiones", "correct": true}, {"text": "El capital se devuelve todo al inicio", "correct": false}, {"text": "La rentabilidad decrece con el tiempo", "correct": false}], "just": "Las comisiones y el periodo de inversión deprimen los retornos iniciales; el valor se materializa después, dando a la curva de retorno acumulado su forma de &quot;J&quot;."}, {"id": 336, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "El &quot;dry powder&quot; en el mercado de capital privado se refiere a:", "opts": [{"text": "El capital ya invertido en empresas", "correct": false}, {"text": "El capital comprometido por los inversionistas pero aún no invertido por el gestor; a finales de 2019, alrededor de un tercio (~$1.1 billones) de los compromisos globales de PE/VC era dry powder", "correct": true}, {"text": "Las comisiones cobradas por el GP", "correct": false}, {"text": "El efectivo de los hedge funds", "correct": false}], "just": "El dry powder elevado indica abundancia de capital comprometido frente a oportunidades de inversión atractivas; demasiado dry powder puede presionar valuaciones y rendimientos futuros."}, {"id": 337, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "La tendencia de que las empresas permanezcan privadas más tiempo implica que:", "opts": [{"text": "Los inversionistas públicos capturan toda la apreciación temprana", "correct": false}, {"text": "Las empresas salen a bolsa más tarde y más grandes (p. ej., Facebook y Alphabet con +$100 mil millones combinados al IPO, vs. Apple/Microsoft/Amazon con ~$2.2 mil millones), de modo que buena parte del crecimiento temprano se queda en los mercados privados", "correct": true}, {"text": "Ya no existen los IPOs", "correct": false}, {"text": "El mercado privado ha desaparecido", "correct": false}], "just": "La formación de capital ocurre cada vez más en privado; esto explica el interés institucional en PE/VC para capturar el crecimiento que antes se daba tras el IPO."}, {"id": 338, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "Un &quot;search fund&quot; es:", "opts": [{"text": "Un fondo de cobertura de divisas", "correct": false}, {"text": "Un vehículo de &quot;emprendimiento por adquisición&quot;: un emprendedor (searcher) levanta capital para buscar, adquirir y operar una sola empresa privada existente", "correct": true}, {"text": "Un fondo indexado de búsqueda algorítmica", "correct": false}, {"text": "Un ETF temático", "correct": false}], "just": "El search fund financia primero la búsqueda y luego la adquisición de una empresa establecida que el searcher dirigirá. Es una clase de PE estudiada de cerca por Stanford GSB; sus retornos históricos han sido atractivos pero muy dispersos."}, {"id": 339, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "La deuda privada (private credit) se caracteriza por:", "opts": [{"text": "Ser deuda gubernamental cotizada en bolsa", "correct": false}, {"text": "Otorgar crédito fuera de los mercados públicos; representa alrededor del 12% del capital de los mercados privados a nivel global", "correct": true}, {"text": "No tener riesgo de crédito", "correct": false}, {"text": "Ser siempre de corto plazo y liquidez diaria", "correct": false}], "just": "La deuda privada financia prestatarios que no acuden (o no acceden) a los mercados públicos; ofrece mayor rendimiento a cambio de iliquidez y riesgo de crédito."}, {"id": 340, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "En México, una forma común de invertir en deuda privada es a través de las SOFOMes, que:", "opts": [{"text": "Son bancos que captan depósitos del público", "correct": false}, {"text": "Son Sociedades Financieras de Objeto Múltiple: pueden otorgar crédito pero no captar depósitos; algunas (envueltas como &quot;fintech&quot;) ofrecen tasas de ~11–15%, que pagan porque a su vez prestan a clientela de mayor riesgo a tasas muy altas", "correct": true}, {"text": "Garantizan el capital sin riesgo alguno", "correct": false}, {"text": "Son fondos de inversión regulados como las AFOREs", "correct": false}], "just": "La tasa atractiva de 11–15% no es &quot;gratis&quot;: refleja el riesgo de fondear préstamos a segmentos no atendidos por la banca tradicional, a tasas que pueden ser de triple dígito. La accesibilidad y la &quot;tasa garantizada&quot; crean otro espejismo de bajo riesgo."}, {"id": 341, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "Los hedge funds se caracterizan por:", "opts": [{"text": "Estar altamente regulados y ser de bajo costo", "correct": false}, {"text": "Ser fondos mancomunados poco regulados que emplean diversas estrategias (long/short, market neutral, global macro), con mayores comisiones y riesgo, que exigen due diligence rigurosa", "correct": true}, {"text": "Replicar pasivamente un índice", "correct": false}, {"text": "Invertir solo en deuda gubernamental", "correct": false}], "just": "Su menor regulación les permite usar apalancamiento, cortos y derivados; el desempeño depende fuertemente de la habilidad del gestor, y la opacidad obliga a una diligencia exhaustiva."}, {"id": 342, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "Los activos reales (commodities, recursos naturales, infraestructura) se incluyen en portafolios principalmente por:", "opts": [{"text": "Su liquidez diaria", "correct": false}, {"text": "Su potencial de diversificación y cobertura contra la inflación, además de flujos de largo plazo (en infraestructura)", "correct": true}, {"text": "Su rendimiento garantizado", "correct": false}, {"text": "Su exención fiscal universal", "correct": false}], "just": "Los activos reales tienden a comportarse distinto a acciones y bonos y a proteger frente a la inflación, aunque con su propia iliquidez y riesgos específicos."}, {"id": 343, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "Un &quot;co-investment&quot; (coinversión) en private equity consiste en:", "opts": [{"text": "Invertir solo a través de un fondo de fondos", "correct": false}, {"text": "Participar directamente en una inversión junto al gestor (GP), normalmente a comisiones menores, lo que reduce los costos del portafolio y/o da mayor control sobre las empresas", "correct": true}, {"text": "Prestar dinero al GP", "correct": false}, {"text": "Comprar acciones en bolsa", "correct": false}], "just": "Según CAIA, ~60% de sus miembros considera que las coinversiones reducen comisiones o dan mayor control; permiten mantener la inversión más allá de la vida del fondo original."}, {"id": 344, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "Las inversiones en coleccionables y activos tangibles (arte, vino, monedas) presentan:", "opts": [{"text": "Valuación objetiva y liquidez diaria", "correct": false}, {"text": "Valor intrínseco y potencial de apreciación, pero valuación subjetiva, iliquidez y ausencia de flujos de efectivo", "correct": true}, {"text": "Rendimientos garantizados", "correct": false}, {"text": "Regulación equivalente a la de las acciones", "correct": false}], "just": "Aunque pueden apreciarse, su valuación depende de demanda y modas, son ilíquidos y no generan ingresos, por lo que su papel en un portafolio es marginal y especulativo."}, {"id": 345, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "Los CKDs (Certificados de Capital de Desarrollo) son:", "opts": [{"text": "Bonos gubernamentales de corto plazo", "correct": false}, {"text": "Instrumentos listados en la BMV que canalizan capital hacia proyectos de capital privado, infraestructura y bienes raíces en México, con llamadas de capital y vida definida", "correct": true}, {"text": "Fondos de liquidez diaria", "correct": false}, {"text": "Acciones de empresas públicas", "correct": false}], "just": "Los CKDs &quot;bursatilizan&quot; el acceso al capital privado dentro del marco regulatorio mexicano, permitiendo a inversionistas institucionales como las AFOREs invertir en proyectos privados a través de un certificado listado."}, {"id": 346, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "Los CERPIs (Certificados de Proyectos de Inversión) se distinguen de los CKDs principalmente porque:", "opts": [{"text": "Solo pueden invertir en deuda gubernamental", "correct": false}, {"text": "Son más flexibles y permiten una mayor proporción de inversión en el extranjero (con un mínimo de inversión doméstica), orientados a inversionistas institucionales/calificados, ampliando el acceso de las AFOREs al capital privado global", "correct": true}, {"text": "Cotizan en mercados extranjeros exclusivamente", "correct": false}, {"text": "Son idénticos a los CKDs", "correct": false}], "just": "Los CERPIs se crearon para dar a los inversionistas institucionales (en especial las AFOREs) acceso a estrategias de capital privado internacionales con mayor flexibilidad que los CKDs originales."}, {"id": 347, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "La participación de las AFOREs en instrumentos estructurados (CKDs y CERPIs):", "opts": [{"text": "Está prohibida por CONSAR", "correct": false}, {"text": "Es relevante pero acotada por límites regulatorios del régimen de inversión (topes a estructurados por Siefore), siendo las AFOREs de los principales inversionistas institucionales en capital privado mexicano", "correct": true}, {"text": "No tiene ningún límite", "correct": false}, {"text": "Representa la mayoría de su cartera", "correct": false}], "just": "Como vimos en la Sección 10, las Siefores destinan una porción (sujeta a límites por tipo de Siefore) a CKDs/CERPIs, canalizando ahorro para el retiro hacia el financiamiento de proyectos privados del país."}, {"id": 348, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "¿Por qué existen vehículos listados como los CKDs/CERPIs para el capital privado en México?", "opts": [{"text": "Para evitar toda regulación", "correct": false}, {"text": "Para dar a inversionistas regulados e institucionales (como las AFOREs) acceso al capital privado dentro de un marco regulatorio, con cierta transparencia y supervisión que la inversión privada directa no ofrece", "correct": true}, {"text": "Para eliminar el riesgo del capital privado", "correct": false}, {"text": "Para sustituir a la BMV", "correct": false}], "just": "Estos vehículos &quot;envuelven&quot; el capital privado en un instrumento listado y supervisado, conciliando el acceso a mercados privados con las exigencias regulatorias de inversionistas como las AFOREs."}, {"id": 349, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "La estructura de comisiones clásica de un fondo de PE/hedge fund (&quot;2 and 20&quot;) consiste en:", "opts": [{"text": "2% de carry y 20% de comisión de administración", "correct": false}, {"text": "Una comisión de administración (~2% anual sobre el capital comprometido/gestionado) más un &quot;carried interest&quot; (~20% de las ganancias), frecuentemente por encima de un hurdle rate", "correct": true}, {"text": "Una comisión única de 22% al inicio", "correct": false}, {"text": "Cero comisiones", "correct": false}], "just": "El &quot;2 y 20&quot; alinea (parcialmente) al gestor con el inversionista vía el carry, pero implica costos elevados que el inversionista debe ponderar contra el valor agregado real del gestor."}, {"id": 350, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "El &quot;hurdle rate&quot; (o preferred return) en un fondo de capital privado es:", "opts": [{"text": "El rendimiento máximo que puede ganar el GP", "correct": false}, {"text": "El rendimiento mínimo que deben recibir los inversionistas (LPs) antes de que el gestor (GP) empiece a cobrar su carried interest", "correct": true}, {"text": "La comisión de administración", "correct": false}, {"text": "El plazo del fondo", "correct": false}], "just": "El hurdle protege a los LPs: el GP solo participa en las ganancias (carry) una vez superado ese umbral de rendimiento preferente, reforzando la alineación de incentivos."}, {"id": 351, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "En la estructura de un fondo de PE, el General Partner (GP) y los Limited Partners (LPs) son, respectivamente:", "opts": [{"text": "El custodio y el regulador", "correct": false}, {"text": "El gestor que administra el fondo y toma las decisiones de inversión (GP), y los inversionistas que aportan el capital con responsabilidad limitada (LPs)", "correct": true}, {"text": "Dos tipos de bonos", "correct": false}, {"text": "El comprador y el vendedor de acciones", "correct": false}], "just": "El GP gestiona y asume la responsabilidad operativa (y cobra comisiones/carry); los LPs aportan la mayor parte del capital y limitan su exposición a lo invertido."}, {"id": 352, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "¿Por qué la due diligence y la diversificación por &quot;añadas&quot; (vintage years) son especialmente importantes en alternativos?", "opts": [{"text": "Porque los alternativos son transparentes y líquidos", "correct": false}, {"text": "Porque la opacidad y la menor regulación elevan el riesgo de selección, y concentrarse en una sola añada expone al inversionista al ciclo de ese año; diversificar entre añadas suaviza ese riesgo", "correct": true}, {"text": "Porque no hay dispersión de resultados entre gestores", "correct": false}, {"text": "Porque la regulación garantiza el desempeño", "correct": false}], "just": "La enorme dispersión de resultados entre gestores y el efecto del ciclo (timing de la añada) hacen que la selección rigurosa y la diversificación temporal sean determinantes del resultado en mercados privados."}, {"id": 353, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "¿Cómo se mide típicamente el desempeño de un fondo de private equity?", "opts": [{"text": "Solo con el rendimiento time-weighted, igual que un fondo mutuo", "correct": false}, {"text": "Con métricas money-weighted como la TIR (IRR) y múltiplos como el MOIC/TVPI y el DPI, y comparándolo contra un equivalente de mercado público (PME)", "correct": true}, {"text": "Únicamente con el Sharpe ratio diario", "correct": false}, {"text": "Con el rendimiento del día", "correct": false}], "just": "Como el GP controla el timing de las llamadas y distribuciones de capital, se usan métricas money-weighted (IRR, múltiplos) y comparaciones PME, en lugar del rendimiento time-weighted típico de los fondos líquidos."}, {"id": 354, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "¿Cuál es la tesis central de GBM sobre los activos alternativos para el inversionista mexicano promedio?", "opts": [{"text": "Que debe concentrar todo su patrimonio en negocios familiares y bienes raíces", "correct": false}, {"text": "Que muchos clientes ya tienen gran parte de su patrimonio en mercados privados ilíquidos (negocios propios/familiares, departamentos en renta, deuda privada vía SOFOM) mal entendidos como de bajo riesgo, y que con frecuencia estarían mejor servidos por portafolios públicos ampliamente diversificados", "correct": true}, {"text": "Que los alternativos no tienen ningún valor", "correct": false}, {"text": "Que debe evitarse toda inversión en bolsa", "correct": false}], "just": "México es de los países más emprendedores (OCDE) y donde los negocios familiares pesan más en el PIB (~70%, 3.º global). El asesor —médico del dinero— debe revelar el riesgo oculto de esas posiciones concentradas e ilíquidas, no validar el espejismo de seguridad."}, {"id": 355, "sec": 15, "secTitle": "Activos alternativos y mercados privados", "q": "Síntesis (capstone). ¿Cuál es el papel apropiado de los activos alternativos en un portafolio?", "opts": [{"text": "Sustituir por completo a las inversiones tradicionales", "correct": false}, {"text": "Evitarlos siempre, ya que nunca aportan valor", "correct": false}, {"text": "Aportar diversificación y potencial de rendimiento para inversionistas adecuados (acreditados, con horizonte largo) que comprenden la iliquidez y hacen due diligence, dimensionando la posición con prudencia; no son una panacea, y la percepción de &quot;bajo riesgo&quot; de los activos privados suele ser una ilusión por falta de marcaje a mercado", "correct": true}, {"text": "Asignar el 100% del portafolio a capital privado por su mayor rendimiento esperado", "correct": false}], "just": "Integra el bloque: los alternativos pueden tener un papel legítimo (descorrelación, retorno, cobertura), pero exigen idoneidad, horizonte, due diligence y dimensionamiento. El riesgo no desaparece por no verse; el deber del asesor es hacerlo visible y ponderar costos, iliquidez y la dispersión de resultados."}, {"id": 356, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Según el material de GBM, una nota estructurada se define como:", "opts": [{"text": "Un bono gubernamental con rendimiento variable según el mercado", "correct": false}, {"text": "Un instrumento híbrido que combina componentes de renta fija con derivados financieros para capitalizar oportunidades o protegerse de riesgos", "correct": true}, {"text": "Un fondo de inversión que replica un índice", "correct": false}, {"text": "Una acción que paga dividendos fijos", "correct": false}], "just": "La esencia de una nota estructurada es la combinación de un componente de renta fija (que ancla el capital o genera el flujo base) con uno o más derivados (que definen el perfil de pago ligado a un subyacente)."}, {"id": 357, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Estructuralmente, una nota con capital protegido se construye combinando:", "opts": [{"text": "Dos acciones distintas", "correct": false}, {"text": "Un bono cupón cero (o instrumento de deuda a descuento), cuyo crecimiento a la par devuelve el capital al vencimiento, más una opción que aporta la participación en el subyacente", "correct": true}, {"text": "Solo un contrato de futuros", "correct": false}, {"text": "Un fondo de liquidez y un ETF", "correct": false}], "just": "El cupón cero comprado bajo la par crece hasta el nominal al vencimiento (protege el capital), y el remanente del capital se destina a comprar la opción que da el upside. Esta descomposición es clave para entender y valuar la nota."}, {"id": 358, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "¿Qué objetivos principales pueden satisfacer las notas estructuradas según GBM?", "opts": [{"text": "Únicamente proteger capital y pagar dividendos fijos", "correct": false}, {"text": "Proteger capital, yield enhancement (mejora de rendimiento), participación en activos específicos, apalancamiento y obtener distintos perfiles de flujo", "correct": true}, {"text": "Solo apalancamiento y acceso a mercados internacionales", "correct": false}, {"text": "Exclusivamente replicar índices y pagar cupones mensuales", "correct": false}], "just": "La flexibilidad de las notas permite &quot;diseñar&quot; el perfil deseado: desde protección de capital hasta amplificación o generación de ingreso, según el objetivo del cliente."}, {"id": 359, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "¿Cuáles pueden ser activos subyacentes de las notas estructuradas distribuidas por GBM?", "opts": [{"text": "Solo acciones mexicanas y bonos gubernamentales", "correct": false}, {"text": "Tasas (TIIE, LIBOR/SOFR), tipo de cambio (p. ej., USD/MXN), acciones mexicanas e internacionales, índices y commodities como oro y plata", "correct": true}, {"text": "Únicamente criptomonedas", "correct": false}, {"text": "Exclusivamente ETFs internacionales", "correct": false}], "just": "El subyacente puede ser prácticamente cualquier variable de mercado con un derivado líquido asociado, lo que da enorme versatilidad para construir el payoff."}, {"id": 360, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "¿Cuál es el rol de GBM en el mercado de notas estructuradas y su valor agregado?", "opts": [{"text": "Es el emisor de las notas y garantiza todos los rendimientos", "correct": false}, {"text": "Actúa como distribuidor y asesor (no emisor), con arquitectura abierta, un &quot;beauty contest&quot; entre emisores para obtener mejores precios, mitigación del riesgo de contraparte y tres programas (recurrente, oportunístico y sobre demanda)", "correct": true}, {"text": "Solo intermedia notas de un único banco sin agregar valor", "correct": false}, {"text": "Crea notas personalizadas sin ningún programa estandarizado", "correct": false}], "just": "Al no ser emisor, GBM puede comparar (beauty contest) cotizaciones de varios emisores para conseguir mejores términos y diversificar el riesgo de contraparte, alineándose con el cliente en lugar de &quot;colocar producto propio&quot;."}, {"id": 361, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Según el curso de GBM, los tres riesgos principales de las notas estructuradas son:", "opts": [{"text": "Inflación, cambiario y de tasas", "correct": false}, {"text": "Riesgo de mercado, riesgo de iliquidez y riesgo de contraparte", "correct": true}, {"text": "Fiscal, regulatorio y de dividendos", "correct": false}, {"text": "De volatilidad, de bonos y de acciones", "correct": false}], "just": "El riesgo de mercado (el subyacente se mueve en contra), el de iliquidez (difícil vender antes del vencimiento) y el de contraparte (solvencia del emisor) son los tres ejes que el asesor debe explicar siempre."}, {"id": 362, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Una nota con capital protegido (principal-protected) ofrece:", "opts": [{"text": "Rendimiento fijo garantizado superior a CETES", "correct": false}, {"text": "La devolución del capital nominal al vencimiento (sujeta a la solvencia del emisor) más una participación en el rendimiento positivo del subyacente", "correct": true}, {"text": "Cero exposición al subyacente", "correct": false}, {"text": "Protección contra la quiebra del emisor", "correct": false}], "just": "Protege el nominal a vencimiento y da upside parcial; pero la &quot;protección&quot; depende de que el emisor pague (riesgo de contraparte) y normalmente aplica solo al vencimiento, no antes."}, {"id": 363, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "La &quot;tasa de participación&quot; (participation rate) de una nota indica:", "opts": [{"text": "La comisión que cobra GBM", "correct": false}, {"text": "Qué proporción del rendimiento positivo del subyacente recibe el inversionista (p. ej., una participación del 80% entrega el 80% del alza del subyacente)", "correct": true}, {"text": "El cupón fijo garantizado", "correct": false}, {"text": "El plazo de la nota", "correct": false}], "just": "La participación calibra cuánto del movimiento del subyacente se traslada al inversionista; una mayor protección de capital suele implicar menor participación, y viceversa."}, {"id": 364, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Un &quot;cap&quot; (tope) en una nota estructurada significa que:", "opts": [{"text": "El capital está garantizado al 100%", "correct": false}, {"text": "El rendimiento máximo que puede obtener el inversionista está limitado a un nivel, normalmente a cambio de mayor participación, mayor cupón o menor costo", "correct": true}, {"text": "Las pérdidas están limitadas", "correct": false}, {"text": "La nota no tiene vencimiento", "correct": false}], "just": "El cap es la contraparte de un beneficio: el inversionista renuncia al alza por encima de cierto nivel a cambio de mejores condiciones en otra dimensión de la nota."}, {"id": 365, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Una nota de yield enhancement / reverse convertible se caracteriza por:", "opts": [{"text": "Garantizar el capital y un cupón bajo", "correct": false}, {"text": "Pagar un cupón elevado a cambio de asumir el riesgo a la baja del subyacente: si este cae por debajo de cierto nivel, el inversionista puede recibir acciones (o una pérdida de capital) en lugar del nominal", "correct": true}, {"text": "No pagar ningún cupón", "correct": false}, {"text": "Eliminar todo riesgo de mercado", "correct": false}], "just": "El cupón atractivo no es gratis: el inversionista vende implícitamente una opción (asume el downside del subyacente). Es lo opuesto a una nota de capital protegido."}, {"id": 366, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Una nota autollamable (autocallable) funciona así:", "opts": [{"text": "Nunca vence y paga un cupón fijo perpetuo", "correct": false}, {"text": "Paga un cupón contingente y se redime anticipadamente (&quot;autollama&quot;) si el subyacente está por encima de un nivel gatillo en fechas de observación; suele tener una barrera que protege el capital al vencimiento salvo que sea vulnerada", "correct": true}, {"text": "Garantiza el capital sin importar el subyacente", "correct": false}, {"text": "Solo paga al vencimiento sin observaciones intermedias", "correct": false}], "just": "La autollamable busca generar ingreso en mercados laterales o moderadamente alcistas; el cupón puede tener &quot;memoria&quot; (recupera cupones no pagados), pero si el subyacente cae bajo la barrera al final, el inversionista absorbe la pérdida."}, {"id": 367, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Una nota &quot;worst-of&quot; (peor de) ligada a varios subyacentes:", "opts": [{"text": "Paga según el mejor de los subyacentes", "correct": false}, {"text": "Determina su pago según el subyacente de peor desempeño, lo que aumenta el riesgo y, por ello, suele ofrecer un cupón más alto", "correct": true}, {"text": "Promedia todos los subyacentes sin riesgo adicional", "correct": false}, {"text": "Elimina el riesgo de mercado al diversificar", "correct": false}], "just": "Atar el pago al peor de varios activos eleva la probabilidad de un resultado adverso (basta que uno caiga), por lo que el emisor compensa con un cupón mayor. Es una fuente común de riesgo subestimado."}, {"id": 368, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "La diferencia entre un &quot;buffer&quot; y una &quot;barrera&quot; (barrier) de protección es que:", "opts": [{"text": "Son exactamente lo mismo", "correct": false}, {"text": "Un buffer absorbe las primeras pérdidas hasta cierto nivel (protección parcial que siempre aplica); una barrera ofrece protección total que desaparece por completo si el subyacente la vulnera (protección condicional, &quot;todo o nada&quot;)", "correct": true}, {"text": "El buffer nunca protege; la barrera siempre protege", "correct": false}, {"text": "Ambas garantizan el capital pase lo que pase", "correct": false}], "just": "El buffer da una protección robusta pero limitada (p. ej., absorbe la primera caída del 20%); la barrera protege más mientras no se toque, pero si se vulnera el inversionista queda expuesto a toda la caída. Es una distinción crítica de riesgo."}, {"id": 369, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Una nota apalancada (leveraged) busca:", "opts": [{"text": "Reducir la exposición al subyacente", "correct": false}, {"text": "Amplificar el rendimiento del subyacente (p. ej., 2x el alza), frecuentemente hasta un cap, a cambio de mayor riesgo", "correct": true}, {"text": "Garantizar el capital", "correct": false}, {"text": "Pagar un cupón fijo sin exposición", "correct": false}], "just": "El apalancamiento multiplica tanto las ganancias como —si no hay protección— las pérdidas; suele combinarse con un cap que limita el alza amplificada."}, {"id": 370, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Una nota digital (binaria) paga:", "opts": [{"text": "Un rendimiento proporcional al subyacente", "correct": false}, {"text": "Un monto fijo si se cumple una condición (p. ej., el subyacente termina por encima de un nivel) y un resultado distinto si no se cumple", "correct": true}, {"text": "Siempre el 100% del capital más dividendos", "correct": false}, {"text": "Un cupón mensual garantizado", "correct": false}], "just": "El pago digital es de tipo &quot;todo o nada&quot; sobre una condición; útil para expresar una visión binaria del mercado, pero con un perfil de pago discontinuo que el cliente debe entender."}, {"id": 371, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Un costo frecuentemente oculto de las notas ligadas a acciones o índices es que:", "opts": [{"text": "El inversionista recibe dividendos adicionales", "correct": false}, {"text": "El tenedor normalmente obtiene solo el rendimiento de precio del subyacente, no los dividendos; el emisor usa esos dividendos no entregados para financiar la estructura", "correct": true}, {"text": "El emisor paga una prima al inversionista", "correct": false}, {"text": "No hay relación con los dividendos", "correct": false}], "just": "Renunciar a los dividendos (rendimiento total vs. de precio) es un costo real que abarata la estructura para el emisor y que el inversionista a menudo no percibe; el asesor debe hacerlo explícito."}, {"id": 372, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "El riesgo más subestimado de una nota &quot;con capital protegido&quot; es:", "opts": [{"text": "Que el subyacente suba demasiado", "correct": false}, {"text": "El riesgo de contraparte/emisor: la nota es deuda no garantizada del emisor, de modo que si el emisor quiebra (como ocurrió con Lehman Brothers en 2008), incluso el capital &quot;protegido&quot; puede perderse", "correct": true}, {"text": "Que pague demasiados dividendos", "correct": false}, {"text": "Que tenga liquidez diaria", "correct": false}], "just": "La &quot;protección de capital&quot; es solo tan buena como la solvencia del emisor. El colapso de las notas de Lehman es el caso emblemático: la protección era frente al mercado, no frente a la quiebra del emisor."}, {"id": 373, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "El riesgo de iliquidez en una nota estructurada implica que:", "opts": [{"text": "Siempre hay un mercado secundario profundo", "correct": false}, {"text": "El mercado secundario suele ser limitado o inexistente; generalmente se diseñan para mantenerse al vencimiento, y salir antes puede implicar venderla al precio (desfavorable) que ofrezca el emisor", "correct": true}, {"text": "Se puede vender en bolsa como una acción en segundos", "correct": false}, {"text": "No existe penalización por salir antes", "correct": false}], "just": "A diferencia de un ETF, una nota no se negocia en un mercado líquido; el horizonte debe coincidir con el vencimiento, y la salida anticipada raramente es eficiente."}, {"id": 374, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Respecto a la complejidad y los costos de las notas estructuradas:", "opts": [{"text": "Son productos simples y sin costos incorporados", "correct": false}, {"text": "Son opacas y difíciles de valuar para el inversionista, con costos incorporados en los términos; por eso comparar cotizaciones entre emisores (el &quot;beauty contest&quot; de GBM) ayuda a obtener un precio más justo", "correct": true}, {"text": "Su precio es siempre transparente y sin márgenes", "correct": false}, {"text": "No requieren análisis del subyacente", "correct": false}], "just": "Los costos no se cobran aparte, sino que están embebidos en los parámetros (participación, cap, barrera). Comparar emisores y descomponer la nota es la mejor defensa del inversionista."}, {"id": 375, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "La &quot;protección de capital&quot; de una nota estructurada debe entenderse como:", "opts": [{"text": "Una garantía absoluta e incondicional", "correct": false}, {"text": "Una protección del valor nominal, normalmente solo al vencimiento, frente al riesgo de mercado, pero NO frente a la quiebra del emisor ni necesariamente ajustada por inflación", "correct": true}, {"text": "Protección contra todos los riesgos posibles", "correct": false}, {"text": "Una garantía del gobierno", "correct": false}], "just": "Hay que matizar la palabra &quot;protegido&quot;: protege el nominal a vencimiento contra el movimiento del subyacente, pero no contra el default del emisor ni contra la pérdida de poder adquisitivo. Sobrevender la &quot;garantía&quot; es un error de asesoría."}, {"id": 376, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "En la valuación de una nota, el entorno de tasas de interés influye porque:", "opts": [{"text": "Las tasas no afectan el precio de la nota", "correct": false}, {"text": "El precio de la nota ≈ valor presente del bono cupón cero + costo de la(s) opción(es) − costos; con tasas bajas, proteger el capital es más caro (el cupón cero cuesta más), dejando menos presupuesto para la opción y reduciendo la participación", "correct": true}, {"text": "Tasas altas siempre eliminan la protección", "correct": false}, {"text": "La opción no tiene costo", "correct": false}], "just": "Cuando las tasas bajan, el cupón cero necesario para devolver el nominal cuesta más, por lo que queda menos para comprar upside; por eso las notas de capital protegido ofrecen mejores términos en entornos de tasas altas."}, {"id": 377, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Para que una nota estructurada sea adecuada para un cliente, el asesor debe:", "opts": [{"text": "Venderla por su cupón atractivo sin más análisis", "correct": false}, {"text": "Verificar idoneidad (cliente informado/calificado), explicar el payoff y sus escenarios, el riesgo de emisor y de iliquidez, los costos y la renuncia a dividendos, y encajarla dentro del plan (Plan Financiero 360) como una &quot;canasta&quot; dimensionada a una meta y horizonte concretos", "correct": true}, {"text": "Asignar el 100% del portafolio a la nota", "correct": false}, {"text": "Omitir el riesgo de contraparte para no asustar al cliente", "correct": false}], "just": "Por su complejidad, las notas exigen una explicación rigurosa de escenarios y riesgos, y un dimensionamiento prudente dentro del plan integral del cliente. Transparencia total es parte del deber fiduciario."}, {"id": 378, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "¿Para qué tipo de cliente y contexto es más apropiada una nota con capital protegido?", "opts": [{"text": "Un especulador que busca máximo apalancamiento de corto plazo", "correct": false}, {"text": "Un cliente conservador que desea exposición parcial al alza de un subyacente sin arriesgar el nominal a vencimiento, que puede mantener la nota hasta el vencimiento y acepta el riesgo de emisor, el cap/participación parcial y la renuncia a dividendos", "correct": true}, {"text": "Un cliente que necesita liquidez diaria", "correct": false}, {"text": "Un cliente que quiere recibir todos los dividendos del subyacente", "correct": false}], "just": "La nota de capital protegido encaja con un perfil averso a perder el nominal pero dispuesto a renunciar a parte del alza y a la liquidez, siempre que comprenda que la &quot;protección&quot; está condicionada a la solvencia del emisor."}, {"id": 379, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Una nota de yield enhancement / autollamable es apropiada para, y peligrosa si:", "opts": [{"text": "Apropiada para quien necesita capital garantizado; peligrosa para inversionistas agresivos", "correct": false}, {"text": "Apropiada para un cliente que busca ingreso elevado en un mercado lateral o moderadamente alcista y entiende el riesgo a la baja si se vulnera la barrera; peligrosa (inadecuada) para un cliente que requiere protección de su capital", "correct": true}, {"text": "Apropiada para cualquier cliente sin distinción", "correct": false}, {"text": "Apropiada solo para inversionistas que no toleran ningún riesgo", "correct": false}], "just": "Estas notas cambian protección por ingreso: brillan en mercados estables, pero exponen al capital si el subyacente cae bajo la barrera. Vendérselas a un cliente que cree tener &quot;capital seguro&quot; es un desajuste grave de idoneidad."}, {"id": 380, "sec": 16, "secTitle": "Notas estructuradas y productos estructurados", "q": "Síntesis (capstone). ¿Cómo debe un asesor presentar una nota estructurada a su cliente?", "opts": [{"text": "Resaltando solo el cupón o la &quot;protección&quot; y omitiendo los riesgos", "correct": false}, {"text": "Evitándolas siempre, pues nunca tienen utilidad", "correct": false}, {"text": "Descomponiéndola en sus partes (bono + derivado), explicando con claridad el riesgo de emisor/contraparte, la iliquidez, el cap, la renuncia a dividendos y los costos embebidos, mostrando escenarios de pago, y asegurando que el perfil de pago coincida con la meta, el horizonte y la tolerancia del cliente", "correct": true}, {"text": "Asignándole una parte mayoritaria del portafolio por su cupón", "correct": false}], "just": "Integra el bloque: una nota no es &quot;mágica&quot; ni &quot;garantizada&quot;; es un bono más uno o varios derivados, con riesgos concretos (emisor, iliquidez, mercado) y costos ocultos. El asesor agrega valor al traducir esa complejidad en escenarios claros y al dimensionarla correctamente dentro del plan —nunca vendiendo la &quot;protección&quot; sin el matiz del riesgo de contraparte—."}, {"id": 381, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "El hallazgo más citado de Bessembinder (2018) es que:", "opts": [{"text": "Todas las acciones superan a los T-bills en el largo plazo", "correct": false}, {"text": "La mayoría de las acciones individuales (≈57.4%) tuvo un rendimiento buy-and-hold de por vida INFERIOR al de los Cetes/T-bills de un mes; solo ≈42.6% los superó", "correct": true}, {"text": "El 90% de las acciones supera al mercado", "correct": false}, {"text": "Las acciones y los T-bills rinden igual", "correct": false}], "just": "Contra la creencia popular de que &quot;las acciones siempre ganan a largo plazo&quot;, la mayoría de las acciones individuales ni siquiera supera a las letras del Tesoro a lo largo de su vida cotizada. La &quot;verdad&quot; del premio accionario aplica al mercado agregado, no a la acción típica."}, {"id": 382, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "En términos de creación de riqueza en dólares, Bessembinder encontró que:", "opts": [{"text": "Todas las acciones contribuyen por igual", "correct": false}, {"text": "El mejor 4.3% de las empresas (≈1,092 acciones) explica la totalidad de la ganancia neta del mercado accionario estadounidense desde 1926; el otro ≈95.7% en conjunto apenas igualó a los T-bills de un mes", "correct": true}, {"text": "El peor 4% explica toda la riqueza", "correct": false}, {"text": "La riqueza se reparte uniformemente entre todas las acciones", "correct": false}], "just": "La creación de riqueza está extraordinariamente concentrada: un puñado de grandes ganadoras genera toda la ganancia neta sobre los T-bills, mientras el resto, agregado, solo empata con las letras."}, {"id": 383, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "La creación de riqueza neta (lifetime dollar wealth creation) del mercado accionario de EE.UU. estimada en el estudio original (1926–2016) fue aproximadamente:", "opts": [{"text": "$1 billón de dólares", "correct": false}, {"text": "≈$34.8 billones de dólares (en exceso sobre los T-bills de un mes)", "correct": true}, {"text": "Cero", "correct": false}, {"text": "Negativa", "correct": false}], "just": "El estudio cuantifica ≈$34.8 billones de creación de riqueza neta a diciembre de 2016 (actualizaciones posteriores del autor elevan la cifra). Toda esa ganancia neta proviene del 4.3% superior de las acciones. (Recordatorio: <em>trillion</em> en inglés = billón en español.)"}, {"id": 384, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "La metodología del estudio se basa en:", "opts": [{"text": "Una muestra de 100 acciones de los últimos 5 años", "correct": false}, {"text": "Cerca de 25,967 acciones individuales de la base CRSP entre julio de 1926 y diciembre de 2016, comparando el rendimiento buy-and-hold de por vida de cada acción contra los T-bills de un mes en el mismo horizonte", "correct": true}, {"text": "Solo las empresas del S&amp;P 500 actuales", "correct": false}, {"text": "Una simulación con rendimientos normales", "correct": false}], "just": "El uso de prácticamente todas las acciones de CRSP durante ~90 años, con rendimientos compuestos de por vida, es lo que permite observar la distribución completa de resultados —incluidas las muchas acciones que desaparecieron—."}, {"id": 385, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "Respecto a la distribución de los rendimientos de por vida de las acciones individuales:", "opts": [{"text": "La mediana es positiva y alta", "correct": false}, {"text": "La mediana del rendimiento de por vida es negativa y el resultado individual más frecuente es una pérdida grande; la distribución es fuertemente asimétrica a la derecha (skewness estandarizada ≈154.8)", "correct": true}, {"text": "Todos los rendimientos se agrupan cerca del promedio", "correct": false}, {"text": "La distribución es simétrica (normal)", "correct": false}], "just": "La enorme asimetría positiva implica que el promedio (jalado por unas pocas ganadoras extremas) está muy por encima de la mediana; la acción típica pierde frente a los T-bills, aunque el promedio del mercado sea positivo."}, {"id": 386, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "¿Cuál es la explicación central de por qué pocas acciones generan toda la riqueza?", "opts": [{"text": "Manipulación de mercado", "correct": false}, {"text": "La asimetría positiva (positive skewness) de los rendimientos: unas pocas acciones generan rendimientos enormes que arrastran al alza al mercado (ponderado por valor), mientras la acción típica se queda atrás", "correct": true}, {"text": "Que todas las acciones son iguales", "correct": false}, {"text": "El azar puro sin patrón alguno", "correct": false}], "just": "La skewness es el corazón del paper: el rendimiento del mercado depende de la cola derecha (las pocas grandes ganadoras), no del desempeño de la acción mediana."}, {"id": 387, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "Según Bessembinder, la asimetría positiva de los rendimientos de por vida proviene de:", "opts": [{"text": "Únicamente de errores de medición", "correct": false}, {"text": "Dos fuentes: la asimetría ya presente en los rendimientos mensuales, amplificada por el efecto del interés compuesto a lo largo de horizontes largos", "correct": true}, {"text": "Solo de los dividendos", "correct": false}, {"text": "De la inflación exclusivamente", "correct": false}], "just": "Componer rendimientos positivos durante décadas estira la cola derecha (un acierto sostenido se multiplica), mientras que lo peor que puede pasar es perder el 100%. La combinación de skewness mensual + compounding produce la extrema asimetría de por vida."}, {"id": 388, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "¿Por qué la mayoría de las acciones queda por debajo del rendimiento promedio?", "opts": [{"text": "Porque el promedio es negativo", "correct": false}, {"text": "Porque en una distribución asimétrica a la derecha el promedio (media) es mayor que la mediana: una acción puede perder a lo sumo 100% pero ganar de forma ilimitada, así que las pocas ganadoras extremas elevan la media por encima de lo que logra la acción típica", "correct": true}, {"text": "Porque todas las acciones pierden dinero", "correct": false}, {"text": "Porque el promedio se calcula mal", "correct": false}], "just": "El límite inferior (-100%) y el potencial ilimitado al alza generan asimetría: la mayoría de las observaciones cae por debajo de una media inflada por la cola derecha. Es estadística, no pesimismo."}, {"id": 389, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "¿Cómo reconcilia el paper que el mercado supere a los T-bills aunque la mayoría de las acciones no lo haga?", "opts": [{"text": "Es una contradicción sin solución", "correct": false}, {"text": "El rendimiento del mercado (ponderado por valor) está impulsado por las pocas ganadoras extremas; &quot;el mercado&quot; no es lo mismo que &quot;la acción típica&quot;, de modo que el agregado gana aunque la mediana pierda frente a los T-bills", "correct": true}, {"text": "El mercado en realidad no supera a los T-bills", "correct": false}, {"text": "Todas las acciones contribuyen igual al índice", "correct": false}], "just": "Es la resolución de la paradoja: el premio accionario es real a nivel de mercado precisamente porque el índice captura a las grandes ganadoras; quien no las posee (carteras concentradas) probablemente se queda corto."}, {"id": 390, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "La implicación principal del paper para la gestión de portafolios es que:", "opts": [{"text": "Conviene concentrar la cartera en pocas acciones", "correct": false}, {"text": "Las estrategias activas poco diversificadas (concentradas) tienden a quedar por debajo del promedio del mercado con mayor frecuencia, porque es probable que NO contengan las pocas acciones que generan casi toda la riqueza", "correct": true}, {"text": "La diversificación es irrelevante", "correct": false}, {"text": "El stock picking concentrado es la mejor estrategia", "correct": false}], "just": "Si la riqueza la crea el 4% superior, una cartera de pocas acciones tiene alta probabilidad de perderse a las ganadoras y quedar rezagada. El paper ofrece un sustento estadístico, más allá de las comisiones, para diversificar."}, {"id": 391, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "¿Cómo refuerza Bessembinder el argumento a favor de la indexación amplia?", "opts": [{"text": "Demostrando que el stock picking es fácil", "correct": false}, {"text": "Mostrando que poseer todo el mercado garantiza tener las pocas ganadoras extremas, mientras seleccionar pocas acciones arriesga perdérselas; es respaldo cuantitativo al &quot;compra el pajar&quot; de Bogle", "correct": true}, {"text": "Recomendando comprar solo la acción más popular", "correct": false}, {"text": "Sugiriendo abandonar la renta variable", "correct": false}], "just": "Conecta con la Sección 12 (indexación) y la 1/3 (activa vs. pasiva): la diversificación amplia asegura capturar la cola derecha que define el rendimiento del mercado, en lugar de apostar a identificarla de antemano."}, {"id": 392, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "Para un cliente con la mayor parte de su patrimonio en una sola acción (p. ej., la empresa que fundó o donde trabaja), el paper sugiere que:", "opts": [{"text": "Debe mantener la concentración porque seguramente será una ganadora", "correct": false}, {"text": "La probabilidad de que esa única posición esté en el 4% que crea casi toda la riqueza es muy baja, por lo que diversificar es estadísticamente prudente", "correct": true}, {"text": "Concentrarse en una acción no tiene riesgo", "correct": false}, {"text": "Conviene endeudarse para comprar más de la misma acción", "correct": false}], "just": "Es una aplicación directa y muy relevante para México (fundadores, negocios familiares, posiciones heredadas): la asimetría implica que apostar todo a una sola acción tiene alta probabilidad de decepcionar. Enlaza con el &quot;espejismo&quot; de la concentración (Sección 15)."}, {"id": 393, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "¿Por qué el paper hace el caso contra la gestión activa aún más fuerte de lo que se pensaba?", "opts": [{"text": "Solo por las comisiones más altas", "correct": false}, {"text": "Porque, más allá de las comisiones, la probabilidad estructural de no poseer las pocas ganadoras hace que el bajo desempeño relativo sea probable; la diferencia frente a poseer el mercado puede pesar más que el costo de las comisiones", "correct": true}, {"text": "Porque la gestión activa siempre gana", "correct": false}, {"text": "Porque los índices están manipulados", "correct": false}], "just": "El estudio sugiere que el reto de la gestión activa no es solo de costos, sino de la propia forma de la distribución: omitir las ganadoras extremas penaliza fuertemente, elevando lo que está en juego al seleccionar gestores."}, {"id": 394, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "¿Qué NO afirma el paper de Bessembinder (lectura cuidadosa)?", "opts": [{"text": "Que la mayoría de las acciones individuales pierde frente a los T-bills", "correct": false}, {"text": "NO afirma que la renta variable sea mala ni que el premio accionario sea falso: el mercado agregado SÍ superó ampliamente a los T-bills; el punto es sobre la distribución de resultados individuales y la importancia de la diversificación", "correct": true}, {"text": "Que la riqueza está muy concentrada en pocas acciones", "correct": false}, {"text": "Que la asimetría positiva es clave", "correct": false}], "just": "Es importante no sobreinterpretar: el hallazgo no es anti-acciones, sino pro-diversificación. El premio por riesgo de la renta variable a nivel de mercado sigue siendo real; lo frágil es apostar a acciones individuales."}, {"id": 395, "sec": 17, "secTitle": "El paper de Bessembinder (2018): ¿Las acciones superan a los T-bills?", "q": "Síntesis (capstone). ¿Cómo usa un asesor el paper de Bessembinder con un cliente?", "opts": [{"text": "Para convencerlo de concentrarse en su &quot;mejor idea&quot;", "correct": false}, {"text": "Para recomendarle salir de la renta variable", "correct": false}, {"text": "Para fundamentar la diversificación amplia (índices/fondos), moderar la sobreconfianza en el stock picking, abordar posiciones concentradas y explicar por qué &quot;comprar el mercado&quot; captura a las ganadoras que crean la riqueza, sin negar que el mercado en agregado sí premia al inversionista de largo plazo", "correct": true}, {"text": "Para justificar apalancarse en una sola acción", "correct": false}], "just": "Integra el bloque y enlaza con el club de lectura y la filosofía &quot;médico del dinero&quot;: la evidencia de Bessembinder es una de las herramientas más poderosas para combatir la sobreconfianza y la concentración, y para explicar —con datos— por qué la diversificación amplia no es mediocridad, sino la forma racional de capturar el premio accionario."}, {"id": 396, "sec": 18, "secTitle": "Fama-French (2010): suerte vs. habilidad en los fondos mutuos", "q": "El hallazgo agregado central de Fama-French (2010) es que:", "opts": [{"text": "Los fondos activos superan ampliamente al mercado después de comisiones", "correct": false}, {"text": "El portafolio agregado (ponderado por activos) de fondos activos de renta variable de EE.UU. se parece al portafolio de mercado en términos brutos, pero los altos costos de la gestión activa se tra
