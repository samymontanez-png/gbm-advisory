:root{
 --azul:#424EE0; --azul02:#F1F0FD; --azul03:#DFE1EB;
 --negro:#0A0A0C; --negro02:#1D1D20; --gris:#EAEBED; --gris02:#F4F5F8;
 --gris03:#DEDEE0; --gris04:#8C8C8C; --gris05:#54565A;
 --ok:#1F9D57; --okbg:#E9F6EF; --bad:#C8453B; --badbg:#FBECEA;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'GBM Sans',-apple-system,sans-serif;color:var(--negro02);
 background:var(--gris02);line-height:1.5;font-size:16px;-webkit-font-smoothing:antialiased;}
.med{font-weight:500;} strong{font-weight:700;} em{font-style:normal;font-weight:500;}
sup{font-size:.72em;}
a{color:var(--azul);}

/* top bar */
.topbar{background:var(--negro);color:#fff;padding:14px 22px;display:flex;align-items:center;
 justify-content:space-between;position:sticky;top:0;z-index:20;}
.brand{font-size:18px;letter-spacing:.2px;}
.brand b{font-weight:700;} .brand span{font-weight:400;color:#fff;}
.brand .sep{color:var(--gris04);font-weight:400;margin:0 10px;}
.brand .app{color:var(--gris04);font-weight:500;font-size:13px;letter-spacing:1.2px;text-transform:uppercase;}

.wrap{max-width:780px;margin:0 auto;padding:26px 18px 80px;}
.card{background:#fff;border:1px solid var(--gris);border-radius:18px;padding:26px;
 box-shadow:0 1px 2px rgba(10,10,12,.04);}
.eyebrow{color:var(--azul);font-weight:700;font-size:12px;letter-spacing:1.6px;
 text-transform:uppercase;margin:0 0 8px;}
h1{font-weight:700;font-size:30px;line-height:1.1;letter-spacing:-.3px;margin:0 0 8px;}
h2{font-weight:700;font-size:20px;margin:0 0 6px;}
.muted{color:var(--gris05);}
.hint{font-size:13.5px;color:var(--gris05);}

/* setup controls */
.field{margin:22px 0 0;}
.field>label{display:block;font-weight:700;font-size:13px;letter-spacing:.4px;margin-bottom:9px;}
.opts-row{display:flex;flex-wrap:wrap;gap:8px;}
.chip{border:1.5px solid var(--gris03);background:#fff;border-radius:999px;padding:9px 16px;
 font-family:inherit;font-size:14.5px;font-weight:500;cursor:pointer;color:var(--negro02);
 transition:all .12s;}
.chip:hover{border-color:var(--azul);}
.chip.on{background:var(--azul);border-color:var(--azul);color:#fff;}
select{font-family:inherit;font-size:15px;padding:11px 14px;border:1.5px solid var(--gris03);
 border-radius:12px;width:100%;background:#fff;color:var(--negro02);cursor:pointer;}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--azul);color:#fff;border:none;
 border-radius:12px;padding:14px 26px;font-family:inherit;font-size:16px;font-weight:700;
 cursor:pointer;transition:transform .08s,background .15s;}
.btn:hover{background:#3540c4;} .btn:active{transform:translateY(1px);}
.btn.ghost{background:#fff;color:var(--negro02);border:1.5px solid var(--gris03);}
.btn.ghost:hover{border-color:var(--azul);color:var(--azul);background:#fff;}
.btn[disabled]{opacity:.4;cursor:not-allowed;}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px;}

/* quiz */
.qbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:8px;}
.qprog{font-weight:700;font-size:14px;}
.qprog .of{color:var(--gris04);font-weight:500;}
.seclabel{font-size:12px;color:var(--gris05);text-transform:uppercase;letter-spacing:.8px;
 font-weight:500;margin:2px 0 16px;}
.timer{font-weight:700;font-variant-numeric:tabular-nums;font-size:15px;background:var(--gris02);
 border:1px solid var(--gris);border-radius:10px;padding:7px 13px;}
.timer.warn{background:var(--badbg);border-color:var(--bad);color:var(--bad);}
.pbar{height:5px;background:var(--gris);border-radius:99px;overflow:hidden;margin-bottom:20px;}
.pbar>i{display:block;height:100%;background:var(--azul);width:0;transition:width .3s;}
.qtext{font-size:19px;font-weight:500;line-height:1.4;margin:0 0 18px;}
.answers{display:flex;flex-direction:column;gap:10px;}
.ans{display:flex;gap:13px;align-items:flex-start;border:1.5px solid var(--gris03);
 background:#fff;border-radius:13px;padding:14px 16px;cursor:pointer;transition:all .12s;
 font-size:15.5px;text-align:left;font-family:inherit;color:var(--negro02);width:100%;}
.ans:hover{border-color:var(--azul);background:var(--azul02);}
.ans .lt{flex:0 0 26px;height:26px;border-radius:7px;background:var(--gris02);border:1px solid var(--gris03);
 display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--gris05);}
.ans.sel{border-color:var(--azul);background:var(--azul02);}
.ans.sel .lt{background:var(--azul);border-color:var(--azul);color:#fff;}
.ans.correct{border-color:var(--ok);background:var(--okbg);}
.ans.correct .lt{background:var(--ok);border-color:var(--ok);color:#fff;}
.ans.wrong{border-color:var(--bad);background:var(--badbg);}
.ans.wrong .lt{background:var(--bad);border-color:var(--bad);color:#fff;}
.ans.lock{cursor:default;}
.fb{margin-top:16px;border-radius:12px;padding:13px 16px;font-size:14.5px;background:var(--azul02);
 border-left:3px solid var(--azul);}
.fb .lbl{font-weight:700;display:block;margin-bottom:3px;font-size:12px;letter-spacing:.6px;
 text-transform:uppercase;color:var(--azul);}
.navrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:22px;
 padding-top:18px;border-top:1px solid var(--gris);}
.navrow .left{display:flex;gap:10px;}
.flagbtn{border:1.5px solid var(--gris03);background:#fff;border-radius:10px;padding:11px 15px;
 font-family:inherit;font-weight:500;font-size:14px;cursor:pointer;color:var(--gris05);}
.flagbtn.on{border-color:var(--azul);color:var(--azul);background:var(--azul02);}

/* palette */
.palette{margin-top:22px;}
.palette h3{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--gris05);
 margin:0 0 10px;font-weight:700;}
.pgrid{display:flex;flex-wrap:wrap;gap:7px;}
.pcell{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--gris03);background:#fff;
 font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;color:var(--gris05);
 display:flex;align-items:center;justify-content:center;position:relative;}
.pcell.ans{background:var(--negro02);border-color:var(--negro02);color:#fff;}
.pcell.cur{outline:2px solid var(--azul);outline-offset:1px;}
.pcell.flag::after{content:'';position:absolute;top:-3px;right:-3px;width:9px;height:9px;
 border-radius:50%;background:var(--azul);}

/* results */
.scorehead{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.scorebig{font-size:58px;font-weight:700;letter-spacing:-2px;line-height:1;}
.scorebig.ok{color:var(--ok);} .scorebig.mid{color:var(--azul);} .scorebig.low{color:var(--bad);}
.scoremeta{font-size:15px;color:var(--gris05);}
.scoremeta b{color:var(--negro02);font-weight:700;}
.statgrid{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
.stat{flex:1;min-width:120px;background:var(--gris02);border:1px solid var(--gris);border-radius:13px;padding:14px 16px;}
.stat .n{font-size:24px;font-weight:700;} .stat .l{font-size:12.5px;color:var(--gris05);}
.rev-filter{display:flex;gap:8px;margin:26px 0 14px;align-items:center;}
.review .ritem{border:1px solid var(--gris);border-radius:14px;padding:18px;margin-bottom:14px;background:#fff;}
.ritem .rq{font-weight:500;font-size:16px;margin:0 0 12px;}
.ritem .rq .tag{display:inline-block;font-size:11px;font-weight:700;color:#fff;background:var(--gris04);
 border-radius:6px;padding:1px 7px;margin-right:8px;vertical-align:middle;letter-spacing:.4px;}
.ritem .rq .tag.bad{background:var(--bad);} .ritem .rq .tag.ok{background:var(--ok);}
.ropt{border-radius:10px;padding:9px 13px;font-size:14.5px;margin-bottom:7px;border:1.5px solid var(--gris03);}
.ropt.correct{border-color:var(--ok);background:var(--okbg);} 
.ropt.chosenwrong{border-color:var(--bad);background:var(--badbg);}
.ropt .mk{font-weight:700;font-size:11px;letter-spacing:.4px;text-transform:uppercase;margin-left:8px;}
.ropt.correct .mk{color:var(--ok);} .ropt.chosenwrong .mk{color:var(--bad);}
.rjust{margin-top:10px;background:var(--azul02);border-left:3px solid var(--azul);border-radius:10px;
 padding:11px 14px;font-size:14px;}
.rjust .lbl{font-weight:700;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--azul);display:block;margin-bottom:3px;}
.foot{text-align:center;color:var(--gris04);font-size:12px;margin-top:30px;}
@media(max-width:560px){.scorebig{font-size:46px;}.wrap{padding:18px 12px 70px;}.card{padding:18px;}}

/* nav + dashboard */
.nav{display:flex;gap:6px;}
.tab{background:transparent;border:1px solid #2c2c33;color:#c9c9cf;border-radius:9px;padding:8px 15px;
 font-family:inherit;font-weight:500;font-size:13.5px;cursor:pointer;transition:all .12s;}
.tab:hover{border-color:#5a5a64;color:#fff;}
.tab.on{background:#fff;color:var(--negro);border-color:#fff;font-weight:700;}
.section-title{font-weight:700;font-size:17px;margin:28px 0 6px;letter-spacing:-.2px;}
.namebar{display:flex;gap:10px;align-items:center;margin:10px 0 4px;}
.namebar input{font-family:inherit;font-size:14px;padding:10px 13px;border:1.5px solid var(--gris03);
 border-radius:10px;flex:1;max-width:280px;color:var(--negro02);}
.chart-wrap{background:var(--gris02);border:1px solid var(--gris);border-radius:14px;padding:16px 14px;margin-top:6px;}
.trend{font-weight:700;} .trend.up{color:var(--ok);} .trend.down{color:var(--bad);} .trend.flat{color:var(--gris05);}
.cov-head{display:flex;align-items:center;gap:12px;font-size:11px;letter-spacing:.5px;text-transform:uppercase;
 color:var(--gris04);font-weight:700;padding:4px 0 8px;border-bottom:1px solid var(--gris);}
.cov-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--gris);}
.cov-row:last-child{border-bottom:none;}
.cov-name{flex:1;font-size:14px;font-weight:500;min-width:0;}
.cov-name .sn{color:var(--gris04);font-weight:700;margin-right:7px;}
.cov-bar{flex:0 0 110px;height:8px;background:var(--gris);border-radius:99px;overflow:hidden;}
.cov-bar>i{display:block;height:100%;background:var(--azul);border-radius:99px;}
.cov-seen{flex:0 0 56px;text-align:right;font-size:12px;color:var(--gris05);font-variant-numeric:tabular-nums;}
.badge{flex:0 0 54px;text-align:center;font-size:12.5px;font-weight:700;border-radius:7px;padding:4px 0;}
.badge.ok{background:var(--okbg);color:var(--ok);} .badge.mid{background:var(--azul02);color:var(--azul);}
.badge.low{background:var(--badbg);color:var(--bad);} .badge.none{background:var(--gris02);color:var(--gris04);}
.cov-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--gris05);margin:10px 0 0;}
.dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle;}
@media(max-width:560px){.cov-head{display:none;}.cov-bar{flex-basis:70px;}.cov-seen{flex-basis:46px;}}
.acct{color:#c9c9cf;font-size:13px;margin-left:14px;display:inline-flex;align-items:center;gap:8px;}
.acct b{color:#fff;font-weight:600;}
.acct button{background:transparent;border:1px solid #2c2c33;color:#c9c9cf;border-radius:8px;padding:5px 10px;font-family:inherit;font-size:12.5px;cursor:pointer;}
.login-card{max-width:380px;margin:6vh auto 0;}
.login-card input{width:100%;font-family:inherit;font-size:15px;padding:12px 14px;border:1.5px solid #DEDEE0;border-radius:11px;margin-top:10px;color:#1D1D20;}
.err{color:#C8453B;font-size:13.5px;margin-top:10px;}

<body>
<div class="topbar">
  <div class="brand"><b>GBM</b> <span>Advisory</span><span class="sep">·</span><span class="app">App de estudio</span></div>
  <div style="display:flex;align-items:center"><div class="nav"><button class="tab on" id="tab-prac">Practicar</button><button class="tab" id="tab-cert">Certificación</button><button class="tab" id="tab-dash">Mi progreso</button></div><span class="acct" id="acct"></span></div>
</div>

<script>
const QUESTIONS = [{"id": 1, "sec": 1, "secTitle": "Advisory", "q": "¿Qué significa que GBM Advisory sea asesoría personalizada?", "opts": [{"text": "Asignación automática por edad", "correct": false}, {"text": "Planificación financiera y de ahorros", "correct": true}, {"text": "Exclusivo para clientes patrimoniales", "correct": false}, {"text": "Recomendaciones iguales para todos", "correct": false}], "just": "Advisory personaliza la estrategia al plan de vida y a los objetivos de cada cliente; no aplica recetas iguales para todos ni se limita a un segmento patrimonial. Su esencia es la planeación financiera y de ahorro adaptada a la situación particular de la persona."}, {"id": 2, "sec": 1, "secTitle": "Advisory", "q": "¿Qué rol cumple el coaching conductual en Advisory?", "opts": [{"text": "Seleccionar acciones de moda", "correct": false}, {"text": "Sustituir al análisis de datos", "correct": false}, {"text": "Reducir comisiones", "correct": false}, {"text": "Dar certeza al cliente frente a la incertidumbre del mercado", "correct": true}], "just": "El coaching conductual ayuda al cliente a sostener su plan y a evitar decisiones emocionales en momentos de volatilidad, dándole certeza frente a la incertidumbre del mercado. Es una de las mayores fuentes de valor del asesor (Advisor&#x27;s Alpha), no un sustituto del análisis de datos."}, {"id": 3, "sec": 1, "secTitle": "Advisory", "q": "¿Cuál es el primer paso de la metodología Invierte con Propósito?", "opts": [{"text": "Comprar CETES", "correct": false}, {"text": "Abrir cuenta de trading", "correct": false}, {"text": "Seleccionar un fondo internacional", "correct": false}, {"text": "Tener un plan financiero claro", "correct": true}], "just": "La metodología &#x27;Invierte con Propósito&#x27; parte de definir objetivos y un plan financiero claro antes de elegir cualquier instrumento. Sin un plan que dé rumbo, las decisiones de inversión se vuelven reactivas y desordenadas."}, {"id": 4, "sec": 1, "secTitle": "Advisory", "q": "¿Qué representa el Portafolio 1 en Invierte con Propósito?", "opts": [{"text": "Acciones", "correct": false}, {"text": "Necesidades inmediatas", "correct": true}, {"text": "Emergencia", "correct": false}, {"text": "Objetivos específicos", "correct": false}], "just": "El Portafolio 1 cubre las necesidades inmediatas o de corto plazo, es decir, la liquidez para el día a día. Es la base de la pirámide, previa a los cajones de emergencia, objetivos y crecimiento."}, {"id": 5, "sec": 1, "secTitle": "Advisory", "q": "¿Qué portafolio debe cubrir al menos 3–6 meses de gastos básicos?", "opts": [{"text": "Inmediatas", "correct": false}, {"text": "Acciones", "correct": false}, {"text": "Fondo de emergencia", "correct": true}, {"text": "Diversificación global", "correct": false}], "just": "El fondo de emergencia debe cubrir de 3 a 6 meses de gastos básicos en instrumentos líquidos y seguros. Su función es proteger al cliente ante imprevistos sin obligarlo a liquidar inversiones de largo plazo en un mal momento."}, {"id": 6, "sec": 1, "secTitle": "Advisory", "q": "¿Cuál es el horizonte mínimo recomendado para el portafolio de diversificación global?", "opts": [{"text": "10 años", "correct": false}, {"text": "5 años", "correct": true}, {"text": "3 años", "correct": false}, {"text": "1 año", "correct": false}], "just": "La diversificación global en renta variable requiere un horizonte mínimo de alrededor de 5 años para absorber la volatilidad de corto plazo y capturar la prima de las acciones. Plazos menores exponen al cliente a tener que vender en una caída."}, {"id": 7, "sec": 1, "secTitle": "Advisory", "q": "Un cliente quiere ahorrar para la universidad de su hijo en 15 años. ¿Qué portafolio usar?", "opts": [{"text": "Emergencia", "correct": false}, {"text": "Inmediatas", "correct": false}, {"text": "Acciones", "correct": false}, {"text": "Objetivos específicos", "correct": true}], "just": "Una meta a 15 años, como la universidad de un hijo, corresponde al portafolio de objetivos específicos, con horizonte y asignación acordes a esa meta concreta. No es ni el fondo de emergencia ni el de necesidades inmediatas."}, {"id": 8, "sec": 1, "secTitle": "Advisory", "q": "¿Qué significa la metodología &quot;págate a ti primero&quot;?", "opts": [{"text": "Gastar primero y ahorrar lo que sobra", "correct": false}, {"text": "Comprar productos financieros de moda", "correct": false}, {"text": "Ninguna de las anteriores", "correct": false}, {"text": "Ahorrar e invertir antes de gastar", "correct": true}], "just": "&#x27;Págate a ti primero&#x27; significa apartar el ahorro y la inversión al recibir el ingreso, antes de gastar. Convierte el ahorro en un hábito automático en lugar de dejarlo como un residuo incierto al final del mes."}, {"id": 9, "sec": 1, "secTitle": "Advisory", "q": "¿Cuál es la ventaja del interés compuesto al invertir?", "opts": [{"text": "Elimina comisiones", "correct": false}, {"text": "Todas las anteriores", "correct": false}, {"text": "El poder ganar interés sobre el interés", "correct": true}, {"text": "Reduce el riesgo", "correct": false}], "just": "El interés compuesto reinvierte los rendimientos, generando rendimientos sobre los rendimientos ya acumulados. Con el tiempo, este efecto acelera de forma exponencial el crecimiento del capital, premiando al inversionista paciente."}, {"id": 10, "sec": 1, "secTitle": "Advisory", "q": "¿Cuánto valor puede añadir un asesor financiero por año según estudios de Vanguard y Russell?", "opts": [{"text": "5%", "correct": false}, {"text": "3%", "correct": true}, {"text": "2%", "correct": false}, {"text": "1%", "correct": false}], "just": "Estudios de Vanguard (Advisor&#x27;s Alpha) y Russell estiman que un asesor puede añadir alrededor de 3% anual, principalmente a través del coaching conductual, el rebalanceo, la gestión de costos y la eficiencia fiscal. Es valor neto potencial, no una garantía de rendimiento."}, {"id": 11, "sec": 1, "secTitle": "Advisory", "q": "¿Qué frase de Warren Buffett se asocia a la paciencia en inversión?", "opts": [{"text": "&quot;El precio es lo que pagas, el valor es lo que obtienes&quot;", "correct": false}, {"text": "&quot;El mercado transfiere dinero de los impacientes a los pacientes&quot;", "correct": true}, {"text": "&quot;Compra barato, vende caro&quot;", "correct": false}, {"text": "Ninguna de las anteriores", "correct": false}], "just": "La frase &#x27;el mercado transfiere dinero de los impacientes a los pacientes&#x27; resume que la disciplina y la paciencia son recompensadas en la inversión de largo plazo. Refuerza el papel del asesor como coach conductual del cliente."}, {"id": 12, "sec": 1, "secTitle": "Advisory", "q": "¿Qué significa riesgo sistemático?", "opts": [{"text": "Riesgo diversificable de una empresa", "correct": false}, {"text": "Riesgo de tipo de cambio", "correct": false}, {"text": "Riesgo asociado al mercado completo que no se elimina diversificando", "correct": true}, {"text": "Riesgo de gestión activa", "correct": false}], "just": "El riesgo sistemático afecta a todo el mercado (tasas, recesiones, geopolítica) y no se puede eliminar diversificando. Es precisamente el riesgo por el que el inversionista recibe una prima de rendimiento."}, {"id": 13, "sec": 1, "secTitle": "Advisory", "q": "¿Qué significa riesgo idiosincrático?", "opts": [{"text": "Riesgo específico de una empresa o sector que sí puede diversificarse", "correct": true}, {"text": "Riesgo de todo el mercado", "correct": false}, {"text": "Riesgo de inflación", "correct": false}, {"text": "Riesgo de liquidez", "correct": false}], "just": "El riesgo idiosincrático es propio de una empresa o sector y sí se reduce mediante la diversificación. Por eso el mercado no paga una prima por asumirlo de forma concentrada: es un riesgo evitable."}, {"id": 14, "sec": 1, "secTitle": "Advisory", "q": "¿Qué postula la Hipótesis de los Mercados Eficientes (EMH)?", "opts": [{"text": "Que las acciones siempre suben a largo plazo", "correct": false}, {"text": "El mercado nunca refleja la realidad", "correct": false}, {"text": "Siempre se puede vencer al mercado con análisis técnico", "correct": false}, {"text": "Los precios reflejan toda la información disponible, por lo que batir al mercado es muy difícil", "correct": true}], "just": "La Hipótesis de los Mercados Eficientes sostiene que los precios reflejan toda la información disponible, lo que hace muy difícil batir al mercado de forma consistente. Es el fundamento teórico de la inversión indexada y de bajo costo."}, {"id": 15, "sec": 1, "secTitle": "Advisory", "q": "¿Por qué ganarle al mercado es un juego de suma cero?", "opts": [{"text": "Porque todos ganan lo mismo", "correct": false}, {"text": "Porque nadie gana nunca", "correct": false}, {"text": "Todas las anteriores", "correct": false}, {"text": "Porque por cada inversionista que gana más, otro gana menos", "correct": true}], "just": "Antes de costos, el conjunto de inversionistas activos no puede superar al mercado: por cada uno que gana de más, otro gana de menos. Tras descontar comisiones, el agregado queda por debajo del mercado (ver Fama-French 2010, Sección 18)."}, {"id": 16, "sec": 1, "secTitle": "Advisory", "q": "¿Cuál es la diferencia clave entre inversión activa y pasiva?", "opts": [{"text": "La pasiva es más cara", "correct": false}, {"text": "La activa no tiene riesgo", "correct": false}, {"text": "La activa busca superar al mercado; la pasiva lo replica", "correct": true}, {"text": "La pasiva garantiza rendimientos", "correct": false}], "just": "La gestión activa intenta superar al mercado seleccionando valores, mientras que la pasiva simplemente lo replica a bajo costo. La evidencia muestra que superar al mercado de forma consistente y neta de comisiones es muy difícil."}, {"id": 17, "sec": 1, "secTitle": "Advisory", "q": "¿Qué impacto tienen los fees en la inversión a largo plazo?", "opts": [{"text": "Solo afectan en corto plazo", "correct": false}, {"text": "Se compensan con dividendos", "correct": false}, {"text": "Reducen el rendimiento neto acumulado", "correct": true}, {"text": "Son irrelevantes", "correct": false}], "just": "Las comisiones se restan año con año y, por el efecto del interés compuesto, su impacto se magnifica en el largo plazo. Minimizar costos es una de las palancas más directas y confiables del rendimiento neto (Advisor&#x27;s Alpha)."}, {"id": 18, "sec": 1, "secTitle": "Advisory", "q": "¿Qué significa que un SMA esté etiquetado como SMA_ICP?", "opts": [{"text": "Que es para traders", "correct": false}, {"text": "Que invierte solo en acciones mexicanas", "correct": false}, {"text": "Que es un fondo abierto", "correct": false}, {"text": "Que es exclusivo de Advisory y vinculado a un plan financiero", "correct": true}], "just": "La etiqueta ICP indica que el SMA es exclusivo de Advisory y está vinculado al plan financiero (Inversión con Propósito) del cliente. No es un producto de trading abierto ni de libre acceso."}, {"id": 19, "sec": 1, "secTitle": "Advisory", "q": "¿Qué debe hacer Advisory si un cliente pide stock picks?", "opts": [{"text": "Negarse a atenderlo", "correct": false}, {"text": "Dirigir al cliente a un producto de Soluciones de Inversión", "correct": true}, {"text": "Recomendar Tesla", "correct": false}, {"text": "Ofrecer CETES", "correct": false}], "just": "Advisory no hace selección de acciones; si el cliente busca stock picks, se le canaliza al producto adecuado de Soluciones de Inversión (por ejemplo, Top Picks). Así se respeta la naturaleza de cada servicio."}, {"id": 20, "sec": 1, "secTitle": "Advisory", "q": "¿Cuál es la diferencia clave entre Advisory y Soluciones de Inversión?", "opts": [{"text": "Advisory vende ETFs; Soluciones vende fondos", "correct": false}, {"text": "Advisory ofrece planificación financiera y de ahorro; Soluciones ofrece productos", "correct": true}, {"text": "Advisory hace trading; Soluciones planea", "correct": false}, {"text": "Ninguna de las anteriores", "correct": false}], "just": "Advisory es el servicio de planeación financiera y de ahorro, mientras que Soluciones de Inversión distribuye los productos. Son complementarios: el plan financiero define qué productos conviene utilizar."}, {"id": 21, "sec": 1, "secTitle": "Advisory", "q": "¿Qué objetivo cumple la optimización en Advisory?", "opts": [{"text": "Elegir acciones de moda", "correct": false}, {"text": "Reducir costos de marketing", "correct": false}, {"text": "Comprar CETES automáticamente", "correct": false}, {"text": "Eficientizar asset allocation, divisas, impuestos y custodia", "correct": true}], "just": "La optimización en Advisory busca mejorar el resultado neto del cliente ajustando la asignación de activos, las divisas, la fiscalidad y la custodia. No se trata de elegir acciones de moda, sino de eficientar el portafolio integral."}, {"id": 22, "sec": 1, "secTitle": "Advisory", "q": "¿Cuál es la principal consecuencia de invertir sin un plan financiero?", "opts": [{"text": "Decisiones emocionales y peores resultados", "correct": true}, {"text": "Menores comisiones", "correct": false}, {"text": "Todas las anteriores", "correct": false}, {"text": "Mayores impuestos", "correct": false}], "just": "Sin un plan financiero, el inversionista tiende a reaccionar emocionalmente a la volatilidad, lo que suele destruir valor (el llamado behavior gap). El plan ancla la conducta y mejora los resultados de largo plazo."}, {"id": 23, "sec": 1, "secTitle": "Advisory", "q": "¿Cuál es el principal aporte de un asesor financiero al cliente?", "opts": [{"text": "Seleccionar siempre las inversiones más rentables", "correct": false}, {"text": "Reducir al mínimo los impuestos sin excepción", "correct": false}, {"text": "Acompañar al cliente con planeación, disciplina y coaching conductual", "correct": true}, {"text": "Garantizar que no habrá pérdidas en el portafolio", "correct": false}], "just": "El mayor aporte del asesor no es elegir las inversiones &#x27;más rentables&#x27; ni garantizar que no haya pérdidas, sino acompañar al cliente con planeación, disciplina y coaching conductual. Ahí reside la mayor parte de su valor agregado."}, {"id": 24, "sec": 1, "secTitle": "Advisory", "q": "¿Qué beneficio tiene diversificar un portafolio de inversión?", "opts": [{"text": "Eliminar por completo el riesgo", "correct": false}, {"text": "Mejorar el potencial de rendimiento ajustado al riesgo", "correct": true}, {"text": "Garantizar rendimientos superiores al mercado", "correct": false}, {"text": "Evitar pagar comisiones", "correct": false}], "just": "La diversificación reduce el riesgo idiosincrático y mejora la relación rendimiento/riesgo, pero no elimina el riesgo sistemático ni garantiza ganarle al mercado. Es la única &#x27;comida gratis&#x27; ampliamente reconocida en finanzas."}, {"id": 25, "sec": 1, "secTitle": "Advisory", "q": "¿Qué enseñanza práctica transmite Advisory sobre paciencia?", "opts": [{"text": "Comprar y vender frecuentemente", "correct": false}, {"text": "Reducir aportaciones", "correct": false}, {"text": "Mantener estrategias a largo plazo pese a volatilidad", "correct": true}, {"text": "Evitar diversificación", "correct": false}], "just": "Advisory enseña a sostener el plan a través de los ciclos de mercado en lugar de operar por impulso. La paciencia es lo que permite capturar la prima de largo plazo y evitar el costo de un mal timing."}, {"id": 26, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "¿Cuál es la función principal de Soluciones de Inversión en GBM?", "opts": [{"text": "Organizar metas de vida", "correct": false}, {"text": "Ninguna de las anteriores", "correct": false}, {"text": "Hacer trading en acciones", "correct": false}, {"text": "Distribuir todos los productos de inversión de GBM", "correct": true}], "just": "Soluciones de Inversión es el área que distribuye todo el catálogo de productos de inversión de GBM (fondos, SMAs, etc.). Advisory, en cambio, se encarga de la planeación financiera del cliente."}, {"id": 27, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "Cliente trader que pide stock picks constantes: ¿qué producto le corresponde?", "opts": [{"text": "SMA_ICP Conservador", "correct": false}, {"text": "GMP", "correct": false}, {"text": "Fondos de deuda", "correct": false}, {"text": "Top Picks México o Global", "correct": true}], "just": "Un cliente que pide stock picks constantes encaja con Top Picks (ideas de acciones de los analistas de GBM), no con un SMA conservador ni con fondos de deuda. Es la vía adecuada para una necesidad activa de selección de acciones."}, {"id": 28, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "Un cliente busca deuda global en pesos con cobertura cambiaria a MXN. ¿Qué fondo cumple esto?", "opts": [{"text": "GBMCRE", "correct": false}, {"text": "GBMTRV", "correct": false}, {"text": "GBMDINT", "correct": true}, {"text": "GMP", "correct": false}], "just": "GBMDINT ofrece renta fija global con cobertura cambiaria a pesos, es decir, exposición a deuda internacional sin el riesgo del tipo de cambio. Además, tiene la ventaja fiscal de tributar como renta variable."}, {"id": 29, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "En GBMDOL, el inversionista acepta:", "opts": [{"text": "Riesgo de inflación en México", "correct": false}, {"text": "Riesgo de liquidez en CETES", "correct": false}, {"text": "Ninguna de las anteriores", "correct": false}, {"text": "Riesgo cambiario dólar–peso", "correct": true}], "just": "Al invertir en instrumentos denominados en dólares sin cobertura, el inversionista de GBMDOL asume el riesgo de que el tipo de cambio peso-dólar se mueva en su contra. Su resultado medido en pesos depende del USD/MXN."}, {"id": 30, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "El GBMUSD se distingue de GBMDOL porque:", "opts": [{"text": "Todas las anteriores", "correct": false}, {"text": "Invierte en deuda mexicana AAA", "correct": false}, {"text": "Se enfoca en bonos corporativos de mediano plazo en dólares", "correct": true}, {"text": "No tiene riesgo cambiario", "correct": false}], "just": "GBMUSD se distingue de GBMDOL por enfocarse en bonos corporativos de mediano plazo en dólares, con mayor duración y riesgo de crédito. Ambos están denominados en dólares, pero su perfil de riesgo difiere."}, {"id": 31, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "Caso práctico: cliente conservador quiere solo bonos del gobierno mexicano. ¿Qué fondo recomendarías?", "opts": [{"text": "GBMGUB", "correct": true}, {"text": "GBMNEAR", "correct": false}, {"text": "GBMINT", "correct": false}, {"text": "Smart Income", "correct": false}], "just": "Para un cliente que solo quiere deuda del gobierno mexicano, GBMGUB invierte 100% en instrumentos gubernamentales, lo que elimina el riesgo de crédito. Es la opción más conservadora del anaquel para ese mandato."}, {"id": 32, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "La diferencia entre GMP y GMP+ está en:", "opts": [{"text": "Todas las anteriores", "correct": false}, {"text": "El plazo mínimo de inversión", "correct": false}, {"text": "La proporción de bonos y acciones globales", "correct": true}, {"text": "Que GMP invierte solo en México", "correct": false}], "just": "GMP y GMP+ se diferencian en la proporción de bonos y acciones globales que mantienen (GMP+ con mayor peso en renta variable). Esto permite escalar el nivel de riesgo según el perfil del cliente."}, {"id": 33, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "Si un cliente busca mezcla 70% bonos / 30% acciones globales, ¿qué fondo aplicar?", "opts": [{"text": "GBMALFA", "correct": false}, {"text": "GMP", "correct": true}, {"text": "GMP+", "correct": false}, {"text": "GBMUSD", "correct": false}], "just": "Una mezcla aproximada de 70% bonos y 30% acciones globales corresponde al perfil más balanceado-conservador (GMP) frente a GMP+, que lleva más acciones. La proporción entre clases define el nivel de riesgo del fondo."}, {"id": 34, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "¿Qué estrategia sigue GBMINT?", "opts": [{"text": "Nearshoring", "correct": false}, {"text": "Replicar el IPC", "correct": false}, {"text": "Superar al S&amp;P 500 invirtiendo en empresas de alto crecimiento en EUA", "correct": true}, {"text": "Invertir en deuda internacional en pesos", "correct": false}], "just": "GBMINT busca superar al S&amp;P 500 invirtiendo en empresas estadounidenses de alto crecimiento. Es una estrategia activa de renta variable, no un fondo de deuda."}, {"id": 35, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "El fondo GBMTRV se centra en:", "opts": [{"text": "Liquidez en dólares", "correct": false}, {"text": "Todas las anteriores", "correct": false}, {"text": "Acciones globales con momentum positivo", "correct": true}, {"text": "Deuda mexicana de corto plazo", "correct": false}], "just": "GBMTRV se centra en acciones globales con momentum positivo (tendencia de precios al alza). Aplica en la práctica el factor momentum revisado en la Sección 13."}, {"id": 36, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "GBMAAA (Global Thematic) invierte en:", "opts": [{"text": "Seis mega tendencias globales", "correct": true}, {"text": "Bonos AAA mexicanos", "correct": false}, {"text": "Nearshoring", "correct": false}, {"text": "CETES", "correct": false}], "just": "GBMAAA (Global Thematic) invierte en torno a seis megatendencias globales, no en bonos AAA. Es renta variable temática, con mayor concentración y volatilidad que un fondo de mercado amplio."}, {"id": 37, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "¿Qué busca GBMALFA?", "opts": [{"text": "Todas las anteriores", "correct": false}, {"text": "Replicar al Nasdaq", "correct": false}, {"text": "Ser renta fija", "correct": false}, {"text": "Superar al IPC con mejores ideas de inversión en México", "correct": true}], "just": "GBMALFA busca generar alfa superando al IPC mediante la selección activa de las mejores ideas de inversión en México. Es una estrategia activa de renta variable local."}, {"id": 38, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "El fondo más asociado al fenómeno de nearshoring en México es:", "opts": [{"text": "GBMNEAR", "correct": true}, {"text": "GBMUSD", "correct": false}, {"text": "GBMGUB", "correct": false}, {"text": "Ninguna de las anteriores", "correct": false}], "just": "GBMNEAR es el fondo asociado a la tesis de nearshoring en México, es decir, a las empresas beneficiadas por la relocalización de cadenas productivas. Conecta con las FIBRAs industriales vistas en la Sección 11."}, {"id": 39, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "¿Qué NO corresponde a un fondo de renta fija como GBMDINT o GBMGUB?", "opts": [{"text": "Cobertura cambiaria", "correct": false}, {"text": "Apalancamiento en acciones de EUA", "correct": true}, {"text": "Baja volatilidad", "correct": false}, {"text": "Horizonte 1 año", "correct": false}], "just": "Un fondo de renta fija como GBMDINT o GBMGUB se caracteriza por baja volatilidad, posible cobertura cambiaria y horizontes acotados; el apalancamiento en acciones de EUA NO le corresponde, pues sería propio de una estrategia de renta variable."}, {"id": 40, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "¿Qué SMA ofrece bonos globales de corto plazo con cobertura a MXN?", "opts": [{"text": "Peso-Hedged Corto Plazo", "correct": true}, {"text": "Opportunistic US Equities", "correct": false}, {"text": "Global Equity Factor", "correct": false}, {"text": "Ninguna de las anteriores", "correct": false}], "just": "El SMA International Peso-Hedged de Corto Plazo ofrece bonos globales de corto plazo con cobertura a pesos. Su mecánica financiera (paridad de tasas de interés cubierta) se detalla a profundidad en la Sección 27."}, {"id": 41, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "La diferencia entre Peso-Hedged Corto Plazo y Peso-Hedged Mediano Plazo es:", "opts": [{"text": "No hay diferencia", "correct": false}, {"text": "La duración de los bonos", "correct": true}, {"text": "El primero es en euros", "correct": false}, {"text": "El primero es renta variable", "correct": false}], "just": "Peso-Hedged Corto Plazo y Mediano Plazo se diferencian por la duración de los bonos subyacentes y, por tanto, por su riesgo de tasa y su rendimiento. El de mediano plazo añade más duración y algo de deuda corporativa."}, {"id": 42, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "¿Qué SMA replica todos los activos del mundo según su tamaño?", "opts": [{"text": "Top Picks Global", "correct": false}, {"text": "Target Income", "correct": false}, {"text": "Global Market Portfolio", "correct": true}, {"text": "Smart Income", "correct": false}], "just": "El SMA Global Market Portfolio replica el portafolio de mercado mundial ponderado por el tamaño (capitalización) de cada activo. Es la materialización práctica de la idea de &#x27;comprar el mercado&#x27; completo."}, {"id": 43, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "¿Qué caracteriza al SMA Opportunistic US Equities?", "opts": [{"text": "Uso de apalancamiento variable en acciones de EUA", "correct": true}, {"text": "Exclusivo de deuda mexicana", "correct": false}, {"text": "Replicar el IPC", "correct": false}, {"text": "Liquidez diaria", "correct": false}], "just": "Opportunistic US Equities emplea apalancamiento variable sobre renta variable estadounidense (enhanced beta), en línea con el factor de baja volatilidad/BAB de la Sección 13. No es un fondo de deuda mexicana ni replica el IPC."}, {"id": 44, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "El SMA adecuado para empresas globales con momentum en precios es:", "opts": [{"text": "Target Income", "correct": false}, {"text": "Smart Income", "correct": false}, {"text": "Global Equity Factor", "correct": true}, {"text": "Peso-Hedged CP", "correct": false}], "just": "Para empresas globales con momentum en precios, el SMA Global Equity Factor aplica factores de inversión (incluido el momentum) a un universo de acciones globales. Es la estrategia factorial del anaquel."}, {"id": 45, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "Cliente con 5M MXN líquidos busca deuda local superior a CETES 28 días. ¿Qué SMA recomendar?", "opts": [{"text": "Top Picks México", "correct": false}, {"text": "Smart Income", "correct": true}, {"text": "Peso-Hedged CP", "correct": false}, {"text": "Opportunistic US Equities", "correct": false}], "just": "Para deuda local con rendimiento superior a los CETES a 28 días, Smart Income es el SMA indicado, pues gestiona deuda local buscando batir a los CETES. No es renta variable ni una estrategia con cobertura cambiaria."}, {"id": 46, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "Target Income se caracteriza por:", "opts": [{"text": "Exposición solo a deuda mexicana", "correct": false}, {"text": "Acciones temáticas", "correct": false}, {"text": "Portafolio 50% acciones globales y 50% bonos gubernamentales, con pagos periódicos superiores a CETES", "correct": true}, {"text": "Todas las anteriores", "correct": false}], "just": "Target Income combina aproximadamente 50% acciones globales y 50% bonos gubernamentales, distribuyendo pagos periódicos por encima de los CETES. Está diseñado para generar un ingreso recurrente para el cliente."}, {"id": 47, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "Diferencia entre Top Picks México y Top Picks Global:", "opts": [{"text": "Top Picks México invierte en acciones globales; Top Picks Global en bonos", "correct": false}, {"text": "Top Picks México invierte en acciones mexicanas; Top Picks Global en acciones globales", "correct": true}, {"text": "Top Picks México mezcla acciones y bonos; Top Picks Global solo acciones", "correct": false}, {"text": "Ninguna de las anteriores", "correct": false}], "just": "La diferencia clave es el universo de inversión: Top Picks México invierte en acciones mexicanas y Top Picks Global en acciones globales. Ambos son carteras de las mejores ideas de acciones de los analistas de GBM."}, {"id": 48, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "Cliente quiere ideas globales de analistas GBM. ¿Qué SMA elegir?", "opts": [{"text": "Peso-Hedged MP", "correct": false}, {"text": "Smart Income", "correct": false}, {"text": "Top Picks Global", "correct": true}, {"text": "Opportunistic US Equities", "correct": false}], "just": "Para obtener ideas globales de los analistas de GBM, el SMA adecuado es Top Picks Global. Top Picks México se limitaría a acciones locales, sin la exposición internacional que el cliente busca."}, {"id": 49, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "¿Qué producto tiene el arancel más alto para persona física excluyendo SMA&#x27;s ICP?", "opts": [{"text": "Smart Income", "correct": false}, {"text": "GBMDINT", "correct": true}, {"text": "GBMF2", "correct": false}, {"text": "GBMGUB", "correct": false}], "just": "Entre las opciones señaladas (excluyendo los SMAs ICP), GBMDINT tiene el arancel más alto, acorde con su gestión de renta fija global con cobertura cambiaria. Conviene siempre ponderar el costo frente al valor agregado del producto."}, {"id": 50, "sec": 2, "secTitle": "Soluciones de Inversión", "q": "Producto ideal para exposición a Crypto:", "opts": [{"text": "IBIT", "correct": false}, {"text": "Blockchain SMA", "correct": true}, {"text": "Top Picks Global", "correct": false}, {"text": "A y B", "correct": false}], "just": "Dentro de Advisory, el Blockchain SMA es el vehículo gestionado adecuado para dar exposición a cripto (IBIT es un ETF que se accede vía Soluciones/Trading, no un SMA de Advisory). Conecta con los cripto-ETFs de la Sección 12."}, {"id": 51, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "La frontera eficiente se define como:", "opts": [{"text": "Todos los portafolios posibles que pueden formarse con activos riesgosos", "correct": false}, {"text": "Los portafolios con la menor correlación promedio entre sus activos", "correct": false}, {"text": "El conjunto de portafolios que ofrecen el máximo rendimiento esperado para cada nivel de riesgo (y el mínimo riesgo para cada nivel de rendimiento)", "correct": true}, {"text": "Los portafolios que maximizan el rendimiento esperado sin considerar el riesgo", "correct": false}], "just": "La frontera eficiente es el subconjunto <em>dominante</em> del conjunto factible. Cualquier portafolio por debajo de ella está dominado: existe otro con mayor rendimiento al mismo riesgo, o con menor riesgo al mismo rendimiento."}, {"id": 52, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "Un portafolio invierte 60% en el activo A (σ = 20%) y 40% en B (σ = 10%), con correlación ρ = 0.30. La desviación estándar del portafolio es aproximadamente:", "opts": [{"text": "16.0%", "correct": false}, {"text": "13.7%", "correct": true}, {"text": "12.6%", "correct": false}, {"text": "10.0%", "correct": false}], "just": "σ<sup>2</sup>p = (0.6<sup>2</sup>)(0.20<sup>2</sup>) + (0.4<sup>2</sup>)(0.10<sup>2</sup>) + 2(0.6)(0.4)(0.30)(0.20)(0.10) = 0.0144 + 0.0016 + 0.00288 = 0.01888 → σp ≈ 13.7%. El resultado es menor que el promedio ponderado de las volatilidades (16%) gracias al beneficio de diversificación, porque ρ &lt; 1."}, {"id": 53, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "En el marco de Markowitz, el principal motor de la reducción de riesgo de un portafolio es:", "opts": [{"text": "El número de activos, exclusivamente", "correct": false}, {"text": "La covarianza (correlación) entre los activos, no su riesgo individual", "correct": true}, {"text": "El rendimiento esperado de cada activo", "correct": false}, {"text": "Eliminar los activos con beta más alta", "correct": false}], "just": "Al crecer el número de activos, los términos de covarianza dominan la varianza del portafolio. Combinar activos con correlación baja o negativa reduce el riesgo total más que simplemente sumar posiciones."}, {"id": 54, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "El portafolio de mínima varianza global (GMVP) es:", "opts": [{"text": "El portafolio con el mayor índice de Sharpe", "correct": false}, {"text": "El portafolio de la frontera con el menor riesgo posible entre todas las combinaciones de activos riesgosos", "correct": true}, {"text": "El portafolio invertido 100% en el activo de menor varianza individual", "correct": false}, {"text": "El portafolio tangente a la Línea del Mercado de Capitales", "correct": false}], "just": "El GMVP es el punto más a la izquierda de la frontera. No coincide necesariamente con el activo de menor varianza individual, porque los efectos de covarianza pueden reducir el riesgo por debajo del de cualquier activo aislado."}, {"id": 55, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "Al incorporar un activo libre de riesgo, el inversionista óptimo combina:", "opts": [{"text": "Únicamente activos riesgosos sobre la frontera", "correct": false}, {"text": "El activo libre de riesgo con el portafolio de mínima varianza global", "correct": false}, {"text": "El activo libre de riesgo con el portafolio tangente (de mayor Sharpe), formando la Línea del Mercado de Capitales (CML)", "correct": true}, {"text": "Los activos en proporción directa a su beta", "correct": false}], "just": "Teorema de separación de dos fondos (Tobin): todos los inversionistas mantienen el mismo portafolio riesgoso óptimo —el tangente— y ajustan su nivel de riesgo prestando o pidiendo prestado a la tasa libre de riesgo."}, {"id": 56, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "A medida que se añaden activos a un portafolio bien diversificado:", "opts": [{"text": "El riesgo total tiende a cero", "correct": false}, {"text": "El riesgo no sistemático tiende a desaparecer, pero permanece un piso de riesgo sistemático", "correct": true}, {"text": "El riesgo sistemático se elimina antes que el idiosincrático", "correct": false}, {"text": "El beta del portafolio tiende a cero", "correct": false}], "just": "La diversificación elimina el riesgo idiosincrático, pero el riesgo de mercado (sistemático) no es diversificable y constituye el límite inferior de la varianza del portafolio."}, {"id": 57, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "Con Rf = 4%, rendimiento esperado del mercado E(Rm) = 10% y β = 1.3, el rendimiento esperado del activo según el CAPM es:", "opts": [{"text": "13.0%", "correct": false}, {"text": "11.8%", "correct": true}, {"text": "14.0%", "correct": false}, {"text": "10.6%", "correct": false}], "just": "E(R) = Rf + β·[E(Rm) − Rf] = 4% + 1.3·(10% − 4%) = 4% + 7.8% = 11.8%."}, {"id": 58, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "Un activo con β = 0 tiene, según el CAPM:", "opts": [{"text": "Un rendimiento esperado de cero", "correct": false}, {"text": "Un rendimiento esperado igual a la tasa libre de riesgo", "correct": true}, {"text": "Riesgo total nulo", "correct": false}, {"text": "Una posición sobre la frontera eficiente", "correct": false}], "just": "E(R) = Rf + 0·(prima de mercado) = Rf. Un beta de cero implica nula correlación con el mercado, pero el activo puede tener riesgo idiosincrático: su riesgo total no es necesariamente cero."}, {"id": 59, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "La diferencia clave entre la Línea del Mercado de Capitales (CML) y la Línea del Mercado de Valores (SML) es:", "opts": [{"text": "Son equivalentes y se usan indistintamente", "correct": false}, {"text": "La CML mide riesgo con la desviación estándar (riesgo total) y solo aplica a portafolios eficientes; la SML mide riesgo con beta (riesgo sistemático) y aplica a cualquier activo o portafolio", "correct": true}, {"text": "La SML usa la desviación estándar y la CML usa beta", "correct": false}, {"text": "La CML aplica a activos individuales y la SML a portafolios", "correct": false}], "just": "El eje horizontal de la CML es σ (riesgo total); el de la SML es β (riesgo sistemático). Por eso la SML permite valuar activos individuales aunque no sean eficientes."}, {"id": 60, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "¿Cuál NO es un supuesto del CAPM?", "opts": [{"text": "Los inversionistas son adversos al riesgo y optimizan en términos de media-varianza", "correct": false}, {"text": "Existe una tasa libre de riesgo a la que se puede prestar y pedir prestado", "correct": false}, {"text": "Los inversionistas tienen expectativas homogéneas", "correct": false}, {"text": "Los inversionistas pueden batir consistentemente al mercado mediante análisis técnico", "correct": true}], "just": "El CAPM se construye sobre mercados eficientes y expectativas homogéneas. Batir al mercado de forma sistemática contradice directamente sus supuestos."}, {"id": 61, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "Un activo tiene un rendimiento requerido por CAPM de 11.8%, pero el análisis fundamental proyecta un rendimiento esperado de 13.5%. El activo está:", "opts": [{"text": "Sobrevaluado, con alfa negativo", "correct": false}, {"text": "Subvaluado, con alfa positivo (se ubica por encima de la SML)", "correct": true}, {"text": "Correctamente valuado", "correct": false}, {"text": "Sobre la Línea del Mercado de Capitales", "correct": false}], "just": "Alfa de Jensen = rendimiento esperado − rendimiento requerido = 13.5% − 11.8% = +1.7%. Un alfa positivo señala un activo atractivo/subvaluado, que gráficamente se ubica por encima de la SML."}, {"id": 62, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "La prima de riesgo de mercado se define como:", "opts": [{"text": "E(Rm) × β", "correct": false}, {"text": "E(Rm) − Rf", "correct": true}, {"text": "Rf − E(Rm)", "correct": false}, {"text": "β·[E(Rm) − Rf]", "correct": false}], "just": "Es el exceso de rendimiento esperado del mercado sobre la tasa libre de riesgo. La opción d) corresponde a la prima de riesgo del <em>activo</em>, no del mercado."}, {"id": 63, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "Un ejemplo de riesgo sistemático es:", "opts": [{"text": "La renuncia inesperada del director general de una empresa", "correct": false}, {"text": "Un retiro de producto por un defecto de fabricación", "correct": false}, {"text": "Un alza inesperada de las tasas de interés por parte del banco central", "correct": true}, {"text": "Una huelga en una planta específica de la compañía", "correct": false}], "just": "El riesgo sistemático afecta a todo el mercado (tasas, inflación, recesión, shocks geopolíticos) y no se diversifica. Los demás son eventos idiosincráticos, propios de una empresa."}, {"id": 64, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "El riesgo no sistemático (idiosincrático):", "opts": [{"text": "Se mide mediante beta", "correct": false}, {"text": "Es recompensado con una prima de riesgo en el CAPM", "correct": false}, {"text": "Es diversificable y, por lo tanto, el CAPM no lo recompensa", "correct": true}, {"text": "Es idéntico para todos los activos", "correct": false}], "just": "Como puede eliminarse mediante diversificación, el mercado no paga prima por asumirlo. Solo se recompensa el riesgo sistemático (no diversificable)."}, {"id": 65, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "El riesgo total de un activo se descompone en:", "opts": [{"text": "Riesgo de tasa de interés + riesgo cambiario", "correct": false}, {"text": "Riesgo sistemático + riesgo no sistemático", "correct": true}, {"text": "Beta + alfa", "correct": false}, {"text": "Varianza + covarianza", "correct": false}], "just": "σ<sup>2</sup>total = riesgo sistemático (β<sup>2</sup>·σ<sup>2</sup>m) + riesgo específico (varianza de los residuales). La diversificación reduce el segundo componente, no el primero."}, {"id": 66, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "En equilibrio CAPM, dos activos con el mismo beta pero distinto riesgo total tendrán:", "opts": [{"text": "Distinto rendimiento esperado", "correct": false}, {"text": "El mismo rendimiento esperado, porque solo el riesgo sistemático (beta) se recompensa", "correct": true}, {"text": "Mayor rendimiento esperado para el de mayor riesgo total", "correct": false}, {"text": "Un rendimiento esperado igual a la tasa libre de riesgo", "correct": false}], "just": "El CAPM solo premia el riesgo no diversificable. La diferencia en riesgo total proviene del componente idiosincrático, que el mercado no recompensa."}, {"id": 67, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "El modelo de tres factores de Fama-French (1993) añade al factor de mercado:", "opts": [{"text": "Momentum y calidad", "correct": false}, {"text": "Tamaño (SMB) y valor (HML)", "correct": true}, {"text": "Rentabilidad e inversión", "correct": false}, {"text": "Liquidez y volatilidad", "correct": false}], "just": "FF3: exceso de mercado (Rm − Rf) + SMB (<em>small minus big</em>, tamaño) + HML (<em>high minus low</em> book-to-market, valor)."}, {"id": 68, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "El factor SMB captura:", "opts": [{"text": "La prima por acciones de valor sobre las de crecimiento", "correct": false}, {"text": "La prima histórica de las empresas de baja capitalización sobre las de alta capitalización", "correct": true}, {"text": "La prima por momentum", "correct": false}, {"text": "El exceso de rendimiento del mercado sobre la tasa libre de riesgo", "correct": false}], "just": "SMB = <em>small minus big</em>: rendimiento de un portafolio de empresas pequeñas menos uno de empresas grandes. Recoge la prima de tamaño."}, {"id": 69, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "El factor HML representa el rendimiento de:", "opts": [{"text": "Acciones de alto momentum menos las de bajo momentum", "correct": false}, {"text": "Empresas grandes menos empresas pequeñas", "correct": false}, {"text": "Empresas de alto valor en libros/precio (<em>value</em>) menos las de bajo (<em>growth</em>)", "correct": true}, {"text": "Bonos de largo plazo menos bonos de corto plazo", "correct": false}], "just": "HML = <em>high minus low</em> book-to-market. Un B/M alto identifica acciones de valor; el factor captura la prima histórica de <em>value</em> sobre <em>growth</em>."}, {"id": 70, "sec": 3, "secTitle": "Teoría financiera clásica", "q": "El modelo de cinco factores de Fama-French (2015) incorpora, además de mercado, tamaño y valor:", "opts": [{"text": "Momentum y liquidez", "correct": false}, {"text": "Rentabilidad (RMW) e inversión (CMA)", "correct": true}, {"text": "Volatilidad y calidad", "correct": false}, {"text": "Tasa libre de riesgo y prima de plazo", "correct": false}], "just": "RMW = <em>robust minus weak</em> (rentabilidad operativa); CMA = <em>conservative minus aggressive</em> (política de inversión/crecimiento de activos). El factor momentum (WML) pertenece al modelo de cuatro factores de Carhart (1997), no al FF5."}, {"id": 71, "sec": 4, "secTitle": "Finanzas conductuales", "q": "La diferencia fundamental entre un error cognitivo y un sesgo emocional es que:", "opts": [{"text": "Los errores cognitivos solo afectan a inversionistas inexpertos", "correct": false}, {"text": "Los errores cognitivos surgen de razonamiento o procesamiento de información defectuoso y suelen mitigarse con educación e información; los sesgos emocionales nacen de impulsos o sentimientos y son más difíciles de corregir, por lo que conviene adaptarse a ellos", "correct": true}, {"text": "Los sesgos emocionales se corrigen fácilmente con datos; los cognitivos no", "correct": false}, {"text": "Ambos son idénticos y la distinción es meramente académica", "correct": false}], "just": "Es la dicotomía central del CFA. La implicación práctica para el asesor: ante errores cognitivos se <em>educa y corrige</em>; ante sesgos emocionales con frecuencia se <em>acomoda</em> el plan al sesgo en lugar de combatirlo de frente."}, {"id": 72, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Según la prospect theory, la función de valor es:", "opts": [{"text": "Cóncava tanto en ganancias como en pérdidas", "correct": false}, {"text": "Cóncava en la zona de ganancias (aversión al riesgo) y convexa en la de pérdidas (búsqueda de riesgo), definida sobre cambios respecto a un punto de referencia", "correct": true}, {"text": "Lineal respecto al nivel de riqueza absoluta", "correct": false}, {"text": "Convexa en ganancias y cóncava en pérdidas", "correct": false}], "just": "Kahneman y Tversky muestran que las personas evalúan resultados como ganancias o pérdidas frente a un <em>punto de referencia</em>, no como niveles de riqueza absoluta (a diferencia de la teoría de utilidad esperada). De ahí la forma en &quot;S&quot; de la función de valor."}, {"id": 73, "sec": 4, "secTitle": "Finanzas conductuales", "q": "El concepto de aversión a las pérdidas implica que:", "opts": [{"text": "Los inversionistas evitan por completo cualquier activo riesgoso", "correct": false}, {"text": "Ganancias y pérdidas de igual magnitud generan la misma intensidad emocional", "correct": false}, {"text": "El dolor de una pérdida pesa aproximadamente el doble que el placer de una ganancia equivalente", "correct": true}, {"text": "Los inversionistas prefieren pérdidas seguras a ganancias inciertas", "correct": false}], "just": "La función de valor es más empinada en pérdidas que en ganancias (relación cercana a 2:1 en los estudios de K&amp;T). Por eso la pendiente del tramo de pérdidas excede la del de ganancias."}, {"id": 74, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un inversionista vende rápidamente las acciones que han subido pero conserva las que están en pérdida esperando &quot;recuperarse&quot;. Este patrón es:", "opts": [{"text": "El efecto disposición, vinculado a la aversión a las pérdidas y al mental accounting", "correct": true}, {"text": "Sesgo de confirmación", "correct": false}, {"text": "Sesgo de anclaje", "correct": false}, {"text": "Ilusión de control", "correct": false}], "just": "El <em>disposition effect</em> describe vender ganadores demasiado pronto y mantener perdedores demasiado tiempo, para no &quot;realizar&quot; la pérdida. Es fiscalmente subóptimo (difiere ganancias y retiene pérdidas no aprovechadas)."}, {"id": 75, "sec": 4, "secTitle": "Finanzas conductuales", "q": "La teoría de utilidad esperada se distingue de la prospect theory principalmente porque:", "opts": [{"text": "La prospect theory asume inversionistas perfectamente racionales", "correct": false}, {"text": "La utilidad esperada evalúa resultados sobre el nivel final de riqueza y supone racionalidad; la prospect theory los evalúa como ganancias/pérdidas frente a un punto de referencia e incorpora ponderación subjetiva de probabilidades", "correct": true}, {"text": "Ambas predicen exactamente las mismas decisiones", "correct": false}, {"text": "La utilidad esperada incorpora la aversión a las pérdidas", "correct": false}], "just": "Diferencias clave: dependencia del punto de referencia, asimetría ganancia/pérdida y <em>probability weighting</em> (sobreponderar probabilidades pequeñas y subponderar las grandes)."}, {"id": 76, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un analista mantiene su recomendación de &quot;compra&quot; y solo busca noticias que la respalden, ignorando los reportes que la contradicen. Esto es:", "opts": [{"text": "Sesgo de confirmación (error cognitivo de perseverancia en creencias)", "correct": true}, {"text": "Sesgo de disponibilidad", "correct": false}, {"text": "Aversión al arrepentimiento", "correct": false}, {"text": "Exceso de confianza", "correct": false}], "just": "El <em>confirmation bias</em> lleva a buscar y sobrevalorar evidencia que confirma la creencia previa y a descartar la que la refuta."}, {"id": 77, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un cliente concluye que &quot;es una empresa excelente, por lo tanto es una excelente inversión&quot;, sin analizar la valuación. Comete:", "opts": [{"text": "Representatividad (juzgar por el estereotipo y omitir la tasa base / la valuación)", "correct": true}, {"text": "Anclaje", "correct": false}, {"text": "Sesgo de statu quo", "correct": false}, {"text": "Contabilidad mental", "correct": false}], "just": "La <em>representatividad</em> clasifica algo por su parecido con un estereotipo. Confundir &quot;buena empresa&quot; con &quot;buena inversión&quot; ignora el precio pagado —enlaza directamente con el deck <em>Buena empresa vs. buena inversión</em>."}, {"id": 78, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un analista fija su estimación de precio objetivo demasiado cerca de la cotización actual y la ajusta de forma insuficiente ante nueva información relevante. Esto es:", "opts": [{"text": "Anclaje y ajuste (error cognitivo de procesamiento de información)", "correct": true}, {"text": "Sesgo de retrospectiva", "correct": false}, {"text": "Aversión a las pérdidas", "correct": false}, {"text": "Efecto dotación", "correct": false}], "just": "El <em>anchoring and adjustment</em> hace que un valor de referencia inicial domine el juicio, y los ajustes posteriores resulten insuficientes."}, {"id": 79, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un inversionista separa mentalmente su &quot;dinero de dividendos&quot; (para gastar) de su &quot;capital&quot; (intocable) y los gestiona con reglas distintas e incoherentes. Comete:", "opts": [{"text": "Contabilidad mental (mental accounting)", "correct": true}, {"text": "Aversión al arrepentimiento", "correct": false}, {"text": "Sesgo de confirmación", "correct": false}, {"text": "Exceso de confianza", "correct": false}], "just": "El <em>mental accounting</em> trata el dinero de forma distinta según su origen o etiqueta, en vez de evaluar el portafolio de manera integral; puede llevar a estructuras subóptimas (p. ej., perseguir rendimiento por dividendos descuidando el rendimiento total)."}, {"id": 80, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Tras una caída de mercado muy difundida en los medios, un cliente sobreestima la probabilidad de un nuevo desplome y reduce su exposición. Esto refleja:", "opts": [{"text": "Heurística de disponibilidad (sobreponderar lo reciente, vívido o fácil de recordar)", "correct": true}, {"text": "Conservadurismo", "correct": false}, {"text": "Sesgo de statu quo", "correct": false}, {"text": "Aversión a las pérdidas", "correct": false}], "just": "La <em>disponibilidad</em> lleva a estimar probabilidades por la facilidad con que vienen ejemplos a la mente; eventos recientes y mediáticos se sobrevaloran."}, {"id": 81, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un inversionista tarda en incorporar a su tesis un cambio estructural confirmado por datos nuevos y se aferra a su visión previa. Esto es:", "opts": [{"text": "Conservadurismo (error cognitivo de perseverancia en creencias: subreacción a información nueva)", "correct": true}, {"text": "Representatividad", "correct": false}, {"text": "Ilusión de control", "correct": false}, {"text": "Exceso de confianza", "correct": false}], "just": "El <em>conservadurismo</em> es lo opuesto a la sobrerreacción: las creencias previas se actualizan con demasiada lentitud frente a evidencia nueva válida."}, {"id": 82, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Después de un evento, un inversionista afirma &quot;era obvio que iba a pasar&quot;, sobrestimando su capacidad previa de predecirlo. Esto es:", "opts": [{"text": "Sesgo de retrospectiva (hindsight bias)", "correct": true}, {"text": "Sesgo de confirmación", "correct": false}, {"text": "Anclaje", "correct": false}, {"text": "Aversión al arrepentimiento", "correct": false}], "just": "El <em>hindsight bias</em> (&quot;lo sabía desde el principio&quot;) distorsiona la memoria de lo que realmente se anticipó e infla la confianza en la propia habilidad predictiva."}, {"id": 83, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un asesor presenta la misma estrategia a dos clientes: a uno le dice que &quot;tiene 90% de probabilidad de conservar el capital&quot; y al otro que &quot;tiene 10% de probabilidad de perder&quot;. El segundo la rechaza. Esto ilustra:", "opts": [{"text": "Sesgo de encuadre (framing): la decisión cambia según cómo se presenta la información, aunque el contenido sea idéntico", "correct": true}, {"text": "Aversión a las pérdidas pura", "correct": false}, {"text": "Contabilidad mental", "correct": false}, {"text": "Sesgo de statu quo", "correct": false}], "just": "El <em>framing</em> (encuadre de ganancia vs. pérdida) altera la elección pese a tratarse de información equivalente. Es un error cognitivo de procesamiento de información."}, {"id": 84, "sec": 4, "secTitle": "Finanzas conductuales", "q": "El exceso de confianza en la inversión se clasifica como sesgo emocional y suele manifestarse en:", "opts": [{"text": "Subreacción a la información nueva", "correct": false}, {"text": "Trading excesivo, subdiversificación y subestimación del riesgo a la baja", "correct": true}, {"text": "Mantener siempre la asignación por defecto", "correct": false}, {"text": "Rechazar cualquier activo riesgoso", "correct": false}], "just": "El <em>overconfidence</em> (en sus formas de predicción y de certeza) lleva a intervalos de confianza demasiado estrechos, rotación elevada que erosiona el rendimiento neto y carteras poco diversificadas."}, {"id": 85, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un cliente cree que operar con mayor frecuencia y &quot;estar encima del mercado&quot; mejora sus resultados, atribuyéndose un control que no tiene. Comete:", "opts": [{"text": "Ilusión de control", "correct": true}, {"text": "Sesgo de disponibilidad", "correct": false}, {"text": "Aversión al arrepentimiento", "correct": false}, {"text": "Efecto dotación", "correct": false}], "just": "La <em>ilusión de control</em> hace creer que se puede influir en resultados esencialmente aleatorios; alimenta el trading excesivo y la subdiversificación."}, {"id": 86, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un cliente se niega a vender acciones heredadas de su padre, a las que asigna un valor superior al que pagaría por ellas hoy. Esto es:", "opts": [{"text": "Efecto dotación (endowment effect)", "correct": true}, {"text": "Aversión al arrepentimiento", "correct": false}, {"text": "Sesgo de statu quo", "correct": false}, {"text": "Contabilidad mental", "correct": false}], "just": "El <em>endowment effect</em> hace que se valore más un activo por el solo hecho de poseerlo; genera concentración y resistencia a rebalancear."}, {"id": 87, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un inversionista evita tomar decisiones de inversión por temor a equivocarse y lamentarlo después, por lo que se mantiene en exceso de liquidez o sigue a la mayoría. Esto es:", "opts": [{"text": "Aversión al arrepentimiento (regret aversion)", "correct": true}, {"text": "Sesgo de confirmación", "correct": false}, {"text": "Conservadurismo", "correct": false}, {"text": "Anclaje", "correct": false}], "just": "La <em>aversión al arrepentimiento</em> lleva a la inacción (errores de omisión) o a refugiarse en el consenso (herding) para diluir la responsabilidad de una decisión que pudiera salir mal."}, {"id": 88, "sec": 4, "secTitle": "Finanzas conductuales", "q": "En un plan de retiro con asignación por defecto, la mayoría de los empleados nunca la modifica, aun cuando no se ajusta a su perfil. Esto ilustra:", "opts": [{"text": "Sesgo de statu quo (preferencia por no cambiar / aceptar la opción predeterminada)", "correct": true}, {"text": "Exceso de confianza", "correct": false}, {"text": "Representatividad", "correct": false}, {"text": "Sesgo de disponibilidad", "correct": false}], "just": "El <em>status quo bias</em> describe la inercia a mantener la situación actual o la opción por defecto. Es la base del diseño de <em>defaults</em> y autoenrolamiento en sistemas de pensiones."}, {"id": 89, "sec": 4, "secTitle": "Finanzas conductuales", "q": "Un cliente posterga sistemáticamente el ahorro para el retiro y prioriza el consumo presente, en contra de sus propias metas de largo plazo. Esto es:", "opts": [{"text": "Sesgo de autocontrol (self-control bias)", "correct": true}, {"text": "Aversión a las pérdidas", "correct": false}, {"text": "Sesgo de statu quo", "correct": false}, {"text": "Ilusión de control", "correct": false}], "just": "El <em>self-control bias</em> privilegia la gratificación inmediata sobre los objetivos de largo plazo; deriva en subahorro y en sobreponderar activos de ingreso corriente para &quot;gastar sin tocar el capital&quot;."}, {"id": 90, "sec": 4, "secTitle": "Finanzas conductuales", "q": "La razón principal por la que las desviaciones de precio de origen conductual pueden persistir y no ser corregidas de inmediato por los arbitrajistas es:", "opts": [{"text": "Que los mercados son perfectamente eficientes en todo momento", "correct": false}, {"text": "Los límites al arbitraje: riesgo fundamental, riesgo de los noise traders (la desviación puede ampliarse antes de corregirse) y costos de implementación", "correct": true}, {"text": "Que los arbitrajistas también padecen aversión a las pérdidas en igual medida", "correct": false}, {"text": "Que no existen inversionistas racionales en el mercado", "correct": false}], "just": "Aun habiendo arbitrajistas racionales, los <em>límites al arbitraje</em> (Shleifer y Vishny) impiden corregir el mispricing: el horizonte y el capital del arbitrajista son finitos, y la posición contraria puede volverse más cara antes de converger al valor justo."}, {"id": 91, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "En el marco Vanguard Advisor&#x27;s Alpha, &quot;alpha del asesor&quot; significa:", "opts": [{"text": "La capacidad del asesor de batir consistentemente al mercado mediante selección de acciones", "correct": false}, {"text": "El valor agregado neto que aporta el asesor a través de la gestión de patrimonio (estructura de cartera, costos, impuestos, rebalanceo y coaching conductual), no de vencer al mercado", "correct": true}, {"text": "El exceso de rendimiento atribuible exclusivamente al market timing", "correct": false}, {"text": "El alfa de Jensen del portafolio del cliente", "correct": false}], "just": "El concepto reencuadra el &quot;valor&quot; del asesor: no es generar alfa de mercado (juego de suma cero y difícil por la EMH), sino las decisiones de wealth management que mejoran el resultado neto del cliente. Conecta directamente con la pregunta 23 del examen base."}, {"id": 92, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "Según el marco de Vanguard, el módulo que aporta el mayor valor potencial es:", "opts": [{"text": "El rebalanceo", "correct": false}, {"text": "La implementación de bajo costo", "correct": false}, {"text": "El coaching conductual", "correct": true}, {"text": "La ubicación de activos (asset location)", "correct": false}], "just": "El <em>behavioral coaching</em> es el componente más grande y más variable (Vanguard lo estima hasta ~1.5%), porque evita que el cliente abandone el plan en momentos de pánico o euforia —el error más costoso del inversionista."}, {"id": 93, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "Una característica clave del valor agregado del asesor según Vanguard es que:", "opts": [{"text": "Es un monto constante y lineal año con año", "correct": false}, {"text": "Es intermitente e irregular: se concentra en episodios de alta volatilidad y en decisiones puntuales, por lo que no debe interpretarse como un extra fijo anual", "correct": true}, {"text": "Solo se materializa en mercados alcistas", "correct": false}, {"text": "Se distribuye por partes iguales entre todos los módulos cada año", "correct": false}], "just": "Vanguard advierte que el &quot;~3%&quot; no es un rendimiento adicional garantizado cada año; gran parte del valor (sobre todo el coaching) aparece de forma concentrada cuando el cliente está más tentado a equivocarse."}, {"id": 94, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "¿Cuál es la diferencia entre &quot;alfa&quot;, &quot;Advisor&#x27;s Alpha&quot; y &quot;Gamma&quot;?", "opts": [{"text": "Son sinónimos de exceso de rendimiento sobre un benchmark", "correct": false}, {"text": "Alfa es el exceso de rendimiento ajustado por riesgo vs. un benchmark; Advisor&#x27;s Alpha (Vanguard) es el valor de las prácticas de wealth management; Gamma (Morningstar) es el ingreso adicional de retiro por mejores decisiones de planeación financiera", "correct": true}, {"text": "Gamma mide el riesgo sistemático y Advisor&#x27;s Alpha el idiosincrático", "correct": false}, {"text": "Alfa y Gamma se refieren a lo mismo; Advisor&#x27;s Alpha es el costo del asesor", "correct": false}], "just": "Tres conceptos distintos: alfa de inversión (mercado), Advisor&#x27;s Alpha (valor de la asesoría) y Gamma (eficiencia de la planeación, sobre todo en decumulación)."}, {"id": 95, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "El principal objetivo del rebalanceo periódico, al que Vanguard asigna ~0.14% de valor anual, es:", "opts": [{"text": "Maximizar el rendimiento esperado del portafolio", "correct": false}, {"text": "Mantener la cartera dentro del perfil de riesgo objetivo (control de riesgo y disciplina), no maximizar rendimiento", "correct": true}, {"text": "Reducir el número de operaciones a cero", "correct": false}, {"text": "Eliminar por completo el riesgo sistemático", "correct": false}], "just": "El rebalanceo es ante todo una herramienta de <em>control de riesgo</em>: evita que la cartera derive a una exposición no deseada. Su valor en rendimiento es modesto; su valor en gestión de riesgo y disciplina conductual es mayor."}, {"id": 96, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "La &quot;implementación de bajo costo&quot; (Vanguard la estima en hasta ~0.30% anual) se refiere a:", "opts": [{"text": "Reducir el número de reuniones con el cliente", "correct": false}, {"text": "Seleccionar instrumentos con menores costos totales (expense ratios, comisiones), que se traducen casi 1 a 1 en mayor rendimiento neto", "correct": true}, {"text": "Eliminar la diversificación para ahorrar comisiones", "correct": false}, {"text": "Invertir solo en CETES", "correct": false}], "just": "El costo es uno de los pocos predictores robustos del rendimiento neto futuro: cada punto base ahorrado en comisiones se traslada directamente al rendimiento del cliente. Enlaza con la pregunta 17 del examen base (fees)."}, {"id": 97, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "Vanguard estima que el coaching conductual puede aportar:", "opts": [{"text": "Un valor fijo de exactamente 3% anual", "correct": false}, {"text": "Entre 0% y 0.14%", "correct": false}, {"text": "Hasta alrededor de 1.5% anual (con un rango aproximado de 0% a 2%), de manera intermitente", "correct": true}, {"text": "Un valor negativo, porque añade costos", "correct": false}], "just": "Es el módulo de mayor magnitud y mayor dispersión, porque depende de cuántos errores conductuales (vender en pánico, perseguir modas) logre evitar el asesor en cada cliente."}, {"id": 98, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "El principio de &quot;ubicación de activos&quot; (asset location), al que Vanguard asigna 0%–0.60%, consiste en:", "opts": [{"text": "Diversificar geográficamente entre países", "correct": false}, {"text": "Colocar los activos fiscalmente ineficientes (los que generan ingreso gravable recurrente) en cuentas con tratamiento fiscal preferente, y los fiscalmente eficientes en cuentas gravables", "correct": true}, {"text": "Elegir la custodia más barata disponible", "correct": false}, {"text": "Rebalancear según la ubicación geográfica del cliente", "correct": false}], "just": "<em>Asset location</em> ≠ <em>asset allocation</em>. La asignación define el qué; la ubicación define en qué tipo de cuenta (gravable vs. con beneficio fiscal) se aloja cada activo para minimizar la carga fiscal del portafolio total."}, {"id": 99, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "La &quot;estrategia de gasto/retiro&quot; (spending strategy), a la que Vanguard asigna 0%–1.10%, agrega valor principalmente en la etapa de:", "opts": [{"text": "Acumulación temprana de un inversionista joven", "correct": false}, {"text": "Decumulación (retiro): definir el orden óptimo de retiro entre cuentas gravables y con beneficio fiscal para extender la duración del patrimonio y reducir impuestos", "correct": true}, {"text": "Apertura de la cuenta de trading", "correct": false}, {"text": "Rebalanceo mensual", "correct": false}], "just": "En el retiro, la <em>secuencia de retiros</em> entre tipos de cuenta tiene un impacto fiscal grande; un orden adecuado puede prolongar significativamente la vida del portafolio."}, {"id": 100, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "¿Por qué Vanguard reporta los módulos de &quot;asignación de activos adecuada&quot; y &quot;rendimiento total vs. inversión por ingreso&quot; como &quot;&gt;0&quot; y no con una cifra puntual?", "opts": [{"text": "Porque no aportan valor alguno", "correct": false}, {"text": "Porque su valor es significativo pero demasiado dependiente de la situación de cada cliente y del benchmark de comparación como para asignarle un número único", "correct": true}, {"text": "Porque solo aplican a clientes institucionales", "correct": false}, {"text": "Porque su valor es siempre negativo", "correct": false}], "just": "Su aporte es real pero idiosincrático: depende del punto de partida del cliente. Por eso se expresa como &quot;mayor que cero&quot; en lugar de una cifra fija."}, {"id": 101, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "La fórmula &quot;Value of an Advisor&quot; de Russell descompone el valor del asesor en componentes que típicamente incluyen:", "opts": [{"text": "Solo el costo de la asesoría", "correct": false}, {"text": "Rebalanceo anual, coaching conductual, costo de la gestión, planeación/servicios de wealth management y planeación fiscal (la fórmula A+B+C+P+T)", "correct": true}, {"text": "Únicamente la selección de acciones y el market timing", "correct": false}, {"text": "Exclusivamente la reducción de comisiones", "correct": false}], "just": "Russell estructura el valor como la suma de varios servicios; su total suele situarse por encima del de Vanguard (alrededor de ~5%, según el año) por diferencias de metodología y de componentes considerados."}, {"id": 102, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "En la fórmula de Russell, el componente que suele aportar el mayor valor es:", "opts": [{"text": "El costo de la gestión", "correct": false}, {"text": "El coaching conductual (evitar los errores de timing del inversionista)", "correct": true}, {"text": "La planeación fiscal", "correct": false}, {"text": "El rebalanceo", "correct": false}], "just": "Coincide con Vanguard: el mayor valor proviene de evitar las decisiones emocionales del inversionista, no de la selección de instrumentos."}, {"id": 103, "sec": 5, "secTitle": "Advisor's Alpha: el valor del asesor", "q": "El concepto de &quot;Gamma&quot; de Morningstar (Blanchett y Kaplan) mide:", "opts": [{"text": "El exceso de rendimiento sobre el S&amp;P 500", "correct": false}, {"text": "El ingreso adicional de retiro que genera tomar decisiones de planeación financiera más inteligentes (estimado en ~22.6% más ingreso, equivalente a ~1.59% de &quot;alfa&quot; anual)", "correct": true}, {"text": "El riesgo sistemático del portafolio de retiro", "correct": false}, {"text": "La comisión total que cobra el asesor", "correct": false}], "just": "Gamma se centra en la <em>eficiencia de la planeación</em> (sobre todo en decumulación) más que en el rendimiento de la inversión; se expresa como ingreso de retiro adicional ajustado por utilidad.
