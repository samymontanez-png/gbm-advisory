da en vigor de la nueva Ley del Seguro Social. Un trabajador puede verificar su régimen con la Constancia de Vigencia de Derechos del IMSS."}, {"id": 202, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "La Ley 73 es un régimen de:", "opts": [{"text": "Contribución definida con cuentas individuales", "correct": false}, {"text": "Beneficio definido (reparto, administrado por el Estado): la pensión se basa en el promedio del salario de cotización de los últimos 5 años, con un mínimo de 500 semanas", "correct": true}, {"text": "Capitalización individual en AFORE", "correct": false}, {"text": "Renta vitalicia obligatoria contratada con aseguradora", "correct": false}], "just": "En Ley 73 la pensión depende del salario promedio y los años cotizados, no del monto ahorrado. Por eso trabajadores con salarios altos y muchos años pueden obtener pensiones generosas."}, {"id": 203, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "La Ley 97 es un régimen de:", "opts": [{"text": "Beneficio definido administrado por el IMSS", "correct": false}, {"text": "Contribución definida: cuentas individuales administradas por AFOREs, donde la pensión depende del saldo acumulado", "correct": true}, {"text": "Reparto solidario sin cuentas individuales", "correct": false}, {"text": "Pensión basada en el salario promedio", "correct": false}], "just": "En Ley 97 el trabajador asume el riesgo de inversión y la pensión es función del saldo de su cuenta individual, gestionada por una AFORE privada supervisada por CONSAR."}, {"id": 204, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Las aportaciones a la cuenta individual bajo Ley 97 (tras la reforma) son tripartitas:", "opts": [{"text": "Solo el trabajador aporta el 6.5%", "correct": false}, {"text": "Trabajador 1.125% + patrón hasta 13.875% del SBC + Estado (cuota social)", "correct": true}, {"text": "Trabajador 10% + patrón 10% + Estado 0%", "correct": false}, {"text": "Únicamente el patrón aporta", "correct": false}], "just": "La reforma 2020 elevó gradualmente la cuota patronal (de 5.15% hasta 13.875% entre 2023 y 2030); el trabajador mantiene su 1.125% y el Estado refuerza la cuota social para salarios bajos."}, {"id": 205, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "El requisito de semanas cotizadas para acceder a pensión bajo Ley 97:", "opts": [{"text": "Es fijo en 500 semanas", "correct": false}, {"text": "Aumenta 25 semanas por año: era 750 en 2021, 875 en 2026 y llegará a 1,000 en 2031 (originalmente eran 1,250)", "correct": true}, {"text": "Se eliminó con la reforma 2020", "correct": false}, {"text": "Es de 1,250 semanas sin cambios", "correct": false}], "just": "La reforma redujo el requisito original de 1,250 a 750 semanas en 2021 y estableció un incremento gradual de 25 semanas anuales hasta estabilizarse en 1,000 semanas en 2031."}, {"id": 206, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Entre Ley 73 y Ley 97, ¿quién asume el riesgo de inversión y qué ocurre con la herencia?", "opts": [{"text": "En ambas el Estado asume el riesgo y no hay herencia", "correct": false}, {"text": "En Ley 73 el riesgo lo asume el Estado y no aplica herencia; en Ley 97 el riesgo lo asume el trabajador/AFORE y el saldo es heredable a beneficiarios designados", "correct": true}, {"text": "En Ley 97 el riesgo lo asume el Estado y hay herencia", "correct": false}, {"text": "En ambas el trabajador asume el riesgo", "correct": false}], "just": "Diferencia estructural clave: la contribución definida traslada el riesgo de inversión (y la propiedad heredable del saldo) al trabajador, a diferencia del beneficio definido estatal."}, {"id": 207, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Una AFORE es:", "opts": [{"text": "Una dependencia del gobierno federal", "correct": false}, {"text": "Una Administradora de Fondos para el Retiro: entidad financiera privada, supervisada por CONSAR, que administra las cuentas individuales e invierte los recursos a través de Siefores", "correct": true}, {"text": "Un banco comercial", "correct": false}, {"text": "Una aseguradora que paga rentas vitalicias", "correct": false}], "just": "Las AFOREs son privadas pero estrictamente reguladas por CONSAR, que fija comisiones máximas, el régimen de inversión y publica rankings de rendimiento."}, {"id": 208, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "¿Cuál es la función supervisora de CONSAR?", "opts": [{"text": "Administrar directamente las cuentas individuales", "correct": false}, {"text": "Establecer comisiones máximas, definir el régimen de inversión de las Siefores y publicar indicadores como el IRN", "correct": true}, {"text": "Garantizar un rendimiento fijo a los trabajadores", "correct": false}, {"text": "Pagar las pensiones de Ley 73", "correct": false}], "just": "CONSAR es el órgano regulador del SAR: fija las reglas del juego (comisiones, régimen de inversión) y da transparencia mediante rankings y el Indicador de Rendimiento Neto."}, {"id": 209, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Respecto a la elección y portabilidad de AFORE:", "opts": [{"text": "El trabajador no puede cambiar de AFORE", "correct": false}, {"text": "Si el trabajador no elige, CONSAR lo asigna automáticamente; y puede cambiar de AFORE una vez al año sin costo, típicamente buscando un mejor rendimiento neto", "correct": true}, {"text": "El cambio de AFORE tiene un costo elevado", "correct": false}, {"text": "Solo se puede cambiar de AFORE al cumplir 65 años", "correct": false}], "just": "Existe asignación automática para quienes no eligen, y portabilidad anual gratuita, lo que incentiva la competencia entre administradoras por rendimiento neto."}, {"id": 210, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "El Indicador de Rendimiento Neto (IRN) que publica CONSAR es:", "opts": [{"text": "El rendimiento bruto antes de comisiones", "correct": false}, {"text": "El rendimiento neto de comisiones ajustado por riesgo; es la métrica oficial de CONSAR y el criterio #1 para elegir AFORE", "correct": true}, {"text": "La comisión que cobra la AFORE", "correct": false}, {"text": "El número de cuentas administradas", "correct": false}], "just": "El IRN integra rendimiento, comisiones y riesgo en una sola métrica comparable, por lo que es la referencia central para decidir entre AFOREs (por encima de mirar solo el rendimiento bruto o la comisión aislada)."}, {"id": 211, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Sobre las comisiones de las AFOREs (2026):", "opts": [{"text": "Varían entre 2% y 5% sobre saldo", "correct": false}, {"text": "Rondan ~0.54% anual sobre saldo, con un promedio del sistema cercano a 0.538%; aunque parezcan pequeñas, una diferencia de unas décimas a 30 años representa meses de pensión", "correct": true}, {"text": "Se cobran sobre el flujo de aportaciones, no sobre el saldo", "correct": false}, {"text": "Son cero para todas las AFOREs", "correct": false}], "just": "Las comisiones se cobran como porcentaje sobre el saldo y están topadas por CONSAR; su efecto compuesto a largo plazo es relevante, de ahí que el IRN (neto de comisiones) sea el criterio correcto."}, {"id": 212, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Como inversionistas institucionales, las AFOREs:", "opts": [{"text": "Solo pueden invertir en CETES", "correct": false}, {"text": "Son una de las mayores fuentes de financiamiento al sector privado e infraestructura en México (deuda privada, FIBRAs, estructurados, renta variable nacional, energía)", "correct": true}, {"text": "Invierten exclusivamente en el extranjero", "correct": false}, {"text": "No pueden invertir en renta variable", "correct": false}], "just": "Con ~$8.7 billones administrados, las Siefores canalizan ahorro de largo plazo hacia el financiamiento productivo del país (infraestructura, FIBRAs, deuda corporativa, OPIs, energía)."}, {"id": 213, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "El SAR representa, dentro del sistema financiero mexicano:", "opts": [{"text": "Una porción marginal e irrelevante", "correct": false}, {"text": "El 2.º lugar por tamaño (~21.5% de participación), con activos equivalentes a ~24% del PIB", "correct": true}, {"text": "El sistema más pequeño", "correct": false}, {"text": "Más del 80% del PIB", "correct": false}], "just": "Su escala (~24% del PIB) lo convierte en un pilar del sistema financiero y en un actor determinante de los mercados de capitales locales."}, {"id": 214, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Las Siefores Generacionales funcionan bajo el principio de:", "opts": [{"text": "Un solo fondo para todos los trabajadores", "correct": false}, {"text": "Target-date funds: cada Siefore agrupa a trabajadores por año aproximado de retiro y aplica un glidepath que reduce el riesgo conforme el trabajador envejece", "correct": true}, {"text": "Selección activa de acciones por el trabajador", "correct": false}, {"text": "Inversión 100% en renta variable hasta el retiro", "correct": false}], "just": "Son el equivalente mexicano de los target-date funds: el mismo principio de ciclo de vida (Merton) que vimos en asset allocation, ahora institucionalizado en el régimen de pensiones."}, {"id": 215, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "La reforma cambió la estructura de Siefores de:", "opts": [{"text": "10 a 5 fondos por edad", "correct": false}, {"text": "5 Siefores Básicas por rango de edad (SB0–SB4) a 10 Siefores Generacionales por año de nacimiento (SG2025–SG2065 más una para pensionados)", "correct": true}, {"text": "Un fondo único a cinco fondos", "correct": false}, {"text": "No modificó la estructura de Siefores", "correct": false}], "just": "El esquema previo escalonaba por bandas de edad (con saltos bruscos al cambiar de banda); el generacional asigna una trayectoria continua por cohorte, evitando reasignaciones abruptas."}, {"id": 216, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Comparando la SB Inicial (jóvenes) con la SB Pensiones (cercanos al retiro), el límite máximo de renta variable es:", "opts": [{"text": "Igual en ambas: 30%", "correct": false}, {"text": "Mucho mayor en la SB Inicial (hasta 60%) que en la SB Pensiones (hasta 15%), reflejando un perfil de mayor riesgo para los más jóvenes", "correct": true}, {"text": "Mayor en la SB Pensiones que en la Inicial", "correct": false}, {"text": "Cero en ambas", "correct": false}], "just": "El régimen permite más renta variable a quien tiene mayor horizonte (mayor capacidad de recuperarse de caídas) y la restringe drásticamente para quien está por pensionarse."}, {"id": 217, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "El &quot;glidepath regulatorio&quot; de las Siefores implica que, conforme se acerca el retiro:", "opts": [{"text": "Aumentan los límites de renta variable y activos riesgosos", "correct": false}, {"text": "Disminuyen los límites de renta variable, divisas, estructurados (CKDs/CERPIs) y FIBRAs, privilegiando la preservación de capital", "correct": true}, {"text": "Los límites de inversión permanecen constantes", "correct": false}, {"text": "Se elimina toda la deuda gubernamental", "correct": false}], "just": "Los límites máximos por clase de activo se reducen de la SB Inicial a la SB Pensiones (RV 60%→15%, divisas 35%→20%, estructurados 30%→10%, FIBRAs 12.5%→5%), un glidepath impuesto por regulación."}, {"id": 218, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "La Siefore Básica de Pensiones (perfil conservador) debe mantener, según el régimen:", "opts": [{"text": "Mínimo 51% en renta variable internacional", "correct": false}, {"text": "Mínimo 51% en protección inflacionaria (UDIBONOs), priorizando preservar el poder adquisitivo del pensionado", "correct": true}, {"text": "Mínimo 60% en FIBRAs", "correct": false}, {"text": "100% en CETES", "correct": false}], "just": "Cerca y durante el retiro, proteger el poder adquisitivo es prioritario; de ahí el piso regulatorio en instrumentos indexados a la inflación (UDIBONOs). Conecta con el objetivo de rendimiento real visto en asset allocation."}, {"id": 219, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "En la composición agregada de las Siefores, el componente predominante es:", "opts": [{"text": "La renta variable internacional", "correct": false}, {"text": "La deuda gubernamental (alrededor de la mitad de la cartera), con los valores extranjeros sujetos a un límite regulatorio del 20%", "correct": true}, {"text": "Las FIBRAs", "correct": false}, {"text": "Las criptomonedas", "correct": false}], "just": "Las Siefores mantienen ~50%+ en deuda gubernamental (buena parte en bonos a tasa fija nominal de largo plazo), y la exposición a valores extranjeros está topada en 20% por regulación."}, {"id": 220, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Un cambio central de la reforma de pensiones de 2020 (DOF 16 dic 2020) fue:", "opts": [{"text": "Eliminar las AFOREs", "correct": false}, {"text": "Aumentar gradualmente la cuota patronal del 5.15% hasta 13.875% del SBC (2023–2030), manteniendo el 1.125% del trabajador", "correct": true}, {"text": "Reducir la aportación patronal a cero", "correct": false}, {"text": "Regresar al sistema de beneficio definido de Ley 73", "correct": false}], "just": "El alza de la cuota patronal busca elevar el saldo acumulado y, con ello, las tasas de reemplazo, sin cargar más al trabajador."}, {"id": 221, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Tras la reforma, la Pensión Mínima Garantizada (PMG):", "opts": [{"text": "Quedó fija en 1 salario mínimo", "correct": false}, {"text": "Se actualizó a un rango de 2.5 a 3.289 UMAs mensuales según semanas cotizadas y edad, desvinculándose del salario mínimo", "correct": true}, {"text": "Se eliminó", "correct": false}, {"text": "Se fijó en 10 UMAs para todos", "correct": false}], "just": "La PMG pasó a expresarse en UMAs (no en salarios mínimos) y a escalar según las semanas cotizadas y la edad de retiro, mejorando el piso de pensión para trabajadores de salarios bajos."}, {"id": 222, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "El requisito de semanas cotizadas, tras la reforma, evoluciona así:", "opts": [{"text": "Disminuye 25 semanas por año", "correct": false}, {"text": "Aumenta 25 semanas por año, de 750 en 2021 hasta 1,000 en 2031", "correct": true}, {"text": "Se mantiene constante en 875", "correct": false}, {"text": "Aumenta 100 semanas por año", "correct": false}], "just": "La transición gradual busca equilibrar el acceso a la PMG (que se redujo desde 1,250) con la sostenibilidad del sistema, subiendo el requisito de forma escalonada."}, {"id": 223, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "La reforma fijó como objetivo elevar la tasa de reemplazo, y la referencia internacional de la OCDE es:", "opts": [{"text": "Un mínimo del 20%", "correct": false}, {"text": "Un mínimo recomendado del 60% del salario (la reforma busca tasas del 40% al 100% según el nivel salarial)", "correct": true}, {"text": "Un máximo del 30%", "correct": false}, {"text": "El 100% para todos los niveles", "correct": false}], "just": "La tasa de reemplazo es el porcentaje del último salario que cubre la pensión. La OCDE recomienda al menos 60%; el sistema mexicano históricamente quedaba por debajo, lo que motivó la reforma y refuerza la importancia de las aportaciones voluntarias."}, {"id": 224, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "La Pensión Mínima Garantizada (PMG) se otorga cuando el trabajador:", "opts": [{"text": "Tiene cualquier saldo, sin requisitos", "correct": false}, {"text": "Cumple la edad y las semanas mínimas requeridas pero su saldo no alcanza para una pensión superior; el Estado complementa hasta el monto garantizado", "correct": true}, {"text": "Decide no contratar una AFORE", "correct": false}, {"text": "Solo si pertenece a Ley 73", "correct": false}], "just": "La PMG es una red de protección: condicionada a edad y semanas cotizadas, garantiza un piso (2.5–3.289 UMAs) cuando el ahorro individual resulta insuficiente."}, {"id": 225, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "La &quot;tasa de reemplazo&quot; se define como:", "opts": [{"text": "La comisión que cobra la AFORE", "correct": false}, {"text": "El porcentaje del último ingreso (o salario) que la pensión logra reemplazar; mejorarla es el principal motivo para hacer aportaciones voluntarias", "correct": true}, {"text": "El rendimiento nominal de la Siefore", "correct": false}, {"text": "El número de semanas cotizadas", "correct": false}], "just": "Una tasa de reemplazo baja significa una caída fuerte del nivel de vida al retirarse. Solo con la aportación obligatoria suele quedar insuficiente, de ahí el rol del ahorro voluntario y el PPR."}, {"id": 226, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "El retiro parcial por desempleo de la AFORE permite disponer de:", "opts": [{"text": "El 100% del saldo en cualquier momento", "correct": false}, {"text": "Hasta ~11.5% del saldo de la subcuenta RCV, con requisitos (p. ej., bimestres cotizados y días sin empleo) y un máximo de dos veces cada cinco años", "correct": true}, {"text": "Solo el rendimiento, nunca el capital", "correct": false}, {"text": "Únicamente al cumplir 65 años", "correct": false}], "just": "Es un retiro acotado y condicionado, pensado como apoyo temporal; reduce el saldo destinado al retiro, por lo que debe usarse con cautela."}, {"id": 227, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "El retiro por matrimonio de la AFORE:", "opts": [{"text": "Equivale a la mitad del saldo total", "correct": false}, {"text": "Equivale a ~30 días de salario mínimo, se solicita una sola vez en la vida y requiere acta de matrimonio", "correct": true}, {"text": "Está disponible de forma ilimitada", "correct": false}, {"text": "Solo aplica a trabajadores de Ley 73", "correct": false}], "just": "Es una prestación histórica única y de monto acotado, vinculada a recursos de la cuenta individual."}, {"id": 228, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "Las aportaciones voluntarias al SAR:", "opts": [{"text": "No tienen ningún beneficio fiscal", "correct": false}, {"text": "Pueden ser deducibles hasta 10% del ingreso anual acumulable (con tope de ~5 UMAs), pueden hacerse en cualquier momento, y un retiro anticipado genera retención de ISR del 20% (recuperable en la declaración)", "correct": true}, {"text": "Son obligatorias y se descuentan de la nómina", "correct": false}, {"text": "No pueden retirarse nunca", "correct": false}], "just": "Las aportaciones voluntarias combinan beneficio fiscal y flexibilidad; cada peso adicional incrementa el saldo y, por el interés compuesto a 25–30 años, su impacto en la pensión es exponencial."}, {"id": 229, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "La diferencia fundamental entre retiro programado y renta vitalicia es:", "opts": [{"text": "Ambos los administra la AFORE de por vida", "correct": false}, {"text": "El retiro programado lo administra la AFORE (CONSAR) y dura hasta agotar el fondo, con el riesgo de longevidad sobre el trabajador y saldo remanente heredable; la renta vitalicia la paga una aseguradora (CNSF) de por vida, trasladando el riesgo de longevidad a la aseguradora, con ajuste por inflación garantizado y carácter irrevocable", "correct": true}, {"text": "La renta vitalicia se agota y el retiro programado es de por vida", "correct": false}, {"text": "No existe diferencia práctica entre ambos", "correct": false}], "just": "El eje es quién asume el riesgo de longevidad: en el retiro programado lo asume el pensionado (puede agotar el fondo si vive mucho); en la renta vitalicia lo asume la aseguradora, a cambio de irrevocabilidad. Conecta con Yaari (Sección 9): la anualidad cubre el riesgo de vivir más de lo previsto."}, {"id": 230, "sec": 10, "secTitle": "Sistema de pensiones y AFOREs", "q": "¿Cuándo conviene típicamente cada modalidad de pensión?", "opts": [{"text": "La renta vitalicia siempre, sin importar el perfil", "correct": false}, {"text": "El retiro programado conviene a quien tiene saldo alto y es relativamente joven (mayor flexibilidad y herencia); la renta vitalicia conviene a perfiles conservadores con alta expectativa de longevidad (protección de por vida)", "correct": true}, {"text": "El retiro programado solo para perfiles muy conservadores", "correct": false}, {"text": "La elección es indistinta y no depende del perfil", "correct": false}], "just": "La decisión depende del saldo, la aversión al riesgo de longevidad y el deseo de heredar. Un asesor debe explicar el trade-off entre flexibilidad/herencia (retiro programado) y certeza de por vida (renta vitalicia)."}, {"id": 231, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "Una FIBRA es:", "opts": [{"text": "Un fondo de deuda gubernamental", "correct": false}, {"text": "Un Fideicomiso de Inversión en Bienes Raíces que cotiza en bolsa (su equivalente internacional es el REIT, vigente en EE.UU. desde 1960): permite invertir en bienes raíces productivos sin comprar un inmueble", "correct": true}, {"text": "Una acción de una constructora", "correct": false}, {"text": "Un seguro inmobiliario", "correct": false}], "just": "La FIBRA da exposición a real estate con liquidez bursátil y gestión profesional en un solo instrumento, vía CBFIs (Certificados Bursátiles Fiduciarios Inmobiliarios) listados en BMV/BIVA."}, {"id": 232, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "Para mantener su régimen fiscal preferente (Art. 187 LISR), una FIBRA debe cumplir, entre otros, que:", "opts": [{"text": "Distribuya el 50% de sus utilidades cada dos años", "correct": false}, {"text": "Invierta al menos 70% de su patrimonio en bienes inmuebles, distribuya al menos 95% del resultado fiscal cada año y mantenga los inmuebles al menos 4 años antes de enajenarlos", "correct": true}, {"text": "No reparta nunca a los inversionistas", "correct": false}, {"text": "Cotice exclusivamente en mercados extranjeros", "correct": false}], "just": "Los tres requisitos centrales (70% en inmuebles, 95% de distribución anual, 4 años mínimo de tenencia) son la contraparte del beneficio fiscal del vehículo y aseguran que sea un instrumento inmobiliario de largo plazo que reparte sus flujos."}, {"id": 233, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "Los tres tipos de FIBRAs que existen en México son:", "opts": [{"text": "Pública, privada y mixta", "correct": false}, {"text": "FIBRA Inmobiliaria (la más común, ~18 emisoras: industrial, comercial, oficinas, hotelero), FIBRA-E (infraestructura y energía) y FIBRA Hipotecaria (portafolios hipotecarios; FHipo es la única)", "correct": true}, {"text": "Industrial, residencial y de data centers", "correct": false}, {"text": "De corto, mediano y largo plazo", "correct": false}], "just": "La inmobiliaria domina el mercado; la FIBRA-E financia infraestructura/energía; la hipotecaria (FHipo) invierte en portafolios hipotecarios residenciales y es la única de su tipo."}, {"id": 234, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "Una diferencia estructural entre las FIBRAs mexicanas y los REITs estadounidenses es que las mexicanas:", "opts": [{"text": "No distribuyen sus flujos", "correct": false}, {"text": "Son prácticamente 100% real estate comercial y productivo (industrial ~67%, comercial, oficinas, hoteles), sin clases como residencial, health care, data centers o telecom towers que sí existen en EE.UU.", "correct": true}, {"text": "Solo invierten en vivienda residencial", "correct": false}, {"text": "Tienen 65 años de historia, igual que las de EE.UU.", "correct": false}], "just": "El mercado mexicano está en etapa más temprana y concentrado en real estate productivo; en EE.UU. ~60% de la capitalización está en clases inexistentes aún en México, lo que marca el espacio de crecimiento del sector local."}, {"id": 235, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "El marco legal que rige a las FIBRAs en México se encuentra principalmente en:", "opts": [{"text": "La Ley de Instituciones de Crédito", "correct": false}, {"text": "Los artículos 187 y 188 de la Ley del ISR", "correct": true}, {"text": "La Ley General de Sociedades Mercantiles", "correct": false}, {"text": "La Ley de Mercado de Valores únicamente", "correct": false}], "just": "Los Art. 187-188 LISR establecen los requisitos del vehículo y su tratamiento fiscal, incluyendo el régimen de la distribución y la exención en la enajenación de CBFIs."}, {"id": 236, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "¿Cuáles son las ventajas estructurales de una FIBRA frente a la inversión inmobiliaria tradicional?", "opts": [{"text": "Garantizan un rendimiento fijo y eliminan el riesgo", "correct": false}, {"text": "Diversificación (múltiples propiedades/sectores/regiones), liquidez bursátil, economías de escala, gestión profesional y distribución obligatoria de al menos 95% del resultado fiscal", "correct": true}, {"text": "Exención total de cualquier impuesto", "correct": false}, {"text": "Apalancamiento ilimitado sin riesgo", "correct": false}], "just": "Estas cinco ventajas convierten una clase de activo tradicionalmente ilíquida, intensiva en capital y de gestión activa en un instrumento accesible, líquido y profesionalmente administrado."}, {"id": 237, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "Comparado con comprar un departamento para rentar, invertir en FIBRAs ofrece:", "opts": [{"text": "Mayor capital mínimo y menor liquidez", "correct": false}, {"text": "Capital mínimo mucho menor (desde decenas de pesos vs. millones), liquidez diaria en bolsa (vs. meses/años para vender), diversificación entre cientos de inmuebles y gestión profesional sin involucrarse en inquilinos ni trámites", "correct": true}, {"text": "Un solo inmueble y gestión personal", "correct": false}, {"text": "Cap rates inferiores y sin apreciación", "correct": false}], "just": "La FIBRA democratiza el acceso al real estate: elimina las barreras de capital, liquidez, diversificación y gestión propias del inmueble directo, con yields típicamente superiores (6–9% + apreciación vs. 4–6% del inmueble directo)."}, {"id": 238, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "La &quot;distribución obligatoria&quot; de una FIBRA significa que:", "opts": [{"text": "Reparte el 50% de sus activos cada año", "correct": false}, {"text": "Debe distribuir al menos el 95% de su resultado fiscal a los tenedores cada año", "correct": true}, {"text": "Distribuye solo cuando vende inmuebles", "correct": false}, {"text": "No tiene obligación de distribuir", "correct": false}], "just": "El piso de 95% del resultado fiscal es lo que hace de la FIBRA un instrumento generador de flujo recurrente, y es condición del régimen fiscal preferente (Art. 187 LISR)."}, {"id": 239, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "Según la evidencia institucional de CEM Benchmarking (2024), los REITs/FIBRAs frente a los bienes raíces privados:", "opts": [{"text": "Tienen siempre peor rendimiento", "correct": false}, {"text": "Superaron a los bienes raíces privados en aproximadamente +2.0% en todos los estilos (core, value-added, oportunista), ubicándose entre las clases de activo mejor calificadas en el análisis de 200+ fondos de pensión a 25 años", "correct": true}, {"text": "No son comparables con el real estate privado", "correct": false}, {"text": "Solo ganan en mercados alcistas", "correct": false}], "just": "El estudio (patrocinado por Nareit, ~$4T USD AUM, 1998-2022) muestra que el real estate cotizado supera al privado con mejor rendimiento ajustado por riesgo, además de aportar liquidez y transparencia."}, {"id": 240, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "El término técnicamente correcto para lo que reparte una FIBRA a sus tenedores es:", "opts": [{"text": "Dividendos", "correct": false}, {"text": "Distribución de resultado fiscal (Art. 188 LISR)", "correct": true}, {"text": "Intereses", "correct": false}, {"text": "Cupones", "correct": false}], "just": "Aunque coloquialmente se hable de &quot;dividendos&quot; o &quot;yield&quot;, el término preciso conforme a la LISR es <strong>distribución de resultado fiscal</strong>. Usar la terminología correcta es parte del rigor técnico y de la fidelidad a la normativa."}, {"id": 241, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "Sobre la distribución de resultado fiscal que recibe una persona física:", "opts": [{"text": "Está totalmente exenta de ISR", "correct": false}, {"text": "La casa de bolsa retiene automáticamente 30%; ese monto es acreditable contra el ISR anual y la distribución se declara en la sección de arrendamiento (es ingreso acumulable)", "correct": true}, {"text": "Tiene una retención fija del 10% definitiva", "correct": false}, {"text": "No se declara ante el SAT", "correct": false}], "just": "La distribución es ingreso acumulable con retención del 30% que opera como pago provisional acreditable; el inversionista la integra a su declaración anual en el apartado de arrendamiento."}, {"id": 242, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "Respecto a la ganancia de capital al vender los CBFIs de una FIBRA en bolsa, una persona física residente:", "opts": [{"text": "Paga 30% de ISR sobre la ganancia", "correct": false}, {"text": "Está exenta de ISR, siempre que los CBFIs se enajenen en bolsa y estén colocados entre el gran público inversionista (Art. 188 LISR)", "correct": true}, {"text": "Paga una tasa progresiva de hasta 35%", "correct": false}, {"text": "Paga IVA del 16% sobre la ganancia", "correct": false}], "just": "La exención en la ganancia de capital de los CBFIs (cuando se adquirieron siendo la FIBRA pública y se venden en bolsa) es un diferenciador fiscal poco conocido pero decisivo frente al inmueble directo, donde la plusvalía sí se grava."}, {"id": 243, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "¿Cómo se clasifica fiscalmente cada tipo de ingreso de una FIBRA para el tenedor?", "opts": [{"text": "Todos son exentos", "correct": false}, {"text": "El resultado fiscal distribuido es acumulable; el reembolso de capital es no acumulable; la ganancia por venta de los certificados es exenta (si se adquirieron siendo pública la FIBRA); la venta de inmuebles por la FIBRA es acumulable", "correct": true}, {"text": "Todos son acumulables sin distinción", "correct": false}, {"text": "Todos están gravados con IVA", "correct": false}], "just": "Distinguir entre estos cuatro tratamientos es clave para una asesoría fiscal correcta: la distribución y la venta de inmuebles son acumulables, el reembolso de capital reduce el costo y no acumula, y la plusvalía de los CBFIs es exenta bajo las condiciones del Art. 188."}, {"id": 244, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "El segmento dominante de las FIBRAs mexicanas y su principal catalizador estructural son:", "opts": [{"text": "Hotelero, impulsado por el turismo", "correct": false}, {"text": "Industrial (~67% del ABR), impulsado por el nearshoring, con contratos triple-neto (NNN) en dólares e inquilinos de alta calidad crediticia", "correct": true}, {"text": "Oficinas, impulsado por el regreso presencial", "correct": false}, {"text": "Residencial, impulsado por la vivienda social", "correct": false}], "just": "El sector industrial es el mayor componente y el de mayor tesis de crecimiento: el nearshoring eleva la demanda de naves, con rentas en dólares (&gt;$11 USD/m<sup>2</sup> en corredores clave) y contratos NNN que trasladan costos al inquilino."}, {"id": 245, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "En el perfil riesgo-retorno por sector, ¿cuál afirmación es correcta?", "opts": [{"text": "El hotelero es el de menor riesgo", "correct": false}, {"text": "El industrial es de bajo riesgo (~8%, contratos NNN en USD, nearshoring); el comercial y oficinas son de riesgo medio-alto y cíclicos (~11-12%); el hotelero es de alto riesgo, estacional y sensible al tipo de cambio", "correct": true}, {"text": "Todos los sectores tienen el mismo riesgo", "correct": false}, {"text": "El educativo es el más volátil", "correct": false}], "just": "Cada segmento tiene su propia dinámica: industrial estable y dolarizado, comercial/oficinas atado al ciclo y consumo, hotelero volátil por estacionalidad y turismo; autoalmacenamiento y educativo tienden a ser estables por contratos recurrentes/largos."}, {"id": 246, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "¿Cuál es un catalizador relevante de la tesis de nearshoring para las FIBRAs industriales?", "opts": [{"text": "El aumento de la vacancia industrial a niveles récord", "correct": false}, {"text": "La baja vacancia industrial (CDMX ~4%, Monterrey ~7.5%), la consolidación sectorial (Prologis + Terrafina, ~7M m<sup>2</sup>), nuevas emisoras 100% industriales (Fibra Next) y la revisión del T-MEC en julio de 2026", "correct": true}, {"text": "La salida de capital del sector", "correct": false}, {"text": "La caída de las rentas en dólares", "correct": false}], "just": "La escasez de espacio industrial, los flujos de capital (~$5B USD), la consolidación y la certidumbre comercial (T-MEC) sostienen la tesis. La revisión del T-MEC es un evento clave para la certidumbre manufacturera."}, {"id": 247, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "El desempeño reciente del sector FIBRAs en México muestra:", "opts": [{"text": "Ocupación baja y rendimientos negativos", "correct": false}, {"text": "Ocupación promedio récord (~96.7%), un rendimiento del índice S&amp;P/BMV FIBRAS de ~+29.9% en 2025 (+37.45% incluyendo distribuciones) y un acumulado de 14 años (+175.5%) muy superior al del IPC (+61.4%)", "correct": true}, {"text": "Una caída del 30% en 2025", "correct": false}, {"text": "Un rendimiento idéntico al del IPC", "correct": false}], "just": "El sector alcanzó niveles récord de ocupación y un desempeño destacado, favorecido además por el ciclo de baja de tasas de Banxico (de 11.25% a 6.75%), que reduce el costo de capital e impulsa las valuaciones."}, {"id": 248, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "La presencia institucional en el sector FIBRAs se evidencia en que:", "opts": [{"text": "Las FIBRAs están prohibidas para inversionistas institucionales", "correct": false}, {"text": "Las AFOREs poseen alrededor del 42% del capital de las FIBRAs, y el 100% de las FIBRAs miembros de AMEFIBRA reporta indicadores ASG", "correct": true}, {"text": "Solo personas físicas pueden invertir en FIBRAs", "correct": false}, {"text": "Las AFOREs tienen prohibido invertir en bienes raíces", "correct": false}], "just": "La fuerte participación de las AFOREs (que vimos como inversionistas institucionales en la Sección 10) respalda la estabilidad, el gobierno corporativo y los estándares ASG del sector."}, {"id": 249, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "En el universo global de REITs, México:", "opts": [{"text": "No tiene presencia", "correct": false}, {"text": "Es, junto con Brasil, uno de los mayores mercados entre economías emergentes; destaca por ~18 emisoras grandes e institucionales (frente a los ~500 FIIs más pequeños de Brasil), dentro de un universo global de más de 1,000 REITs en 42 países", "correct": true}, {"text": "Es el mayor mercado del mundo", "correct": false}, {"text": "Tiene más REITs que Estados Unidos", "correct": false}], "just": "El modelo REIT tiene 65+ años y &gt;$2 billones USD de capitalización global. México sobresale entre emergentes por el tamaño e institucionalidad de sus emisoras, comparable con estándares del FTSE EPRA Nareit."}, {"id": 250, "sec": 11, "secTitle": "FIBRAs: inversión inmobiliaria", "q": "Las vías para invertir en FIBRAs a través de GBM incluyen:", "opts": [{"text": "Únicamente la compra de un inmueble físico", "correct": false}, {"text": "Compra auto-dirigida de FIBRAs individuales (CBFIs) en Trading MX, el ETF FIBRATC (réplica del índice S&amp;P/BMV FIBRAS, gestión pasiva y diversificación inmediata) y el SMA de FIBRAs (portafolio gestionado)", "correct": true}, {"text": "Solo a través de un fondo de deuda", "correct": false}, {"text": "Exclusivamente mediante derivados", "correct": false}], "just": "GBM ofrece rutas complementarias según el perfil: control total (FIBRAs individuales), diversificación pasiva de bajo costo (ETF FIBRATC) o gestión profesional (SMA FIBRAs), todas con la liquidez bursátil característica del vehículo."}, {"id": 251, "sec": 12, "secTitle": "ETFs", "q": "Un ETF (Exchange-Traded Fund) es:", "opts": [{"text": "Un bono gubernamental de largo plazo", "correct": false}, {"text": "Un fondo de inversión que cotiza en bolsa y se compra y vende como una acción individual durante el horario bursátil", "correct": true}, {"text": "Una cuenta de ahorro bancaria", "correct": false}, {"text": "Un contrato de futuros", "correct": false}], "just": "El ETF combina la diversificación de un fondo con la negociabilidad de una acción: se opera en tiempo real durante la sesión, a diferencia de un fondo mutuo tradicional."}, {"id": 252, "sec": 12, "secTitle": "ETFs", "q": "¿Cuáles son las características clave de un ETF?", "opts": [{"text": "Rendimiento garantizado y sin riesgo", "correct": false}, {"text": "Diversificación (canasta de valores), liquidez bursátil, bajo costo, transparencia (composición publicada diariamente) y eficiencia fiscal", "correct": true}, {"text": "Opacidad en sus holdings y altos costos", "correct": false}, {"text": "Negociación una sola vez al día a valor neto", "correct": false}], "just": "La publicación diaria de holdings (transparencia) y la negociación intradía distinguen al ETF; sus comisiones suelen ser menores que las de los fondos mutuos tradicionales."}, {"id": 253, "sec": 12, "secTitle": "ETFs", "q": "La diferencia principal entre un ETF y un fondo mutuo tradicional es que el ETF:", "opts": [{"text": "No puede seguir un índice", "correct": false}, {"text": "Se negocia en bolsa a precio de mercado en tiempo real durante la sesión, mientras que el fondo mutuo se valúa y opera una vez al día a su valor neto (NAV); además el ETF suele tener menores costos", "correct": true}, {"text": "Tiene siempre mayores comisiones", "correct": false}, {"text": "No publica su composición", "correct": false}], "just": "El ETF cotiza intradía como una acción; el fondo mutuo se compra/vende al NAV de cierre. Esta negociabilidad y la menor comisión son ventajas centrales del ETF."}, {"id": 254, "sec": 12, "secTitle": "ETFs", "q": "El primer ETF de la historia fue:", "opts": [{"text": "IBIT, de BlackRock, en 2024", "correct": false}, {"text": "El SPDR S&amp;P 500 ETF Trust (SPY), lanzado en 1993, creado por Nathan Most y Steven Bloom tras el crash de 1987", "correct": true}, {"text": "VOO, de Vanguard, en 1960", "correct": false}, {"text": "GLD, de oro, en 1896", "correct": false}], "just": "SPY fue pionero: permitió acceder a las 500 mayores empresas de EE.UU. en una sola operación y sentó las bases de la democratización de la inversión indexada."}, {"id": 255, "sec": 12, "secTitle": "ETFs", "q": "La filosofía de la inversión indexada vía ETFs (&quot;no busques la aguja en el pajar; compra el pajar&quot;, de Jack Bogle) implica:", "opts": [{"text": "Seleccionar activamente las mejores acciones", "correct": false}, {"text": "Replicar un índice completo en lugar de intentar vencer al mercado con selección de valores, capturando el rendimiento del mercado a bajo costo", "correct": true}, {"text": "Operar con apalancamiento para multiplicar rendimientos", "correct": false}, {"text": "Concentrar la cartera en un solo sector", "correct": false}], "just": "Es la lógica de la gestión pasiva (conecta con la inversión activa vs. pasiva y la EMH de las Secciones 1 y 3): comprar el mercado entero a bajo costo, en lugar de pagar por intentar superarlo."}, {"id": 256, "sec": 12, "secTitle": "ETFs", "q": "Respecto a los costos de administración de los ETFs:", "opts": [{"text": "Son idénticos para todos los ETFs", "correct": false}, {"text": "Varían aproximadamente entre 0.03% y 1% anual; como distintos ETFs pueden replicar el mismo índice, conviene comparar comisiones, ya que el costo erosiona directamente el rendimiento neto", "correct": true}, {"text": "Siempre superan el 2%", "correct": false}, {"text": "No afectan el rendimiento de largo plazo", "correct": false}], "just": "Dado que varios ETFs siguen el mismo índice (p. ej., SPY, VOO, IVV para el S&amp;P 500), elegir el de menor costo y mejor liquidez es clave; enlaza con el módulo de costos de Advisor&#x27;s Alpha (Sección 5)."}, {"id": 257, "sec": 12, "secTitle": "ETFs", "q": "¿Cuál de los siguientes NO es un tipo de ETF mencionado en el universo de productos?", "opts": [{"text": "Indexados, sectoriales y temáticos", "correct": false}, {"text": "De bonos, commodities y divisas", "correct": false}, {"text": "Inversos, apalancados y buffer", "correct": false}, {"text": "ETFs de depósito bancario garantizado", "correct": true}], "just": "El universo de ETFs abarca indexados (SPY, VOO), sectoriales (XLK), temáticos (BOTZ), de bonos (TLT), commodities (GLD), divisas (FXE), regionales (FXI), inversos (SQQQ), apalancados (TQQQ) y buffer (BUFR); no existen &quot;ETFs de depósito bancario garantizado&quot;."}, {"id": 258, "sec": 12, "secTitle": "ETFs", "q": "Un ETF inverso (p. ej., SQQQ):", "opts": [{"text": "Gana cuando el índice sube", "correct": false}, {"text": "Está diseñado para ganar cuando el mercado o el índice de referencia baja", "correct": true}, {"text": "Garantiza el capital invertido", "correct": false}, {"text": "Replica fielmente al índice al alza", "correct": false}], "just": "Los ETFs inversos ofrecen exposición contraria al índice; se usan tácticamente para beneficiarse de caídas o como cobertura, no como inversión de largo plazo."}, {"id": 259, "sec": 12, "secTitle": "ETFs", "q": "¿Cuál es el riesgo clave de mantener un ETF apalancado (p. ej., TQQQ, 3x) en el largo plazo?", "opts": [{"text": "Que nunca pierde valor", "correct": false}, {"text": "Que su reajuste diario provoca &quot;decaimiento por volatilidad&quot; (volatility decay): en mercados volátiles o laterales su rendimiento se desvía del múltiplo del rendimiento acumulado del índice, por lo que son herramientas tácticas de corto plazo, no de comprar y mantener", "correct": true}, {"text": "Que tiene comisiones de 0%", "correct": false}, {"text": "Que elimina el riesgo de mercado", "correct": false}], "just": "Los ETFs apalancados e inversos buscan multiplicar el rendimiento <em>diario</em>; el reajuste diario compuesto hace que, sostenidos varios días, su resultado difiera (a menudo desfavorablemente) del múltiplo del movimiento total del índice. Es un matiz crítico para advertir al cliente."}, {"id": 260, "sec": 12, "secTitle": "ETFs", "q": "Empareja correctamente cada ETF con su tipo:", "opts": [{"text": "TLT es de commodities; GLD es de bonos", "correct": false}, {"text": "TLT replica bonos del Tesoro de largo plazo (renta fija); GLD sigue al oro (commodities); XLK es sectorial de tecnología", "correct": true}, {"text": "GLD es un ETF inverso; XLK es de divisas", "correct": false}, {"text": "TLT es temático de IA; GLD es regional", "correct": false}], "just": "TLT (iShares 20+ Year Treasury), GLD (SPDR Gold Shares) y XLK (Technology Select Sector SPDR) ejemplifican, respectivamente, las categorías de bonos, commodities y sectorial."}, {"id": 261, "sec": 12, "secTitle": "ETFs", "q": "Un &quot;buffer ETF&quot; se caracteriza por:", "opts": [{"text": "Multiplicar por tres el rendimiento del índice", "correct": false}, {"text": "Ofrecer una pérdida limitada a cambio de una ganancia también limitada (acotada) en un plazo determinado", "correct": true}, {"text": "Garantizar rendimientos ilimitados", "correct": false}, {"text": "Invertir solo en criptomonedas", "correct": false}], "just": "Los buffer ETFs (p. ej., BUFR) usan estructuras de opciones para acotar tanto las pérdidas como las ganancias dentro de un periodo, atractivos para perfiles que priorizan proteger el capital a cambio de renunciar a parte del alza."}, {"id": 262, "sec": 12, "secTitle": "ETFs", "q": "Un ETF temático (p. ej., de IA, energía limpia, espacio o biotecnología):", "opts": [{"text": "Replica siempre un índice amplio de mercado", "correct": false}, {"text": "Da exposición dirigida a una tendencia o sector emergente completo, en lugar de hacer selección individual de acciones; suele tener mayor concentración y volatilidad", "correct": true}, {"text": "Es de bajo riesgo por definición", "correct": false}, {"text": "Garantiza superar al mercado", "correct": false}], "just": "Los temáticos apuestan a megatendencias (IA, sostenibilidad, fintech, espacio). El deck muestra su alta dispersión de resultados (algunos +45%, otros -68% desde una base común), lo que ilustra su mayor volatilidad y riesgo de concentración: hay que dimensionar la posición con cuidado."}, {"id": 263, "sec": 12, "secTitle": "ETFs", "q": "Los ETFs UCITS se diferencian de los ETFs &quot;regulares&quot; estadounidenses en que:", "opts": [{"text": "No están regulados", "correct": false}, {"text": "Se rigen por la directiva UCITS de la UE (pasaporte transfronterizo con un solo registro) y tienen reglas más estrictas de concentración (máx. ~20% en un solo emisor, ~10% en activos ilíquidos) y obligación de liquidez diaria", "correct": true}, {"text": "Permiten mayor concentración que los estadounidenses", "correct": false}, {"text": "No publican su cartera", "correct": false}], "just": "UCITS prioriza la protección al inversionista con límites de concentración y transparencia; a cambio, restringe ciertas estrategias y puede implicar costos algo mayores por los requisitos regulatorios."}, {"id": 264, "sec": 12, "secTitle": "ETFs", "q": "La diferencia entre un ETF UCITS de acumulación (&quot;Acc&quot;) y uno de distribución (&quot;Dist&quot;) es que el de acumulación:", "opts": [{"text": "Reparte los rendimientos mensualmente", "correct": false}, {"text": "Reinvierte automáticamente los rendimientos dentro del fondo, sin generar un evento fiscal hasta que se vende el ETF (difiere el impuesto), mientras que el de distribución los paga al inversionista", "correct": true}, {"text": "No tiene rendimientos", "correct": false}, {"text": "Está prohibido para personas físicas", "correct": false}], "just": "La versión de acumulación capitaliza los dividendos internamente, posponiendo el evento fiscal hasta la venta; la de distribución entrega el flujo, generando el evento fiscal al recibirlo."}, {"id": 265, "sec": 12, "secTitle": "ETFs", "q": "Una ventaja de los ETFs UCITS de acumulación para un inversionista enfocado en el largo plazo es:", "opts": [{"text": "Que garantizan un rendimiento superior", "correct": false}, {"text": "El diferimiento fiscal: al reinvertir internamente sin distribuir, no se generan eventos fiscales recurrentes y el interés compuesto trabaja sin la fuga del impuesto anual hasta la venta", "correct": true}, {"text": "Que eliminan las comisiones de gestión", "correct": false}, {"text": "Que no tienen riesgo de mercado", "correct": false}], "just": "Diferir el impuesto permite que el capital completo siga componiéndose. Es un punto de eficiencia fiscal relevante, aunque el tratamiento concreto debe validarse con la normativa aplicable al inversionista."}, {"id": 266, "sec": 12, "secTitle": "ETFs", "q": "Sobre los emisores y el tamaño del mercado de ETFs:", "opts": [{"text": "No hay concentración entre emisores", "correct": false}, {"text": "BlackRock (iShares) lidera y los cinco principales emisores concentran ~80% del total; el mercado estadounidense supera los ~$10 billones USD con miles de ETFs listados, y a nivel global existen ~7,000 ETFs", "correct": true}, {"text": "Solo existen 100 ETFs en el mundo", "correct": false}, {"text": "Vanguard no emite ETFs", "correct": false}], "just": "El mercado está dominado por unos pocos grandes emisores (BlackRock, Vanguard, State Street), con un crecimiento explosivo en número y activos durante las últimas dos décadas."}, {"id": 267, "sec": 12, "secTitle": "ETFs", "q": "Entre SPY y VOO (ambos siguen al S&amp;P 500):", "opts": [{"text": "Son idénticos en todo", "correct": false}, {"text": "VOO suele liderar en activos bajo gestión, mientras que SPY lidera en volumen de negociación; ilustra que varios ETFs replican el mismo índice y conviene comparar costo y liquidez", "correct": true}, {"text": "SPY sigue al Nasdaq y VOO al Dow", "correct": false}, {"text": "Ninguno sigue al S&amp;P 500", "correct": false}], "just": "Que varios productos repliquen el mismo índice obliga a elegir según comisión, liquidez y error de seguimiento; SPY destaca por liquidez/volumen y VOO por menor costo y activos."}, {"id": 268, "sec": 12, "secTitle": "ETFs", "q": "Los cinco criterios clave para invertir en ETFs son:", "opts": [{"text": "Color, nombre, popularidad, moda y antigüedad", "correct": false}, {"text": "Benchmark (índice de referencia), plazo/horizonte de inversión, costos de administración, perfil de riesgo y la compensación riesgo/rendimiento de largo plazo", "correct": true}, {"text": "Únicamente la comisión", "correct": false}, {"text": "Solo el rendimiento del último mes", "correct": false}], "just": "Estos cinco factores estructuran una decisión informada: qué replica, para cuánto tiempo, a qué costo, con qué riesgo y con qué relación riesgo/rendimiento histórica."}, {"id": 269, "sec": 12, "secTitle": "ETFs", "q": "Al comparar dos ETFs que replican exactamente el mismo índice, el criterio de desempate más relevante suele ser:", "opts": [{"text": "Cuál tiene el nombre más conocido", "correct": false}, {"text": "El costo total (expense ratio) junto con la liquidez y el error de seguimiento, ya que a igualdad de índice el menor costo se traduce casi 1 a 1 en mayor rendimiento neto", "correct": true}, {"text": "Cuál fue lanzado más recientemente", "correct": false}, {"text": "El emisor con más empleados", "correct": false}], "just": "Si el índice es el mismo, la diferencia de resultado proviene principalmente de costo, liquidez y precisión de réplica; el costo bajo es el predictor más robusto del rendimiento neto futuro."}, {"id": 270, "sec": 12, "secTitle": "ETFs", "q": "¿Cuál es la diferencia entre un ETF de Bitcoin spot, uno de futuros y uno de empresas relacionadas?", "opts": [{"text": "Todos compran Bitcoin directamente", "correct": false}, {"text": "El spot (p. ej., IBIT) compra y mantiene Bitcoin directamente; el de futuros (p. ej., BITO) invierte en contratos de futuros, no en el activo; y los de empresas (p. ej., BLOK) invierten en acciones del ecosistema (mineras, exchanges, blockchain)", "correct": true}, {"text": "El de futuros mantiene Bitcoin físico", "correct": false}, {"text": "No existen diferencias entre ellos", "correct": false}], "just": "La distinción es clave para la idoneidad: el spot da exposición directa al precio; el de futuros puede divergir por la estructura de los contratos; y los de empresas dan exposición indirecta al sector, con su propio riesgo accionario."}, {"id": 271, "sec": 12, "secTitle": "ETFs", "q": "Un hito regulatorio relevante para los cripto-ETFs fue:", "opts": [{"text": "La prohibición de los ETFs de Bitcoin en 2024", "correct": false}, {"text": "La aprobación por parte de la SEC de los primeros 11 ETFs de Bitcoin spot en EE.UU. en enero de 2024, lo que facilitó el acceso institucional y masivo a la criptomoneda", "correct": true}, {"text": "La eliminación de todos los ETFs en 2017", "correct": false}, {"text": "La aprobación del primer ETF en 1993", "correct": false}], "just": "Tras años de rechazos (el primer intento de los Winklevoss en 2013 fue denegado), la aprobación de los spot ETFs en enero de 2024 marcó un punto de inflexión en la adopción de cripto como activo invertible."}, {"id": 272, "sec": 12, "secTitle": "ETFs", "q": "El iShares Bitcoin Trust (IBIT) se caracteriza por:", "opts": [{"text": "Ser emitido por una minera de Bitcoin", "correct": false}, {"text": "Reflejar el precio de Bitcoin (referencia CME CF Bitcoin Reference Rate), ser gestionado por BlackRock con Coinbase como custodio, y dar exposición sin las complejidades de custodia o llaves privadas", "correct": true}, {"text": "Invertir en bonos del Tesoro", "correct": false}, {"text": "No tener comisión ni custodio", "correct": false}], "just": "IBIT permite exposición a Bitcoin desde una cuenta de inversión tradicional, delegando la custodia (Coinbase) y la operación; se volvió el cripto-ETF más negociado desde su lanzamiento en enero de 2024."}, {"id": 273, "sec": 12, "secTitle": "ETFs", "q": "Comparando la inversión directa en Ethereum con un ETF de Ethereum:", "opts": [{"text": "El ETF da acceso a DeFi y aplicaciones descentralizadas", "correct": false}, {"text": "La inversión directa ofrece control total y acceso a DeFi pero exige gestión de llaves privadas; el ETF ofrece custodia institucional y acceso fácil desde una cuenta existente (como la app de GBM), a cambio de una comisión y sin funcionalidades blockchain", "correct": true}, {"text": "Son equivalentes en todo", "correct": false}, {"text": "El ETF requiere manejar llaves privadas", "correct": false}], "just": "El ETF traslada la complejidad técnica y de custodia al emisor, a costa de la comisión y de renunciar a la utilidad on-chain (staking, DeFi). La elección depende del perfil y los conocimientos del cliente."}, {"id": 274, "sec": 12, "secTitle": "ETFs", "q": "Para un cliente que pide exposición a cripto sin manejar llaves privadas ni custodia, la solución más adecuada (consistente con el examen base) es:", "opts": [{"text": "Comprar un ETF apalancado del Nasdaq", "correct": false}, {"text": "Un cripto-ETF spot (p. ej., IBIT) o el Blockchain SMA, que dan exposición regulada y operativamente sencilla desde una cuenta de inversión", "correct": true}, {"text": "Un ETF de bonos del Tesoro", "correct": false}, {"text": "Un fondo de deuda gubernamental mexicana", "correct": false}], "just": "Enlaza con la pregunta 50 del examen base (IBIT / Blockchain SMA para exposición a cripto): la vía idónea para un cliente que no quiere operar custodia directa es un vehículo regulado como un ETF spot o el SMA correspondiente."}, {"id": 275, "sec": 12, "secTitle": "ETFs", "q": "El acceso a ETFs a través de GBM se caracteriza por:", "opts": [{"text": "Limitarse a un único ETF del S&amp;P 500", "correct": false}, {"text": "Ofrecer acceso a miles de ETFs de todo tipo desde la app (vía Trading MX), abarcando perfiles desde conservadores (indexados y de deuda) hasta especulativos (apalancados y temáticos)", "correct": true}, {"text": "Permitir solo la compra de acciones individuales", "correct": false}, {"text": "Excluir los ETFs internacionales", "correct": false}], "just": "GBM da acceso a un universo amplio de ETFs que cubre todo el espectro de riesgo; el rol del asesor es seleccionar, según el perfil y objetivos del cliente, el vehículo adecuado dentro de esa oferta."}, {"id": 276, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El &quot;scientific beta&quot; o factor investing se sitúa, dentro del espectro de gestión, como:", "opts": [{"text": "Pura gestión activa basada en intuición", "correct": false}, {"text": "Un enfoque sistemático y basado en reglas que captura primas de riesgo conocidas (factores) de forma transparente y de bajo costo, ubicándose entre la indexación pasiva pura y la gestión activa discrecional", "correct": true}, {"text": "Pura indexación por capitalización sin ningún criterio adicional", "correct": false}, {"text": "Especulación de corto plazo con apalancamiento", "correct": false}], "just": "El smart/scientific beta sistematiza (como lo pasivo) la búsqueda de fuentes de retorno que históricamente generaron exceso (como lo activo). Es &quot;invertir con el método científico&quot;: reglas explícitas respaldadas por evidencia."}, {"id": 277, "sec": 13, "secTitle": "Factor investing: profundización", "q": "En la descomposición del rendimiento de una estrategia, los tres componentes de riesgo son:", "opts": [{"text": "Riesgo de tasa, de crédito y de liquidez", "correct": false}, {"text": "Riesgo de mercado (sistemático), riesgo factorial y riesgo alfa (skill del gestor)", "correct": true}, {"text": "Riesgo cambiario, soberano y operativo", "correct": false}, {"text": "Varianza, covarianza y correlación", "correct": false}], "just": "El rendimiento se descompone en el beta de mercado, las exposiciones a factores (beta factorial) y el alfa residual atribuible a la habilidad. El factor investing busca capturar de forma sistemática y barata lo que antes se cobraba como &quot;alfa&quot;."}, {"id": 278, "sec": 13, "secTitle": "Factor investing: profundización", "q": "Que los factores ofrezcan primas no contradice la EMH porque:", "opts": [{"text": "Significa que se puede vencer al mercado sin riesgo", "correct": false}, {"text": "Las primas de factores son compensación por asumir un riesgo sistemático adicional (o por patrones conductuales persistentes), no un &quot;almuerzo gratis&quot;: se cosecha una prima de riesgo, no se &quot;vence&quot; al mercado", "correct": true}, {"text": "Demuestra que la EMH es completamente falsa", "correct": false}, {"text": "Implica que el análisis técnico siempre funciona", "correct": false}], "just": "Conecta con la EMH (Secciones 1 y 3): capturar la prima de valor, tamaño o momentum implica asumir el riesgo asociado a ese factor. No es alfa libre de riesgo; es la remuneración por una exposición sistemática."}, {"id": 279, "sec": 13, "secTitle": "Factor investing: profundización", "q": "Las tres formas de la Hipótesis de los Mercados Eficientes son:", "opts": [{"text": "Estática, dinámica y mixta", "correct": false}, {"text": "Débil (los precios reflejan la información histórica; el análisis técnico no funciona), semi-fuerte (reflejan toda la información pública) y fuerte (reflejan incluso información privilegiada)", "correct": true}, {"text": "Local, regional y global", "correct": false}, {"text": "Corto, mediano y largo plazo", "correct": false}], "just": "Es la taxonomía de Fama (1970). La evidencia es fuerte para la forma débil, mixta para la semi-fuerte y débil para la fuerte (la información privilegiada sí parece dar ventaja en algunos estudios)."}, {"id": 280, "sec": 13, "secTitle": "Factor investing: profundización", "q": "¿Cuáles son los beneficios que se atribuyen a la inversión por factores, y su principal exigencia?", "opts": [{"text": "Rendimiento garantizado sin ningún costo", "correct": false}, {"text": "Potencial de menor riesgo, rendimientos superiores y mayor diversificación; pero exige paciencia, porque los factores atraviesan periodos largos de underperformance", "correct": true}, {"text": "Eliminación total del riesgo y liquidez infinita", "correct": false}, {"text": "Resultados positivos cada mes sin excepción", "correct": false}], "just": "Los factores no pagan de forma constante: pueden tener años de rezago (p. ej., el &quot;value winter&quot;). Su captura requiere disciplina y horizonte —&quot;time in the market, not timing the market&quot;—."}, {"id": 281, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El factor de mercado (MKT), base de todos los modelos de factores, establece que:", "opts": [{"text": "Todas las acciones tienen el mismo riesgo", "correct": false}, {"text": "El riesgo de mercado (sistemático) se compensa con una prima sobre la tasa libre de riesgo; en el largo plazo, los activos riesgosos pagan una prima por riesgo positiva (Sharpe-Lintner, CAPM)", "correct": true}, {"text": "El mercado siempre sube", "correct": false}, {"text": "La prima de mercado es negativa en el largo plazo", "correct": false}], "just": "El factor de mercado, formalizado por Sharpe (1964) y Lintner (1965), es el cimiento sobre el que Fama-French (1993) y los modelos posteriores añaden los demás factores."}, {"id": 282, "sec": 13, "secTitle": "Factor investing: profundización", "q": "Respecto al factor tamaño (SMB), un matiz importante del debate académico actual es:", "opts": [{"text": "Que es el factor más fuerte y estable de todos", "correct": false}, {"text": "El &quot;factor decay&quot;: aunque Banz (1981) documentó la prima de las small-caps, varios estudios indican que el efecto tamaño se desvaneció en gran medida después de los años 1980", "correct": true}, {"text": "Que solo aplica a empresas grandes", "correct": false}, {"text": "Que nunca existió evidencia de él", "correct": false}], "just": "El factor decay del tamaño (Asness, Frazzini, Pedersen) es un recordatorio de que las primas documentadas pueden debilitarse tras su publicación, sea por arbitraje o por cambios estructurales del mercado."}, {"id": 283, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El factor valor (HML) captura que:", "opts": [{"text": "Las acciones growth superan sistemáticamente a las value", "correct": false}, {"text": "Las acciones de valor (alto book-to-market) han superado sistemáticamente a las de crecimiento (Fama-French 1992/1993); la prima de valor global (~4.8%) ha sido mayor que la estadounidense (~3.7%)", "correct": true}, {"text": "El valor en libros es irrelevante para el rendimiento", "correct": false}, {"text": "Las acciones value no pagan ninguna prima", "correct": false}], "just": "HML (&quot;high minus low&quot; book-to-market) tiene raíces conceptuales en Graham y Dodd. La evidencia internacional (Asness, Moskowitz, Pedersen) muestra que la prima de valor está presente globalmente, con magnitud aún mayor fuera de EE.UU."}, {"id": 284, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El &quot;value winter&quot; se refiere a:", "opts": [{"text": "Una temporada estacional de compra de acciones value", "correct": false}, {"text": "Un periodo prolongado de underperformance del factor valor (notablemente en EE.UU. en años recientes), que ilustra por qué la captura de factores exige paciencia y persistencia", "correct": true}, {"text": "La desaparición permanente del factor valor", "correct": false}, {"text": "Un fenómeno exclusivo de la renta fija", "correct": false}], "just": "El value winter es el ejemplo paradigmático de que un factor con evidencia sólida puede rezagarse por años. Abandonarlo en el peor momento (conducta) destruye su captura de largo plazo."}, {"id": 285, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El &quot;factor rotation&quot; entre growth y value implica que:", "opts": [{"text": "Hay que mantener siempre el mismo factor sin importar el contexto", "correct": false}, {"text": "Growth es el inverso conceptual de value, y ante un underperformance persistente de un factor, algunos inversionistas sofisticados pueden rotar hacia el factor opuesto", "correct": true}, {"text": "Los factores no cambian su desempeño relativo", "correct": false}, {"text": "Value y growth siempre rinden igual", "correct": false}], "just": "La rotación factorial es una decisión activa (con sus riesgos de timing). El deck la asocia a vehículos como GBMINT (growth) cuando value atraviesa un invierno prolongado."}, {"id": 286, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El factor momentum (UMD, &quot;up minus down&quot;) fue formalizado por:", "opts": [{"text": "Markowitz (1952)", "correct": false}, {"text": "Carhart (1997), que lo añadió como cuarto factor al modelo de Fama-French; captura que los ganadores recientes tienden a seguir ganando y los perdedores a seguir perdiendo en el corto-mediano plazo", "correct": true}, {"text": "Sharpe (1964)", "correct": false}, {"text": "Black y Litterman (1992)", "correct": false}], "just": "El momentum es el cuarto factor de Carhart. A diferencia de value/size (con explicaciones de riesgo y conductuales), el momentum tiene una base predominantemente conductual."}, {"id": 287, "sec": 13, "secTitle": "Factor investing: profundización", "q": "La construcción estándar del factor momentum (&quot;12-1&quot;) consiste en:", "opts": [{"text": "Comprar las acciones que más cayeron el último mes", "correct": false}, {"text": "Ordenar por el rendimiento de los últimos 12 meses excluyendo el mes más reciente, para evitar la reversión de corto plazo; el momentum funciona en el corto-mediano plazo (3-12 meses) pero tiende a revertirse en el largo plazo (2-5 años)", "correct": true}, {"text": "Mantener las posiciones de por vida sin rotación", "correct": false}, {"text": "Usar solo el rendimiento de la última semana", "correct": false}], "just": "Se excluye el mes más reciente porque a un mes opera la reversión de corto plazo, que contaminaría la señal. Y como el momentum se revierte a largo plazo, es un factor que requiere rotación periódica."}, {"id": 288, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El factor de calidad por rentabilidad (RMW, &quot;robust minus weak&quot;) captura que:", "opts": [{"text": "Las empresas menos rentables superan a las más rentables", "correct": false}, {"text": "Las empresas con rentabilidad operativa robusta tienden a superar a las de rentabilidad débil (Novy-Marx; incorporado al FF5)", "correct": true}, {"text": "La rentabilidad no afecta los rendimientos", "correct": false}, {"text": "Solo importa el tamaño de la empresa", "correct": false}], "just": "Novy-Marx (2012/2013) mostró que la rentabilidad bruta predice rendimientos; Fama-French lo formalizaron como RMW en su modelo de cinco factores (2015)."}, {"id": 289, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El factor de inversión (CMA, &quot;conservative minus aggressive&quot;) establece que:", "opts": [{"text": "Las empresas que más invierten/crecen en activos rinden más", "correct": false}, {"text": "Las empresas conservadoras en su crecimiento de activos (inversión prudente) tienden a superar a las agresivas; forma parte del FF5 (2015)", "correct": true}, {"text": "La política de inversión de la empresa es irrelevante", "correct": false}, {"text": "Es idéntico al factor momentum", "correct": false}], "just": "CMA recoge que un crecimiento agresivo de activos suele asociarse a peores rendimientos futuros; junto con RMW completa la dimensión de &quot;calidad&quot; del modelo de cinco factores."}, {"id": 290, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El factor QMJ (&quot;quality minus junk&quot;) de Asness, Frazzini y Pedersen:", "opts": [{"text": "Compra acciones de baja calidad y vende las de alta", "correct": false}, {"text": "Va largo en acciones de alta calidad y corto en las de baja calidad, y obtiene rendimientos ajustados por riesgo significativos en EE.UU. y en 23 de 24 países; integra cuatro dimensiones de calidad", "correct": true}, {"text": "Solo funciona en EE.UU.", "correct": false}, {"text": "No tiene respaldo empírico", "correct": false}], "just": "QMJ sintetiza la calidad en dimensiones como rentabilidad, crecimiento, seguridad y payout. Su robustez internacional (23/24 países) lo hace uno de los factores con evidencia más sólida."}, {"id": 291, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El factor de baja volatilidad / BAB (&quot;betting against beta&quot;, Frazzini-Pedersen 2014) se explica porque:", "opts": [{"text": "Las acciones de mayor beta siempre rinden más ajustadas por riesgo", "correct": false}, {"text": "Muchos inversionistas no pueden apalancarse, así que sobreponderan activos de alto beta y elevan su precio (bajando su rendimiento esperado); por eso los activos de bajo beta ofrecen mejor rendimiento ajustado por riesgo", "correct": true}, {"text": "La volatilidad no tiene relación con el rendimiento", "correct": false}, {"text": "Es idéntico al factor valor", "correct": false}], "just": "La restricción de apalancamiento es la clave: quien sí puede apalancar bajo-beta (como el &quot;Opportunistic US Equities&quot;, que sube apalancamiento de 1.4x a 2x de forma contraria al mercado) explota esta anomalía —enhanced beta—."}, {"id": 292, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El modelo de cinco factores de Fama-French (2015), respecto al poder explicativo:", "opts": [{"text": "Explica menos del 10% de la varianza de los rendimientos", "correct": false}, {"text": "Añade RMW (rentabilidad) y CMA (inversión) a mercado, tamaño y valor, y explica aproximadamente 71-94% de la varianza de los rendimientos de los portafolios", "correct": true}, {"text": "Reemplaza por completo al factor de mercado", "correct": false}, {"text": "No incluye el factor valor", "correct": false}], "just": "El FF5 mejora el poder explicativo del FF3 al incorporar las dos dimensiones de calidad; su rango de varianza explicada (71-94%) lo convierte en un marco de referencia para atribución de rendimientos."}, {"id": 293, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El enfoque integrado de construcción multifactor:", "opts": [{"text": "Crea un portafolio separado por cada factor y los suma", "correct": false}, {"text": "Combina los distintos factores en un solo proceso de construcción del portafolio, evitando exposiciones que se compensan entre sí y mejorando el ratio de información (~+40% según Fitzgibbons et al., 2017)", "correct": true}, {"text": "Ignora la diversificación", "correct": false}, {"text": "Solo invierte en el factor de mercado", "correct": false}], "just": "Al integrar señales en una sola optimización, una acción puede ser atractiva por valor y por calidad a la vez, evitando que las posiciones de un factor anulen las de otro (exposiciones compensatorias)."}, {"id": 294, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El enfoque mixto de construcción multifactor:", "opts": [{"text": "Es idéntico al integrado", "correct": false}, {"text": "Crea portafolios separados por factor (valor, momentum, calidad) y luego los combina con pesos específicos; ofrece pureza factorial, transparencia y flexibilidad táctica (p. ej., 50% value + 50% momentum)", "correct": true}, {"text": "Solo usa un factor a la vez", "correct": false}, {"text": "No permite ajustar pesos", "correct": false}], "just": "El enfoque mixto (Vogel, 2025) mantiene cada factor &quot;puro&quot; en su propio portafolio, lo que da transparencia y permite reasignar tácticamente; históricamente, 50/50 value+momentum mostró buen desempeño por la baja correlación entre ambos."}, {"id": 295, "sec": 13, "secTitle": "Factor investing: profundización", "q": "La principal diferencia entre el enfoque integrado y el mixto es:", "opts": [{"text": "Que el mixto siempre rinde más", "correct": false}, {"text": "El integrado optimiza todos los factores juntos (maximiza eficiencia y evita exposiciones compensatorias); el mixto mantiene factores separados y los combina (maximiza pureza, transparencia y flexibilidad táctica), con un trade-off entre eficiencia y claridad", "correct": true}, {"text": "Que el integrado no usa factores", "correct": false}, {"text": "Que son indistinguibles en la práctica", "correct": false}], "just": "No hay un ganador universal: el integrado tiende a ser más eficiente en captura de prima neta; el mixto es más transparente y flexible. La elección depende de los objetivos y la sofisticación del inversionista."}, {"id": 296, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El &quot;factor quilt&quot; (tabla de desempeño anual por factor, estilo Morningstar) ilustra que:", "opts": [{"text": "Un mismo factor gana todos los años", "correct": false}, {"text": "Ningún factor lidera de forma consistente: el mejor de un año puede ser el peor del siguiente, lo que justifica diversificar entre factores en lugar de apostar a uno solo", "correct": true}, {"text": "Los factores no tienen ciclos", "correct": false}, {"text": "El factor de mercado siempre es el peor", "correct": false}], "just": "La ciclicidad y rotación de liderazgo entre factores es el argumento central a favor de la diversificación factorial: combinar factores poco correlacionados suaviza el camino y reduce el riesgo de quedar atrapado en el invierno de un solo factor."}, {"id": 297, "sec": 13, "secTitle": "Factor investing: profundización", "q": "La &quot;persistencia y paciencia&quot; en la inversión por factores significa que:", "opts": [{"text": "Hay que cambiar de factor cada mes según el desempeño reciente", "correct": false}, {"text": "Los factores atraviesan periodos largos de underperformance y su captura exige mantener la exposición con disciplina; abandonarlos en el peor momento destruye la prima de largo plazo", "correct": true}, {"text": "Los factores pagan de forma constante todos los meses", "correct": false}, {"text": "La paciencia es irrelevante en factores", "correct": false}], "just": "Conecta con las finanzas conductuales (Sección 4) y el coaching (Secciones 5 y 7): el mayor enemigo de la captura de factores es la impaciencia conductual del inversionista, no la teoría."}, {"id": 298, "sec": 13, "secTitle": "Factor investing: profundización", "q": "El &quot;factor decay&quot; y el riesgo de crowding implican que:", "opts": [{"text": "Todos los factores son permanentes e inmutables", "correct": false}, {"text": "Algunas primas pueden debilitarse tras su publicación y popularización (como ocurrió con el factor tamaño), por arbitraje o cambios estructurales; conviene basarse en factores con evidencia robusta y global", "correct": true}, {"text": "Los factores nunca cambian de magnitud", "correct": false}, {"text": "Publicar un factor lo fortalece", "correct": false}], "just": "La economía de los factores no es estática. Por eso se privilegian factores con fundamentación teórica sólida y evidencia internacional amplia (como QMJ en 23/24 países), más resistentes al decaimiento que anomalías frágiles."}, {"id": 299, "sec": 13, "secTitle": "Factor investing: profundización", "q": "¿Cómo se mapean los factores a los vehículos de GBM?", "opts": [{"text": "No existe forma de invertir en factores con GBM", "correct": false}, {"text": "Factor de mercado → GMP / GMP+; enhanced beta (BAB) → Opportunistic US Equities; momentum → GBMTRV / Global Equity Factor; growth → GBMINT; valor + calidad → Top Picks Global", "correct": true}, {"text": "Todos los factores se capturan con un solo fondo de deuda", "correct": false}, {"text": "Solo el factor de mercado es accesible", "correct": false}], "just": "GBM ofrece vehículos para implementar cada factor o combinaciones, permitiendo construir exposiciones factoriales diversificadas desde la app, ya sea con enfoque integrado o mixto."}, {"id": 300, "sec": 13, "secTitle": "Factor investing: profundización", "q": "Síntesis (capstone). Un cliente con horizonte largo quiere &quot;invertir como los profesionales, con base científica&quot;. El enfoque factorial correcto sería:", "opts": [{"text": "Apostar todo al factor que mejor rindió el año pasado", "correct": false}, {"text": "Evitar los factores por completo y mantener solo efectivo", "correct": false}, {"text": "Construir una exposición diversificada a múltiples factores con evidencia sólida (mercado, valor, momentum, calidad, baja volatilidad), elegir entre enfoque integrado o mixto según objetivos, dimensionar los costos y, sobre todo, mantener la disciplina a través de los periodos de underperformance (&quot;time in the market&quot;)", "correct": true}, {"text": "Usar exclusivamente ETFs apalancados para multiplicar la prima", "correct": false}], "just": "Integra todo el bloque y el banco: inversión sistemática basada en evidencia (+60 años y Premios Nobel), diversificación factorial para suavizar la ciclicidad, atención a costos (Advisor&#x27;s Alpha) y disciplina conductual (la verdadera fuente de fracaso). El rol del asesor —médico del dinero— es sostener al cliente en el plan cuando un factor atraviesa su invierno."}, {"id": 301, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "Según la teoría de portafolios por ciclo de vida, la riqueza total del inversionista es:", "opts": [{"text": "Solo sus activos financieros", "correct": false}, {"text": "El capital humano (valor presente de los ingresos laborales futuros) más el capital financiero; para un inversionista joven, el capital humano puede representar hasta ~94% de su riqueza total", "correct": true}, {"text": "Únicamente el valor de su vivienda", "correct": false}, {"text": "El saldo de su AFORE exclusivamente", "correct": false}], "just": "El marco de Ibbotson, Milevsky, Chen y Zhu (2007) integra capital humano y financiero. En la juventud domina el capital humano; con la edad este se &quot;convierte&quot; en capital financiero, lo que justifica (en la teoría tradicional) reducir el riesgo de la cartera con el tiempo."}, {"id": 302, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "El principio de Bodie, Merton y Samuelson (1992) sobre la flexibilidad laboral establece que:", "opts": [{"text": "Quien tiene un empleo estable debe evitar la renta variable", "correct": false}, {"text": "Los inversionistas con alta flexibilidad laboral (capacidad de ajustar cuánto y cuánto tiempo trabajan) pueden asumir mayor riesgo en su portafolio de inversión", "correct": true}, {"text": "La flexibilidad laboral no afecta la asignación", "correct": false}, {"text": "Hay que invertir 100% en bonos hasta el retiro", "correct": false}], "just": "La flexibilidad laboral es una opción implícita: quien puede trabajar más o posponer el retiro ante un mal escenario tiene mayor capacidad de absorber riesgo financiero, igual que un capital humano &quot;tipo bono&quot; estable lo permite."}, {"id": 303, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "Los dos &quot;dogmas&quot; tradicionales de la inversión por ciclo de vida —precisamente los que el paper de Anarkulova et al. cuestiona— son:", "opts": [{"text": "Maximizar el Sharpe y minimizar comisiones", "correct": false}, {"text": "(i) diversificar entre acciones y bonos, y (ii) reducir la exposición a renta variable conforme aumenta la edad (glidepath: los jóvenes más acciones que los viejos)", "correct": true}, {"text": "Invertir solo en el mercado local y evitar divisas", "correct": false}, {"text": "Comprar y vender con frecuencia para capturar tendencias", "correct": false}], "just": "Estos dos principios son la base de los target-date funds y de los glidepath regulatorios (como las Siefores generacionales). El paper los somete a una &quot;evaluación crítica&quot;."}, {"id": 304, "sec": 14, "secTitle": "Lifecycle investing y el \"all-equity\" de Anarkulova-Cederburg-O'Doherty", "q": "La &quot;aversión miópica a las pérdidas&quot; (Benartzi y Thaler, 1995) implica que:", "opts": [{"text": "Revisar el portafolio con más frecuencia mejora las decisiones", "correct": false}, {"text": "Evaluar el portafolio con menor frecuencia lleva a asumir más renta variable; la frecuencia de revisión debería ser inversamente proporcional al horizonte de inversión", "correct": true}, {"text": "La frecuencia de revisión no afecta la asignación", "correct": false}, {"text": "Hay que revisar el portafolio a diario para invertir más en acciones", "correct": false}], "just": "En el experimento, quienes veían resultados anuales invertían ~60% en acciones vs. ~40% de quienes los veían a diario, ante la misma volatilidad. Ver menos el portafolio (automatizar) reduce el dolor de la volatilidad de corto plazo y favorece mantener más renta variable. Conecta con la aversión a las pérdidas (Sec
